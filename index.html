// 把總堂數平均切成 n 段（前段多、後段補），回傳陣列。例：10,3 → [4,3,3]
function splitSessions(total, n){
  const base=Math.floor(total/n), rem=total%n;
  return Array.from({length:n},(_,i)=>base+(i<rem?1:0));
}
// 把金額平均切成 n 期（前期多、後期補，四捨五入到整數），總和等於原金額
function splitAmount(amount, n){
  const per=Math.floor(amount/n), rem=amount-per*n;
  return Array.from({length:n},(_,i)=>per+(i<rem?1:0));
}
// 顯示分期試算（每期金額、開通堂數）
function refreshInstallPreview(){
  const box=document.getElementById('gt-install-preview'); if(!box)return;
  const plan=window._grantPlanCache;
  const n=Number((document.getElementById('gt-install')||{}).value||1);
  if(!plan || n<=1){ box.style.display='none'; return; }
  const total=(plan.sessions_base||0)+(plan.sessions_bonus||0);
  const amount=Number((document.getElementById('gt-amount')||{}).value)||0;
  const segs=splitSessions(total,n);
  const amts=splitAmount(amount,n);
  const rows=segs.map((s,i)=>{
    const from=segs.slice(0,i).reduce((a,b)=>a+b,0)+1, to=from+s-1;
    return `第 ${i+1} 期：$${amts[i].toLocaleString()}　·　開通第 ${from}–${to} 堂（${s} 堂）${i===0?'　<b style="color:var(--green);">發放即開通</b>':'　<span style="color:var(--t3);">上到接近上限時收款解鎖</span>'}`;
  }).join('<br>');
  box.innerHTML=`<div style="font-size:14px;margin-bottom:6px;">本期實收 <b style="color:var(--green);font-size:17px;">$${amts[0].toLocaleString()}</b>　<span style="color:var(--t3);font-size:11.5px;">（總金額 $${amount.toLocaleString()} ÷ ${n} 期）</span></div><b style="color:var(--green);">分 ${n} 期・分段開通</b><br>${rows}<br><span style="color:var(--t3);">發放時只記第 1 期營收（$${amts[0].toLocaleString()}），第 2、3 期收款時再認列。</span>`;
  box.style.display='';
}
async function submitGrant(){
  const member_id=document.getElementById('gt-member').value;
  const plan_id=document.getElementById('gt-plan').value;
  if(!plan_id){ showToast('此會員沒有可發放的方案'); return; }
  const plan=await dbGet('course_plans',plan_id);
  // 防呆：主顧客方案只能發給主顧客/VIP
  if(plan && plan.plan_type==='loyal'){
    const mem0=await dbGet('members',member_id);
    if(!memberCanUseLoyal(mem0)){ showToast('主顧客方案僅限主顧客／VIP 會員，請先調整會員等級'); return; }
  }
  const total=plan.sessions_base+plan.sessions_bonus;
  const unitPrice=plan.unit_price||0;
  const listPrice=unitPrice*plan.sessions_base;
  const dealAmount=Number(document.getElementById('gt-amount').value)||listPrice; // 實際成交金額
  const method=document.getElementById('gt-method').value;
  const installCount=plan.installment?(Number(document.getElementById('gt-install').value)||1):1;
  const note=document.getElementById('gt-note').value.trim()||null;
  // ── 分期（分段解鎖）計算 ──
  const isInstall = installCount>1;
  const segs = isInstall ? splitSessions(total, installCount) : [total];
  const amts = isInstall ? splitAmount(dealAmount, installCount) : [dealAmount];
  const unlocked = segs[0];                        // 只開通第 1 段
  const firstAmount = amts[0];                     // 第 1 期實收
  const installment = isInstall ? {
    count: installCount,
    segments: segs,
    amounts: amts,
    paid: amts.map((_,i)=>i===0),                  // 只有第 1 期已付
    current: 1                                      // 已開通到第 1 段
  } : null;
  const t={id:uid('TK'),member_id,ticket_type_id:plan.ticket_type_id,source_plan_id:plan_id,plan_name:plan.name,format:plan.format||null,source:'purchase',
    unit_price:unitPrice, amount_paid:(isInstall?firstAmount:dealAmount),   // 營收：分期只記第1期實收
    purchase_date:ymd(TODAY),start_date:ymd(TODAY),expire_date:ymd(addDays(TODAY,plan.valid_days)),
    sessions_total:total,sessions_remaining:total,
    unlocked_sessions:unlocked, installment:installment,   // 分期分段解鎖
    status:'usable',
    payment_status:document.getElementById('gt-pay').value,invoice_status:'none',created_at:new Date().toISOString()};
  await dbPut('member_tickets',t);
  await logTicket(t.id,'grant',total,null,SESSION.id,'發放（'+plan.name+'）'+(isInstall?`，分${installCount}期・首期開通${unlocked}堂`:''));
  // 建立購買紀錄（分期只記第1期實收金額；未收期款不列入營收）
  try{

      note,operator:SESSION.id,source:'backoffice',created_at:new Date().toISOString()});
  }catch(e){ /* 購買紀錄失敗不阻斷發票券，僅記錄 */ console.error('purchase log fail',e); }
  // 新朋友購買「私人教練」課程 → 自動升級為「會員」
  try{
    const ty=await dbGet('ticket_types',plan.ticket_type_id);

      if(mem && (mem.tier==='newbie'||!mem.tier)){
        mem.tier='regular';
        await dbPut('members',mem);

    }
  }catch(_){}
  closeModal();showToast('票券已發放：'+plan.name);

// 教練首頁月曆（每日：課程數圓點＋值班時數）
function coachDashCalendar(month, bookings, shifts){
  const [my,mm]=month.split('-');
  const daysInMonth=new Date(Number(my),Number(mm),0).getDate();
  const firstDow=new Date(Number(my),Number(mm)-1,1).getDay();
  const today=ymd(TODAY);
  const WDh=['日','一','二','三','四','五','六'];
  let cells='';
  for(let i=0;i<firstDow;i++) cells+='<div class="cdash-cell cdash-empty"></div>';
  for(let d=1;d<=daysInMonth;d++){
    const ds=`${my}-${mm}-${String(d).padStart(2,'0')}`;
    const dow=new Date(Number(my),Number(mm)-1,d).getDay();
    const isWk=dow===0||dow===6;
    const dayBks=bookings.filter(b=>b.coach_id===SESSION.id&&b.date===ds&&b.status!=='cancelled');
    // 綠燈＝已完成/已簽到；橘燈＝已預約尚未簽到
    const doneN=dayBks.filter(b=>b.status==='completed'||b.status==='checked_in').length;
    const pendN=dayBks.filter(b=>b.status!=='completed'&&b.status!=='checked_in').length;
    const duty=shifts.filter(s=>s.emp_id===SESSION.id&&s.date===ds).reduce((a,s)=>a+(Number(s.hours)||0),0);
    const isToday=ds===today;
    cells+=`<div class="cdash-cell${isWk?' cdash-wk':''}${isToday?' cdash-today':''}" onclick="coachDashClickDay('${ds}')" data-d="${ds}">
      <div class="cdash-num">${d}</div>
      ${(doneN>0||pendN>0)?`<div class="cdash-cls">${doneN>0?`<span class="cdash-lamp lamp-done">${doneN}</span>`:''}${pendN>0?`<span class="cdash-lamp lamp-pend">${pendN}</span>`:''}</div>`:''}
      ${duty>0?`<div class="cdash-duty">🕒${duty%1===0?duty:duty.toFixed(1)}h</div>`:''}
    </div>`;
  }
  return `<div class="cdash-head">${WDh.map((w,i)=>`<div class="cdash-wd${(i===0||i===6)?' cdash-wd-wk':''}">${w}</div>`).join('')}</div>
    <div class="cdash-grid">${cells}</div>`;
}

}
// ════════ 全系統共用月曆元件（四角固定資訊、中央留白）════════
// opts: { role:'admin'|'coach'|'member', month:'YYYY-MM', bookings, shifts, attendance, myId, onDayFn }
//   左上=日期、右上=值班狀態(依角色)、左下=🟢已簽到、右下=🟠已預約、中央留白
//   點日期 → 呼叫 onDayFn(ds)，於 #ucal-day 展開
const SHIFT_LABEL={ 'A':'早班','A1':'早班','C':'晚班','C1':'晚班','全':'全班' };
function shiftLabelOf(code){ if(!code) return '排班'; if(SHIFT_QUICK.find(([c])=>c===code)) return code; return SHIFT_LABEL[code]||code; }
// 分鐘 → HH:MM
function minToTimeStr(m){ const h=Math.floor(m/60), mi=m%60; return String(h).padStart(2,'0')+':'+String(mi).padStart(2,'0'); }
// 產出某天「值班異常」說明 HTML（無異常回空字串）
//   ① 營業時間內有缺人時段（列出各段起迄）
//   ② 有人排班但未打卡（過去/今天才算；列出姓名），coachMap: id→名字
function dutyAbnormalHtml(ds, dow, shifts, attendance, coachMap, today){
  const dayShifts=(shifts||[]).filter(s=>s.date===ds&&!s.leave_type);
  const gaps=findShiftGaps(dayShifts, dow);
  let noPunchNames=[];
  if(ds<=today){
    dayShifts.forEach(s=>{
      if(!shiftStarted(ds, s.start_time, today)) return; // 班次還沒開始，不算未打卡
      const att=(attendance||[]).find(a=>a.emp_id===s.emp_id&&a.date===ds);
      if(!att||!att.clock_in){ const nm=(coachMap&&coachMap[s.emp_id])||'（未知員工）'; if(!noPunchNames.includes(nm)) noPunchNames.push(nm); }
    });
  }
  if(gaps.length===0 && noPunchNames.length===0) return '';
  const bh=BUSINESS_HOURS[dow];
  const bhStr=bh?`${bh[0]}–${bh[1]}`:'—';
  let rows='';
  if(gaps.length>0){
    const segs=gaps.map(([s,e])=>`<b>${minToTimeStr(s)}–${minToTimeStr(e)}</b>`).join('、');
    rows+=`<div style="display:flex;gap:7px;align-items:flex-start;margin-top:4px;">
      <span style="color:#c0392b;flex-shrink:0;">●</span>
      <span>營業時間內有缺人時段：${segs}<br><span style="color:var(--t3);font-size:11px;">（本日營業 ${bhStr}）</span></span></div>`;
  }
  if(noPunchNames.length>0){
    rows+=`<div style="display:flex;gap:7px;align-items:flex-start;margin-top:4px;">
      <span style="color:#c0392b;flex-shrink:0;">●</span>
      <span>有排班但尚未打卡：<b>${noPunchNames.join('、')}</b></span></div>`;
  }
  return `<div style="background:#fdf3ec;border:1px solid #e8c9b5;border-radius:9px;padding:10px 12px;margin-bottom:10px;font-size:12.5px;line-height:1.7;color:#8a5230;">
    <div style="font-weight:700;color:#c0392b;margin-bottom:2px;">⚠ 值班異常</div>${rows}</div>`;
}
function unifiedCalendar(opts){
  const {role,month,bookings,shifts,attendance,myId,onDayFn}=opts;
  const [my,mm]=month.split('-');
  const daysInMonth=new Date(Number(my),Number(mm),0).getDate();
  const firstDow=new Date(Number(my),Number(mm)-1,1).getDay();
  const today=ymd(TODAY);
  const WDh=['日','一','二','三','四','五','六'];
  const fn=onDayFn||'ucalClickDay';
  // 角色對應的「我的課」判斷
  const isMine=(b)=> role==='admin' ? true
    : role==='member' ? (b.member_id===myId || (Array.isArray(b.member_ids)&&b.member_ids.includes(myId)))
    : (b.coach_id===myId || b.substitute_coach_id===myId); // coach
  let cells='';
  for(let i=0;i<firstDow;i++) cells+='<div class="ucal-cell ucal-empty"></div>';
  for(let d=1;d<=daysInMonth;d++){
    const ds=`${my}-${mm}-${String(d).padStart(2,'0')}`;
    const dow=new Date(Number(my),Number(mm)-1,d).getDay();
    const isWk=dow===0||dow===6;
    const isToday=ds===today;
    const dayBks=(bookings||[]).filter(b=>b.date===ds&&b.status!=='cancelled'&&isMine(b));
    const doneN=dayBks.filter(b=>b.status==='completed'||b.status==='checked_in').length;
    const pendN=dayBks.filter(b=>b.status!=='completed'&&b.status!=='checked_in').length;
    // ── 右上：值班狀態（依角色）──
    let topRight='';
    if(role==='coach'){
      const myShift=(shifts||[]).find(s=>s.emp_id===myId&&s.date===ds);
      const onLeave=myShift&&myShift.leave_type; // 休假 → 留白
      if(myShift && !onLeave){
        const att=(attendance||[]).find(a=>a.emp_id===myId&&a.date===ds);
        if(att&&att.clock_in&&att.clock_out){
          const h=calcWorkHours(att); topRight=`<span class="ucal-tr ucal-tr-h">${h!=null?(h%1===0?h:h.toFixed(1))+'h':''}</span>`;
        }else if(att&&att.clock_in){
          topRight=`<span class="ucal-tr ucal-tr-on"><i class="ucal-dot ucal-dot-g"></i>上班</span>`;
        }else{
          const code=myShift.code||shiftCode(myShift.start_time,myShift.end_time);
          topRight=`<span class="ucal-tr ucal-tr-shift">${shiftLabelOf(code)}</span>`;
        }
      }
    }else if(role==='admin'){
      // 值班異常：①有人排班但未打卡 ②營業時間有缺人（沒排班）
      const dayShifts=(shifts||[]).filter(s=>s.date===ds&&!s.leave_type);
      let abnormal=false;
      // 過去與今天才檢查未打卡（未來不算異常）
      if(ds<=today){
        const noPunch=dayShifts.some(s=>{
          if(!shiftStarted(ds, s.start_time, today)) return false; // 班次還沒開始，不算未打卡
          const att=(attendance||[]).find(a=>a.emp_id===s.emp_id&&a.date===ds);
          return !att||!att.clock_in;
        });
        const gaps=findShiftGaps(dayShifts,dow);
        if(noPunch||gaps.length>0) abnormal=true;
      }else{
        // 未來：只檢查營業時間是否有缺人（提醒排班）
        const gaps=findShiftGaps(dayShifts,dow);
        if(gaps.length>0) abnormal=true;
      }
      if(abnormal) topRight=`<span class="ucal-tr ucal-tr-warn" title="值班異常，點格子看原因">⚠</span>`;
    }
    // role==='member' → 右上留白
    // ── 左下/右下：簡化為單一狀態（只回答「今天是否還有未完成」）──
    //   有未簽到 → 🟠 未完成數；全部完成 → 🟢 總課數；無課 → 留白
    let statusCorner='';
    if(dayBks.length>0){
      if(pendN>0){
        statusCorner=`<span class="ucal-br ucal-st-o"><i class="ucal-dot ucal-dot-o"></i>${pendN}</span>`;
      }else{
        statusCorner=`<span class="ucal-br ucal-st-g"><i class="ucal-dot ucal-dot-g"></i>${dayBks.length}</span>`;
      }
    }
    cells+=`<div class="ucal-cell${isWk?' ucal-wk':''}${isToday?' ucal-today':''}" onclick="${fn}('${ds}')" data-d="${ds}">
      <div class="ucal-tl">${d}</div>
      ${topRight}
      ${statusCorner}
    </div>`;
  }
  return `<div class="ucal-head">${WDh.map((w,i)=>`<div class="ucal-wd${(i===0||i===6)?' ucal-wd-wk':''}">${w}</div>`).join('')}</div>
    <div class="ucal-grid">${cells}</div>
    <div id="ucal-day"></div>`;
}

// 工時（小時，1 位小數）
function calcWorkHours(rec){
  if(!rec||!rec.clock_in||!rec.clock_out) return null;
  const [ih,im]=rec.clock_in.split(':').map(Number);
  const [oh,om]=rec.clock_out.split(':').map(Number);
  let mins=(oh*60+om)-(ih*60+im);
  if(mins<0) mins+=24*60; // 跨午夜
  return Math.round(mins/30)/2; // 以 0.5 小時為單位（四捨五入）
}
function nowHM(){ const n=new Date(); return String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0'); }

}

async function startScan(){
  const video=document.getElementById('scan-video');
  const hint=document.getElementById('scan-hint');
  if(!video) return;
  try{
    _scanStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
    video.srcObject=_scanStream; video.setAttribute('playsinline','true'); await video.play();
    hint.textContent='將店內 QR Code 對準框內';
  }catch(e){
    hint.innerHTML='無法開啟相機，請允許相機權限後重試。<br><span style="font-size:11px;">'+(e&&e.name?e.name:'')+'</span>';
    return;
  }
  // 優先用原生 BarcodeDetector（Android Chrome），否則載入 jsQR（iPhone/Safari）
  if('BarcodeDetector' in window){
    const detector=new BarcodeDetector({formats:['qr_code']});
    const tick=async()=>{
      if(!_scanStream)return;
      try{
        const codes=await detector.detect(video);
        if(codes&&codes.length){ handleScanValue(codes[0].rawValue||'',hint); if(_scanBusy)return; }
      }catch(_){}
      _scanRAF=requestAnimationFrame(tick);
    };
    _scanRAF=requestAnimationFrame(tick);
  }else{
    // 載入 jsQR
    await ensureJsQR(hint);
    if(!window.jsQR){ return; }
    const canvas=document.createElement('canvas');
    const ctx=canvas.getContext('2d',{willReadFrequently:true});
    const tick=()=>{
      if(!_scanStream)return;
      if(video.readyState===video.HAVE_ENOUGH_DATA){
        canvas.width=video.videoWidth; canvas.height=video.videoHeight;
        ctx.drawImage(video,0,0,canvas.width,canvas.height);
        try{
          const img=ctx.getImageData(0,0,canvas.width,canvas.height);
          const code=window.jsQR(img.data,img.width,img.height,{inversionAttempts:'dontInvert'});
          if(code&&code.data){ handleScanValue(code.data,hint); if(_scanBusy)return; }
        }catch(_){}
      }
      _scanRAF=requestAnimationFrame(tick);
    };
    _scanRAF=requestAnimationFrame(tick);
  }
}
// 載入 jsQR 函式庫（從 CDN，使用者手機端載入）
function ensureJsQR(hint){
  return new Promise(resolve=>{
    if(window.jsQR){ resolve(); return; }
    if(hint) hint.textContent='載入掃描元件中…';
    const s=document.createElement('script');
    s.src='https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js';
    s.onload=()=>{ if(hint)hint.textContent='將店內 QR Code 對準框內'; resolve(); };
    s.onerror=()=>{ if(hint)hint.innerHTML='掃描元件載入失敗，請確認網路連線後重試。'; resolve(); };
    document.head.appendChild(s);
  });
}
// 處理掃到的內容（依 _scanMode 分派）
function handleScanValue(val,hint){
  if(_scanBusy) return;
  if(_scanMode==='member'){
    if(val===MEMBER_QR_CODE){ _scanBusy=true; stopScan(); doMemberScanCheckin(); }
    else if(val){ if(hint)hint.textContent='QR Code 不正確，請掃描店內會員簽到碼'; }
    return;
  }
  // 預設：員工打卡
  if(val===STAFF_QR_CODE){ _scanBusy=true; stopScan(); doScanPunch(); }
  else if(val){ if(hint)hint.textContent='QR Code 不正確，請掃描店內打卡碼'; }
}

  if(_scanRAF){ cancelAnimationFrame(_scanRAF); _scanRAF=null; }

// 浮動打卡鈕可拖曳（記住位置，拖曳時不觸發點擊）
let _fabDragInit=false;
function initPunchFabDrag(fab){
  if(_fabDragInit) return; _fabDragInit=true;
  let sx=0,sy=0,ox=0,oy=0,moved=false,dragging=false;
  // 將按鈕夾限在當前可視範圍內（視窗縮放/還原位置時呼叫，避免跑到畫面外）
  const clampIntoView=()=>{
    if(fab.style.left==='' || fab.style.left==='auto') return; // 還沒被拖過、用預設 right/bottom 定位則不處理
    const w=fab.offsetWidth||60, h=fab.offsetHeight||60;
    let l=parseFloat(fab.style.left)||0, t=parseFloat(fab.style.top)||0;
    l=Math.max(6, Math.min(window.innerWidth - w - 6, l));
    t=Math.max(60, Math.min(window.innerHeight - h - 6, t));
    fab.style.left=l+'px'; fab.style.top=t+'px'; fab.style.right='auto'; fab.style.bottom='auto';
  };
  // 還原上次位置（並夾限到目前視窗）
  try{ const p=JSON.parse(sessionStorage.getItem('punchFabPos')||'null'); if(p){ fab.style.left=p.left+'px'; fab.style.top=p.top+'px'; fab.style.right='auto'; fab.style.bottom='auto'; clampIntoView(); try{ sessionStorage.setItem('punchFabPos',JSON.stringify({left:parseFloat(fab.style.left)||0,top:parseFloat(fab.style.top)||0})); }catch(_){} } }catch(_){}
  // 視窗縮放時把按鈕拉回畫面內
  window.addEventListener('resize', clampIntoView);
  const start=(x,y)=>{ dragging=true;moved=false; sx=x;sy=y; const r=fab.getBoundingClientRect(); ox=r.left; oy=r.top; fab.classList.add('dragging'); };
  const move=(x,y)=>{ if(!dragging)return; const dx=x-sx,dy=y-sy; if(Math.abs(dx)>4||Math.abs(dy)>4)moved=true;
    let nl=ox+dx, nt=oy+dy;
    nl=Math.max(6,Math.min(window.innerWidth-fab.offsetWidth-6,nl));
    nt=Math.max(60,Math.min(window.innerHeight-fab.offsetHeight-6,nt));
    fab.style.left=nl+'px'; fab.style.top=nt+'px'; fab.style.right='auto'; fab.style.bottom='auto';
  };
  const end=()=>{ if(!dragging)return; dragging=false; fab.classList.remove('dragging');
    if(moved){ const r=fab.getBoundingClientRect(); try{ sessionStorage.setItem('punchFabPos',JSON.stringify({left:r.left,top:r.top})); }catch(_){} }
  };
  fab.addEventListener('touchstart',e=>{ const t=e.touches[0]; start(t.clientX,t.clientY); },{passive:true});
  fab.addEventListener('touchmove',e=>{ const t=e.touches[0]; move(t.clientX,t.clientY); },{passive:true});
  fab.addEventListener('touchend',end);
  fab.addEventListener('mousedown',e=>{ start(e.clientX,e.clientY); e.preventDefault(); });
  window.addEventListener('mousemove',e=>move(e.clientX,e.clientY));
  window.addEventListener('mouseup',end);
  // 點擊：若剛拖曳過則不觸發
  fab.addEventListener('click',e=>{ if(moved){ e.preventDefault(); e.stopPropagation(); moved=false; return; } punchFabTap(); });
  fab._dragMoved=()=>moved;
}

}

async function renderAttRequests(){

  const pending=reqs.filter(r=>r.status==='pending').sort((a,b)=>(b.created_at||'').localeCompare(a.created_at||''));
  const done=reqs.filter(r=>r.status!=='pending').sort((a,b)=>(b.created_at||'').localeCompare(a.created_at||'')).slice(0,20);
  const rowHtml=(r,isPending)=>`<div class="card" style="padding:13px 15px;margin-bottom:10px;">

        <div style="font-size:12.5px;color:var(--t2);margin-top:4px;">上班 ${r.clock_in||'—'}　·　下班 ${r.clock_out||'—'}</div>
        ${r.reason?`<div style="font-size:12px;color:var(--t3);margin-top:3px;">原因：${r.reason}</div>`:''}

        : `<span class="tag ${r.status==='approved'?'tag-ok':'tag-warn'}">${r.status==='approved'?'已核准':'已駁回'}</span>`}
    </div>
  </div>`;
  body.innerHTML=`

async function approvePunchReq(id){
 try{
  const r=await dbGet('punch_requests',id);
  if(!r){ showToast('找不到申請'); return; }
  // 寫入 / 更新 attendance
  let rec=await getAttendance(r.emp_id,r.date);
  if(!rec) rec={id:uid('AT'),emp_id:r.emp_id,emp_name:r.emp_name||'',date:r.date,created_at:new Date().toISOString()};
  if(r.clock_in) rec.clock_in=r.clock_in;
  if(r.clock_out) rec.clock_out=r.clock_out;
  if(rec.clock_in&&rec.clock_out) rec.work_hours=calcWorkHours(rec);
  await dbPut('attendance',rec);
  r.status='approved'; r.reviewed_at=new Date().toISOString();
  await dbPut('punch_requests',r);
  showToast('已核准，出勤紀錄已更新');
  navTo('attendance');
 }catch(e){ showToast('核准失敗：'+(e&&e.message?e.message:e)); }
}
async function rejectPunchReq(id){
 try{
  const r=await dbGet('punch_requests',id);
  if(!r){ showToast('找不到申請'); return; }
  r.status='rejected'; r.reviewed_at=new Date().toISOString();
  await dbPut('punch_requests',r);
  showToast('已駁回');
  navTo('attendance');
 }catch(e){ showToast('操作失敗：'+(e&&e.message?e.message:e)); }
}
// ① 今日出勤總覽（應出勤＝當天有排班的人員）
function renderAttToday(needPunch,all,coaches,shifts){
  const date=_attDate||ymd(TODAY);
  const recMap=Object.fromEntries(all.filter(a=>a.date===date).map(r=>[r.emp_id,r]));
  const coachMap=Object.fromEntries((coaches||[]).map(c=>[c.id,c]));
  // 當天有排班的人員（一人可能多段，依姓名彙整時段）
  const dayShifts=(shifts||[]).filter(s=>s.date===date).sort((a,b)=>(a.start_time||'').localeCompare(b.start_time||''));
  const byEmp={};
  dayShifts.forEach(s=>{ (byEmp[s.emp_id]=byEmp[s.emp_id]||[]).push(s); });
  const dutyEmpIds=Object.keys(byEmp);
  const punchedIn=dutyEmpIds.filter(id=>recMap[id]&&recMap[id].clock_in).length;
  const rowsHtml = dutyEmpIds.length===0
    ? `<tr><td colspan="5" style="text-align:center;color:var(--t3);padding:20px;">本日無人排班</td></tr>`
    : dutyEmpIds.map(id=>{
        const c=coachMap[id]; const nm=c?(c.name||'—'):id;
        const segs=byEmp[id].map(s=>{const code=s.code||shiftCode(s.start_time,s.end_time);return `${code?code+' ':''}${s.start_time}–${s.end_time}`;}).join('、');
        const r=recMap[id]; const wh=r?calcWorkHours(r):null;
        return `<tr>
          <td data-label="姓名">${nm}</td>
          <td data-label="排班">${segs}</td>
          <td data-label="上班">${r&&r.clock_in?r.clock_in:'<span style="color:var(--t3);">未打</span>'}</td>
          <td data-label="下班">${r&&r.clock_out?r.clock_out:(r&&r.clock_in?'<span style="color:var(--warn);">上班中</span>':'—')}</td>
          <td data-label="當日工時">${wh!=null?wh+' 小時':'—'}</td>
        </tr>`;
      }).join('');
  document.getElementById('att-body').innerHTML=`<div class="card">
    <div class="card-title">今日出勤
      <input type="date" value="${date}" onchange="_attDate=this.value;navTo('attendance')" style="padding:6px 10px;border:1px solid var(--bd);border-radius:8px;background-color:#fff;font-size:13px;padding-right:30px;">
    </div>
    <div class="stat-grid dash-summary"><div class="stat-card"><div class="sc-label">應出勤（排班）</div><div><span class="sc-num">${dutyEmpIds.length}</span><span class="sc-unit">人</span></div></div>
      <div class="stat-card"><div class="sc-label">已上班打卡</div><div><span class="sc-num" style="color:var(--green);">${punchedIn}</span><span class="sc-unit">人</span></div></div></div>
    <table class="rwd-card"><thead><tr><th>姓名</th><th>排班</th><th>上班</th><th>下班</th><th>當日工時</th></tr></thead><tbody>
    ${rowsHtml}
    </tbody></table>
  </div>`;
}

// ③ 工時統計（本月各員工累計）
function renderAttHours(needPunch,all){
  const ym=(_attDate||ymd(TODAY)).slice(0,7);
  const stat=needPunch.map(c=>{
    const recs=all.filter(a=>a.emp_id===c.id&&a.date.startsWith(ym));
    const hours=recs.reduce((s,r)=>s+(calcWorkHours(r)||0),0);

    return {name:c.name||'—',hours,days};
  }).sort((a,b)=>b.hours-a.hours);
  document.getElementById('att-body').innerHTML=`<div class="card">

    </div>

    ${stat.map(s=>`<tr>

    </tbody></table>

// ④ 異常打卡管理（只上班沒下班、或應到未打）
function renderAttAbnormal(needPunch,all){
  const today=ymd(TODAY);

function renderCoachWeekInline(box){
  const {visible,memMap,myId}=window._coachCalData;
  const sel=window._coachSelDate;
  const selD=parseYmd(sel);
  const dow=(selD.getDay()+6)%7;

  const todayStr=ymd(TODAY);
  const isMine=(b)=> b.coach_id===myId||b.substitute_coach_id===myId;

  // 時間軸參數（壓縮版，一頁顯示一週）
  const START=8*60, END=22*60, SLOT=30, ROWH=22; // 08:00–22:00
  const axisH=((END-START)/SLOT)*ROWH;
  const yOf=(m)=>(m-START)/SLOT*ROWH;

  // 左側時間軸：每小時一格、固定顯示時間
  let grid='';
  for(let mm=START; mm<=END; mm+=60){
    grid+=`<div class="wkx-grid wkx-grid-h" style="top:${yOf(mm)}px;">
      <span class="wkx-gt">${String(Math.floor(mm/60)).padStart(2,'0')}:00</span></div>`;
  }
  // 欄內整點橫線（共用背景，畫在每欄）
  let colLines='';
  for(let mm=START; mm<=END; mm+=60){
    colLines+=`<div class="wkx-hline" style="top:${yOf(mm)}px;"></div>`;
  }

  // 七天欄（只放我的課）
  let dayCols='';
  for(let i=0;i<7;i++){
    const d=addDays(monday,i); const ds=ymd(d);
    const isToday=ds===todayStr;
    const isSel=ds===sel;
    const myBk=visible.filter(b=>b.date===ds && (window._coachScope==='all' || isMine(b)));
    let evs='';
    myBk.forEach(b=>{
      const [h,m]=b.start_time.split(':').map(Number); const s=h*60+m;
      if(s<START||s>=END) return;
      const dur=b.duration||60;
      const top=yOf(s), height=Math.max(dur/SLOT*ROWH-2, ROWH-2);
      const cc=bkCC(b);
      const who=b.category==='小班肌力'?'團':(b.category==='體驗'?(b.trial_name||'體驗').slice(0,3):(memMap[b.member_id]||'—').slice(0,3));
      // 高度夠才顯示時間（避免太擠）
      const showTime=height>=30;
      evs+=`<div class="wkx-ev wkx-${cc}" style="top:${top}px;height:${height}px;" onclick="event.stopPropagation();openCourseCard('${b.id}')" title="${b.start_time} ${who}">
        ${showTime?`<span class="wkx-evt">${b.start_time}</span>`:''}<span class="wkx-evn">${who}</span></div>`;
    });
    const isWeekend=(i>=5); // 週六(5)、週日(6)
    dayCols+=`<div class="wkx-day${isToday?' wkx-today':''}${isSel?' wkx-sel':''}${isWeekend?' wkx-weekend':''}" onclick="coachSelectDate('${ds}')">
      <div class="wkx-dhead"><span class="wkx-dw">${wlabel[i]}</span><span class="wkx-dd${isToday?' wkx-dd-today':''}">${d.getDate()}</span></div>
      <div class="wkx-dbody" style="height:${axisH}px;">${colLines}${evs}</div>
    </div>`;
  }

  box.innerHTML=`<div class="card" style="padding:12px;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
      <button class="btn btn-ghost btn-sm" onclick="coachWeekStep(-1)">‹</button>
      <div style="display:flex;align-items:center;gap:8px;">
        <span style="font-size:13px;font-weight:600;">${fmtMD(monday)}～${fmtMD(addDays(monday,6))}</span>
        <button class="btn btn-ghost btn-sm" onclick="coachMonthToday()">今天</button>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="coachWeekStep(1)">›</button>
    </div>

// 點空白時段 → 依點擊縱軸位置換算時間，帶入快速預約
function coach3BodyTap(ev,ds){
  ev.stopPropagation();
  if(window._coachReadonly) return; // 純檢視模式：點空白不排課
  // 若點到的是課程色塊或 ✕ 標記，不處理（色塊有自己的 onclick）
  if(ev.target.closest('.wkx-ev')) return;
  const START=8*60, SLOT=30, ROWH=30;
  const body=ev.currentTarget;
  const rect=body.getBoundingClientRect();
  const y=(ev.clientY||0)-rect.top;
  let mins=START + Math.floor(y/ROWH)*SLOT;          // 對齊到最近的 30 分
  if(mins<START) mins=START;
  if(mins>22*60) mins=22*60;                          // 最晚 22:00 起（課程 1hr 內結束）
  const hh=String(Math.floor(mins/60)).padStart(2,'0');
  const mm=String(mins%60).padStart(2,'0');
  _prefill={date:ds,time:`${hh}:${mm}`};
  if(typeof openQuickBookCoach==='function')openQuickBookCoach();
}

function quickBookOn(ds){ _prefill={date:ds,time:''}; openBookingModal(); }

function renderCoachDayList(){
  const box=document.getElementById('coach-daylist'); if(!box||!window._coachCalData)return;
  const {memMap,coachMap,myId,allBk}=window._coachCalData;
  const ds=window._coachSelDate;
  const d=parseYmd(ds);
  const wd=['日','一','二','三','四','五','六'][d.getDay()];
  const source = allBk || window._coachCalData.visible || [];
  const list=source.filter(b=>b.date===ds);
  const myList=list.filter(b=>b.coach_id===myId||b.substitute_coach_id===myId);
  const ptN=myList.filter(b=>b.category==='私人教練'||b.category==='體驗').length;
  const grpN=myList.filter(b=>b.category==='小班肌力').length;
  // 教練課場地容量（多功能訓練區：教練課+體驗）→ 取代寫死 3
  const PT_VENUE_CATS=new Set();
  let PT_SLOTS=3;
  { const v=getVenues().filter(v=>v.categories.includes('私人教練'));
    if(v.length){ PT_SLOTS=v.reduce((s,x)=>s+(x.capacity||0),0); v.forEach(x=>x.categories.forEach(c=>PT_VENUE_CATS.add(c))); }
    else { ['私人教練','體驗'].forEach(c=>PT_VENUE_CATS.add(c)); } }
  const isMine=(b)=> b.coach_id===myId||b.substitute_coach_id===myId;

  // 依開始時間分組
  const slots={};
  list.forEach(b=>{ (slots[b.start_time]=slots[b.start_time]||[]).push(b); });

  const endOf=(b)=>{ const [h,m]=b.start_time.split(':').map(Number); const tot=h*60+m+(b.duration||60); return minToTime(tot); };

  // ── 底層時間格線：08:00–22:00，每 30 分一格 ──
  const START=8*60, END=22*60, SLOT=30, ROWH=58;
  window._tlxParams={START,END,SLOT,ROWH,ds};
  const axisH=((END-START)/SLOT)*ROWH;
  const yOf=(m)=>(m-START)/SLOT*ROWH;
  let grid='';
  for(let mm=START; mm<=END; mm+=SLOT){
    const isHour=(mm%60===0);
    grid+=`<div class="tlx-grid ${isHour?'tlx-grid-h':'tlx-grid-q'}" style="top:${yOf(mm)}px;">
      ${isHour?`<span class="tlx-gt">${minToTime(mm)}</span>`:''}</div>`;
  }

  // 我有課的時段（分鐘集合 + 區間）→ 別人的課與＋不顯示
  const myBusy=new Set();
  const myRanges=[];
  list.forEach(b=>{ if(!isMine(b))return; const [h,m]=b.start_time.split(':').map(Number); const s=h*60+m,e=s+(b.duration||60); myRanges.push([s,e]); for(let t=s;t<e;t+=SLOT)myBusy.add(t); });
  const overlapsMine=(s,e)=>myRanges.some(([rs,re])=>s<re && e>rs);

  // 各時段教練課場地佔用（只算多功能訓練區服務的類型）
  const slotUsed={};
  list.forEach(b=>{ if(PT_VENUE_CATS.has(b.category)) slotUsed[b.start_time]=(slotUsed[b.start_time]||0)+1; });

  // ＋欄（右側固定，未滿且我無課才顯示）
  let addLayer='';
  for(let mm=START; mm<END; mm+=SLOT){
    if(myBusy.has(mm)) continue;
    const time=minToTime(mm), used=slotUsed[time]||0;
    if(used>=PT_SLOTS) addLayer+=`<div class="tlx-slot-full" style="top:${yOf(mm)}px;height:${ROWH}px;">滿</div>`;
    else addLayer+=`<button class="tlx-slot-add" style="top:${yOf(mm)}px;height:${ROWH}px;" onclick="quickBookAt('${ds}','${time}')"><span>＋</span></button>`;
  }

  // 票券卡（絕對定位疊在格線上，依時間跨格；時間重疊的卡片分欄錯開）
  let cardLayer='';
  const colGroup={};
  list.forEach(b=>{ (colGroup[b.start_time]=colGroup[b.start_time]||[]).push(b); });
  // 先收集「要畫的卡」（每個 start_time 取 showArr 的代表）
  const draws=[];
  Object.entries(colGroup).forEach(([time,arr])=>{
    const [hh,mm2]=time.split(':').map(Number); const startM=hh*60+mm2;
    const mineArr=arr.filter(isMine);
    const showArr = mineArr.length>0 ? mineArr : arr;
    const first=showArr[0];
    const mine=isMine(first);
    const dur=first.duration||60;
    // 別人的課若與我的任何課時間重疊 → 不顯示（我的課優先、整列填滿）
    if(!mine && overlapsMine(startM,startM+dur)) return;
    draws.push({first,mine,showArr,startM,endM:startM+dur,dur});
  });
  // 重疊分欄：依開始時間排序，掃描重疊群組，群組內每張卡分欄
  draws.sort((a,b)=>a.startM-b.startM || a.endM-b.endM);
  let i=0;
  while(i<draws.length){
    // 找一個重疊群組（連續重疊鏈）
    let groupEnd=draws[i].endM; let j=i+1;
    const group=[draws[i]];
    while(j<draws.length && draws[j].startM<groupEnd){
      group.push(draws[j]); groupEnd=Math.max(groupEnd,draws[j].endM); j++;
    }
    // 群組內分欄：貪婪指派欄位
    const cols=[]; // 每欄記錄目前佔用到的 endM
    group.forEach(g=>{
      let placed=false;
      for(let c=0;c<cols.length;c++){ if(g.startM>=cols[c]){ g.col=c; cols[c]=g.endM; placed=true; break; } }
      if(!placed){ g.col=cols.length; cols.push(g.endM); }
    });
    const nCols=cols.length;
    group.forEach(g=>{ g.nCols=nCols; });
    i=j;
  }

  // 渲染
  draws.forEach(g=>{
    const {first,mine,showArr,startM,dur}=g;
    const top=yOf(startM);
    const height=Math.max(dur/SLOT*ROWH-3, ROWH-3);
    const endT=minToTime(startM+dur);
    const cc=bkCC(first);
    let badge='';
    if(mine){
      const isDone=(first.status==='completed'||first.status==='checked_in');
      if(isDone) badge=`<span class="tkr-badge done">✓ 已簽到</span>`;
      else if(first.date<ymd(TODAY)) badge=`<span class="tkr-badge none">未確認</span>`;
      else badge=`<span class="tkr-badge wait">待開始</span>`;
    }
    let midLines='', tkRem='';
    if(mine){
      showArr.forEach(b=>{
        const who=b.category==='小班肌力'?'團體課':(b.category==='體驗'?(b.trial_name||'體驗'):(memMap[b.member_id]||'—'));
        const fmt=b.format?b.format.toUpperCase():'';
        const typeM={'私人教練':'教練課','自主訓練':'自主訓練','體驗':'體驗','小班肌力':'團體課'}[b.category]||'課程';
        const venTag = venueIsNotable(b.category,b.venue_unit) ? `<span class="tkr-venue">📍${venueName(b.venue_unit)}</span>` : '';
        midLines+=`<div class="tkr-name">${who}${fmt?`<span class="tlx-fmt">${fmt}</span>`:''}</div><div class="tkr-type">${typeM}${fmt?' '+fmt:''}${venTag}</div>`;
      });
      if(first.ticket_id){ const tk=(window._allTkCache||[]).find(t=>t.id===first.ticket_id); if(tk) tkRem=`${tk.sessions_remaining}/${tk.sessions_total}`; }
    }else{
      midLines=`<div class="tkr-masked">已預約</div>`;
    }
    // 分欄定位：右側留 ＋欄(50px)，群組內依 col/nCols 切寬
    const nCols=g.nCols||1, col=g.col||0;
    const gapR=50; // 右側＋欄
    const compact = nCols>1 ? ' tkr-compact' : '';
    const style = nCols>1
      ? `position:absolute;top:${top}px;height:${height}px;left:calc(${(col/nCols)*100}% );width:calc(${(1/nCols)*100}% - ${gapR/nCols}px - 3px);`
      : `position:absolute;top:${top}px;height:${height}px;left:0;right:${mine?4:gapR}px;`;
    // 今日訓練狀態（我的教練課/體驗才顯示；自主訓練/團體不需要）
    let trainTag='';
    if(mine && (first.category==='私人教練'||first.category==='體驗')){
      const hasLog=(window._tlogBids||new Set()).has(first.id);
      trainTag = hasLog
        ? `<span class="tkr-train done">完成</span>`
        : `<span class="tkr-train todo">未完成</span>`;
    }
    cardLayer+=`<div class="tkr-row tkr-${cc}${mine?'':' tkr-other'}${compact}"
      style="${style}"
      ${mine?`data-bid="${first.id}" data-start="${startM}" data-dur="${dur}" onpointerdown="tlxDragStart(event,'${first.id}',${startM},${dur})" onclick="tlxClick('${first.id}')"`:`style="cursor:default;"`}>
      ${badge}
      <div class="tkr-time"><span class="tkr-t1">${minToTime(startM)}</span><span class="tkr-tline"></span><span class="tkr-t2">${endT}</span></div>
      <div class="tkr-mid">${midLines}</div>
      ${nCols>1?'':`<div class="tkr-right">${tkRem?`<span class="tkr-rem">${tkRem}</span>`:''}${trainTag}</div>`}
    </div>`;
  });

  box.innerHTML=`<div class="card">
    <div class="card-title" style="display:flex;justify-content:space-between;align-items:flex-start;">
      <div>
        <div>${ds.replace(/-/g,'/')}（${wd}）</div>
        <div style="font-size:12px;color:var(--t3);font-weight:400;margin-top:3px;">我的課：教練課 ${ptN} 堂・團體課 ${grpN} 堂　·　當日全店 ${list.length} 筆</div>
      </div>
      <button class="btn btn-green btn-sm" style="flex:none;" onclick="quickBookOn('${ds}')">＋ 預約</button>
    </div>
    <div class="tlx-cal" style="height:${axisH}px;">
      <div class="tlx-grid-layer">${grid}</div>
      <div class="tlx-content">
        <div class="tlx-cards">${cardLayer}</div>
        <div class="tlx-addcol">${addLayer}</div>
      </div>
    </div>
  </div>`;
}

/* ── 時間軸：長按卡片拖移調整時間 ── */
window._tlxDrag=null;
function tlxClick(id){
  // 若剛拖移過，吞掉這次 click
  if(window._tlxJustDragged){ window._tlxJustDragged=false; return; }
  openCourseCard(id);
}
function tlxDragStart(e,id,startM,dur){
  const el=e.currentTarget;
  const P=window._tlxParams; if(!P)return;
  // 長按 500ms 才進入拖移
  const startY=e.clientY, startTop=parseFloat(el.style.top)||0;
  let armed=false;
  const timer=setTimeout(()=>{
    armed=true;
    el.classList.add('tlx-dragging');
    if(navigator.vibrate) navigator.vibrate(15);
    showToast('拖動調整時間，放開儲存');
  },500);
  const move=(ev)=>{
    if(!armed){ // 還沒長按完成，若移動太多視為捲動，取消
      if(Math.abs(ev.clientY-startY)>8){ clearTimeout(timer); cleanup(); }
      return;
    }
    ev.preventDefault();
    const dy=ev.clientY-startY;
    let newTop=startTop+dy;
    // 吸附 30 分格
    const rows=Math.round(newTop/P.ROWH);
    newTop=Math.max(0, Math.min(rows*P.ROWH, ((P.END-P.START)/P.SLOT - dur/P.SLOT)*P.ROWH));
    el.style.top=newTop+'px';
    el.dataset.newstart = (P.START + Math.round(newTop/P.ROWH)*P.SLOT);
  };
  const up=async(ev)=>{
    clearTimeout(timer);
    if(!armed){ cleanup(); return; }
    el.classList.remove('tlx-dragging');
    const newStartM=parseInt(el.dataset.newstart||startM,10);
    cleanup();
    if(newStartM===startM){ return; } // 沒移動
    window._tlxJustDragged=true;
    const newTime=minToTime(newStartM);
    await tlxApplyMove(id,P.ds,newTime,dur);
  };
  const cleanup=()=>{
    window.removeEventListener('pointermove',move);
    window.removeEventListener('pointerup',up);
    window.removeEventListener('pointercancel',up);
  };
  window.addEventListener('pointermove',move,{passive:false});
  window.addEventListener('pointerup',up);
  window.addEventListener('pointercancel',up);
}
async function tlxApplyMove(id,ds,newTime,dur){
  try{
    const b=await dbGet('bookings',id);
    if(!b){showToast('找不到課程');renderCoachDayList();return;}
    // 驗證新時段（排除自己）
    const vbk={...b,id:b.id};
    const verr=await validateBooking(vbk,ds,newTime,dur);
    if(verr){ showToast('無法移動：'+verr); renderCoachDayList(); return; }
    b.start_time=newTime;
    if(vbk.venue_unit) b.venue_unit=vbk.venue_unit;
    await dbPut('bookings',b);
    // 更新快取
    if(window._coachCalData){
      const upd=(arr)=>{ const x=(arr||[]).find(z=>z.id===id); if(x)x.start_time=newTime; };
      upd(window._coachCalData.allBk); upd(window._coachCalData.visible);
    }
    showToast('已調整為 '+newTime);
    renderCoachDayList();
  }catch(e){ showToast('調整失敗：'+(e&&e.message?e.message:e)); renderCoachDayList(); }
}

// 會員月曆檢視（整月格子 + 點日期看當天課）
function renderMemMonthView(){
  const box=document.getElementById('mem-cal'); if(!box||!window._memCalData)return;
  const {mine}=window._memCalData;
  const today=new Date(TODAY);
  if(!_memCalMonth) _memCalMonth={y:today.getFullYear(),m:today.getMonth()};
  if(!_memCalSel) _memCalSel=ymd(today);
  const {y,m}=_memCalMonth;
  const first=new Date(y,m,1);
  const startDow=first.getDay();
  const daysInMonth=new Date(y,m+1,0).getDate();
  const todayStr=ymd(today);
  const WDH=['日','一','二','三','四','五','六'];
  const cntByDate={};
  mine.forEach(b=>{ if(!b.date)return; cntByDate[b.date]=(cntByDate[b.date]||0)+1; });
  let cells='';
  for(let i=0;i<startDow;i++) cells+=`<div class="mc-cell mc-empty"></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const cnt=cntByDate[ds]||0;
    const isToday=ds===todayStr, isSel=ds===_memCalSel;
    cells+=`<div class="mc-cell${isToday?' mc-today':(isSel?' mc-sel':'')}" onclick="memCalPick('${ds}')">
      <span class="mc-d">${d}</span>${cnt>0?`<span class="mc-dot">${cnt}</span>`:''}</div>`;
  }
  const sel=parseYmd(_memCalSel);
  const selBk=mine.filter(b=>b.date===_memCalSel).sort((a,b)=>(a.start_time||'').localeCompare(b.start_time||''));
  const selLabel=`${_memCalSel.slice(5).replace('-','/')}（${WDH[sel.getDay()]}）`;
  let listHtml;
  if(selBk.length===0){
    listHtml=`<div style="text-align:center;color:var(--t3);font-size:13px;padding:24px 0;">這天沒有課</div>`;
  }else{
    listHtml=selBk.map(b=>{
      const d=parseYmd(b.date);
      const isSelf=b.category==='自主訓練';
      const dur=b.duration||60;
      const end=minToTime(timeToMin(b.start_time)+dur);
      const who=b.coach_id?(window._memCalData.coachMap[b.coach_id]||'教練'):'自主訓練';

      let actionBtn='';

        actionBtn=`<span class="tag tag-ok" style="font-size:11px;">已簽到</span>`;
      }else if(b.status==='booked'||b.status==='scheduled'){
        const slotDt=new Date(b.date+'T'+b.start_time+':00');
        const openDt=new Date(slotDt.getTime()-30*60000);
        const canCheckin=new Date()>=openDt && b.date===ymd(TODAY);
        if(canCheckin) actionBtn=`<button class="btn btn-green btn-sm" onclick="memCheckin('${b.id}')">簽到</button>`;
        else if(isSelf) actionBtn=`<button class="btn btn-ghost btn-sm" onclick="memCancelSelf('${b.id}')">取消</button>`;
      }
      const cc=bkCC(b); // pt/friendly/self/group/trial
      const barCls='mc-bar-'+cc;
      const evName=bookingTypeName(b, window._memTypeMap);
      return `<div class="mc-ev">
        <div class="mc-ev-time"><span class="mc-ev-t1">${b.start_time}</span><span class="mc-ev-t2">${end}</span></div>
        <div class="mc-ev-bar ${barCls}"></div>
        <div class="mc-ev-body"><div class="mc-ev-name">${evName}</div>
          <div class="mc-ev-cat">${who} · ${dur}分鐘 · ${statusLabel(b.status)}</div></div>
        <div style="display:flex;align-items:center;">${actionBtn}</div>
      </div>`;
    }).join('');

  box.innerHTML=`
    <div class="mc-head">
      <button class="btn btn-ghost btn-sm" onclick="memCalShiftMonth(-1)">‹</button>
      <div style="font-weight:600;color:var(--green);">${y} 年 ${m+1} 月</div>
      <button class="btn btn-ghost btn-sm" onclick="memCalShiftMonth(1)">›</button>
    </div>
    <div class="mc-wd mc-grid">${WDH.map((w,i)=>`<div class="mc-wdh${i===0||i===6?' mc-wk':''}">${w}</div>`).join('')}</div>
    <div class="mc-grid">${cells}</div>

      <div style="font-size:13px;font-weight:600;color:var(--text);margin-bottom:6px;">${selLabel}</div>
      ${listHtml}
    </div>`;
}

async function memCancelSelf(id){
  const b=await dbGet('bookings',id);

  const note = within24
    ? '因開課 24 小時內取消，<b>本次恕不退回點數</b>。'
    : '開課 24 小時前取消，將退回 1 點自主訓練票券。';

async function doMemCancelSelf(id){
  const b=await dbGet('bookings',id);
  if(!b||b.member_id!==SESSION.id||b.category!=='自主訓練'){showToast('無法取消');return;}
  const within24 = hoursUntilStart(b) < 24;
  b.status='cancelled';
  b.cancelled_at=new Date().toISOString();
  b.refund_waived=within24;
  await dbPut('bookings',b);

function ptTicketTypeIds(){
  const ids=new Set(['pt','pt_friendly']);
  (window._ttCache||[]).forEach(t=>{ if(t.category==='私人教練') ids.add(t.id); });
  return ids;
}
// 判斷是否為教練課票券（用排除法：不是自主訓練/團體/體驗就算教練課）
function isPtTicket(t){
  if(!t) return false;
  const tt=(window._ttCache||[]).find(x=>x.id===t.ticket_type_id);
  const cat=tt?tt.category:'';
  const nm=(t.plan_name||'')+(tt?tt.name:'');
  // 明確是其他類 → 不算教練課
  if(cat==='自主訓練'||cat==='小班肌力'||cat==='體驗') return false;
  if(nm.indexOf('自主')>=0||nm.indexOf('團體')>=0||nm.indexOf('小班')>=0||nm.indexOf('體驗')>=0) return false;
  // 其餘（含 category 對不到、或名稱含教練）都當教練課
  return true;
}
// 計算會員教練課可用剩餘總堂數（不再死綁單一 typeId）
async function qbCountTickets(memberId,typeId){
  if(!memberId) return 0;
  try{
    const tickets=window._qbTickets||await dbGetAll('member_tickets');
    return tickets.filter(t=>t.member_id===memberId && isPtTicket(t) && t.status==='usable')
      .reduce((s,t)=>s+(t.sessions_remaining||0),0);
  }catch(_){ return 0; }
}

function qbRenderMemberPick(){
  const box=document.getElementById('qb-mem-list'); if(!box)return;

  const tickets=window._qbTickets||[];

  const remOf=(mid)=>tickets.filter(t=>t.member_id===mid && isPtTicket(t) && t.status==='usable')

  let list=(window._qbMembers||[]).filter(m=>!q||(m.name||'').toLowerCase().includes(q)||(m.phone||'').includes(q));
  list.sort((a,b)=>remOf(b.id)-remOf(a.id)||(a.name||'').localeCompare(b.name||''));

async function qbSubmitForm(){
  const f=window._qbForm;
  if(!f.memberId){ showToast('請選擇會員'); return; }
  if(!f.date||!f.time){ showToast('請選日期與時間'); return; }
  if(f.recurring && f.dows.length===0){ showToast('請選重複星期'); return; }
  qbShowProgress(0,0); // 立即回饋
  // 教練課找票（含友善教練課）：用 isPtTicket
  const ptFindTk=async(mid,ds)=>{
    const tickets=await dbGetAll('member_tickets'); // 每次重抓，連續扣才正確
    return tickets.filter(t=>t.member_id===mid && isPtTicket(t) && t.status==='usable'
      && t.sessions_remaining>0 && (!t.expire_date||t.expire_date>=ds))
      .sort((a,b)=>(a.expire_date||'9999').localeCompare(b.expire_date||'9999'))[0]||null;
  };
  const ptCountRemain=async(mid)=>{
    const tickets=await dbGetAll('member_tickets');
    return tickets.filter(t=>t.member_id===mid && isPtTicket(t) && t.status==='usable')
      .reduce((s,t)=>s+(t.sessions_remaining||0),0);
  };
  // 先確認至少有一張可用票券
  const firstTk=await ptFindTk(f.memberId, f.date);
  if(!firstTk){ qbHideProgress(); showToast('該會員沒有可用的教練課票券'); return; }

  const r=await runRecurringBooking({
    member_id:f.memberId, coach_id:SESSION.id, substitute_coach_id:null,
    category:'私人教練', type_id:f.typeId, format:'1v1',
    startDate:f.date, time:f.time, duration:60,
    dows: f.recurring ? f.dows : [],
    count: f.recurring ? (f.count||1) : 1,
    findTicketFn: ptFindTk, countRemainFn: ptCountRemain,
    onProgress:(cur,total)=>qbShowProgress(cur,total),
  });
  qbHideProgress();
  closeQuickBook();
  showToast(recurringResultMsg(r));
  navTo(CUR_PAGE);
}

async function openTrainingLog(bookingId){
  closeModal();

  if(!b){showToast('找不到課程');return;}
  window._tlBooking=b;
  // 會員名 + 票券剩餘 + 是否友善課
  let memName='會員', tkText='', isFriendly=false;
  try{ const m=await dbGet('members',b.member_id); if(m)memName=m.name; }catch(_){}
  try{
    if(b.ticket_id){ const tk=await dbGet('member_tickets',b.ticket_id); if(tk)tkText=`${tk.plan_name||'票券'}　${tk.sessions_remaining}/${tk.sessions_total}`; }
    // 判斷友善：看課程的票券種類名稱是否含「友善」
    if(b.ticket_type_id){
      const ty=await dbGet('ticket_types',b.ticket_type_id);
      if(ty && (ty.name||'').indexOf('友善')>=0) isFriendly=true;
    }
    if(!isFriendly && tkText.indexOf('友善')>=0) isFriendly=true;

    if(l.sets_detail){ try{ const arr=JSON.parse(l.sets_detail); if(arr&&arr.length) return arr.map(s=>`${s.reps||'-'}${s.weight?'×'+s.weight+'kg':''}`).join('、'); }catch(_){} }
    return `${l.reps??'-'} 次${l.sets?(' × '+l.sets+' 組'):''}`;

  const fmt=b.format?b.format.toUpperCase():'';

    <div class="tlh-mem-sub">${typeM}${window._tlTkText?`　·　剩餘 ${window._tlTkText}`:''}</div>
  </div>`;

  // 第二區：今日訓練紀錄

    ? '<div class="tl-empty">尚無訓練紀錄<br><span style="font-size:11.5px;color:var(--t3);">點下方「新增動作」開始記錄</span></div>'
    : `<div class="tlh-logs">${logs.map(l=>`<div class="tlh-log">

        <div class="tlh-log-sub">${[l.posture,l.tool].filter(Boolean).join(' / ')}${l.note?'　·　'+l.note.replace(/\[[^\]]*\]/g,'').trim():''}</div>
        <button class="tl-del" onclick="delTrainingLog('${l.id}')">✕</button>
      </div>`).join('')}</div>`;

  // ── P1-1 會員訓練總覽（跨課程統計）──
  const memAllLogs=allLogs.filter(l=>l.member_id===b.member_id);
  const memBkSet=new Set(memAllLogs.map(l=>l.booking_id));
  const sessionCount=memBkSet.size;                       // 有訓練紀錄的課堂數
  const lastTrainDate=memAllLogs.length
    ? memAllLogs.map(l=>(l.created_at||'').slice(0,10)).sort().slice(-1)[0].replace(/-/g,'/')
    : '—';
  // 最常練動作 Top3
  const exCount={};
  memAllLogs.forEach(l=>{ if(l.exercise_name) exCount[l.exercise_name]=(exCount[l.exercise_name]||0)+1; });
  const topEx=Object.entries(exCount).sort((a,b)=>b[1]-a[1]).slice(0,3).map(e=>e[0]);
  // 各部位分布
  const partCount={};
  memAllLogs.forEach(l=>{ if(l.body_part) partCount[l.body_part]=(partCount[l.body_part]||0)+1; });
  const partLine=TL_BODY_PARTS.map(p=>partCount[p]?`${p} ${partCount[p]}`:null).filter(Boolean).join('　');
  const overview=`<div class="tlh-ov">

        <div class="tlh-ov-cell"><div class="tlh-ov-n">${sessionCount}</div><div class="tlh-ov-l">訓練堂數</div></div>
        <div class="tlh-ov-cell"><div class="tlh-ov-n" style="font-size:15px;">${lastTrainDate}</div><div class="tlh-ov-l">最近訓練</div></div>
      </div>
      ${topEx.length?`<div class="tlh-ov-sub"><span class="tlh-ov-k">常練</span>${topEx.join('、')}</div>`:''}
      ${partLine?`<div class="tlh-ov-sub"><span class="tlh-ov-k">部位</span>${partLine}</div>`:''}
    </div>`;

  // ── P1-2 歷史課表（最近三次，可一鍵套用）──
  const memLogs=allLogs.filter(l=>l.member_id===b.member_id && l.booking_id!==b.id);
  const byBk={};
  memLogs.forEach(l=>{ (byBk[l.booking_id]=byBk[l.booking_id]||[]).push(l); });
  let hist=Object.entries(byBk).map(([bid,ls])=>({bid,ls,t:ls[0].created_at||''}))
    .sort((a,b)=>b.t.localeCompare(a.t)).slice(0,3);
  window._tlHistCache=Object.fromEntries(hist.map(h=>[h.bid,h.ls])); // 供套用取用
  const sec4 = hist.length===0
    ? '<div style="font-size:12px;color:var(--t3);padding:10px 0;">尚無歷史課表</div>'
    : hist.map(h=>{
        const dt=(h.t||'').slice(0,10).replace(/-/g,'/');
        const exs=[...new Set(h.ls.map(l=>l.exercise_name))].join('、');
        return `<div class="tlh-hist">
          <div class="tlh-hist-l"><div class="tlh-hist-d">${dt||'—'}</div><div class="tlh-hist-x">${exs}</div></div>
          <button class="tlh-apply" onclick="tlApplyHist('${h.bid}')">套用</button>
        </div>`;
      }).join('');

  host.innerHTML=`<div class="ms-backdrop" onclick="closeTrainingLog()"></div>
    <div class="ms-panel tl-panel">
      <div class="ms-head">
        <div><div class="ms-title">訓練課表</div>

        <button class="ms-close" onclick="closeTrainingLog()">✕</button>

        ${sec2}
        <button class="btn btn-green" style="width:100%;margin-top:10px;" onclick="tlStartAddExercise()">＋ 新增動作</button>
        <div class="tlh-label" style="margin-top:18px;display:flex;align-items:center;justify-content:space-between;">
          <span>歷史課表（最近三次）</span>
          <button class="tlh-hq-btn" onclick="tlOpenExerciseHistory()">動作查詢 ›</button>
        </div>
        ${sec4}
      </div>
    </div>`;

// ── P1-2 一鍵套用歷史課表：把某次的所有動作複製成今日紀錄（重量保留供微調）──
async function tlApplyHist(srcBid){
  const srcLogs=(window._tlHistCache||{})[srcBid];
  if(!srcLogs||!srcLogs.length){ showToast('找不到該次課表'); return; }
  const b=window._tlBooking;
  const dt=(srcLogs[0].created_at||'').slice(0,10).replace(/-/g,'/');
  const exNames=[...new Set(srcLogs.map(l=>l.exercise_name))].join('、');
  showModal(`<div class="modal-title">套用歷史課表</div>
    <div style="font-size:13px;color:var(--text);padding:4px 0 2px;">將 <b>${dt}</b> 的 ${srcLogs.length} 個動作複製到本堂課：</div>
    <div style="font-size:12.5px;color:var(--t2);margin:6px 0 14px;line-height:1.7;">${exNames}</div>
    <div style="font-size:11.5px;color:var(--t3);margin-bottom:14px;">複製後可逐項調整重量／次數。已存在的今日紀錄不會被覆蓋。</div>
    <div class="modal-foot"><button class="btn btn-ghost" onclick="closeModal()">取消</button><button class="btn btn-green" onclick="tlDoApplyHist('${srcBid}')">確認套用</button></div>`);
}
async function tlDoApplyHist(srcBid){
  const srcLogs=(window._tlHistCache||{})[srcBid];
  if(!srcLogs||!srcLogs.length){ closeModal(); return; }
  const b=window._tlBooking;
  let n=0;
  try{
    for(const s of srcLogs){
      const log={
        id:uid('TLOG'), booking_id:b.id, member_id:b.member_id, coach_id:SESSION.id,
        exercise_name:s.exercise_name, body_part:s.body_part, posture:s.posture, tool:s.tool,
        reps:s.reps, sets:s.sets, sets_detail:s.sets_detail,
        note:(s.note||'').replace(/\s*\(套用.*?\)\s*/g,'')+' (套用 '+((s.created_at||'').slice(0,10).replace(/-/g,'/'))+')',
        created_at:new Date().toISOString()
      };
      await dbPut('training_logs',log);
      window._tlogBids&&window._tlogBids.add(log.booking_id);
      n++;
    }
    closeModal();
    showToast(`已套用 ${n} 個動作`);
    renderTrainingLogSheet();

// ── P1-3 動作歷史紀錄查詢：選一個動作 → 看該會員歷來重量/次數變化 ──
async function tlOpenExerciseHistory(){
  const b=window._tlBooking;
  let allLogs=[];
  try{ allLogs=await dbGetAll('training_logs'); }catch(_){}
  const memLogs=allLogs.filter(l=>l.member_id===b.member_id);
  // 該會員練過的所有動作（去重，依最近練過排序）
  const exMap={};
  memLogs.forEach(l=>{ if(!l.exercise_name)return; const t=l.created_at||''; if(!exMap[l.exercise_name]||t>exMap[l.exercise_name]) exMap[l.exercise_name]=t; });
  const exList=Object.entries(exMap).sort((a,b)=>b[1].localeCompare(a[1])).map(e=>e[0]);
  window._tlExHistLogs=memLogs;
  let host=document.getElementById('tl-exhist'); if(host)host.remove();
  host=document.createElement('div'); host.id='tl-exhist'; document.body.appendChild(host);
  const chips=exList.length
    ? exList.map(n=>`<button class="tleh-chip" onclick="tlExHistShow('${n.replace(/'/g,"\\'")}')">${n}</button>`).join('')
    : '<div class="ae-hint">這位會員尚無動作紀錄</div>';
  host.innerHTML=`<div class="ms-backdrop" onclick="document.getElementById('tl-exhist').remove()"></div>
    <div class="ms-panel">
      <div class="ms-head"><div><div class="ms-title">動作歷史查詢</div>
        <div style="font-size:11.5px;color:var(--t3);margin-top:2px;">${window._tlMemName}</div></div>
        <button class="ms-close" onclick="document.getElementById('tl-exhist').remove()">✕</button></div>
      <div class="ms-list" style="max-height:62vh;">
        <div class="ae-label" style="margin:8px 0;">選擇動作</div>
        <div class="tleh-chips">${chips}</div>
        <div id="tleh-detail"></div>
      </div>
    </div>`;
}
function tlExHistShow(name){
  const logs=(window._tlExHistLogs||[]).filter(l=>l.exercise_name===name)
    .sort((a,b)=>(b.created_at||'').localeCompare(a.created_at||''));
  const box=document.getElementById('tleh-detail'); if(!box)return;
  // 標記選中 chip
  document.querySelectorAll('#tl-exhist .tleh-chip').forEach(c=>c.classList.toggle('active',c.textContent===name));
  if(!logs.length){ box.innerHTML='<div class="ae-hint">無紀錄</div>'; return; }
  // 計算每次最大重量，標出進步
  const rows=logs.map(l=>{
    const dt=(l.created_at||'').slice(0,10).replace(/-/g,'/');
    let detail='', maxW=0;
    if(l.sets_detail){ try{ const arr=JSON.parse(l.sets_detail);
      detail=arr.map(s=>`${s.reps||'-'}×${s.weight||'-'}`).join('　');
      arr.forEach(s=>{ const w=parseFloat(s.weight)||0; if(w>maxW)maxW=w; });
    }catch(_){} }
    if(!detail) detail=`${l.reps||'-'} 次${l.sets?(' ×'+l.sets+'組'):''}`;
    return {dt,detail,maxW,tool:l.tool,posture:l.posture};
  });
  const peak=Math.max(...rows.map(r=>r.maxW));
  box.innerHTML=`<div class="ae-label" style="margin:16px 0 8px;">${name} · 歷來紀錄（共 ${rows.length} 次）</div>
    <div class="tleh-rows">${rows.map(r=>`<div class="tleh-row">
      <div class="tleh-row-d">${r.dt}</div>
      <div class="tleh-row-x"><div class="tleh-row-sets">${r.detail}</div>
        <div class="tleh-row-meta">${[r.tool,r.posture].filter(Boolean).join(' / ')}</div></div>
      ${r.maxW>0?`<div class="tleh-row-w ${r.maxW>=peak?'peak':''}">${r.maxW}<span>kg</span></div>`:''}
    </div>`).join('')}</div>
    <div style="font-size:11px;color:var(--t3);margin-top:10px;text-align:center;">標金色＝歷來最大重量</div>`;
}

function closeAddExercise(){ const s=document.getElementById('tl-add-sheet'); if(s)s.remove(); }

async function renderAddExerciseSheet(){
  const st=window._tlState;
  let host=document.getElementById('tl-add-sheet');
  if(!host){ host=document.createElement('div'); host.id='tl-add-sheet'; document.body.appendChild(host); }

  if(st.page===1){
    let allEx=[];
    try{ allEx=(await dbGetAll('exercises')).filter(e=>e.active!==false); }catch(_){}
    allEx.sort((a,b)=>(!!a.is_custom-!!b.is_custom)||(a.created_at||'').localeCompare(b.created_at||''));
    { const seen=new Set(); allEx=allEx.filter(e=>{ if(seen.has(e.name))return false; seen.add(e.name); return true; }); }
    const exByName=Object.fromEntries(allEx.map(e=>[e.name,e]));
    const mkBtn=(name)=>{ const e=exByName[name]; if(!e)return''; return `<button class="ae-opt ${st.exercise_name===name?'active':''}" onclick="tlPickExAuto('${name.replace(/'/g,"\\'")}')">${name}</button>`; };

    // 已選動作條（選了動作後顯示）
    const chosen = st.exercise_name ? `<div class="ae-chosen-bar">
      <div class="ae-chosen-l"><span class="ae-chosen-ex">${st.exercise_name}</span>
        <span class="ae-chosen-meta">工具：${st.tool||'—'}　·　姿勢：${st.posture||'—'}　<button class="ae-chosen-edit" onclick="tlToggleTP()">${st._tpOpen?'收合':'修改'}</button></span></div>
      </div>
      ${st._tpOpen?`<div class="ae-tp">
        <div class="ae-label">使用工具</div><div class="ae-grid ae-grid-3">${TL_TOOLS.map(t=>`<button class="ae-opt ${st.tool===t?'active':''}" onclick="tlPickTool('${t}')">${t}</button>`).join('')}</div>
        <div class="ae-label">使用姿勢</div><div class="ae-grid ae-grid-2">${TL_POSTURES.map(p=>`<button class="ae-opt ${st.posture===p?'active':''}" onclick="tlPickPosture('${p}')">${p}</button>`).join('')}</div>
      </div>`:''}` : '';
    const ready = st.exercise_name && st.tool && st.posture;
    const foot = `<div class="ae-foot"><button class="btn ${ready?'btn-green':'btn-ghost'}" style="width:100%;" ${ready?'':'disabled'} onclick="tlGoPage2()">開始記錄 →</button></div>`;

    if(!st._dir){
      // 步驟1：選訓練方向（七大按鈕）
      const dirBtns=TL_DIRECTIONS.map(d=>`<button class="ae-dir" onclick="tlPickDir('${d.key}')">${d.key}</button>`).join('');
      host.innerHTML=`<div class="ms-backdrop" onclick="closeAddExercise()"></div>
        <div class="ms-panel ae-panel">
          <div class="ms-head"><div class="ms-title">選擇訓練方向</div><button class="ms-close" onclick="closeAddExercise()">✕</button></div>
          <div class="ae-body"><div class="ae-dir-grid">${dirBtns}</div></div>
        </div>`;
      return;
    }

    // 步驟2：方向已選 → 上次紀錄 + 快速套用 + 新增動作
    const dir=TL_DIRECTIONS.find(d=>d.key===st._dir)||TL_DIRECTIONS[0];
    const part=dir.part;
    // 該會員最近一次此方向(part)的紀錄
    let lastBlock='<div class="ae-hint">這個會員還沒有這個方向的紀錄</div>';
    try{
      const b=window._tlBooking;
      const logs=(await dbGetAll('training_logs')).filter(l=>l.member_id===b.member_id && l.body_part===part && l.booking_id!==b.id)
        .sort((a,b)=>(b.created_at||'').localeCompare(a.created_at||''));
      if(logs.length){
        // 取最近那一堂課(同 booking_id)的紀錄
        const lastBid=logs[0].booking_id;
        const lastLogs=logs.filter(l=>l.booking_id===lastBid);
        const dt=(logs[0].created_at||'').slice(0,10).replace(/-/g,'/');
        lastBlock=`<div class="ae-last-date">${dt}</div>`+lastLogs.map(l=>{
          let sets='';
          if(l.sets_detail){ try{ const arr=JSON.parse(l.sets_detail); sets=arr.map(s=>`${s.reps||'-'}×${s.weight||'-'}`).join('　'); }catch(_){} }
          if(!sets) sets=`${l.reps||'-'} 次${l.sets?(' ×'+l.sets+'組'):''}`;
          return `<div class="ae-last-row"><span class="ae-last-ex">${l.exercise_name}</span><span class="ae-last-sets">${sets}</span></div>`;
        }).join('');
      }
    }catch(_){}

    // 快速套用：此方向(part)的動作
    const dirExs=allEx.filter(e=>e.body_part===part);
    const quickBlock=`<div class="ae-grid ae-grid-2">${dirExs.map(e=>mkBtn(e.name)).join('')||'<div class="ae-hint">尚無動作</div>'}</div>`;

    host.innerHTML=`<div class="ms-backdrop" onclick="closeAddExercise()"></div>
      <div class="ms-panel ae-panel">
        <div class="ms-head">
          <button class="ae-back" onclick="tlBackToDir()">‹</button>
          <div class="ms-title">${st._dir}</div>
          <button class="ms-close" onclick="closeAddExercise()">✕</button>
        </div>
        <div class="ae-body">
          <div class="ae-label">最近訓練</div>
          <div class="ae-last">${lastBlock}</div>
          <div class="ae-label">快速套用</div>
          ${quickBlock}
          <div class="ae-grid ae-grid-2" style="margin-top:10px;"><button class="ae-opt ae-add" onclick="tlAddCustomExercise()">＋ 新增動作</button></div>
        </div>
        ${chosen}
        ${foot}
      </div>`;
  }else{
    // 第二頁：已完成的組顯示為摘要，最後一組為輸入；按「＋新增一組」定下當前組再開新組
    const done = st.sets.slice(0, st.sets.length-1); // 已定下的組
    const cur = st.sets[st.sets.length-1];           // 當前輸入組
    const doneHtml=done.map((s,i)=>`<div class="ae-set-done">
      <div class="ae-set-no done">${i+1}</div>
      <div class="ae-set-val">${s.reps||'-'} 次　×　${s.weight||'-'} kg</div>
      <button class="ae-set-del" onclick="tlDelSet(${i})">✕</button>
    </div>`).join('');
    const curNo=done.length+1;
    const curHtml=`<div class="ae-set-cur">
      <div class="ae-set-no">${curNo}</div>
      <div class="ae-cur-fields">
        <div class="ae-set-field"><input type="number" inputmode="numeric" id="ae-cur-reps" class="ae-set-in" placeholder="次數" value="${cur.reps}"><span>次</span></div>
        <div class="ae-set-field"><input type="number" inputmode="decimal" id="ae-cur-weight" class="ae-set-in" placeholder="重量" value="${cur.weight}"><span>kg</span></div>
      </div>
    </div>`;
    const noteBlock = st._noteOpen
      ? `<textarea id="ae-note" class="ae-note" placeholder="輸入備註…">${st.note||''}</textarea>`
      : `<button class="ae-add-note" onclick="tlOpenNote()">＋ 新增備註</button>`;
    // 工具/姿勢：預設已從動作資料庫帶入，顯示於動作名下方；點「修改」才展開編輯
    const tpBlock = st._tpOpen
      ? `<div class="ae-tp" style="margin-top:8px;">
          <div class="ae-label">使用工具</div><div class="ae-grid ae-grid-3">${TL_TOOLS.map(t=>`<button class="ae-opt ${st.tool===t?'active':''}" onclick="tlPickTool('${t}')">${t}</button>`).join('')}</div>
          <div class="ae-label">使用姿勢</div><div class="ae-grid ae-grid-2">${TL_POSTURES.map(p=>`<button class="ae-opt ${st.posture===p?'active':''}" onclick="tlPickPosture('${p}')">${p}</button>`).join('')}</div>
        </div>`
      : '';
    host.innerHTML=`<div class="ms-backdrop" onclick="closeAddExercise()"></div>
      <div class="ms-panel ae-panel">
        <div class="ms-head">
          <button class="ae-back" onclick="tlBackPage1()">‹</button>
          <div class="ms-title">記錄訓練</div>
          <button class="ms-close" onclick="closeAddExercise()">✕</button>
        </div>
        <div class="ae-chosen">
          <div class="ae-chosen-ex">${st.exercise_name}</div>
          <div class="ae-chosen-sub">${[st.posture,st.tool].filter(Boolean).join('　·　')||'未設定工具姿勢'}　<button class="ae-chosen-edit" onclick="tlToggleTP()">${st._tpOpen?'收合':'修改'}</button></div>
          ${tpBlock}
        </div>
        <div class="ae-body">
          <div class="ae-sets-head"><span>組</span><span>次數 RM</span><span>重量 kg</span></div>
          ${doneHtml}
          ${curHtml}
          <button class="ae-add-set" onclick="tlAddSet()">＋ 新增一組</button>
          <div style="margin-top:14px;">${noteBlock}</div>
        </div>
        <div class="ae-foot"><button class="btn btn-green" style="width:100%;" onclick="tlSaveExercise()">儲存（共 ${curNo} 組）</button></div>
      </div>`;
    setTimeout(()=>{const r=document.getElementById('ae-cur-reps');if(r&&!cur.reps)r.focus();},60);
  }
}

// 選動作 → 自動帶入部位＋預設工具/姿勢，直接進入記錄頁（紙本邏輯：先記重量次數）
async function tlPickExAuto(n){
  const st=window._tlState;
  st.exercise_name=n; st._tpOpen=false;
  try{
    const ex=(await dbGetAll('exercises')).find(e=>e.name===n && e.active!==false);
    if(ex){
      st.body_part=ex.body_part||st.body_part;
      st.tool = ex.default_tool || st.tool || '徒手';
      st.posture = ex.default_posture || st.posture || '站姿';
    }else{ st.tool=st.tool||'徒手'; st.posture=st.posture||'站姿'; }
  }catch(_){ st.tool=st.tool||'徒手'; st.posture=st.posture||'站姿'; }
  st.page=2; // 直接進記錄頁，不需再按「開始記錄」
  renderAddExerciseSheet();

function tlAddSet(){
  tlReadCur();

async function saveCustomExercise(){
  const name=(document.getElementById('cx-name').value||'').trim();
  if(!name){showToast('請輸入動作名稱');return;}
  const part=document.getElementById('cx-part').value;
  const tool=document.getElementById('cx-tool').value;
  const post=document.getElementById('cx-post').value;
  const ex={id:uid('EX'),name,body_part:part,default_tool:tool,default_posture:post,is_custom:true,created_by:SESSION.id,active:true,created_at:new Date().toISOString()};
  try{
    await dbPut('exercises',ex);
    const st=window._tlState;
    st.body_part=part; st.exercise_name=name;
    if(!st.tool)st.tool=tool; if(!st.posture)st.posture=post;
    closeModal();
    renderAddExerciseSheet();
  }catch(e){ showToast('建立失敗：'+(e&&e.message?e.message:e)); }
}
async function tlSaveExercise(){
  tlReadCur();
  const st=window._tlState, b=window._tlBooking;
  // 整理有效組（至少填了次數或重量的組）
  const valid=st.sets.filter(s=>s.reps!==''||s.weight!=='');
  if(valid.length===0){ showToast('請至少記錄一組的次數或重量'); return; }
  const setsText=valid.map(s=>`${s.reps||'-'}次${s.weight?'×'+s.weight+'kg':''}`).join('、');
  const repsFirst=valid[0].reps!==''?parseInt(valid[0].reps,10):null;
  const log={
    id:uid('TLOG'), booking_id:b.id, member_id:b.member_id, coach_id:SESSION.id,
    exercise_name:st.exercise_name, body_part:st.body_part, posture:st.posture, tool:st.tool,
    reps:repsFirst, sets:valid.length,
    sets_detail:JSON.stringify(valid),    // 多組明細（次數+重量）
    note:(st.note||'') + (setsText?(st.note?'　':'')+'['+setsText+']':''),
    created_at:new Date().toISOString()
  };
  try{
    await dbPut('training_logs',log);
    window._tlogBids&&window._tlogBids.add(log.booking_id); // 即時更新課卡狀態
    closeAddExercise();
    showToast('已加入紀錄');
    renderTrainingLogSheet();
  }catch(e){ showToast('儲存失敗：'+(e&&e.message?e.message:e)); }
}

// ── 票券品牌文案（依狀態與剩餘堂數，傳達陪伴感）──
function ticketCopy(t){
  const total=t.sessions_total||0, remain=t.sessions_remaining||0;
  // 失效
  if(t.status==='expired') return { tone:'soft', line1:'這張票券已完成它的旅程。', line2:'期待再次陪伴你。' };
  if(t.status==='used_up'||remain<=0) return { tone:'done', line1:'恭喜完成這一張票券。', line2:'謝謝你陪自己走到這裡，期待下一段旅程。' };
  // 剛購買：尚未使用任何一堂（remain===total）
  if(total>0 && remain===total){
    return { tone:'new', line1:'歡迎加入這段新的練習。', line2:`你的練習，還有 ${remain} 堂，我們陪你一起開始。` };
  }
  // 最後一堂
  if(remain===1) return { tone:'last', line1:'最後一堂。', line2:'也是下一段開始的時候。' };
  // 剩 2 堂
  if(remain===2) return { tone:'low', line1:`還剩最後 ${remain} 堂。`, line2:'我們一起完成這一段旅程。' };
  // 剩餘不到 3 堂（即 remain<3 已被上面涵蓋；此處放「準備迎接下一段」備用）
  // 過半（完成一半以上）
  if(total>0 && remain<=Math.ceil(total/2)){
    return { tone:'half', line1:'已經完成一半了。', line2:`身體正在慢慢回應你的努力，還剩 ${remain} 堂。` };
  }
  // 還有很多堂
  return { tone:'plenty', line1:`你的練習，還剩 ${remain} 堂。`, line2:'慢慢來，保持自己的節奏，我們一起慢慢練。' };
}
// 圓圈進度條：每堂一個圓
//  已上完(已簽到/完成)=反白消去(done)；已預約未上=圓圈內標 月/日(booked)；其餘未排=空心(open)
//  bks：該票券扣抵的預約清單(已依日期排序、不含取消)
function ticketBar(remain,total,bks,tk){
  const t=Math.max(total,0);
  bks=bks||[];
  const done=bks.filter(b=>b.status==='checked_in'||b.status==='completed');
  const booked=bks.filter(b=>b.status==='booked'||b.status==='scheduled');
  const md=b=>{ const d=parseYmd(b.date); return d?(d.getMonth()+1)+'/'+d.getDate():''; };
  // 分期票：只有前 unlocked 堂已開通，其餘顯示鎖定
  const isInstall = tk && tk.installment && tk.unlocked_sessions!=null && tk.unlocked_sessions<t;
  const unlocked = isInstall ? tk.unlocked_sessions : t;
  let s='', di=0, bi=0;
  for(let i=0;i<t;i++){
    if(i>=unlocked){ // 未開通（分期尚未繳款解鎖）
      s+='<span class="mck-dot locked" title="尚未開通（需繳下一期）">🔒</span>';
    }else if(di<done.length){ // 已上完 → 反白
      s+=`<span class="mck-dot done" title="已完成 ${done[di].date||''}">✓</span>`; di++;
    }else if(bi<booked.length){ // 已預約未上 → 標日期
      const b=booked[bi]; s+=`<span class="mck-dot booked" title="已預約 ${b.date||''} ${b.start_time||''}">${md(b)}</span>`; bi++;
    }else{ // 未排（仍可預約）→ 實心色，不標日期
      s+='<span class="mck-dot remain"></span>';
    }
  }
  return s||'<span class="mck-dot remain"></span>';
}
let _mcOpen={}; // 展開狀態
function toggleMcCard(id){ _mcOpen[id]=!_mcOpen[id]; renderMemTickets(); }
let _memTkData=null;
PAGES.mem_tickets=async function(){
  const[tickets,types,logs,bookings]=await Promise.all([dbGetAll('member_tickets'),dbGetAll('ticket_types'),dbGetAll('ticket_logs').catch(()=>[]),dbGetAll('bookings').catch(()=>[])]);
  window._ttCache=types;
  const typeMap=Object.fromEntries(types.map(t=>[t.id,t]));
  const mine=tickets.filter(t=>t.member_id===SESSION.id);
  const myBk=(bookings||[]).filter(b=>b.member_id===SESSION.id || (Array.isArray(b.member_ids)&&b.member_ids.includes(SESSION.id)));
  // 未使用堂數 = 總數 − 已簽到/完成（已預約未上仍算未使用，避免會員誤會堂數用完）
  const usedMap=usedSessionsMap(myBk);
  // 每張票券扣抵的預約清單（給圓圈進度條：已上=反白、已預約=標日期），依日期時間排序
  //  一般課：booking.ticket_id 直接對應；
  //  團課：booking.ticket_id 為 null，改由 ticket_logs 的 deduct 紀錄反查（ticket_id ↔ booking_id）
  const bkById=Object.fromEntries(myBk.map(b=>[b.id,b]));
  const bkByTicket={};
  const pushUniq=(tid,b)=>{ const arr=(bkByTicket[tid]=bkByTicket[tid]||[]); if(!arr.some(x=>x.id===b.id)) arr.push(b); };
  // ① 直接關聯
  myBk.forEach(b=>{
    if(!b.ticket_id || b.status==='cancelled') return;
    pushUniq(b.ticket_id, b);
  });
  // ② 由扣票紀錄反查（涵蓋團課等 booking.ticket_id 為 null 的情況）
  (logs||[]).forEach(lg=>{
    if(lg.action!=='deduct' || !lg.ticket_id || !lg.booking_id) return;
    const b=bkById[lg.booking_id];
    if(!b || b.status==='cancelled') return;
    // 只補進屬於本會員的票券
    const tk=mine.find(t=>t.id===lg.ticket_id); if(!tk) return;
    pushUniq(lg.ticket_id, b);
  });
  Object.values(bkByTicket).forEach(arr=>arr.sort((a,b)=>((a.date||'')+(a.start_time||'')).localeCompare((b.date||'')+(b.start_time||''))));
  // 依 bkByTicket 重算已使用堂數（涵蓋團課：ticket_id=null 但由 log 反查到的預約）
  Object.keys(bkByTicket).forEach(tid=>{
    usedMap[tid]=bkByTicket[tid].filter(b=>b.status==='checked_in'||b.status==='completed').length;
  });
  // 每張票券「已預約但尚未上課」堂數（給 ticketUnused 的上限鉗制用）
  const bookedMap={};
  Object.keys(bkByTicket).forEach(tid=>{
    bookedMap[tid]=bkByTicket[tid].filter(b=>b.status==='booked'||b.status==='scheduled').length;
  });
  _memTkData={mine,typeMap,logs,usedMap,bkByTicket,bookedMap};
  renderMemTickets();
};
function renderMemTickets(){
  if(!_memTkData) return;
  const {mine,typeMap,logs,usedMap,bkByTicket,bookedMap}=_memTkData;
  const today=ymd(TODAY);
  // 「有效」判斷改用未使用堂數（已預約未簽到仍算未使用），而非 sessions_remaining。
  //  狀態須 usable、未過期、且仍有未使用堂數 → 歸「持有中」；否則歸「已完成 / 已到期」。
  const isLive=t=>t.status==='usable' && ticketUnused(t,usedMap,((bookedMap||{})[t.id]||0))>0 && (!t.expire_date||t.expire_date>=today);
  const usable=mine.filter(isLive)
    .sort((a,b)=>(a.expire_date||'').localeCompare(b.expire_date||''));
  const inactive=mine.filter(t=>!isLive(t))
    .sort((a,b)=>(b.expire_date||'').localeCompare(a.expire_date||''));

  const card=(t,dim)=>{
    const ty=typeMap[t.ticket_type_id];
    const color=ty?ty.color:'pt';
    const remain=t.sessions_remaining||0, total=t.sessions_total||0;
    const unused=ticketUnused(t,usedMap,((bookedMap||{})[t.id]||0)); // 顯示用：未使用（以真實剩餘+已預約為上限）
    const days=t.expire_date?diffDays(t.expire_date,today):null;
    const soon=!dim&&days!=null&&days<=7&&days>=0;
    const copy=ticketCopy(t);
    const open=!!_mcOpen[t.id];
    const name=t.plan_name||(ty?ty.name:'票券');
    // 若名稱已含 1V1/1V2 等授課型別，不重複附加
    const fmtU=t.format?t.format.toUpperCase():'';
    const fmt=(fmtU && name.toUpperCase().indexOf(fmtU)<0)?` · ${fmtU}`:'';
    // 展開內容：使用紀錄
    const myLogs=(logs||[]).filter(l=>l.ticket_id===t.id).sort((a,b)=>(b.created_at||'').localeCompare(a.created_at||''));
    const actLabel={grant:'發放',deduct:'扣課',refund:'退課',adjust:'調整',expire:'過期',checkin_grant:'簽到送'};
    const detail=open?`<div class="mck-detail">
      <div class="mck-d-row"><span class="mck-d-k">發放日期</span><span class="mck-d-v">${t.purchase_date||t.start_date||'—'}</span></div>
      <div class="mck-d-row"><span class="mck-d-k">到期日</span><span class="mck-d-v">${t.expire_date||'—'}</span></div>
      <div class="mck-d-row"><span class="mck-d-k">來源</span><span class="mck-d-v">${srcLabel(t.source)}</span></div>
      <div class="mck-d-sub">使用紀錄</div>
      ${myLogs.length===0?'<div class="mck-d-empty">尚無異動紀錄</div>':
        myLogs.map(l=>`<div class="mck-d-log"><span class="mck-d-act">${actLabel[l.action]||l.action}</span>
          <span class="mck-d-delta" style="color:${l.delta>0?'var(--ok)':'var(--danger)'};">${l.delta>0?'+':''}${l.delta}</span>
          <span class="mck-d-time">${l.created_at?new Date(l.created_at).toLocaleDateString('zh-TW',{month:'2-digit',day:'2-digit'}):''}</span></div>`).join('')}
      <div class="mck-d-rule">使用規則：每堂課預約即扣 1 堂，取消（開課 24 小時前）會退回；到期後未使用堂數失效。</div>
    </div>`:'';

    return `<div class="mck-card mck-${color}${dim?' mck-dim':''}">
      <div class="mck-head" onclick="toggleMcCard('${t.id}')">
        <div class="mck-top">
          <div class="mck-name">${name}${fmt}</div>
          ${dim?`<span class="mck-badge">${(t.status==='expired'||(t.expire_date&&t.expire_date<today))?'已到期':'已使用完'}</span>`
                :(soon?`<span class="mck-badge mck-badge-warn">${days} 天後到期</span>`:'')}
        </div>
        ${dim?'':`<div class="mck-copy"><div class="mck-copy1">${copy.line1}</div><div class="mck-copy2">${copy.line2}</div></div>`}
        <div class="mck-bar">${ticketBar(unused,total,bkByTicket[t.id],t)}</div>
        ${(t.installment && t.unlocked_sessions!=null && t.unlocked_sessions<total)?`<div class="mck-install">分期方案・目前開通 <b>${t.unlocked_sessions}</b> / ${total} 堂　·　🔒 部分堂數需繳下一期後開通</div>`:''}
        <div class="mck-figures">
          <div class="mck-num"><span class="mck-num-big">${unused}</span><span class="mck-num-tot">/ ${total} 堂</span></div>
          <div class="mck-exp">${dim?'':'到期'} ${t.expire_date||'—'}</div>
        </div>
        <div class="mck-toggle">${open?'收合 ▲':'查看紀錄 ▾'}</div>
      </div>
      ${detail}
    </div>`;
  };

  // 續課提示：總未使用堂數 <=2，或最快到期 <=7 天時，柔和提醒（移自首頁）
  let totalRemain=0, soonest=null;
  usable.forEach(t=>{ totalRemain+=ticketUnused(t,usedMap); if(t.expire_date&&(!soonest||t.expire_date<soonest)) soonest=t.expire_date; });
  const expDays=soonest?diffDays(soonest,today):null;
  const needRenew = usable.length>0 && (totalRemain<=2 || (expDays!=null&&expDays<=7));
  const renewHint = needRenew
    ? `<button class="mck-renew" onclick="navTo('mem_purchase')">
        <span class="mck-renew-t">${totalRemain<=2?'剩餘堂數不多了':'票券即將到期'}</span>
        <span class="mck-renew-s">${totalRemain<=2?'準備好，我們陪你走下一段練習。':'有需要時，我們都在。'}　前往續課 ›</span>
      </button>`
    : '';

  C.innerHTML=head('TICKETS','我的票券',`目前持有 ${usable.length} 張有效票券`)+
  renewHint+
  `${usable.length===0&&inactive.length===0
    ? '<div class="card"><div class="empty" style="padding:40px 16px;"><div class="em-t">還沒有票券</div><div style="font-size:12.5px;color:var(--t2);margin-top:8px;">到「購買票券」開始你的第一段練習。</div></div></div>'
    : ''}
  ${usable.map(t=>card(t,false)).join('')}
  ${inactive.length>0?`<div class="mck-section-label">已完成 / 已到期</div>${inactive.map(t=>card(t,true)).join('')}`:''}`;
}

// 勾選同意 → 開啟簽名區並初始化簽名板
function toggleSigArea(){
  const on=document.getElementById('ap-agree').checked;
  const area=document.getElementById('ap-sig-area');
  if(!area)return;
  area.style.display=on?'block':'none';
  if(on) setTimeout(initSigPad,50);
}
function initSigPad(){
  const canvas=document.getElementById('ap-sig'); if(!canvas)return;
  const rect=canvas.getBoundingClientRect();
  canvas.width=rect.width*2; canvas.height=rect.height*2;
  const ctx=canvas.getContext('2d'); ctx.scale(2,2); ctx.lineWidth=2; ctx.lineCap='round'; ctx.strokeStyle='#003d32';
  let drawing=false, has=false;
  const pos=e=>{const r=canvas.getBoundingClientRect();const t=e.touches?e.touches[0]:e;return{x:t.clientX-r.left,y:t.clientY-r.top};};
  const start=e=>{drawing=true;has=true;const p=pos(e);ctx.beginPath();ctx.moveTo(p.x,p.y);e.preventDefault();};
  const move=e=>{if(!drawing)return;const p=pos(e);ctx.lineTo(p.x,p.y);ctx.stroke();e.preventDefault();};
  const end=()=>{drawing=false;};
  canvas.addEventListener('pointerdown',start); canvas.addEventListener('pointermove',move);
  canvas.addEventListener('pointerup',end); canvas.addEventListener('pointerleave',end);
  _sigPad={canvas,ctx,hasInk:()=>has,clear:()=>{ctx.clearRect(0,0,canvas.width,canvas.height);has=false;}};
}
function clearSig(){ if(_sigPad)_sigPad.clear(); }
async function submitApply(){

  if(!name||!birth||!phone||!ec||!ecphone){ showToast('請完整填寫會員基本資料（Email 選填）'); return; }
  if(!_sigPad||!_sigPad.hasInk()){showToast('請完成電子簽名');return;}
  const p=await dbGet('course_plans',_applyPlanId);
  const ty=await dbGet('ticket_types',p.ticket_type_id);
  const tot=p.sessions_base+p.sessions_bonus;
  const price=(p.unit_price||0)*p.sessions_base;
  const sig=_sigPad.canvas.toDataURL('image/png');
  let ip=null;
  try{ const r=await fetch('https://api.ipify.org?format=json'); const j=await r.json(); ip=j.ip||null; }catch(_){}
  const signedAt=new Date().toISOString();
  // 回寫會員基本資料（簽約時填的視為最新）
  try{
    const me=await dbGet('members',SESSION.id);
    if(me){ me.name=name; me.birthday=birth; me.email=email||me.email; me.emergency_name=ec; me.emergency_phone=ecphone; await dbPut('members',me); }
  }catch(_){}
  // 合約快照（存當下購買內容與會員資料，供後台永久查閱、第二批產 PDF）
  const snapshot={
    member:{name,birth_date:birth,phone,email,emergency_name:ec,emergency_phone:ecphone},
    purchase:{plan_name:p.name,course_type:(ty?ty.name:'')+(p.format?'・'+p.format.toUpperCase():''),
      purchase_date:ymd(TODAY),sessions_total:tot,sessions_bonus:p.sessions_bonus||0,
      amount:price,installment:!!p.installment,valid_days:p.valid_days,
      expire_date:ymd(addDays(TODAY,p.valid_days))},
    contract_version:CONTRACT_VERSION, signed_at:signedAt, ip
  };
  const app={id:uid('PA'),member_id:SESSION.id,plan_id:_applyPlanId,plan_name:p.name,
    list_price:price,signature:sig,contract_version:CONTRACT_VERSION,agreed_health:true,ip,
    signed_at:signedAt, contract_snapshot:JSON.stringify(snapshot),
    status:'pending',created_at:new Date().toISOString()};
  try{ await dbPut('purchase_applications',app); }
  catch(e){ showToast('送出失敗：'+(e.message||e)); return; }
  closeModal();showToast('合約已簽署，申請已送出待審核');navTo('mem_tickets');
}

/* ════════ 後台:購買申請審核（發票分流） ════════
   狀態流轉：
   pending（待審核）
     ├─免發票  → completed（已完成）          ＋ 立即發票券（invoice_status=none）
     ├─雲端發票→ invoicing（待開立發票）      → 填發票號 → completed ＋發票券
     ├─紙本發票→ invoicing（待開立發票）      → 填發票號 → completed ＋發票券
     └─取消    → cancelled（已取消）          不發票券
   發放核心統一走 _issueTicketsFromApp()，沿用既有「發票券／算到期日／購買紀錄／異動紀錄／升級會員／通知」邏輯。 */
const APP_INVOICE_LABEL={none:'免發票',cloud:'雲端發票',paper:'紙本發票'};
PAGES.purchase_review=async function(){
  const[apps,members,plans,types]=await Promise.all([dbGetAll('purchase_applications'),dbGetAll('members'),dbGetAll('course_plans'),dbGetAll('ticket_types')]);
  const memMap=Object.fromEntries(members.map(m=>[m.id,m]));
  const planMap=Object.fromEntries(plans.map(p=>[p.id,p]));
  const pending=apps.filter(a=>a.status==='pending').sort((a,b)=>(a.created_at||'').localeCompare(b.created_at||''));
  const invoicing=apps.filter(a=>a.status==='invoicing').sort((a,b)=>(a.reviewed_at||a.created_at||'').localeCompare(b.reviewed_at||b.created_at||''));
  const done=apps.filter(a=>a.status==='completed'||a.status==='cancelled').sort((a,b)=>(b.reviewed_at||b.created_at||'').localeCompare(a.reviewed_at||a.created_at||'')).slice(0,30);
  const APPST={completed:['已完成','tag-ok'],cancelled:['已取消','tag-danger'],invoicing:['待開立發票','tag-warn'],
    approved:['已通過','tag-ok'],rejected:['已拒絕','tag-danger']}; // 後兩者相容舊資料
  const payMethodLabel=m=>({cash:'現金',transfer:'匯款'}[m]||m||'—');
  const metaLine=a=>{
    const bits=[];
    bits.push(`申請 ${(a.created_at||'').replace('T',' ').slice(0,16)}`);
    if(a.payment_method) bits.push('付款：'+payMethodLabel(a.payment_method));
