function ticketCategoryOf(t){
  if(!t) return null;
  const tt=(window._ttCache||[]).find(x=>x.id===t.ticket_type_id);
  if(tt && tt.category) return tt.category;
  // 字串相容（舊資料 ticket_type_id 直接是語意字串）
  const id=t.ticket_type_id||'';
  if(id==='pt'||id==='pt_friendly') return '私人教練';
  if(id==='group') return '小班肌力';
  if(id==='self_training'||id==='self_friendly') return '自主訓練';
  if(id==='trial') return '體驗';
  // 用方案名相容
  const nm=(t.plan_name||'')+(tt?tt.name:'');
  if(nm.indexOf('團體')>=0||nm.indexOf('小班')>=0) return '小班肌力';
  if(nm.indexOf('自主')>=0) return '自主訓練';
  if(nm.indexOf('體驗')>=0) return '體驗';
  if(nm.indexOf('教練')>=0) return '私人教練';
  return null;
}
// 判斷一張票券是否可用於某「課程類別」（同類別即可，不死綁 ticket_type_id）
function ticketMatchesCategory(t, category){
  if(!t||!category) return false;
  const cat=ticketCategoryOf(t);
  if(cat===category) return true;
  // 教練課與體驗在票券上常通用？預設不通用，嚴格比對類別
  return false;
}
// 把一個 ticket_type_id 解析成它代表的課程類別（給呼叫端用 id 時轉換）
function categoryOfTypeId(type_id){
  const tt=(window._ttCache||[]).find(x=>x.id===type_id);
  if(tt && tt.category) return tt.category;
  if(type_id==='pt'||type_id==='pt_friendly') return '私人教練';
  if(type_id==='group') return '小班肌力';
  if(type_id==='self_training'||type_id==='self_friendly') return '自主訓練';
  if(type_id==='trial') return '體驗';
  return null;
}
// 找會員某類型最早到期的可用票券
// 列出會員在某類型、某預約日仍有效（未過期、有剩餘堂數）的所有票券
async function listUsableTickets(member_id,type_id,bookDate){
  const all=await dbGetAll('member_tickets');
  if(!window._ttCache){ try{ window._ttCache=await dbGetAll('ticket_types'); }catch(_){ window._ttCache=[]; } }
  const wantCat=categoryOfTypeId(type_id); // 目標課程類別
  const groupMode = wantCat==='小班肌力';   // 團課：不同方案票券互通（同為團課即可用）
  return all.filter(t=>{
      if(t.member_id!==member_id) return false;
      if(t.status!=='usable' || !(t.sessions_remaining>0)) return false;
      if(bookDate && t.expire_date && t.expire_date<bookDate) return false; // 已過期
      if(groupMode) return ticketCategoryOf(t)==='小班肌力'; // 團課：同類別即可（不分方案）
      return t.ticket_type_id===type_id;                     // 其他類別：維持原本嚴格比對（保留友善/方案區分）
    })
    .sort((a,b)=>(a.expire_date||'').localeCompare(b.expire_date||''));
}
async function findUsableTicket(member_id,type_id,bookDate){
  const cand=await listUsableTickets(member_id,type_id,bookDate);
  return cand[0]||null;
}
async function logTicket(ticket_id,action,delta,booking_id,operator,note){
  await dbPut('ticket_logs',{id:uid('LG'),ticket_id,action,delta,booking_id,operator,note,created_at:new Date().toISOString()});
}
// 扣一堂
async function deductTicket(ticket,booking_id,operator){
  ticket.sessions_remaining-=1;
  if(ticket.sessions_remaining<=0) ticket.status='used_up';
  await dbPut('member_tickets',ticket);
  await logTicket(ticket.id,'deduct',-1,booking_id,operator,'預約扣課');
}
// 退一堂
async function refundTicket(ticket_id,booking_id,operator){
  const t=await dbGet('member_tickets',ticket_id);
  if(!t)return;
  t.sessions_remaining+=1;
  if(t.status==='used_up'&&t.sessions_remaining>0) t.status='usable';
  await dbPut('member_tickets',t);
  await logTicket(ticket_id,'refund',1,booking_id,operator,'取消退課');
}
// 一鍵補發補課券：綁原課同類型，1 堂，效期 14 天，source='makeup'
async function grantMakeupTicket(booking){
  if(!booking||!booking.member_id){ showToast('此預約無綁定會員，無法補發'); return; }
  // 找原課同類型的票券種類 id（優先用原 booking 的 ticket_type_id，否則依 category 找）
  let type_id=booking.ticket_type_id||null, planName='補課券';
  try{
    if(!window._ttCache) window._ttCache=await dbGetAll('ticket_types');
    if(type_id){
      const tt=window._ttCache.find(t=>t.id===type_id);
      if(tt) planName=`${tt.name}・補課券`;
    }else{
      const tt=window._ttCache.find(t=>t.category===booking.category);
      if(tt){ type_id=tt.id; planName=`${tt.name}・補課券`; }
    }
  }catch(_){}
  const today=ymd(TODAY);
  const expire=ymd(addDays(TODAY,14)); // 效期 14 天
  const tk={ id:uid('TK'), member_id:booking.member_id, ticket_type_id:type_id,
    source_plan_id:null, plan_name:planName, format:booking.format||null,
    source:'makeup', purchase_date:today, start_date:today, expire_date:expire,
    sessions_total:1, sessions_remaining:1, status:'usable',
    payment_status:'paid', invoice_status:'none',
    makeup_for_booking:booking.id||null, created_at:new Date().toISOString() };
  await dbPut('member_tickets',tk);
  await logTicket(tk.id,'grant',1,booking.id||null,SESSION.id,'補發補課券');
  if(booking.id){ try{ const b=await dbGet('bookings',booking.id); if(b){ b.makeup_granted=true; await dbPut('bookings',b); } }catch(_){} }
  return tk;
}

function typeOfCat(cat){return {'私人教練':'pt','小班肌力':'group','自主訓練':'self_training','體驗':'trial'}[cat]||'pt';}
/* ── 行事曆隱私：教練身分看「別人的課」時，隱藏會員姓名（改顯示課程類型）、灰階呈現 ──
   只對 role==='coach' 生效；管理員 / 後台帳號正常看全部。
   「自己的課」＝ 授課教練（含代課）是登入者本人。 */
function bkIsMasked(b){
  if(!SESSION || SESSION.role!=='coach') return false; // 非教練不遮蔽
  if(b.category==='小班肌力') return false;             // 團體課本就不顯示會員名
  const acting = b.substitute_coach_id || b.coach_id;
  return acting !== SESSION.id;                          // 不是我帶的 → 遮蔽
}
// 取得行事曆上應顯示的名稱（遮蔽時回課程類型，如「教練課」「自主訓練」）
function bkDisplayName(b, realName){
  if(bkIsMasked(b)){
    return {'私人教練':'教練課','自主訓練':'自主訓練','體驗':'體驗','小班肌力':'團體課'}[b.category] || '課程';
  }
  return realName;
}

/* ════════ 共用:行事曆（30 分鐘格、可拖曳/拉伸/跨日） ════════ */
let calWeekStart=null;
let _calDays=null; // null=自動(依寬度) ; 7/3/1=手動覆蓋
function autoCalDays(){ const w=window.innerWidth; return w>=1100?7:(w>=680?3:1); }
function effCalDays(){ return _calDays||autoCalDays(); }
const CAL_START_H=8, CAL_END_H=22, SLOT_MIN=30, SLOT_PX=34; // 每 30 分 = 34px（容納三列卡片）
function initCalWeek(){const d=new Date(TODAY);const dow=d.getDay();calWeekStart=addDays(d,-((dow+6)%7));} // 週一起
function calToToday(){
  // 「回今天」：7 日檢視維持週一起；3/1 日檢視以今天當第一欄
  if(effCalDays()===7){ initCalWeek(); }
  else { const d=new Date(TODAY); calWeekStart=new Date(d.getFullYear(),d.getMonth(),d.getDate()); }
}
function timeToMin(t){const[h,m]=t.split(':').map(Number);return h*60+m;}
function minToTime(min){const h=Math.floor(min/60),m=min%60;return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0');}
function isMobileView(){return window.innerWidth<=820;}

let _calOpts=null;
async function renderCalendar(opts){
  // opts: {coachFilter(bool), onSlot(fnName), me(coach_id), editable(bool), _data(預先抓好的資料，避免重複) }
  _calOpts=opts;
  if(!calWeekStart)initCalWeek();
  // 若呼叫端已抓好資料（_data），直接沿用避免重複向雲端要同一批表；否則自行抓取
  let bookings,coaches,members,types,allTickets;
  if(opts&&opts._data){
    ({bookings,coaches,members,types,allTickets}=opts._data);
  }else{
    // 效能優化：coaches / members / ticket_types 很少變動 → 首次抓取後快取（60 秒內），切週時沿用，
    // 只有 bookings / member_tickets 每次重抓（會新增/異動）。大幅減少切週的等待時間。
    const cacheFresh = window._calStaticCache && (Date.now()-window._calStaticCache._t < 60000);
    const useCache = window._calStepping && cacheFresh;
    if(useCache){
      ({coaches,members,types}=window._calStaticCache);
      [bookings,allTickets]=await Promise.all([dbGetAll('bookings'),dbGetAll('member_tickets')]);
    }else{
      [bookings,coaches,members,types,allTickets]=await Promise.all([dbGetAll('bookings'),dbGetAll('coaches'),dbGetAll('members'),dbGetAll('ticket_types'),dbGetAll('member_tickets')]);
      window._calStaticCache={coaches,members,types,_t:Date.now()};

  const coachMap=Object.fromEntries(coaches.map(c=>[c.id,coachDisp(c)]));

  const typeMap=Object.fromEntries(types.map(t=>[t.id,t]));
  const ticketMap=Object.fromEntries(allTickets.map(t=>[t.id,t]));
  const nDays=effCalDays();
  const days=[];for(let i=0;i<nDays;i++)days.push(addDays(calWeekStart,i));

    if(opts.me && !opts.allMode && !opts.maskOthers && (b.substitute_coach_id||b.coach_id)!==opts.me) return false;
    if(opts.coachFilter && filterCoach!=='all' && b.coach_id!==filterCoach) return false;

  let filterHtml='';
  if(opts.coachFilter){
    const cOpts=coaches.filter(isCoachable).map(c=>`<option value="${c.id}" ${filterCoach===c.id?'selected':''}>${coachDisp(c)}</option>`).join('');
    filterHtml=`<div class="filter-row"><span style="font-size:12px;color:var(--t2);">篩選教練</span>

  // 時間軸欄

  for(let h=CAL_START_H;h<CAL_END_H;h++){

  const totalSlots=(CAL_END_H-CAL_START_H)*2;

  // 每天一欄

  days.forEach((d,di)=>{

    // 同一天同時段並排:簡單分欄
    const lanes=assignLanes(dayEvs);
    let evHtml='';
    dayEvs.forEach(b=>{
      const startMin=timeToMin(b.start_time)-CAL_START_H*60;

      const h=((b.duration||60)/SLOT_MIN)*SLOT_PX;
      const lane=lanes[b.id]||{idx:0,total:1};
      const wpct=100/lane.total;
      const editable=opts.editable && !opts.allMode && b.status!=='cancelled' && b.status!=='completed' && b.date>=ymd(TODAY) && (!opts.me || b.coach_id===opts.me);
      const cls=evColorClass(b,typeMap);
      const tk=b.ticket_id?ticketMap[b.ticket_id]:null;
      const remain = tk ? `${tk.sessions_remaining}/${tk.sessions_total}` : '';
      const coachName=b.coach_id?coachMap[b.coach_id]:'';
      const subCoachName=b.substitute_coach_id?coachMap[b.substitute_coach_id]:'';
      const typeName=bookingTypeName(b,typeMap);
      // 顯示名稱：團體課=多會員、體驗課=客戶名、一般=單一會員

      const acting=b.substitute_coach_id||b.coach_id;
      const isMine = opts.me && acting===opts.me;
      // 教練端（含全部預約模式）：自己的課顯示會員名；別的教練的課隱藏會員名
      const hideMember = (opts.me && !isMine) || bkIsMasked(b);
      if(hideMember){
        // 別的教練的課：隱藏會員名，顯示課程類型（如「教練課」「自主訓練」）

      }else if(b.category==='體驗'){

      }else if(b.category==='小班肌力'){

      const colW = (window.innerWidth - 80) / Math.max(nDays,1); // 每日欄約略寬度

      const mobile7 = window.innerWidth<=600 && nDays===7; // 手機七日 → 一律色塊（直書單名）
      const dense = mobile7 || (lane.total>=3 && cardW < 96); // 每張 < 96px 才縮成直式
      // 直式窄卡的精簡名稱：教練端非自己的課顯示種類；體驗=純客戶名、團課=第一人（人數）、一般=會員名
      let denseName;
      if(hideMember){
        const actingName = subCoachName || coachName;
        denseName = actingName || typeName;
      }else if(b.category==='體驗'){
        denseName = b.trial_name || '體驗';
      }else if(b.category==='小班肌力'){
        const ns=gIds.map(id=>memMap[id]).filter(Boolean);
        denseName = ns.length===0 ? '團課' : ns.length===1 ? ns[0] : `${ns[0]}<span class="dn-cnt">${ns.length}</span>`;
      }else{
        denseName = memMap[b.member_id]||'—';

      // hover 詳細資訊卡（滑過仍可看到完整狀態）
      const tip = hideMember ? `<div class="ev-tip">
        <div class="ev-tip-h"><b>${typeName}</b><span>${b.start_time}–${minToTime(timeToMin(b.start_time)+(b.duration||60))}</span></div>
        ${coachName?`<div class="ev-tip-r">教練：${coachName}${subCoachName?`　→ 代課：${subCoachName}`:''}</div>`:''}
        <div class="ev-tip-s">${statusLabel(b.status)}</div>
      </div>` : `<div class="ev-tip">
        <div class="ev-tip-h"><b>${memName}</b><span>${b.start_time}–${minToTime(timeToMin(b.start_time)+(b.duration||60))}</span></div>
        <div class="ev-tip-r">${typeName}${b.format?' · '+b.format:''}</div>
        ${coachName?`<div class="ev-tip-r">教練：${coachName}${subCoachName?`　→ 代課：${subCoachName}`:''}</div>`:''}
        ${tk?`<div class="ev-tip-tk">${tk.plan_name||'票券'}　剩 ${remain}　<span style="opacity:.7;">效期至 ${tk.expire_date}</span></div>`:''}
        <div class="ev-tip-s">${statusLabel(b.status)}</div>
      </div>`;
      const tipUp = timeToMin(b.start_time) >= (CAL_END_H-3)*60; // 接近底部 → 提示往上展開避免被切
      evHtml+=`<div class="cal-ev ${cls} ${editable?'':'readonly'} ${dense?'ev-dense':''} ${tipUp?'tip-up':''} ${hideMember?'bk-masked':''}" data-bid="${b.id}" data-time="${b.start_time}"
        style="top:${top}px;height:${Math.max(h-2,64)}px;left:calc(${lane.idx*wpct}% + 3px);width:calc(${wpct}% - 6px);"
        ${editable?`onclick="onEvClick(event,'${b.id}')"`:(opts.allMode||bkIsMasked(b)?'':`onclick="openBookingDetail('${b.id}')"`)}>
        ${dense

        ${tip}
      </div>`;
    });
    daysHtml+=`<div class="cal-daycol ${isPast?'col-past':''}" data-date="${ds}">
      <div class="cal-daycol-head ${isToday?'today':''}">
        <div class="cd-wd">週${WD[d.getDay()]}</div>

      </div>

        if(!isToday)return '';

  const title=(nDays===1)

// 每分鐘更新行事曆「現在時間」紅線位置（不重繪整頁）
function updateNowLine(){
  document.querySelectorAll('.cal-now').forEach(el=>{
    const now=new Date();
    const nowMin=now.getHours()*60+now.getMinutes();
    if(nowMin<CAL_START_H*60||nowMin>CAL_END_H*60){ el.style.display='none'; return; }
    el.style.display='';
    el.style.top=(((nowMin-CAL_START_H*60)/SLOT_MIN)*SLOT_PX)+'px';
  });
}
if(!window._nowLineTimer){ window._nowLineTimer=setInterval(updateNowLine,60000); }
// 同天事件並排分欄(避免重疊):依時間排序貪婪分配
function assignLanes(evs){
  const sorted=[...evs].sort((a,b)=>timeToMin(a.start_time)-timeToMin(b.start_time));
  const lanesEnd=[]; const res={};
  // 找重疊群組
  const groups=[]; let cur=[];
  let curEnd=-1;
  sorted.forEach(b=>{
    const s=timeToMin(b.start_time),e=s+(b.duration||60);
    if(cur.length&&s>=curEnd){groups.push(cur);cur=[];curEnd=-1;}
    cur.push(b);curEnd=Math.max(curEnd,e);
  });
  if(cur.length)groups.push(cur);
  groups.forEach(g=>{
    const ends=[];
    g.forEach(b=>{
      const s=timeToMin(b.start_time),e=s+(b.duration||60);
      let idx=ends.findIndex(end=>end<=s);
      if(idx===-1){idx=ends.length;ends.push(e);}else{ends[idx]=e;}
      res[b.id]={idx,total:0};
    });
    g.forEach(b=>res[b.id].total=ends.length);
  });
  return res;
}
function calStep(n){calWeekStart=addDays(calWeekStart,n);window._calStepping=true;navTo(CUR_PAGE);}
// 手動切換顯示天數(null=自動)
function setCalDays(n){
  _calDays=n;
  // 1日/3日時，起點對齊今天(若今天在合理範圍);7日對齊週一
  if(n===7){ initCalWeek(); }
  else if(n===1||n===3){ const d=new Date(TODAY); calWeekStart=new Date(d.getFullYear(),d.getMonth(),d.getDate()); }
  window._calStepping=true; navTo(CUR_PAGE);
}

function openCalJump(){
  const base=calWeekStart||TODAY;

  showModal(`<div class="modal-title">跳至日期</div>
    <div class="form-row"><label>選擇日期</label><input type="date" id="cal-jump-date" value="${val}"></div>
    <div class="modal-foot"><button class="btn btn-ghost" onclick="closeModal()">取消</button><button class="btn btn-green" onclick="doCalJump()">前往</button></div>`);

function doCalJump(){
  const v=document.getElementById('cal-jump-date').value;
  if(!v){closeModal();return;}
  const d=parseYmd(v);
  const nDays=effCalDays();
  // 7日模式跳到該日期所在週的週一；其他模式直接以該日為起點
  if(nDays===7){ const dow=d.getDay(); calWeekStart=addDays(d,-((dow+6)%7)); }
  else{ calWeekStart=d; }
  window._calStepping=true;
  closeModal(); navTo(CUR_PAGE);
}

/* ── 拖曳 / 拉伸互動（電腦，支援跨日跟隨） ── */
function initCalDrag(){
  if(window.innerWidth<=600)return; // 真手機（窄螢幕）改點選；平板/iPad/桌機可拖曳
  const wrap=document.querySelector('.cal-body');
  if(!wrap)return;
  // Tooltip 邊界自適應：滑入卡片時，依空間決定 tooltip 往左/置中/往右展開，避免超出畫面
  wrap.addEventListener('mouseenter',(e)=>{
    const ev=e.target.closest&&e.target.closest('.cal-ev'); if(!ev)return;
    const tip=ev.querySelector('.ev-tip'); if(!tip)return;
    // 先重置
    tip.style.left='50%'; tip.style.right='auto'; tip.style.transform='translateX(-50%)';
    requestAnimationFrame(()=>{
      const r=tip.getBoundingClientRect();
      const vw=window.innerWidth, margin=8;
      if(r.left<margin){ // 超出左邊 → 靠卡片左緣往右展開
        tip.style.left='0'; tip.style.right='auto'; tip.style.transform='translateX(0)';
      }else if(r.right>vw-margin){ // 超出右邊 → 靠卡片右緣往左展開
        tip.style.left='auto'; tip.style.right='0'; tip.style.transform='translateX(0)';
      }
    });
  },true);
  let mode=null, bid=null, evEl=null, startY=0, startX=0, origH=0, origDur=60;
  let origDate=null, origTime=null, grabOffsetY=0, grabOffsetX=0;
  let preview=null, label=null;
  let dropDate=null, dropTime=null, dropDur=60;
  const cols=[...document.querySelectorAll('.cal-daycol')];

  function clearVis(){
    cols.forEach(c=>c.classList.remove('drop-target'));
    if(preview){preview.remove();preview=null;}
    if(label){label.remove();label=null;}
  }
  // 由滑鼠座標找落點欄位與對齊到 30 分的時間
  function locate(clientX,clientY){
    let col=null;
    for(const c of cols){
      const r=c.getBoundingClientRect();
      if(clientX>=r.left&&clientX<r.right){col=c;break;}
    }
    if(!col)return null;
    const track=col.querySelector('.cal-track');
    const tr=track.getBoundingClientRect();
    // 以抓取點在卡片內的偏移，換算卡片頂端應對齊的格
    let topPx=clientY - tr.top - grabOffsetY;
    let slot=Math.round(topPx/SLOT_PX);
    const maxSlot=(CAL_END_H-CAL_START_H)*2 - Math.round(origDur/SLOT_MIN);
    slot=Math.max(0,Math.min(slot,maxSlot));
    const min=CAL_START_H*60+slot*SLOT_MIN;
    return {col, track, date:col.dataset.date, time:minToTime(min), topPx:slot*SLOT_PX};
  }

  wrap.addEventListener('pointerdown',e=>{
    const ev=e.target.closest('.cal-ev');
    if(!ev||ev.classList.contains('readonly'))return;
    bid=ev.dataset.bid; evEl=ev;
    const rect=ev.getBoundingClientRect();
    origH=rect.height; origDur=Math.round(parseFloat(ev.style.height)/SLOT_PX)*SLOT_MIN||60;
    origDate=ev.closest('.cal-track').dataset.date;
    origTime=ev.dataset.time;
    grabOffsetY=e.clientY-rect.top;
    grabOffsetX=e.clientX-rect.left;
    startY=e.clientY; startX=e.clientX;
    mode='move';
    window._dragStarted=false; // 尚未真正開始拖曳（避免純點擊就移動卡片）
    try{ wrap.setPointerCapture(e.pointerId); }catch(_){}
    e.preventDefault();
  });

  window.addEventListener('pointermove',e=>{
    if(!mode)return;
    e.preventDefault(); // 觸控時避免頁面跟著捲動
    // move：首次移動超過 5px 才真正開始拖曳（純點擊不會移動卡片）
    if(!window._dragStarted){
      if(Math.abs(e.clientX-startX)<=5 && Math.abs(e.clientY-startY)<=5) return;
      window._dragStarted=true;
      const rect=evEl.getBoundingClientRect();
      evEl.classList.add('dragging');
      evEl.style.position='fixed';
      evEl.style.width=rect.width+'px';
      evEl.style.left=rect.left+'px';
      evEl.style.top=rect.top+'px';
      evEl.style.right='auto';
    }
    // 卡片左上角跟隨滑鼠（扣除抓取點偏移）
    evEl.style.left=(e.clientX-grabOffsetX)+'px';
    evEl.style.top=(e.clientY-grabOffsetY)+'px';

    clearVis();
    const loc=locate(e.clientX,e.clientY);
    if(loc){
      loc.col.classList.add('drop-target');
      dropDate=loc.date; dropTime=loc.time;
      // 預覽框
      preview=document.createElement('div');
      preview.className='cal-drop-preview';
      preview.style.top=loc.topPx+'px';
      preview.style.height=((origDur/SLOT_MIN)*SLOT_PX-2)+'px';
      loc.track.appendChild(preview);
      // 浮動標籤
      label=document.createElement('div');
      label.className='cal-drop-label';
      const d=parseYmd(loc.date);
      const endMin=timeToMin(loc.time)+origDur;
      label.textContent=`${d.getMonth()+1}/${d.getDate()}（${WD[d.getDay()]}）${loc.time}–${minToTime(endMin)}`;
      label.style.left=(e.clientX+14)+'px';
      label.style.top=(e.clientY+14)+'px';
      document.body.appendChild(label);
    }else{dropDate=null;dropTime=null;}
  });

  window.addEventListener('pointerup',async e=>{
    if(!mode)return;
    const m=mode; mode=null;
    const ev=evEl; evEl=null;
    const _bid=bid;
    // 判斷是否真的進入過拖曳（_dragStarted 在 mousemove 超過閾值時才設）
    const moved = window._dragStarted===true;
    window._dragStarted=false;
    clearVis();
    try{ wrap.releasePointerCapture(e.pointerId); }catch(_){}
    if(!moved){
      // 沒有拖動 → 視為點擊。因 pointer capture 會吞掉瀏覽器 click，這裡手動開明細。
      window._justDragged=false;
      window._justTapped=true; setTimeout(()=>{window._justTapped=false;},400);
      if(_bid) openBookingDetail(_bid);
      return;
    }
    // 確實拖曳過 → 立即重繪行事曆，讓卡片回到正確位置（避免清空 inline 定位後掉到容器底部）
    window._justDragged=true; setTimeout(()=>{window._justDragged=false;},300);
    // 只吞掉瀏覽器在 pointerup 後「補發在課卡上」的 click（避免拖完又誤開明細）。
    //  ⚠ 不可無差別吞整個視窗的下一次 click：否則拖完接著點明細裡的「取消預約」等按鈕會被吃掉（P0-1 bug）。
    //  判斷：click 目標若落在 .cal-ev / 行事曆容器內 → 攔截；落在 modal 或其他 UI → 放行。
    const swallow=(ev)=>{
      const t=ev.target;
      const onCalCard = t && t.closest && (t.closest('.cal-ev') || (t.closest('.cal-body') && !t.closest('.modal')));
      if(onCalCard){ ev.stopPropagation(); ev.preventDefault(); }
    };
    window.addEventListener('click',swallow,{capture:true,once:true});
    setTimeout(()=>window.removeEventListener('click',swallow,{capture:true}),350);
    window._calStepping=true; // 拖曳更新後保留當前檢視週，不要跳回本週
    const b=await dbGet('bookings',_bid);
    if(!b){navTo(CUR_PAGE);return;}
    if(b.date<ymd(TODAY)){ showToast('已過期的預約無法移動'); navTo(CUR_PAGE); return; } // 原課已過期 → 不可拖動

    const nd=dropDate||origDate, ntime=dropTime||origTime;
    if(nd!==b.date||ntime!==b.start_time){
      const verr=await validateBooking(b,nd,ntime,b.duration);
      if(verr){ showToast(verr); navTo(CUR_PAGE); return; } // 有錯誤 → 提示並復原
      b.date=nd; b.start_time=ntime; await dbPut('bookings',b);
      showToast('已更新預約'); navTo(CUR_PAGE);
    }else navTo(CUR_PAGE);
  });

}
function initCalSwipe(wrap){
  if(!wrap) return;
  let sx=0, sy=0, st=0, tracking=false, onCard=false;
  wrap.addEventListener('touchstart',(e)=>{
    if(e.touches.length!==1){ tracking=false; return; }
    const t=e.touches[0];
    sx=t.clientX; sy=t.clientY; st=Date.now();
    onCard = !!(e.target.closest && e.target.closest('.cal-ev')); // 起點在課卡 → 交給拖曳邏輯，不換頁
    tracking=true;
  },{passive:true});
  wrap.addEventListener('touchend',(e)=>{
    if(!tracking||onCard){ tracking=false; return; }
    tracking=false;
    if(window._dragStarted){ return; } // 正在拖卡，忽略
    const t=e.changedTouches[0];
    const dx=t.clientX-sx, dy=t.clientY-sy, dt=Date.now()-st;
    const TH=60; // 觸發門檻（px）
    // 必須是「夠長的橫向滑動」且「橫向明顯大於縱向」且「不是太慢的拖移」
    if(Math.abs(dx)<TH) return;
    if(Math.abs(dx)<Math.abs(dy)*1.5) return;
    if(dt>600) return;
    const step=_calDays||(window.innerWidth<=600?1:(window.innerWidth<=1024?3:7));
    if(dx<0) calStep(step);   // 左滑 → 下一段（往未來）
    else calStep(-step);      // 右滑 → 上一段（往過去）
  },{passive:true});
}
/* ════════ 驗證層（Validation Layer） ════════
   規則：
   - 時間重疊：new_start < existing_end && new_end > existing_start
   - 教練衝堂：同教練、重疊時段，只能一堂
   - 場地容量：私人教練/體驗/自主訓練 同時段最多 3 組（小班肌力不計入）
   - 團課教室：小班肌力 同時段只能一堂
   - 會員重複：同會員、重疊時段，只能一筆
   booking 參數需含：id(可空,新增時)、coach_id、member_id、category、date、start_time、duration
   回傳：錯誤訊息字串（不可建立）或 null（通過）。
*/
const CAP_CATS=['私人教練','自主訓練','體驗']; // 沿用：哪些類別需要場地
// ── 場地設定（可在系統設定調整數量）──
// 每個場地有 N 個單位（multi=3、treadmill=2、group=1）。
window.VENUES = window.VENUES || [
  { id:'multi',     name:'多功能訓練區', capacity:3, active:true },
  { id:'treadmill', name:'跑步機',       capacity:2, active:true },
  { id:'group',     name:'團課教室',     capacity:1, active:true },
];
function getVenues(){ return (window.VENUES||[]).filter(v=>v.active!==false); }
function venueCap(id){ const v=getVenues().find(x=>x.id===id); return v?(v.capacity||0):0; }

// 課程類型 → 可使用場地的「優先序」（先排滿前面的，剩餘溢出到後面）
//   教練課/友善教練課：多功能 → 團課教室
//   體驗課：同教練課
//   團體課：只能團課教室
//   自主訓練/友善自主訓練：多功能 → 跑步機 → 團課教室
function venuePriorityFor(category){
  if(category==='小班肌力') return ['group'];
  if(category==='自主訓練') return ['multi','treadmill','group'];
  // 私人教練（含友善）、體驗
  return ['multi','group'];
}
// 產生所有場地單位 id：multi_1..3 / treadmill_1..2 / group_1
function venueUnits(){
  const units=[];
  getVenues().forEach(v=>{ for(let i=1;i<=(v.capacity||0);i++) units.push(`${v.id}_${i}`); });
  return units;
}
// venue_unit（如 multi_1 / group_1 / treadmill_2）→ 場地名稱
function venueName(unit){
  if(!unit) return '';
  const vid=String(unit).split('_')[0];
  const v=(window.VENUES||[]).find(x=>x.id===vid);
  return v?v.name:vid;
}
// 是否為「非預設場地」（值得特別提示）：
//   教練課/體驗 預設在多功能訓練區 → 排到團課教室要提示
//   自主訓練 預設多功能 → 排到跑步機/團課教室要提示
//   團體課 本來就在團課教室 → 不提示
function venueIsNotable(category, unit){
  if(!unit) return false;
  const vid=String(unit).split('_')[0];
  if(category==='小班肌力') return false;            // 團課在團課教室是常態
  if(category==='自主訓練') return vid!=='multi';     // 自主訓練排到跑步機/團課教室才提示
  return vid!=='multi';                               // 教練課/體驗排到團課教室才提示
}
// 計算某時段「已被佔用」的場地單位集合
function occupiedUnits(sameDay, ns, ne){
  const occ=new Set();
  sameDay.forEach(x=>{
    if(!overlaps(ns,ne, timeToMin(x.start_time), timeToMin(x.start_time)+(x.duration||60))) return;
    if(x.venue_unit){ occ.add(x.venue_unit); }
  });
  return occ;
}
// 為一筆預約分配場地單位：依課程類型優先序，找第一個該時段未被佔的單位。
//   回傳 { unit } 或 { error }
function allocateVenue(category, sameDay, ns, ne, selfId){
  // 排除自己（改期時）
  const others=sameDay.filter(x=> x.id!==selfId);
  const occ=occupiedUnits(others, ns, ne);
  // 還要相容「舊資料沒有 venue_unit」：用數量回推佔用——把沒標單位的同類場地預約，依場地池順序填佔
  //   （保險：避免舊資料未分配單位導致超賣）
  const legacy=others.filter(x=> overlaps(ns,ne, timeToMin(x.start_time), timeToMin(x.start_time)+(x.duration||60)) && !x.venue_unit);
  // 依課程類型把 legacy 也納入對應場地池佔用估算
  const fillLegacy=(poolPrefix, count)=>{
    for(let i=1;i<=venueCap(poolPrefix) && count>0;i++){
      const u=`${poolPrefix}_${i}`; if(!occ.has(u)){ occ.add(u); count--; }
    }
    return count;
  };
  if(legacy.length){
    // 粗略：團課佔 group，教練/體驗佔 multi 優先、自主佔 multi/treadmill
    let g=legacy.filter(x=>x.category==='小班肌力').length;
    let m=legacy.filter(x=>x.category==='私人教練'||x.category==='體驗').length;
    let s=legacy.filter(x=>x.category==='自主訓練').length;
    g=fillLegacy('group',g);
    m=fillLegacy('multi',m); if(m>0) fillLegacy('group',m);
    s=fillLegacy('multi',s); s=(s>0?fillLegacy('treadmill',s):0); if(s>0) fillLegacy('group',s);
  }
  const pri=venuePriorityFor(category);
  for(const vid of pri){
    for(let i=1;i<=venueCap(vid);i++){
      const u=`${vid}_${i}`;
      if(!occ.has(u)) return { unit:u };
    }
  }
  return { error:'該時段沒有可用場地（已額滿）' };
}
function overlaps(s1,e1,s2,e2){ return s1<e2 && e1>s2; }
async function validateBooking(bk,date,time,duration){
  const dur=duration||bk.duration||60;
  const ns=timeToMin(time), ne=ns+dur;

  // 0a) 不得排到「過去的日期」（以日期為界，不看時分）
  //     今天即使某時段已過仍可操作（教練忙碌時常來不及即時更新今天的課）
  if(date < ymd(TODAY)) return '不可預約已過去的日期';

  // 0b) 限時段檢查：該票券種類 time_restricted=true → 僅平日 18:00 前
  if(bk.ticket_type_id){
    const tt=await dbGet('ticket_types',bk.ticket_type_id);
    if(tt && tt.time_restricted){
      const dow=parseYmd(date).getDay(); // 0=日,6=六
      const isWeekday = dow>=1 && dow<=5;
      const before18 = ns < 1080; // 開始時間早於 18:00（不限下限，不受場館營業時間影響）
      if(!isWeekday || !before18) return '此票券僅限平日 18:00 前使用';
    }
  }

  const all=await dbGetAll('bookings');
  // 同一天、未取消、排除自己
  const sameDay=all.filter(x=> x.id!==bk.id && x.status!=='cancelled' && x.date===date );

  // 1) 教練衝堂：以「實際授課教練」（有代課算代課教練）判斷
  //    例：A 把課交給 B 代課 → 該時段是 B 在忙，A 反而可再排課
  const actingCoach = bk.substitute_coach_id || bk.coach_id;
  if(actingCoach){
    const clash=sameDay.find(x=>{
      const xActing = x.substitute_coach_id || x.coach_id;
      return xActing===actingCoach &&
        overlaps(ns,ne, timeToMin(x.start_time), timeToMin(x.start_time)+(x.duration||60));
    });
    if(clash) return '此教練於該時段已有課程，無法重複預約';
  }

  // 2) 會員重複預約（同會員、時間重疊）
  if(bk.member_id){
    const dup=sameDay.find(x=> x.member_id===bk.member_id &&
      overlaps(ns,ne, timeToMin(x.start_time), timeToMin(x.start_time)+(x.duration||60)) );
    if(dup) return '會員於該時段已有預約';
  }

  // 3) 場地分配（依課程類型可用場地優先序，找該時段未被佔的單位）
  //    團課→團課教室；教練/體驗→多功能→團課教室；自主→多功能→跑步機→團課教室
  const alloc = allocateVenue(bk.category, sameDay, ns, ne, bk.id);
  if(alloc.error) return alloc.error;
  bk.venue_unit = alloc.unit; // 寫回，呼叫端存 booking 時帶上

  return null; // 通過
}
// 對照式確認框（原時間 → 新時間）
function fmtRange(date,time,dur){
  const d=parseYmd(date);
  const end=minToTime(timeToMin(time)+dur);

let _bkMembers=[];

async function openBookingModal(){
  const[coaches,types]=await Promise.all([dbGetAll('coaches'),dbGetAll('ticket_types')]);
  const isCoach=SESSION.role==='coach';
  const isMobileBk=window.innerWidth<=600;
  // 課程類型過濾：
  //  - 教練端：只能建「私人教練」「體驗」類（教練課/友善教練課/體驗課）；不可建自主訓練、團體課
  //  - 手機版（含管理員教練視角）：不可建團體課（團體課僅後台桌機建立）
  const coachAllowed=['私人教練','體驗'];
  const activeTypes=types.filter(t=>{
    if(t.active===false) return false;
    if(isCoach && !coachAllowed.includes(t.category)) return false; // 教練：只留教練課/體驗
    if(isMobileBk && t.category==='小班肌力') return false;          // 手機：不建團體課
    if(isMobileBk && t.category==='自主訓練') return false;          // 手機：自主訓練由會員自約
    return true;
  });
  const typeOpts=activeTypes.map(t=>`<option value="${t.id}">${t.name}（${t.category}）</option>`).join('');
  const pf=_prefill||{};   // 只有從行事曆點選才有 date/time
  _bkWizard={fromSlot:!!_prefill};
  _prefill=null;
  // 教練端：授課教練固定為自己（隱藏選擇）；管理員/櫃台才顯示教練下拉
  window._bkSelfCoach = isCoach ? SESSION.id : null;
  // 管理員/櫃台從「某教練視角」建立預約時的預設教練（可修改）：
  //  - 手機版行事曆只看自己 → 預設自己
  //  - 桌機「只看我的課」模式 → 預設自己
  //  - 全店模式 → 不預設
  let prefillCoach = window._bkPrefillCoach || null;
  if(!isCoach && !prefillCoach){
    const isMobile=window.innerWidth<=600;
    if(isMobile) prefillCoach = SESSION.id;              // 手機行事曆=只看自己
    else if(window._calMineOnly) prefillCoach = SESSION.id; // 桌機只看我的課
  }
  window._bkPrefillCoach=null; // 用完即清
  const coachOpts=coaches.filter(isCoachable).map(c=>{
    const sel = (isCoach&&c.id===SESSION.id) || (prefillCoach&&c.id===prefillCoach);
    return `<option value="${c.id}" ${sel?'selected':''}>${coachDisp(c)}</option>`;
  }).join('');
  // 30 分鐘時段選項（08:00～22:00）
  const timeOpts=bkTimeOptions(pf.time);
  showModal(`<div class="modal-title">新增預約 · 步驟 1 / 2</div>
    <div style="font-size:12px;color:var(--t2);margin-bottom:14px;">選擇課程類型${isCoach?'與時段':'、教練與時段'}。</div>
    <div class="form-row"><label>課程類型</label>
      <select id="bk-type" onchange="onBkTypeChange()"><option value="">請選擇課程類型…</option>${typeOpts}</select></div>
    ${isCoach
      ? `<input type="hidden" id="bk-coach" value="${SESSION.id}">`
      : `<div class="form-row" id="bk-coach-row" style="display:none;"><label>授課教練</label>
          <select id="bk-coach"><option value="">請選擇教練…</option>${coachOpts}</select></div>`}
    <div class="form-row"><label>日期</label><input type="date" id="bk-date" value="${pf.date||''}"></div>
    <div class="form-row"><label>時間</label><select id="bk-time">${timeOpts}</select></div>
    <div class="modal-foot"><button class="btn btn-ghost" onclick="closeModal()">取消</button><button class="btn btn-green" onclick="bkStep2()">下一步 →</button></div>`);
}
// 產生 30 分鐘間隔時段選項（08:00～22:00）
function bkTimeOptions(selected){
  let html='<option value="">請選擇時間…</option>';
  for(let h=8;h<=22;h++){
    for(let mm of ['00','30']){
      if(h===22&&mm==='30')break;
      const t=String(h).padStart(2,'0')+':'+mm;
      html+=`<option value="${t}" ${selected===t?'selected':''}>${t}</option>`;
    }
  }
  return html;
}

// 依起始日、星期清單、次數上限、結束日，產生日期陣列
function buildRecurringDates(startDate,dows,maxN,until){
  const out=[];
  const start=parseYmd(startDate);
  const untilD=until?parseYmd(until):null;
  let cur=new Date(start);
  let guard=0;
  while(out.length<maxN && guard<400){
    guard++;
    if(untilD && cur>untilD) break;
    if(dows.includes(cur.getDay())){
      out.push(ymd(cur));
    }
    cur.setDate(cur.getDate()+1);
  }
  return out;
}

/* ════════════════════════════════════════════════════════
   共用連續預約引擎（後台與教練端共用，規則一致）
   opts = {
     member_id, coach_id, substitute_coach_id,
     category, type_id, format,
     startDate, time, duration=60,
     dows:[],            // 重複星期（0=日..6=六）；空陣列＝單筆（只建 startDate）
     count,              // 要求建立次數（會被票券剩餘上限夾住）
     horizonDays=370,    // 往後最多展開幾天
     onProgress(cur,total)  // 進度回呼（可選）
   }
   回傳 { ok, skipped, noTicket, total, results:[{date, ok, reason}], capped }
   規則：
     1. 次數上限 = min(要求次數, 票券剩餘堂數)
     2. 逐筆即時找該會員可用票券（連續扣，逐次重算剩餘）
     3. 衝堂/場地滿 → 該筆跳過並記原因
     4. 票券不足 → 該筆記「票券不足」
   ════════════════════════════════════════════════════════ */
async function runRecurringBooking(opts){
  const o=opts||{};
  const dur=o.duration||60;
  const operator=(window.SESSION&&SESSION.id)||o.coach_id||null;
  // 找票券函式：預設用 listUsableTickets(依類別)；呼叫端可傳 findTicketFn(memberId, dateStr) 覆寫
  const findTk = o.findTicketFn || (async(mid,ds)=>{ const c=await listUsableTickets(mid,o.type_id,ds); return c[0]||null; });
  const countRemain = o.countRemainFn || (async(mid)=>{ const c=await listUsableTickets(mid,o.type_id,o.startDate); return c.reduce((s,t)=>s+(t.sessions_remaining||0),0); });
  // 1) 票券剩餘上限
  let remainTotal=0;
  try{ remainTotal=await countRemain(o.member_id); }catch(_){}
  const noDeduct = (o.category==='體驗');
  // 2) 產生日期清單
  let dates;
  if(o.dows && o.dows.length){
    const reqCount=Math.max(1, o.count||1);
    const cap = noDeduct ? reqCount : Math.min(reqCount, remainTotal||0);
    const far=ymd(addDays(parseYmd(o.startDate), o.horizonDays||370));
    dates=buildRecurringDates(o.startDate, o.dows, cap, far);
  }else{
    dates=[o.startDate];
  }
  const total=dates.length;
  const capped = (o.dows&&o.dows.length) ? (!noDeduct && (o.count||1) > (remainTotal||0)) : false;

  let ok=0, skipped=0, noTicket=0;
  const results=[];
  let done=0;
  for(const ds of dates){
    done++;
    if(typeof o.onProgress==='function'){ try{ o.onProgress(done,total); }catch(_){} await new Promise(r=>setTimeout(r,0)); }
    let tk=null;
    if(!noDeduct){
      try{ tk=await findTk(o.member_id, ds); }catch(_){}
      if(!tk){ noTicket++; results.push({date:ds,ok:false,reason:'票券不足或已過期'}); continue; }
    }
    const bk={id:uid('BK'), member_id:o.member_id||null, coach_id:o.coach_id||null,
      substitute_coach_id:o.substitute_coach_id||null,
      ticket_id:tk?tk.id:null, ticket_type_id:(tk&&tk.ticket_type_id)||o.type_id||null,
      category:o.category, format:o.format||null,
      date:ds, start_time:o.time, duration:dur, status:'booked',
      recurring:(o.dows&&o.dows.length>0)||false, created_by:operator, created_at:new Date().toISOString()};
    const verr=await validateBooking(bk, ds, o.time, dur);
    if(verr){ skipped++; results.push({date:ds,ok:false,reason:verr}); continue; }
    try{
      await dbPut('bookings', bk);
      if(tk) await deductTicket(tk, bk.id, operator);
      ok++; results.push({date:ds,ok:true});
    }catch(e){ skipped++; results.push({date:ds,ok:false,reason:'寫入失敗'}); }
  }
  return { ok, skipped, noTicket, total, results, capped, remainTotal };
}
// 把連續預約結果組成回報訊息
function recurringResultMsg(r){
  let msg=`已建立 ${r.ok} 筆`;
  const fails=r.skipped+r.noTicket;
  if(fails>0){
    msg+=`，${fails} 筆未建立`;
    const reasons={};
    r.results.filter(x=>!x.ok).forEach(x=>{ reasons[x.reason]=(reasons[x.reason]||0)+1; });
    const detail=Object.entries(reasons).map(([k,v])=>`${k}×${v}`).join('、');
    if(detail) msg+=`（${detail}）`;
  }
  if(r.capped) msg+=`；次數已受票券剩餘 ${r.remainTotal} 堂限制`;
  return msg;
}

      <div class="form-row" style="margin-bottom:0;margin-top:8px;"><label>指定代課教練（薪資將歸代課教練）</label>

    </div>`:`<div style="margin-top:10px;font-size:13px;"><span style="color:var(--t2);">時間</span>　${b.date}（週${WD[d.getDay()]}）${b.start_time}　${b.duration}分鐘</div>`}
    ${b.status==='cancelled'&&b.refund_waived?`<div style="margin-top:12px;padding:10px;background:#f7efe0;border-radius:8px;font-size:12px;color:#8a5e28;">此預約於開課 24 小時內取消，未退回票券。${b.makeup_granted?'（已補發補課券）':''}</div>`:''}

      ${canCancel&&ownByCoach?`<button class="btn btn-danger" onclick="confirmCancelBooking('${b.id}')">取消預約</button>`:''}

/* ── 簽到：改狀態 checked_in、記簽到時間、發點數（票券已於預約時扣，不重扣） ── */
async function checkInBooking(id){
  const b=await dbGet('bookings',id);
  if(!b){showToast('找不到預約');return;}
  if(b.status==='checked_in'){showToast('此預約已簽到');return;}
  // 簽到開放時間：課程開始前 30 分鐘起。太早不可簽（維持時段公平、避免提前領點數）
  const slotDt=new Date(b.date+'T'+b.start_time+':00');
  const openDt=new Date(slotDt.getTime()-30*60000);
  if(new Date()<openDt){
    showToast('尚未開放簽到（課程開始前 30 分鐘起）');
    return;
  }
  b.status='checked_in';
  b.checked_in_at=new Date().toISOString();
  await dbPut('bookings',b);
  const granted=await grantCheckinReward(b);     // 回傳是否發點
  closeModal();
  showToast('已簽到'+(granted?'，已發放自主訓練點數 2 點':''));
  navTo(CUR_PAGE);
}

/* ── 會員端簽到（沿用 checkInBooking 的規則與發點，確保只簽自己的課）── */
async function memCheckin(id){
  const b=await dbGet('bookings',id);
  if(!b){showToast('找不到預約');return;}
  if(b.member_id!==SESSION.id){showToast('只能為自己的預約簽到');return;}
  await checkInBooking(id); // 內含時間檢查、發點、navTo 重繪
}
/* ── 簽到自動發點數 ──
   教練課/體驗課 → 自主訓練點數 +2；友善教練課 → 友善自主訓練點數 +2
   點數以 member_tickets 儲存（ticket_type_id: self_training / self_friendly, source: checkin_grant）
   有效期 7 天。防呆：booking.reward_issued 為 true 則不再發。 */
async function grantCheckinReward(b){
  if(b.reward_issued) return true;             // 已發過視為已發
  // 補簽限制：僅「課程當天」補簽可發點；隔天以後補登不發（維持時段公平）
  // 用正規化日期字串比較，避免補零差異造成誤判
  const norm=s=>{const d=parseYmd(s);return d?ymd(d):s;};
  if(b.makeup && norm(b.date) !== ymd(TODAY)) return false;
  // 判斷發哪種點數
  //  以 category 為主要依據（穩定值），ticket_type_id 為輔（相容舊寫死值）。
  let isFriendly=false, doGrant=false;
  const cat=b.category||'';
  const friendly = b.ticket_type_id==='pt_friendly' || cat.indexOf('友善')>=0;
  const coachClass = cat==='私人教練' || cat==='體驗' || b.ticket_type_id==='pt' || b.ticket_type_id==='trial';
  if(coachClass){ doGrant=true; isFriendly=friendly; }
  if(!doGrant) return false;                 // 團課/自主訓練本身不發點

  // 動態查「自主訓練」票券種類的實際 ID（與會員預約自主訓練時用的同一個種類，避免 ID 對不上）
  //  規則：category==='自主訓練'；友善 → name 含「友善」；一般 → name 不含「友善」。
  let rewardTypeId=null;
  try{
    const allTypes=await dbGetAll('ticket_types');
    const selfTypes=allTypes.filter(t=>t.category==='自主訓練');
    const friendlyType=selfTypes.find(t=>(t.name||'').indexOf('友善')>=0);
    const normalType=selfTypes.find(t=>(t.name||'').indexOf('友善')<0);
    rewardTypeId = isFriendly ? (friendlyType&&friendlyType.id) : (normalType&&normalType.id);
    // 後備：若找不到對應種類，退回舊的固定 ID（self_friendly / self_training）
    if(!rewardTypeId) rewardTypeId = isFriendly ? 'self_friendly' : 'self_training';
  }catch(_){ rewardTypeId = isFriendly ? 'self_friendly' : 'self_training'; }

  const POINTS=2, VALID_DAYS=7;
  const today=ymd(TODAY);
  const expire=ymd(addDays(TODAY,VALID_DAYS)); // 發放日 +7
  const tk={
    id:uid('TK'),
    member_id:b.member_id,
    ticket_type_id:rewardTypeId,
    source_plan_id:null,
    plan_name: isFriendly?'友善自主訓練點數':'自主訓練點數',
    format:null,
    source:'checkin_grant',
    purchase_date:today, start_date:today, expire_date:expire,
    sessions_total:POINTS, sessions_remaining:POINTS,
    status:'usable', payment_status:'paid', invoice_status:'none',
    created_at:new Date().toISOString()
  };
  try{
    await dbPut('member_tickets',tk);
    await logTicket(tk.id,'grant',POINTS,b.id,SESSION.id,'簽到發放（'+tk.plan_name+'）');
    // 在 booking 上標記，避免重複發
    b.reward_issued=true; b.reward_issued_at=new Date().toISOString(); b.reward_type=rewardTypeId;
    await dbPut('bookings',b);
    return true;
  }catch(e){
    // 發放失敗：完整記錄錯誤並以明顯方式提示（不阻斷簽到本身）
    const msg=(e&&e.message)?e.message:String(e);
    console.error('自主訓練點數發放失敗:',e,'tk=',tk);
    window._lastRewardError=msg;
    // 用 alert 確保不被其他 toast 蓋掉，讓使用者看得到原因
    setTimeout(()=>{ try{ alert('自主訓練點數發放失敗：\n'+msg+'\n\n（簽到已完成，但點數沒發出去。請把這段訊息回報給開發者。）'); }catch(_){} },300);
    return false;
  }
}

/* ── 取消（確認視窗 → 改 cancelled，不刪資料，退回票券） ── */
async function confirmCancelBooking(id){
  const b=await dbGet('bookings',id);
  if(!b){showToast('找不到預約');return;}
  const hrs=hoursUntilStart(b);
  const within24 = hrs < 24;
  const isAdmin = SESSION.role==='admin' || SESSION.role==='front_desk';
  const isTrial = b.category==='體驗';

  if(isAdmin && !isTrial){
    // 管理員：可選擇是否退回票券
    const note = within24
      ? '此預約在開課 24 小時內。一般會員自行取消不退票，管理員可決定是否退回。'
      : '此預約在開課 24 小時前，預設退回票券。';
    showModal(`<div class="modal-title">取消預約</div>
      <div style="font-size:13px;color:var(--text);padding:4px 0;">${b.date} ${b.start_time}　${b.category}</div>
      <div style="font-size:12px;color:var(--t2);margin:8px 0 14px;line-height:1.6;">${note}</div>
      <div class="modal-foot" style="flex-wrap:wrap;gap:8px;">
        <button class="btn btn-ghost" onclick="closeModal()">返回</button>
        <button class="btn btn-ghost" onclick="cancelBooking('${id}','none')">取消・不退票</button>
        <button class="btn btn-danger" onclick="cancelBooking('${id}','force')">取消・退回票券</button>
      </div>`);
    return;
  }
  // 教練 / 會員：依 24h 自動判斷
  const refundText = isTrial ? '體驗課不涉及票券。'
    : (within24 ? '因開課 24 小時內取消，<b>本次扣課不退票</b>。' : '開課 24 小時前取消，票券將退回。');
  showModal(`<div class="modal-title">取消預約</div>
    <div style="font-size:13.5px;color:var(--text);padding:6px 0 4px;">確定要取消 ${b.date} ${b.start_time} 的${b.category}嗎？</div>
    <div style="font-size:12px;color:var(--t2);margin-top:6px;line-height:1.6;">${refundText}</div>
    <div class="modal-foot"><button class="btn btn-ghost" onclick="closeModal()">返回</button><button class="btn btn-danger" onclick="cancelBooking('${id}','auto')">確定取消</button></div>`);
}
async function saveBookingTime(id){
  const b=await dbGet('bookings',id);
  if(b.date<ymd(TODAY)){showToast('已過期的預約無法修改');return;} // 原課已過期 → 不可改動
  const nd=document.getElementById('ed-date').value;
  const nt=document.getElementById('ed-time').value.slice(0,5);
  const ndur=Number(document.getElementById('ed-dur').value);
  const nsub=document.getElementById('ed-subcoach')?document.getElementById('ed-subcoach').value||null:b.substitute_coach_id||null;
  const noChange = nd===b.date&&nt===b.start_time&&ndur===b.duration&&nsub===(b.substitute_coach_id||null);
  if(noChange){closeModal();return;}
  // 用更新後的內容（含代課教練）驗證：時間衝突、代課教練該時段衝堂、過去時間等
  const vbk={...b, substitute_coach_id:nsub};
  const verr=await validateBooking(vbk,nd,nt,ndur);
  if(verr){showToast(verr);return;}
  b.date=nd;b.start_time=nt;b.duration=ndur;b.substitute_coach_id=nsub;
  if(vbk.venue_unit) b.venue_unit=vbk.venue_unit; // 重新分配的場地單位
  await dbPut('bookings',b);
  closeModal();showToast('已更新預約');navTo(CUR_PAGE);
}
// 團體課：管理名單（加 / 移除會員，上限 5）
async function openGroupMembers(id){
  const b=await dbGet('bookings',id);
  const members=(await dbGetAll('members')).filter(m=>m.status==='active');
  const allTk=await dbGetAll('member_tickets');
  if(!window._ttCache){ try{ window._ttCache=await dbGetAll('ticket_types'); }catch(_){ window._ttCache=[]; } }
  const cur=mids(b);
  const opts=members.map(m=>{
    const tks=allTk.filter(tt=>tt.member_id===m.id && ticketMatchesCategory(tt,'小班肌力') && tt.status==='usable' && tt.sessions_remaining>0 && (!tt.expire_date||tt.expire_date>=b.date));
    const sum=tks.reduce((s,tt)=>s+tt.sessions_remaining,0);
    const tag = sum>0 ? `團體課票 剩 ${sum} 堂` : '無票（教練負責）';
    return `<option value="${m.id}" ${cur.includes(m.id)?'selected':''}>${m.name}（${m.phone}）· ${tag}</option>`;
  }).join('');
  showModal(`<div class="modal-title">團體課名單</div>
    <div style="font-size:11.5px;color:var(--t2);margin-bottom:10px;">最多 5 人。有團體課票券的會員會在加入時扣 1 堂、移除時退回；沒票的由教練負責（不扣）。</div>
    <div class="form-row"><label>選擇會員（按住 Ctrl／⌘ 複選）</label>
      <select id="grp-members" multiple size="8" style="height:auto;">${opts}</select></div>
    <div class="modal-foot"><button class="btn btn-ghost" onclick="openBookingDetail('${id}')">返回</button><button class="btn btn-green" onclick="saveGroupMembers('${id}')">儲存名單</button></div>`);
}
async function saveGroupMembers(id){
  const b=await dbGet('bookings',id);
  const sel=document.getElementById('grp-members');
  const next=[...sel.selectedOptions].map(o=>o.value);
  if(next.length>5){showToast('團體課最多 5 人');return;}
  const prev=mids(b);
  const added=next.filter(x=>!prev.includes(x));
  const removed=prev.filter(x=>!next.includes(x));
  // 新加入的有票就扣、移除的退回（依該 booking 的票券類型）
  for(const mid of added){
    const tk=await findUsableTicket(mid,b.ticket_type_id,b.date);
    if(tk) await deductTicket(tk,b.id,SESSION.id);
  }
  for(const mid of removed){
    // 找該會員因這堂課扣的票退回（用 ticket_logs 對應）；簡化：找該會員同類型最近一筆可退
    const logs=(await dbGetAll('ticket_logs')).filter(l=>l.booking_id===b.id && l.action==='deduct');
    const tickets=await dbGetAll('member_tickets');
    const log=logs.find(l=>{const t=tickets.find(t=>t.id===l.ticket_id);return t&&t.member_id===mid;});
    if(log) await refundTicket(log.ticket_id,b.id,SESSION.id);
  }
  b.member_ids=next;
  await dbPut('bookings',b);
  showToast('名單已更新');
  openBookingDetail(id);
}
function statusLabel(s){return {scheduled:'已預約',booked:'已預約',checked_in:'已簽到',completed:'已完成',cancelled:'已取消',no_show:'未到'}[s]||s;}
// 安全取得團體課會員 id 陣列（相容資料庫回傳陣列或 JSON 字串）
function mids(b){
  const v=b&&b.member_ids;
  if(Array.isArray(v))return v;
  if(typeof v==='string'&&v.trim()){try{const p=JSON.parse(v);return Array.isArray(p)?p:[];}catch(e){return [];}}
  return [];
}
// 安全取得團課每人簽到狀態物件 {memberId: 'checked_in'|'booked'}
function attObj(b){
  const v=b&&b.attendance;
  if(v&&typeof v==='object'&&!Array.isArray(v))return v;
  if(typeof v==='string'&&v.trim()){try{const p=JSON.parse(v);return (p&&typeof p==='object')?p:{};}catch(e){return {};}}
  return {};
}
// 團課：切換某會員的簽到狀態
async function toggleGroupAttend(bid,mid){
  const b=await dbGet('bookings',bid);
  const att=attObj(b);
  att[mid] = att[mid]==='checked_in' ? 'booked' : 'checked_in';
  b.attendance=att;
  // 整體狀態：有任一人簽到就算 checked_in，否則 booked（保留原本整體狀態邏輯供今日事項統計）
  const anyIn=Object.values(att).some(s=>s==='checked_in');
  if(b.status!=='completed'&&b.status!=='cancelled') b.status = anyIn?'checked_in':'booked';
  await dbPut('bookings',b);
  openBookingDetail(bid);
}
// 距開課剩餘小時數（<0 表示已過開課時間）
function hoursUntilStart(b){
  try{ const dt=new Date(b.date+'T'+(b.start_time||'00:00')+':00'); return (dt.getTime()-Date.now())/3600000; }
  catch(_){ return 999; }
}
// refundMode：'auto'(依24h自動)、'force'(強制退)、'none'(強制不退)
async function cancelBooking(id, refundMode){
  const b=await dbGet('bookings',id);
  if(!b)return;
  b.status='cancelled';
  b.cancelled_at=new Date().toISOString();
  await dbPut('bookings',b);

  // 決定是否退票
  const hrs=hoursUntilStart(b);
  const within24 = hrs < 24;        // 24 小時內取消
  let doRefund;
  if(refundMode==='force') doRefund=true;
  else if(refundMode==='none') doRefund=false;
  else doRefund = !within24;        // auto：24 小時前才退
  b.refund_waived = !doRefund;      // 記錄是否扣課不退（供補課券判斷）
  await dbPut('bookings',b);

  let refundedCount=0;
  if(doRefund){
    if(b.category==='小班肌力'){
      const logs=(await dbGetAll('ticket_logs')).filter(l=>l.booking_id===b.id && l.action==='deduct');
      const refunded=(await dbGetAll('ticket_logs')).filter(l=>l.booking_id===b.id && l.action==='refund');
      const refundCntByTk={};
      refunded.forEach(l=>{refundCntByTk[l.ticket_id]=(refundCntByTk[l.ticket_id]||0)+1;});
      for(const log of logs){
        if((refundCntByTk[log.ticket_id]||0)>0){ refundCntByTk[log.ticket_id]--; continue; }
        await refundTicket(log.ticket_id,b.id,SESSION.id);
        refundedCount++;
      }
    }else if(b.ticket_id){
      await refundTicket(b.ticket_id,b.id,SESSION.id);
      refundedCount=1;
    }
  }
  // 體驗課（ticket_id 為 null）：本就不退

  // 通知文案
  let body;
  const when=`（${b.date} ${b.start_time}）`;
  if(b.category==='體驗'){
    body=`您的體驗課${when}已取消。`;
  }else if(!doRefund && within24){
    body=`您的${b.category}${when}已取消。因開課 24 小時內取消，本次恕不退回票券。`;
  }else if(b.category==='小班肌力'){
    body=`您的小班肌力課${when}已取消${refundedCount>0?`，已退回 ${refundedCount} 堂團體課票券`:''}。`;
  }else{
    body=`您的${b.category}${when}已取消${refundedCount>0?'，票券已退回 1 堂':'，本次未退回票券'}。`;
  }
  if(b.member_id) await pushNotification(b.member_id,'cancel','預約已取消',body);

  closeModal();
  if(refundedCount>0) showToast(`已取消預約，退回 ${refundedCount} 堂票券`);
  else if(within24 && refundMode!=='none' && refundMode!=='force') showToast('已取消預約（24 小時內，扣課不退）');
  else showToast('已取消預約');
  navTo(CUR_PAGE);
}

function memSortBy(key){
  if(_memSort===key){ _memSortDir=-_memSortDir; } else { _memSort=key; _memSortDir=1; }

}
function memGoPage(p){ _memPage=p; navTo('members'); }
// 產生頁碼按鈕（頁數多時以省略號精簡，永遠顯示首尾與當前頁附近）
function memPageNumbers(cur,total){
  const pages=[];
  const add=p=>pages.push(p);
  if(total<=7){ for(let i=1;i<=total;i++)add(i); }
  else{
    add(1);
    if(cur>3) pages.push('...');
    for(let i=Math.max(2,cur-1);i<=Math.min(total-1,cur+1);i++)add(i);
    if(cur<total-2) pages.push('...');
    add(total);
  }
  return pages.map(p=>p==='...'
    ? `<span style="padding:0 4px;color:var(--t3);">…</span>`
    : `<button class="btn btn-sm ${p===cur?'btn-green':'btn-ghost'}" onclick="memGoPage(${p})" style="min-width:34px;">${p}</button>`
  ).join('');
}

// 會員預約紀錄：月曆呈現（整月格子，每格放預約小卡，可翻月）
function memWeekStep(n){
  let {y,m}=window._memMonth; m+=n;
  if(m<0){m=11;y--;} if(m>11){m=0;y++;}
  window._memMonth={y,m}; renderMemberWeek();
}
function memWeekToday(){ const td=new Date(TODAY); window._memMonth={y:td.getFullYear(),m:td.getMonth()}; renderMemberWeek(); }
function renderMemberWeek(){
  const box=document.getElementById('mem-week-cal'); if(!box||!window._memWeekData)return;
  const {bookings,coachMap}=window._memWeekData;
  const {y,m}=window._memMonth;
  const todayStr=ymd(TODAY);
  const wlabel=['一','二','三','四','五','六','日'];
  const first=new Date(y,m,1);
  const startOffset=(first.getDay()+6)%7;            // 週一為第一欄
  const daysInMonth=new Date(y,m+1,0).getDate();
  const totalCells=Math.ceil((startOffset+daysInMonth)/7)*7;
  const heads=wlabel.map(w=>`<div class="mm-wh">週${w}</div>`).join('');
  let cells='';
  for(let i=0;i<totalCells;i++){
    const dayNum=i-startOffset+1;
    if(dayNum<1||dayNum>daysInMonth){ cells+=`<div class="mm-cell mm-empty"></div>`; continue; }
    const d=new Date(y,m,dayNum); const ds=ymd(d);
    const isToday=ds===todayStr;
    const list=bookings.filter(b=>b.date===ds).sort((a,b)=>a.start_time.localeCompare(b.start_time));
    const cards=list.map(b=>{
      const cn=b.coach_id?(coachMap[b.coach_id]||''):'';
      const cc=bkCC(b);
      return `<div class="mm-card ev-${cc}"><span class="mm-t">${b.start_time}</span>${cn?` <span class="mm-c">${cn}</span>`:''}</div>`;
    }).join('');
    cells+=`<div class="mm-cell${isToday?' mm-today':''}">
      <div class="mm-d">${dayNum}</div>${cards}
    </div>`;
  }
  box.innerHTML=`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
      <button class="btn btn-ghost btn-sm" onclick="memWeekStep(-1)">‹ 上月</button>
      <div style="display:flex;align-items:center;gap:10px;"><span style="font-size:14px;font-weight:600;">${y} 年 ${m+1} 月</span><button class="btn btn-ghost btn-sm" onclick="memWeekToday()">本月</button></div>
      <button class="btn btn-ghost btn-sm" onclick="memWeekStep(1)">下月 ›</button>
    </div>
    <div class="mm-grid">${heads}${cells}</div>`;
}

function togglePw(inputId, btn){
  const el=document.getElementById(inputId); if(!el)return;

  else { el.type='password'; btn.textContent='👁'; }

// 即時驗證手機格式（台灣手機：09 開頭、10 碼數字），並只允許輸入數字
function checkPhone(){
  const el=document.getElementById('reg-phone'); const box=document.getElementById('phone-hint');
  if(!el)return;
  // 過濾非數字
  const cleaned=el.value.replace(/\D/g,'').slice(0,10);
  if(cleaned!==el.value) el.value=cleaned;
  if(!box)return;
  const p=el.value;
  if(!p){ box.textContent=''; return; }
  if(/^09\d{8}$/.test(p)){ box.textContent='✓ 手機格式正確'; box.style.color='var(--ok)'; }
  else if(p.length<10){ box.textContent=`還差 ${10-p.length} 碼（需 09 開頭共 10 碼）`; box.style.color='var(--t3)'; }
  else { box.textContent='✕ 請輸入 09 開頭的台灣手機號碼'; box.style.color='var(--danger)'; }
}

function checkPwMatch(){
  const p1=document.getElementById('reg-pw'), p2=document.getElementById('reg-pw2');

/* ════════ 管理員:員工管理（邀請制 + 營運薪資制度） ════════ */
const PAY_LABEL={full_time:'正職',part_time:'兼職',contractor:'合作',intern:'工讀',
  fulltime:'正職',parttime:'兼職',partner:'合作',workstudy:'工讀'}; // 後四個相容舊寫法
// 把任何寫法正規化成資料庫 enum 值（full_time / part_time / contractor / intern）
function normEmp(v){
  if(v==='fulltime') return 'full_time';
  if(v==='parttime') return 'part_time';
  if(v==='partner') return 'contractor';   // 合作
  if(v==='workstudy') return 'intern';      // 工讀
  return v||'full_time';
}

// ── 薪資制度模板（依員工類型，統一五大區塊）──
// 五大項：base_salary 底薪 / 教練課費(pt_mode tier|flat) / pt_bonus 達標獎金 / group_per_head 團課人頭 / duty_hourly 值班時薪
const SALARY_TPL_DEFAULT = {
  full_time:{
    base_salary:29500,
    pt_mode:'tier',
    pt_rate:0,
    pt_tiers:[
      {min:0,  max:59,  rate:625},

      {min:80, max:99,  rate:675},
      {min:100,max:null,rate:700},
    ],

    group_per_head:200,
    duty_hourly:0,
  },
  part_time:{ base_salary:0, pt_mode:'flat', pt_rate:600, pt_tiers:[], pt_bonus:[], group_per_head:200, duty_hourly:200 },
  contractor:{ base_salary:0, pt_mode:'flat', pt_rate:600, pt_tiers:[], pt_bonus:[], group_per_head:200, duty_hourly:0 },
  intern:{ base_salary:0, pt_mode:'flat', pt_rate:0, pt_tiers:[], pt_bonus:[], group_per_head:0, duty_hourly:0 },
};
window.SALARY_TPL = window.SALARY_TPL || JSON.parse(JSON.stringify(SALARY_TPL_DEFAULT));
async function loadSalaryTemplates(){

// 取得某員工適用費率（階段一：仍回傳簡易三費率供現有薪資頁過渡；階段二改複雜計算）
function effRates(emp){
  if(emp && emp.custom_salary){
    return { pt_rate:emp.pt_rate||0, group_rate:emp.group_rate||0, duty_hourly:emp.duty_hourly||0, source:'自訂' };
  }
  const et=normEmp(emp&&(emp.employment_type||emp.pay_type));
  const tpl=(window.SALARY_TPL||{})[et]||{};
  let pt=tpl.pt_rate||0;
  if(tpl.pt_mode==='tier' && Array.isArray(tpl.pt_tiers) && tpl.pt_tiers[0]) pt=tpl.pt_tiers[0].rate||0; // 暫以第一階代表
  return { pt_rate:pt, group_rate:tpl.group_per_head||0, duty_hourly:tpl.duty_hourly||0, source:(PAY_LABEL[et]||'')+'模板' };
}
// ════════ 完整薪資計算（依模板：底薪＋教練課階梯／固定＋達標獎金＋團課人頭＋值班費）════════
// 參數：emp 員工、ptDone 教練課完成堂數、groupHeads 團課總人頭、dutyHours 值班工時
// 回傳各項金額與合計，供薪資頁顯示
function calcSalary(emp, ptDone, groupHeads, dutyHours){
  // 自訂薪資：用個人費率（簡化：固定費率）
  if(emp && emp.custom_salary){
    const ptPay=ptDone*(emp.pt_rate||0);
    const groupPay=groupHeads*(emp.group_rate||0);
    const dutyPay=Math.round(dutyHours*(emp.duty_hourly||0));
    return { base:0, ptPay, ptDetail:`${ptDone} 堂 × $${emp.pt_rate||0}`, ptIncome:ptPay, ptIsFloor:false, ptIncomeDetail:`${ptDone} 堂 × $${emp.pt_rate||0}`,
      bonus:0, bonusDetail:'—', groupPay, groupDetail:`${groupHeads} 人 × $${emp.group_rate||0}`,
      dutyPay, dutyDetail:`${dutyHours.toFixed(1)} hr × $${emp.duty_hourly||0}`,
      total: ptPay+groupPay+dutyPay };
  }
  const et=normEmp(emp&&(emp.employment_type||emp.pay_type));
  const tpl=(window.SALARY_TPL||{})[et]||{};
  const base=tpl.base_salary||0;

  // ① 教練課費（固定 or 階梯）
  let ptPay=0, ptDetail='';
  if(tpl.pt_mode==='tier' && Array.isArray(tpl.pt_tiers) && tpl.pt_tiers.length){
    // 階梯：逐堂落在哪一階就用哪一階費率
    const tiers=tpl.pt_tiers.slice().sort((a,b)=>(a.min||0)-(b.min||0));
    let remain=ptDone; const parts=[];
    for(const t of tiers){
      const lo=t.min||0, hi=(t.max==null?Infinity:t.max);
      // 這一階涵蓋第 lo+1 ~ hi+1 堂（min/max 以「已完成堂數」為界）
      const cntInTier=Math.max(0, Math.min(ptDone, hi+1) - lo);
      if(cntInTier>0){ ptPay+=cntInTier*(t.rate||0); parts.push(`${cntInTier}堂×$${t.rate||0}`); }
    }
    ptDetail = ptDone>0 ? parts.join(' + ') : '0 堂';
  }else{
    const rate=tpl.pt_rate||0;
    ptPay=ptDone*rate; ptDetail=`${ptDone} 堂 × $${rate}`;
  }

  // ② 達標獎金（疊加：每個達到門檻的都給）
  let bonus=0; const bonusParts=[];
  (tpl.pt_bonus||[]).forEach(b=>{
    if(b.amount>0 && ptDone>=(b.threshold||0)){ bonus+=b.amount; bonusParts.push(`滿${b.threshold}堂+$${b.amount}`); }
  });
  const bonusDetail = bonus>0 ? bonusParts.join('、') : '—';

  // ③ 團課費（人頭制）
  const ghead=tpl.group_per_head||0;
  const groupPay=groupHeads*ghead;
  const groupDetail=`${groupHeads} 人次 × $${ghead}`;

  // ④ 值班費（工時 × 時薪）
  const dhr=tpl.duty_hourly||0;
  const dutyPay=Math.round(dutyHours*dhr);
  const dutyDetail=`${dutyHours.toFixed(1)} hr × $${dhr}`;

  // 保障底薪：教練課費與底薪取高者（其餘項目另外加）
  // 課收入 = max(教練課費, 底薪)；若領底薪，標示「保障底薪」
  const ptIncome = Math.max(ptPay, base);
  const ptIsFloor = base>0 && base>ptPay; // 是否觸發保障底薪
  const ptIncomeDetail = base>0
    ? (ptIsFloor ? `保障底薪 $${base.toLocaleString()}（課費 $${ptPay.toLocaleString()} 未達底薪）`
                 : `教練課費 $${ptPay.toLocaleString()}（高於底薪 $${base.toLocaleString()}）`)
    : ptDetail;

  return { base, ptPay, ptDetail, ptIncome, ptIsFloor, ptIncomeDetail,
    bonus, bonusDetail, groupPay, groupDetail, dutyPay, dutyDetail,
    total: ptIncome + bonus + groupPay + dutyPay };
}

function stplToggleMode(){
  const mode=document.getElementById('stpl-ptmode').value;
  document.getElementById('stpl-flat-wrap').style.display=mode==='flat'?'block':'none';
  document.getElementById('stpl-tier-wrap').style.display=mode==='tier'?'block':'none';
}
async function saveSalaryTpl(typeKey){
  try{
    const gv=id=>{const el=document.getElementById(id);return el?Number(el.value)||0:0;};
    const gvRaw=id=>{const el=document.getElementById(id);return el?el.value:'';};
    const mode=document.getElementById('stpl-ptmode').value;
    const tiers=[]; for(let i=0;i<4;i++){ const maxRaw=gvRaw(`stpl-tier-max-${i}`);
      tiers.push({min:gv(`stpl-tier-min-${i}`),max:maxRaw===''?null:Number(maxRaw),rate:gv(`stpl-tier-rate-${i}`)}); }
    const bonus=[]; for(let i=0;i<2;i++){ bonus.push({threshold:gv(`stpl-bonus-th-${i}`),amount:gv(`stpl-bonus-amt-${i}`)}); }
    const config={
      base_salary:gv('stpl-base'),
      pt_mode:mode,
      pt_rate:gv('stpl-ptflat'),
      pt_tiers:mode==='tier'?tiers:[],
      pt_bonus:bonus,
      group_per_head:gv('stpl-ghead'),
      duty_hourly:gv('stpl-duty'),
    };
    // 同時寫相容三費率欄位（過渡用）
    const rec={ id:typeKey, config,
      pt_rate: mode==='tier'?(tiers[0]?tiers[0].rate:0):config.pt_rate,
      group_rate: config.group_per_head||0,
      duty_hourly: config.duty_hourly||0 };
    await dbPut('salary_templates',rec);
    window.SALARY_TPL[typeKey]=config;
    closeModal(); showToast('薪資制度已更新'); navTo('staff');
  }catch(e){ showToast('儲存失敗：'+(e&&e.message?e.message:e)); }
}

// 依勞基法計算「應給特休天數」(以年資對應)；未滿半年 0
function statutoryAnnualLeave(hireDate){
  const sen=calcSeniority(hireDate); if(!sen) return null;
  const days=sen.days;
  if(days<182) return 0;            // 未滿 6 個月
  if(days<365) return 3;            // 滿 6 個月～未滿 1 年
  const y=sen.years;
  if(y<2) return 7;                 // 滿 1 年
  if(y<3) return 10;                // 滿 2 年
  if(y<5) return 14;                // 滿 3～5 年
  if(y<10) return 15;              // 滿 5～10 年
  return Math.min(30, 15+(y-9));   // 滿 10 年起每年+1，上限 30
}

// 依到職日計算年資（年）
function calcSeniority(hireDate){
  if(!hireDate) return null;
  const h=parseYmd(hireDate); if(!h||isNaN(h)) return null;
  const now=new Date(TODAY);
  let years=now.getFullYear()-h.getFullYear();
  const m=now.getMonth()-h.getMonth();
  if(m<0||(m===0&&now.getDate()<h.getDate())) years--;
  const days=Math.floor((now-h)/86400000);
  return {years:Math.max(0,years), days:Math.max(0,days)};
}

// 產生某員工類型的薪資制度摘要 HTML（員工詳細資料、唯讀，統一五區塊）
function salaryTplSummaryHtml(et){
  const t=(window.SALARY_TPL||{})[et]||{};
  const money=n=>'$'+Number(n||0).toLocaleString();
  let ptLine;
  if(t.pt_mode==='tier'){
    const tiers=(t.pt_tiers||[]).map(x=>`${x.min}~${x.max==null?'∞':x.max}堂 ${money(x.rate)}`).join('　');
    ptLine=tiers?`階梯　${tiers}`:'不適用';
  }else{ ptLine=(t.pt_rate>0)?`固定每堂 ${money(t.pt_rate)}`:'不適用 / 0'; }
  const bonus=(t.pt_bonus||[]).filter(x=>x.amount>0).map(x=>`滿${x.threshold}堂+${money(x.amount)}`).join('、')||'不適用 / 0';
  const grp=(t.group_per_head>0)?`人頭制 每人 ${money(t.group_per_head)}`:'不適用 / 0';
  const duty=(t.duty_hourly>0)?`${money(t.duty_hourly)} / 小時`:'依設定 / 0';
  const row=(lb,val)=>`<div style="display:flex;gap:8px;"><span style="min-width:64px;color:var(--t3);">${lb}</span><span>${val}</span></div>`;
  return `${row('底薪',(t.base_salary>0)?money(t.base_salary):'不適用 / 0')}${row('教練課費',ptLine)}${row('達標獎金',bonus)}${row('團課費',grp)}${row('值班時薪',duty)}`;
}
// 切換自訂薪資：開＝顯示費率框可編輯；關＝顯示該類型模板摘要（唯讀）
function hrToggleCustom(init, cArg){
  const custom=document.getElementById('hr-custom').checked;

  const tpl=(window.SALARY_TPL||{})[et]||{};

  const pt=document.getElementById('hr-ptrate'), gp=document.getElementById('hr-grouprate'), dy=document.getElementById('hr-dutyrate');
  const hint=document.getElementById('hr-rate-hint');
  if(custom){
    wrap.style.display='block'; summary.style.display='none';
    if(init){ pt.value=c.pt_rate??0; gp.value=c.group_rate??0; dy.value=c.duty_hourly??0; }
    [pt,gp,dy].forEach(el=>{el.readOnly=false; el.style.background='#fff'; el.style.color='';});
    hint.innerHTML='此員工使用<b>自訂費率</b>（簡易三費率），會覆蓋類型模板。';

}

function toggleMgr(prefix){
  const ft=normEmp(document.getElementById(prefix+'-pay').value)==='full_time';

function readPayRoleFields(prefix){
  const empType=normEmp(document.getElementById(prefix+'-pay').value);
  const ft=empType==='full_time';
  const isMgr=ft&&document.getElementById(prefix+'-ismgr').checked;
  const isSup=ft&&document.getElementById(prefix+'-issup').checked;
  const customEl=document.getElementById(prefix+'-custom'); // 自訂薪資開關（邀請階段無）
  const out={
    employment_type:empType,
    hire_date:document.getElementById(prefix+'-hire').value||null,
    is_manager:isMgr, is_supervisor:isSup,
    manager_bonus:isMgr?Number(document.getElementById(prefix+'-mgrbonus').value)||0:0,
    supervisor_bonus:isSup?Number(document.getElementById(prefix+'-supbonus').value)||0:0,
  };
  const promoteEl=document.getElementById(prefix+'-promote');
  if(promoteEl) out.promote_date=promoteEl.value||null;
  if(customEl){
    const custom=customEl.checked;
    out.custom_salary=custom;
    out.count_salary=document.getElementById(prefix+'-countsalary').checked;
    if(custom){
      out.pt_rate=Number(document.getElementById(prefix+'-ptrate').value)||0;
      out.group_rate=Number(document.getElementById(prefix+'-grouprate').value)||0;
      out.duty_hourly=Number(document.getElementById(prefix+'-dutyrate').value)||0;
      out.pay_rate=out.pt_rate;
    }
    // 不開自訂時不寫費率欄位，沿用模板（不覆蓋既有值）
  }
  return out;
}

const STAFF_DEFAULT_PW='88888888';
async function submitStaffInvite(){
  const preName=(document.getElementById('st-name').value||'').trim();
  const prePhone=(document.getElementById('st-phone').value||'').trim();
  if(!preName){showToast('請填寫姓名');return;}
  if(!prePhone){showToast('請填寫電話');return;}
  // 防重複：同電話是否已存在員工
  const exist=(await dbGetAll('coaches')).find(c=>c.phone===prePhone);
  if(exist){showToast('此電話已存在員工資料');return;}
  const pay=readPayRoleFields('st');
  if(pay.pay_rate===undefined) pay.pay_rate=null;
  // 透過 Edge Function 以預設密碼建立 Auth 帳號（伺服器端，不影響目前管理員登入）
  const r=await cloudCreateAuth('staff',prePhone,STAFF_DEFAULT_PW,true);
  if(r.error){
    const dup=/already|exists|registered/i.test(r.error);
    showToast(dup?'此電話已被使用（Auth 已存在）':('建立帳號失敗：'+r.error));
    return;
  }
  const chosenRole=document.getElementById('st-role').value;
  // 若新員工設為管理員：先把既有 admin 降為一般員工（系統僅一位管理員）
  if(chosenRole==='admin'){
    const others=(await dbGetAll('coaches')).filter(x=>x.role==='admin');
    for(const o of others){ o.role='coach'; try{ await dbPut('coaches',o); }catch(_){} }
  }
  const c=Object.assign({
    id:uid('c'),
    name:preName, phone:prePhone,
    role:chosenRole,
    auth_id:r.uid,
    status:'active',          // 可登入
    must_setup:true,          // 首次登入須改密碼+完善資料
    invite_status:'completed',
    need_duty:true,           // 預設：需值班（多數員工符合，特殊人員再個別關閉）
    can_substitute:true,      // 預設：可代課
    need_punch:true,          // 預設：需打卡
    created_at:new Date().toISOString()
  },pay);
  try{
    await dbPut('coaches',c);   // coaches 映射到 employees 表
  }catch(e){
    showToast('建立員工失敗：'+(e.message||e));
    return;
  }
  closeModal();
  navTo('staff');
  showModal(`<div class="modal-title">員工帳號已建立</div>
    <div style="font-size:13px;color:var(--t2);line-height:1.9;">請把以下登入資訊交給員工：</div>
    <div style="background:var(--card2);border:1px solid var(--bd);border-radius:9px;padding:14px;margin:12px 0;font-size:14px;line-height:2;">
      帳號（電話）：<b>${prePhone}</b><br>
      預設密碼：<b>${STAFF_DEFAULT_PW}</b>
    </div>
    <div style="font-size:12px;color:var(--t3);line-height:1.7;">員工首次登入後，系統會要求修改密碼並完善資料。</div>
    <div class="modal-foot"><button class="btn btn-green" onclick="closeModal()">完成</button></div>`);
}

async function saveStaffEdit(id){
 try{
  const c=await dbGet('coaches',id);
  const newRole=document.getElementById('se-role').value;
  // 管理員轉移：若把此人設為 admin，將其他既有 admin 自動降為教練（系統僅一位管理員）
  if(newRole==='admin' && c.role!=='admin'){
    const all=await dbGetAll('coaches');
    const others=all.filter(x=>x.role==='admin' && x.id!==id);
    if(others.length){
      const names=others.map(x=>x.name||x.phone||x.id).join('、');
      if(!confirm(`確定將管理員權限轉移給「${c.name||c.phone}」？\n原管理員（${names}）將自動轉為一般員工。`)) return;
      for(const o of others){ o.role='coach'; await dbPut('coaches',o); }
    }
  }
  c.role=newRole;
  c.name_en=(document.getElementById('se-namedisp').value||'').trim()||null;
  Object.assign(c,readPayRoleFields('se'));
  c.status=document.getElementById('se-status').value;
  await dbPut('coaches',c);
  closeModal();
  showToast(newRole==='admin'?'已設為管理員':'員工資料已更新');
  // 若把自己降級，登入身分也要同步（避免停留在 admin 視圖）
  if(id===SESSION.id && newRole!=='admin' && SESSION.role==='admin'){ SESSION.role=newRole; }
  navTo('staff');
 }catch(e){ console.error('saveStaffEdit 失敗:',e); showToast('儲存失敗：'+(e&&e.message?e.message:e)); }
}

/* 快捷切換員工狀態（在職 active / 留職停薪 unpaid_leave / 已停用 inactive） */
async function setStaffStatus(id,status){
  const c=await dbGet('coaches',id);
  if(!c){showToast('找不到員工');return;}
  // 安全防呆：不可停用「唯一的在職管理員」，否則將無人能進入後台
  if(status==='inactive' && c.role==='admin'){
    const all=await dbGetAll('coaches');
    const otherActiveAdmins=all.filter(x=>x.role==='admin' && x.id!==id && x.status==='active');
    if(otherActiveAdmins.length===0){
      showToast('這是唯一的在職管理員，請先將其他員工設為管理員，再停用此帳號');
      return;
    }
  }
  const label={active:'在職',unpaid_leave:'留職停薪',inactive:'已停用'}[status]||status;
  c.status=status;
  try{ await dbPut('coaches',c); }catch(e){ showToast('更新失敗：'+(e.message||e)); return; }
  showToast('已設為「'+label+'」');navTo('staff');
}

function copyText(txt){
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(()=>showToast('已複製連結')).catch(()=>fallbackCopy(txt));
  }else fallbackCopy(txt);
}
function fallbackCopy(txt){
  const ta=document.createElement('textarea');ta.value=txt;document.body.appendChild(ta);ta.select();
  try{document.execCommand('copy');showToast('已複製連結');}catch(e){showToast('請手動複製');}
  ta.remove();
}

}
async function deleteType(id){
  // 有歷史資料（課程方案、或已發放的會員票券）→ 只允許停用，不允許刪除
  const[plans,tickets]=await Promise.all([dbGetAll('course_plans'),dbGetAll('member_tickets')]);

async function submitGrant(){
  const member_id=document.getElementById('gt-member').value;
  const plan_id=document.getElementById('gt-plan').value;
  if(!plan_id){ showToast('此會員沒有可發放的方案'); return; }
  const plan=await dbGet('course_plans',plan_id);
  // 防呆：主顧客方案只能發給主顧客/VIP
  if(plan && plan.plan_type==='loyal'){
    const mem0=await dbGet('members',member_id);
    if(!memberCanUseLoyal(mem0)){ showToast('主顧客方案僅限主顧客／VIP 會員，請先調整會員等級'); return; }
  }
  const total=plan.sessions_base+plan.sessions_bonus;
  const unitPrice=plan.unit_price||0;
  const listPrice=unitPrice*plan.sessions_base;
  const dealAmount=Number(document.getElementById('gt-amount').value)||listPrice; // 實際成交金額
  const method=document.getElementById('gt-method').value;
  const installCount=plan.installment?(Number(document.getElementById('gt-install').value)||1):1;
  const note=document.getElementById('gt-note').value.trim()||null;
  const t={id:uid('TK'),member_id,ticket_type_id:plan.ticket_type_id,source_plan_id:plan_id,plan_name:plan.name,format:plan.format||null,source:'purchase',
    unit_price:unitPrice, amount_paid:dealAmount,   // 營收採實際成交金額
    purchase_date:ymd(TODAY),start_date:ymd(TODAY),expire_date:ymd(addDays(TODAY,plan.valid_days)),
    sessions_total:total,sessions_remaining:total,status:'usable',
    payment_status:document.getElementById('gt-pay').value,invoice_status:'none',created_at:new Date().toISOString()};
  await dbPut('member_tickets',t);
  await logTicket(t.id,'grant',total,null,SESSION.id,'發放（'+plan.name+'）');
  // 建立購買紀錄
  try{
    await dbPut('purchases',{id:uid('PUR'),member_id,plan_id,ticket_id:t.id,plan_name:plan.name,
      list_price:listPrice,deal_amount:dealAmount,payment_method:method,installment_count:installCount,
      note,operator:SESSION.id,source:'backoffice',created_at:new Date().toISOString()});
  }catch(e){ /* 購買紀錄失敗不阻斷發票券，僅記錄 */ console.error('purchase log fail',e); }
  // 新朋友購買「私人教練」課程 → 自動升級為「會員」
  try{
    const ty=await dbGet('ticket_types',plan.ticket_type_id);
    if(ty && ty.category==='私人教練'){
      const mem=await dbGet('members',member_id);
      if(mem && (mem.tier==='newbie'||!mem.tier)){
        mem.tier='regular';
        await dbPut('members',mem);
      }
    }
  }catch(_){}
  closeModal();showToast('票券已發放：'+plan.name);
  if(_grantFromDetail){_grantFromDetail=false;openMemberDetail(member_id);}
  else navTo(CUR_PAGE);
}

/* ╔══════════════════════════════════════════════╗
   ║  出勤打卡（attendance）                          ║
   ║  上下班打卡、記錄工時。need_punch=true 的員工適用。 ║
   ╚══════════════════════════════════════════════╝ */
// 工時（小時，1 位小數）
function calcWorkHours(rec){
  if(!rec||!rec.clock_in||!rec.clock_out) return null;
  const [ih,im]=rec.clock_in.split(':').map(Number);
  const [oh,om]=rec.clock_out.split(':').map(Number);
  let mins=(oh*60+om)-(ih*60+im);
  if(mins<0) mins+=24*60; // 跨午夜
  return Math.round(mins/6)/10; // 0.1 小時
}
function nowHM(){ const n=new Date(); return String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0'); }

const STAFF_QR_CODE='YUGYM-STAFF-CHECKIN'; // 店內固定 QR 內容
let _scanStream=null, _scanRAF=null, _scanBusy=false;

        <div style="margin-top:16px;padding-top:14px;border-top:1px solid var(--bd);">

        </div>
      </div>
    </div>
  </div>`;
  startScan();

async function startScan(){
  const video=document.getElementById('scan-video');
  const hint=document.getElementById('scan-hint');
  if(!video) return;
  try{
    _scanStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
    video.srcObject=_scanStream; video.setAttribute('playsinline','true'); await video.play();
    hint.textContent='將店內 QR Code 對準框內';
  }catch(e){
    hint.innerHTML='無法開啟相機，請允許相機權限後重試。<br><span style="font-size:11px;">'+(e&&e.name?e.name:'')+'</span>';
    return;
  }
  // 優先用原生 BarcodeDetector（Android Chrome），否則載入 jsQR（iPhone/Safari）
  if('BarcodeDetector' in window){
    const detector=new BarcodeDetector({formats:['qr_code']});
    const tick=async()=>{
      if(!_scanStream)return;
      try{
        const codes=await detector.detect(video);
        if(codes&&codes.length){ handleScanValue(codes[0].rawValue||'',hint); if(_scanBusy)return; }
      }catch(_){}
      _scanRAF=requestAnimationFrame(tick);
    };
    _scanRAF=requestAnimationFrame(tick);
  }else{
    // 載入 jsQR
    await ensureJsQR(hint);
    if(!window.jsQR){ return; }
    const canvas=document.createElement('canvas');
    const ctx=canvas.getContext('2d',{willReadFrequently:true});
    const tick=()=>{
      if(!_scanStream)return;
      if(video.readyState===video.HAVE_ENOUGH_DATA){
        canvas.width=video.videoWidth; canvas.height=video.videoHeight;
        ctx.drawImage(video,0,0,canvas.width,canvas.height);
        try{
          const img=ctx.getImageData(0,0,canvas.width,canvas.height);
          const code=window.jsQR(img.data,img.width,img.height,{inversionAttempts:'dontInvert'});
          if(code&&code.data){ handleScanValue(code.data,hint); if(_scanBusy)return; }
        }catch(_){}
      }
      _scanRAF=requestAnimationFrame(tick);
    };
    _scanRAF=requestAnimationFrame(tick);
  }
}
// 載入 jsQR 函式庫（從 CDN，使用者手機端載入）
function ensureJsQR(hint){
  return new Promise(resolve=>{
    if(window.jsQR){ resolve(); return; }
    if(hint) hint.textContent='載入掃描元件中…';
    const s=document.createElement('script');
    s.src='https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js';
    s.onload=()=>{ if(hint)hint.textContent='將店內 QR Code 對準框內'; resolve(); };
    s.onerror=()=>{ if(hint)hint.innerHTML='掃描元件載入失敗，請確認網路連線後重試。'; resolve(); };
    document.head.appendChild(s);
  });
}
// 處理掃到的內容
function handleScanValue(val,hint){
  if(val===STAFF_QR_CODE && !_scanBusy){ _scanBusy=true; stopScan(); doScanPunch(); }
  else if(val && val!==STAFF_QR_CODE){ if(hint)hint.textContent='QR Code 不正確，請掃描店內打卡碼'; }
}
function stopScan(){
  if(_scanRAF){ cancelAnimationFrame(_scanRAF); _scanRAF=null; }
  if(_scanStream){ _scanStream.getTracks().forEach(t=>t.stop()); _scanStream=null; }
}

// ③ 工時統計（本月各員工累計）
function renderAttHours(needPunch,all){
  const ym=(_attDate||ymd(TODAY)).slice(0,7);
  const stat=needPunch.map(c=>{
    const recs=all.filter(a=>a.emp_id===c.id&&a.date.startsWith(ym));
    const hours=recs.reduce((s,r)=>s+(calcWorkHours(r)||0),0);
    const days=recs.filter(r=>r.clock_in).length;
    return {name:c.name||'—',hours,days};
  }).sort((a,b)=>b.hours-a.hours);
  document.getElementById('att-body').innerHTML=`<div class="card">

// ④ 異常打卡管理（只上班沒下班、或應到未打）
function renderAttAbnormal(needPunch,all){
  const today=ymd(TODAY);

// 類別縮寫
function catAbbr(cc){return {pt:'教',friendly:'友',group:'團',self:'自',trial:'體'}[cc]||'教';}

function coachMonthStep(n){
  let {y,m}=window._coachMonth; m+=n;
  if(m<0){m=11;y--;} if(m>11){m=0;y++;}
  window._coachMonth={y,m}; renderCoachMonth();
}
function coachMonthToday(){
  const t=new Date(TODAY);
  window._coachMonth={y:t.getFullYear(),m:t.getMonth()};
  window._coachSelDate=ymd(TODAY);
  renderCoachMonth(); renderCoachDayList();
}
function coachSelectDate(ds){
  window._coachSelDate=ds;
  renderCoachMonth();      // 重繪以更新選取外框
  renderCoachDayList();
}
function renderCoachMonth(){
  const box=document.getElementById('coach-month'); if(!box||!window._coachCalData)return;
  if(!window._coachView) window._coachView='month';
  // 週檢視 → 改畫週曆
  if(window._coachView==='week'){ renderCoachWeekInline(box); return; }
  const {visible,typeMap}=window._coachCalData;
  const {y,m}=window._coachMonth;
  const todayStr=ymd(TODAY), selStr=window._coachSelDate;
  const wlabel=['一','二','三','四','五','六','日'];
  const first=new Date(y,m,1);
  const startOffset=(first.getDay()+6)%7;
  const daysInMonth=new Date(y,m+1,0).getDate();
  const totalCells=Math.ceil((startOffset+daysInMonth)/7)*7;
  const byDay={};
  visible.forEach(b=>{
    const cc=bkCC(b);
    (byDay[b.date]=byDay[b.date]||{}); byDay[b.date][cc]=(byDay[b.date][cc]||0)+1;
  });
  const heads=wlabel.map(w=>`<div class="cm-wh">${w}</div>`).join('');
  let cells='';
  for(let i=0;i<totalCells;i++){
    const dayNum=i-startOffset+1;
    if(dayNum<1||dayNum>daysInMonth){cells+=`<div class="cm-cell cm-empty"></div>`;continue;}
    const d=new Date(y,m,dayNum); const ds=ymd(d);
    const isToday=ds===todayStr, isSel=ds===selStr;
    const counts=byDay[ds]||{};
    const order=['pt','friendly','group','self','trial'];
    const tags=order.filter(cc=>counts[cc]).slice(0,2)
      .map(cc=>`<span class="cm-tag cm-${cc}">${catAbbr(cc)}${counts[cc]}</span>`).join('');
    cells+=`<div class="cm-cell${isToday?' cm-today':''}${isSel?' cm-sel':''}" onclick="coachSelectDate('${ds}')">
      <div class="cm-d">${dayNum}</div>
      <div class="cm-tags">${tags}</div>
    </div>`;
  }
  box.innerHTML=`<div class="card" style="padding:14px;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
      <button class="btn btn-ghost btn-sm" onclick="coachMonthStep(-1)">‹</button>
      <div style="display:flex;align-items:center;gap:8px;">
        <span style="font-size:15px;font-weight:600;">${y} 年 ${m+1} 月</span>
        <button class="btn btn-ghost btn-sm" onclick="coachMonthToday()">今天</button>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="coachMonthStep(1)">›</button>
    </div>
    ${coachViewToggle()}
    <div class="cm-grid">${heads}${cells}</div>
  </div>`;
}
// 月/週切換鈕
function coachViewToggle(){
  const v=window._coachView||'month';

// 點空白時段 → 依點擊縱軸位置換算時間，帶入快速預約
function coach3BodyTap(ev,ds){
  ev.stopPropagation();
  if(window._coachReadonly) return; // 純檢視模式：點空白不排課
  // 若點到的是課程色塊或 ✕ 標記，不處理（色塊有自己的 onclick）
  if(ev.target.closest('.wkx-ev')) return;
  const START=8*60, SLOT=30, ROWH=30;
  const body=ev.currentTarget;
  const rect=body.getBoundingClientRect();
  const y=(ev.clientY||0)-rect.top;
  let mins=START + Math.floor(y/ROWH)*SLOT;          // 對齊到最近的 30 分
  if(mins<START) mins=START;
  if(mins>22*60) mins=22*60;                          // 最晚 22:00 起（課程 1hr 內結束）
  const hh=String(Math.floor(mins/60)).padStart(2,'0');
  const mm=String(mins%60).padStart(2,'0');
  _prefill={date:ds,time:`${hh}:${mm}`};
  if(typeof openQuickBookCoach==='function')openQuickBookCoach();
}
