  const myBusy=new Set();
  const myRanges=[];
  list.forEach(b=>{ if(!isMine(b))return; const [h,m]=b.start_time.split(':').map(Number); const s=h*60+m,e=s+(b.duration||60); myRanges.push([s,e]); for(let t=s;t<e;t+=SLOT)myBusy.add(t); });
  const overlapsMine=(s,e)=>myRanges.some(([rs,re])=>s<re && e>rs);

  // 各時段教練課場地佔用（只算多功能訓練區服務的類型）
  const slotUsed={};
  list.forEach(b=>{ if(PT_VENUE_CATS.has(b.category)) slotUsed[b.start_time]=(slotUsed[b.start_time]||0)+1; });

  // ＋欄（右側固定，未滿且我無課才顯示）
  let addLayer='';
  for(let mm=START; mm<END; mm+=SLOT){
    if(myBusy.has(mm)) continue;
    const time=minToTime(mm), used=slotUsed[time]||0;
    if(used>=PT_SLOTS) addLayer+=`<div class="tlx-slot-full" style="top:${yOf(mm)}px;height:${ROWH}px;">滿</div>`;
    else addLayer+=`<button class="tlx-slot-add" style="top:${yOf(mm)}px;height:${ROWH}px;" onclick="quickBookAt('${ds}','${time}')"><span>＋</span></button>`;
  }

  // 票券卡（絕對定位疊在格線上，依時間跨格；時間重疊的卡片分欄錯開）
  let cardLayer='';
  const colGroup={};
  list.forEach(b=>{ (colGroup[b.start_time]=colGroup[b.start_time]||[]).push(b); });
  // 先收集「要畫的卡」（每個 start_time 取 showArr 的代表）
  const draws=[];
  Object.entries(colGroup).forEach(([time,arr])=>{
    const [hh,mm2]=time.split(':').map(Number); const startM=hh*60+mm2;
    const mineArr=arr.filter(isMine);
    const showArr = mineArr.length>0 ? mineArr : arr;
    const first=showArr[0];
    const mine=isMine(first);
    const dur=first.duration||60;
    // 別人的課若與我的任何課時間重疊 → 不顯示（我的課優先、整列填滿）
    if(!mine && overlapsMine(startM,startM+dur)) return;
    draws.push({first,mine,showArr,startM,endM:startM+dur,dur});
  });
  // 重疊分欄：依開始時間排序，掃描重疊群組，群組內每張卡分欄
  draws.sort((a,b)=>a.startM-b.startM || a.endM-b.endM);
  let i=0;
  while(i<draws.length){
    // 找一個重疊群組（連續重疊鏈）
    let groupEnd=draws[i].endM; let j=i+1;
    const group=[draws[i]];
    while(j<draws.length && draws[j].startM<groupEnd){
      group.push(draws[j]); groupEnd=Math.max(groupEnd,draws[j].endM); j++;
    }
    // 群組內分欄：貪婪指派欄位
    const cols=[]; // 每欄記錄目前佔用到的 endM
    group.forEach(g=>{
      let placed=false;
      for(let c=0;c<cols.length;c++){ if(g.startM>=cols[c]){ g.col=c; cols[c]=g.endM; placed=true; break; } }
      if(!placed){ g.col=cols.length; cols.push(g.endM); }
    });
    const nCols=cols.length;
    group.forEach(g=>{ g.nCols=nCols; });
    i=j;
  }

  // 渲染
  draws.forEach(g=>{
    const {first,mine,showArr,startM,dur}=g;
    const top=yOf(startM);
    const height=Math.max(dur/SLOT*ROWH-3, ROWH-3);
    const endT=minToTime(startM+dur);
    const cc=bkCC(first);
    let badge='';
    if(mine){
      const isDone=(first.status==='completed'||first.status==='checked_in');
      if(isDone) badge=`<span class="tkr-badge done">✓ 已簽到</span>`;
      else if(first.date<ymd(TODAY)) badge=`<span class="tkr-badge none">未確認</span>`;
      else badge=`<span class="tkr-badge wait">待開始</span>`;
    }
    let midLines='', tkRem='';
    if(mine){
      showArr.forEach(b=>{
        const who=b.category==='小班肌力'?'團體課':(b.category==='體驗'?(b.trial_name||'體驗'):(memMap[b.member_id]||'—'));
        const fmt=b.format?b.format.toUpperCase():'';
        const typeM={'私人教練':'教練課','自主訓練':'自主訓練','體驗':'體驗','小班肌力':'團體課'}[b.category]||'課程';
        const venTag = venueIsNotable(b.category,b.venue_unit) ? `<span class="tkr-venue">📍${venueName(b.venue_unit)}</span>` : '';
        midLines+=`<div class="tkr-name">${who}${fmt?`<span class="tlx-fmt">${fmt}</span>`:''}</div><div class="tkr-type">${typeM}${fmt?' '+fmt:''}${venTag}</div>`;
      });
      if(first.ticket_id){ const tk=(window._allTkCache||[]).find(t=>t.id===first.ticket_id); if(tk) tkRem=`${tk.sessions_remaining}/${tk.sessions_total}`; }
    }else{
      midLines=`<div class="tkr-masked">已預約</div>`;
    }
    // 分欄定位：右側留 ＋欄(50px)，群組內依 col/nCols 切寬
    const nCols=g.nCols||1, col=g.col||0;
    const gapR=50; // 右側＋欄
    const compact = nCols>1 ? ' tkr-compact' : '';
    const style = nCols>1
      ? `position:absolute;top:${top}px;height:${height}px;left:calc(${(col/nCols)*100}% );width:calc(${(1/nCols)*100}% - ${gapR/nCols}px - 3px);`
      : `position:absolute;top:${top}px;height:${height}px;left:0;right:${mine?4:gapR}px;`;
    // 今日訓練狀態（我的教練課/體驗才顯示；自主訓練/團體不需要）
    let trainTag='';
    if(mine && (first.category==='私人教練'||first.category==='體驗')){
      const hasLog=(window._tlogBids||new Set()).has(first.id);
      trainTag = hasLog
        ? `<span class="tkr-train done">完成</span>`
        : `<span class="tkr-train todo">未完成</span>`;
    }
    cardLayer+=`<div class="tkr-row tkr-${cc}${mine?'':' tkr-other'}${compact}"
      style="${style}"
      ${mine?`data-bid="${first.id}" data-start="${startM}" data-dur="${dur}" onpointerdown="tlxDragStart(event,'${first.id}',${startM},${dur})" onclick="tlxClick('${first.id}')"`:`style="cursor:default;"`}>
      ${badge}
      <div class="tkr-time"><span class="tkr-t1">${minToTime(startM)}</span><span class="tkr-tline"></span><span class="tkr-t2">${endT}</span></div>
      <div class="tkr-mid">${midLines}</div>
      ${nCols>1?'':`<div class="tkr-right">${tkRem?`<span class="tkr-rem">${tkRem}</span>`:''}${trainTag}</div>`}
    </div>`;
  });

  box.innerHTML=`<div class="card">
    <div class="card-title" style="display:flex;justify-content:space-between;align-items:flex-start;">
      <div>
        <div>${ds.replace(/-/g,'/')}（${wd}）</div>
        <div style="font-size:12px;color:var(--t3);font-weight:400;margin-top:3px;">我的課：教練課 ${ptN} 堂・團體課 ${grpN} 堂　·　當日全店 ${list.length} 筆</div>
      </div>
      <button class="btn btn-green btn-sm" style="flex:none;" onclick="quickBookOn('${ds}')">＋ 預約</button>
    </div>
    <div class="tlx-cal" style="height:${axisH}px;">
      <div class="tlx-grid-layer">${grid}</div>
      <div class="tlx-content">
        <div class="tlx-cards">${cardLayer}</div>
        <div class="tlx-addcol">${addLayer}</div>
      </div>
    </div>
  </div>`;
}

/* ── 時間軸：長按卡片拖移調整時間 ── */
window._tlxDrag=null;
function tlxClick(id){
  // 若剛拖移過，吞掉這次 click
  if(window._tlxJustDragged){ window._tlxJustDragged=false; return; }
  openCourseCard(id);
}
function tlxDragStart(e,id,startM,dur){
  const el=e.currentTarget;
  const P=window._tlxParams; if(!P)return;
  // 長按 500ms 才進入拖移
  const startY=e.clientY, startTop=parseFloat(el.style.top)||0;
  let armed=false;
  const timer=setTimeout(()=>{
    armed=true;
    el.classList.add('tlx-dragging');
    if(navigator.vibrate) navigator.vibrate(15);
    showToast('拖動調整時間，放開儲存');
  },500);
  const move=(ev)=>{
    if(!armed){ // 還沒長按完成，若移動太多視為捲動，取消
      if(Math.abs(ev.clientY-startY)>8){ clearTimeout(timer); cleanup(); }
      return;
    }
    ev.preventDefault();
    const dy=ev.clientY-startY;
    let newTop=startTop+dy;
    // 吸附 30 分格
    const rows=Math.round(newTop/P.ROWH);
    newTop=Math.max(0, Math.min(rows*P.ROWH, ((P.END-P.START)/P.SLOT - dur/P.SLOT)*P.ROWH));
    el.style.top=newTop+'px';
    el.dataset.newstart = (P.START + Math.round(newTop/P.ROWH)*P.SLOT);
  };
  const up=async(ev)=>{
    clearTimeout(timer);
    if(!armed){ cleanup(); return; }
    el.classList.remove('tlx-dragging');
    const newStartM=parseInt(el.dataset.newstart||startM,10);
    cleanup();
    if(newStartM===startM){ return; } // 沒移動
    window._tlxJustDragged=true;
    const newTime=minToTime(newStartM);
    await tlxApplyMove(id,P.ds,newTime,dur);
  };
  const cleanup=()=>{
    window.removeEventListener('pointermove',move);
    window.removeEventListener('pointerup',up);
    window.removeEventListener('pointercancel',up);
  };
  window.addEventListener('pointermove',move,{passive:false});
  window.addEventListener('pointerup',up);
  window.addEventListener('pointercancel',up);
}
async function tlxApplyMove(id,ds,newTime,dur){
  try{
    const b=await dbGet('bookings',id);
    if(!b){showToast('找不到課程');renderCoachDayList();return;}
    // 驗證新時段（排除自己）
    const vbk={...b,id:b.id};
    const verr=await validateBooking(vbk,ds,newTime,dur);
    if(verr){ showToast('無法移動：'+verr); renderCoachDayList(); return; }
    b.start_time=newTime;
    if(vbk.venue_unit) b.venue_unit=vbk.venue_unit;
    await dbPut('bookings',b);
    // 更新快取
    if(window._coachCalData){
      const upd=(arr)=>{ const x=(arr||[]).find(z=>z.id===id); if(x)x.start_time=newTime; };
      upd(window._coachCalData.allBk); upd(window._coachCalData.visible);
    }
    showToast('已調整為 '+newTime);
    renderCoachDayList();
  }catch(e){ showToast('調整失敗：'+(e&&e.message?e.message:e)); renderCoachDayList(); }
}

/* ── 會員自助預約自主訓練（訂位式：選日期→看可預約時段→點時段送出）── */
async function openSelfBookModal(){
  const tickets=await dbGetAll('member_tickets');
  const mineUsable=tickets.filter(t=>t.member_id===SESSION.id
    && (t.ticket_type_id==='self_training'||t.ticket_type_id==='self_friendly')
    && t.status==='usable' && t.sessions_remaining>0
    && (!t.expire_date||t.expire_date>=ymd(TODAY)));
  const sumByType=t=>mineUsable.filter(x=>x.ticket_type_id===t).reduce((s,x)=>s+x.sessions_remaining,0);
  const selfSum=sumByType('self_training'), friendlySum=sumByType('self_friendly');
  if(selfSum+friendlySum===0){
    showModal(`<div class="modal-title">預約自主訓練</div>
      <div class="empty" style="padding:24px 8px;"><div class="em-t">你目前沒有可用的自主訓練點數</div>
      <div style="font-size:11.5px;margin-top:6px;color:var(--t2);">完成教練課簽到後會獲得自主訓練點數（效期 7 天）</div></div>
      <div class="modal-foot"><button class="btn btn-ghost" onclick="closeModal()">關閉</button></div>`);
    return;
  }
  // 預設類型：有自主訓練優先，否則友善
  window._sbState={ type: selfSum>0?'self_training':'self_friendly', date:ymd(TODAY), time:null, selfSum, friendlySum };
  renderSelfBookSheet();
}
function renderSelfBookSheet(){
  let host=document.getElementById('qb-sheet');
  if(!host){ host=document.createElement('div'); host.id='qb-sheet'; document.body.appendChild(host); }
  document.querySelectorAll('.qb-fab').forEach(b=>b.style.display='none');
  const s=window._sbState;
  // 類型切換（只在兩種票都有時顯示）
  const typeToggle = (s.selfSum>0 && s.friendlySum>0)
    ? `<div class="qb-periods" style="margin-bottom:6px;">
         <button class="qb-period ${s.type==='self_training'?'active':''}" onclick="sbSetType('self_training')">自主訓練（${s.selfSum}）</button>
         <button class="qb-period ${s.type==='self_friendly'?'active':''}" onclick="sbSetType('self_friendly')">友善（${s.friendlySum}）</button>

  // 未來 7 天

      <div class="qb-day-l">${d.label}</div><div class="qb-day-w">${d.wd}</div></button>`).join('');
  host.innerHTML=`<div class="ms-backdrop" onclick="closeQuickBook()"></div>
    <div class="ms-panel qb-panel">
      <div class="ms-head"><div class="ms-title">預約自主訓練</div><button class="ms-close" onclick="closeQuickBook()">✕</button></div>
      ${typeToggle}
      <div class="qb-section-label">選擇日期（未來 7 天）</div>
      <div class="qb-days">${days}</div>
      <div class="qb-section-label">可預約時段</div>
      <div class="qb-slots" id="sb-slots"><div class="qb-loading">載入中…</div></div>
      <div style="font-size:11.5px;color:var(--t3);padding:10px 18px 4px;">點選時段即完成預約，自動使用最快到期的點數扣 1 點。</div>
    </div>`;
  sbLoadSlots();
}

function sbSetDate(ds){ window._sbState.date=ds; window._sbState.time=null; renderSelfBookSheet(); }
async function sbLoadSlots(){
  const s=window._sbState;

  if(b.category!=='自主訓練'){showToast('僅能取消自主訓練預約');return;}

    : '開課 24 小時前取消，將退回 1 點自主訓練票券。';

    <div style="font-size:13.5px;padding:6px 0 4px;">確定取消 ${b.date} ${b.start_time} 的自主訓練嗎？</div>

async function doMemCancelSelf(id){
  const b=await dbGet('bookings',id);
  if(!b||b.member_id!==SESSION.id||b.category!=='自主訓練'){showToast('無法取消');return;}
  const within24 = hoursUntilStart(b) < 24;
  b.status='cancelled';
  b.cancelled_at=new Date().toISOString();
  b.refund_waived=within24;
  await dbPut('bookings',b);
  if(!within24 && b.ticket_id){ await refundTicket(b.ticket_id,b.id,SESSION.id); }
  closeModal();
  showToast(within24?'已取消（24 小時內，恕不退點）':'已取消，退回 1 點');
  navTo('mem_bookings');
}

// 判斷是否為教練課票券（用排除法：不是自主訓練/團體/體驗就算教練課）
function isPtTicket(t){
  if(!t) return false;
  const tt=(window._ttCache||[]).find(x=>x.id===t.ticket_type_id);
  const cat=tt?tt.category:'';
  const nm=(t.plan_name||'')+(tt?tt.name:'');
  // 明確是其他類 → 不算教練課
  if(cat==='自主訓練'||cat==='小班肌力'||cat==='體驗') return false;
  if(nm.indexOf('自主')>=0||nm.indexOf('團體')>=0||nm.indexOf('小班')>=0||nm.indexOf('體驗')>=0) return false;
  // 其餘（含 category 對不到、或名稱含教練）都當教練課
  return true;
}

async function qbCountTickets(memberId,typeId){
  if(!memberId) return 0;
  try{
    const tickets=window._qbTickets||await dbGetAll('member_tickets');
    return tickets.filter(t=>t.member_id===memberId && isPtTicket(t) && t.status==='usable')
      .reduce((s,t)=>s+(t.sessions_remaining||0),0);
  }catch(_){ return 0; }
}

  const ptFindTk=async(mid,ds)=>{

      .sort((a,b)=>(a.expire_date||'9999').localeCompare(b.expire_date||'9999'))[0]||null;

  const ptCountRemain=async(mid)=>{

      .reduce((s,t)=>s+(t.sessions_remaining||0),0);

  let tk=await findUsableTicket(SESSION.id,'self_training',date);
  let type_id='self_training';
  if(!tk){
    try{
      const types=await dbGetAll('ticket_types');
      const selfIds=types.filter(t=>t.category==='自主訓練').map(t=>t.id);
      const cand=tickets.filter(t=>t.member_id===SESSION.id && selfIds.includes(t.ticket_type_id)
        && t.status==='usable' && t.sessions_remaining>0 && (!t.expire_date||t.expire_date>=ymd(TODAY)))
        .sort((a,b)=>(a.expire_date||'9999').localeCompare(b.expire_date||'9999'));
      if(cand[0]){ tk=cand[0]; type_id=cand[0].ticket_type_id; }
    }catch(_){}
  }
  if(!tk){ showToast('沒有可用的自主訓練票券'); return; }
  const d=parseYmd(date);
  window._qbConfirm={date,time,ticket_id:tk.id,type_id};
  showModal(`<div class="modal-title">確認自主訓練預約</div>
    <div style="background:var(--card2);border-radius:10px;padding:14px;font-size:13.5px;line-height:2;">
      <div><span style="color:var(--t2);">類型</span>　自主訓練</div>
      <div><span style="color:var(--t2);">日期</span>　${date.replace(/-/g,'/')}（週${WD[d.getDay()]}）</div>
      <div><span style="color:var(--t2);">時間</span>　${time}</div>
      <div><span style="color:var(--t2);">使用票券</span>　${tk.plan_name||'自主訓練點數'}（剩 ${tk.sessions_remaining} 點）</div>
    </div>
    <div style="font-size:11.5px;color:var(--t3);margin-top:10px;">確認後將扣抵 1 點。</div>
    <div class="modal-foot"><button class="btn btn-ghost" onclick="closeModal()">取消</button><button class="btn btn-green" onclick="submitQuickSelfBook()">確認預約</button></div>`);
}
async function submitQuickSelfBook(){
 try{
  const c=window._qbConfirm; if(!c){showToast('資料遺失，請重試');return;}
  const tk=await dbGet('member_tickets',c.ticket_id);
  if(!tk||tk.sessions_remaining<=0){showToast('票券已無剩餘');return;}
  const vbk={id:null,member_id:SESSION.id,coach_id:null,category:'自主訓練',ticket_type_id:c.type_id};
  const verr=await validateBooking(vbk,c.date,c.time,60);
  if(verr){showToast(verr);return;}
  const bk={id:uid('BK'),member_id:SESSION.id,coach_id:null,ticket_id:tk.id,ticket_type_id:c.type_id,
    category:'自主訓練',format:null,date:c.date,start_time:c.time,duration:60,status:'booked',
    recurring:false,venue_unit:vbk.venue_unit||null,created_by:SESSION.id,created_at:new Date().toISOString()};
  await dbPut('bookings',bk);
  await deductTicket(tk,bk.id,SESSION.id);
  closeModal();
  showToast('預約成功，已扣 1 點');
  navTo('mem_bookings');
 }catch(e){ console.error('submitQuickSelfBook 錯誤:',e); showToast('預約失敗：'+(e&&e.message?e.message:e)); }
}

/* ════════════════════════════════════════════════════════════
   訓練紀錄系統（第一批：紀錄清單 + 新增動作 7 步驟）
   單一任務 Bottom Sheet：課程卡 → 訓練紀錄 → 新增動作（一層一層）

const TL_BODY_PARTS=['功能性','上肢','下肢'];
// 訓練方向（七個入口）→ 對應現有 body_part（先簡化對應）
const TL_DIRECTIONS=[
  {key:'功能性',     part:'功能性'},
  {key:'上肢垂直推', part:'上肢'},
  {key:'上肢垂直拉', part:'上肢'},
  {key:'上肢水平推', part:'上肢'},
  {key:'上肢水平拉', part:'上肢'},
  {key:'下肢深蹲',   part:'下肢'},
  {key:'下肢硬舉',   part:'下肢'},
];
const TL_POSTURES=['站姿','跪姿','坐姿','趴姿','躺姿'];
const TL_TOOLS=['啞鈴','壺鈴','槓鈴','SSB槓鈴','四角槓','史密斯','Cable','TRX','彈力帶','徒手'];
window._tlState=null; // 新增動作流程暫存

// 入口：點訓練紀錄 → 開紀錄清單 sheet
async function openTrainingLog(bookingId){
  closeModal();
  const b=await dbGet('bookings',bookingId);
  if(!b){showToast('找不到課程');return;}
  window._tlBooking=b;
  // 會員名 + 票券剩餘 + 是否友善課
  let memName='會員', tkText='', isFriendly=false;
  try{ const m=await dbGet('members',b.member_id); if(m)memName=m.name; }catch(_){}
  try{
    if(b.ticket_id){ const tk=await dbGet('member_tickets',b.ticket_id); if(tk)tkText=`${tk.plan_name||'票券'}　${tk.sessions_remaining}/${tk.sessions_total}`; }
    // 判斷友善：看課程的票券種類名稱是否含「友善」
    if(b.ticket_type_id){
      const ty=await dbGet('ticket_types',b.ticket_type_id);
      if(ty && (ty.name||'').indexOf('友善')>=0) isFriendly=true;
    }
    if(!isFriendly && tkText.indexOf('友善')>=0) isFriendly=true;
  }catch(_){}
  window._tlMemName=memName; window._tlTkText=tkText; window._tlIsFriendly=isFriendly;
  renderTrainingLogSheet();
}
function closeTrainingLog(){ const s=document.getElementById('tl-sheet'); if(s)s.remove(); document.querySelectorAll('.qb-fab').forEach(x=>x.style.display=''); }

async function renderTrainingLogSheet(){
  const b=window._tlBooking;
  let host=document.getElementById('tl-sheet');
  if(!host){ host=document.createElement('div'); host.id='tl-sheet'; document.body.appendChild(host); }
  document.querySelectorAll('.qb-fab').forEach(x=>x.style.display='none');

  let allLogs=[];
  try{ allLogs=await dbGetAll('training_logs'); }catch(_){}
  // 今日（本堂課）紀錄
  const logs=allLogs.filter(l=>l.booking_id===b.id).sort((a,b)=>(a.created_at||'').localeCompare(b.created_at||''));
  // 動作明細顯示（次數 x 重量；多組）
  const setLine=(l)=>{
    if(l.sets_detail){ try{ const arr=JSON.parse(l.sets_detail); if(arr&&arr.length) return arr.map(s=>`${s.reps||'-'}${s.weight?'×'+s.weight+'kg':''}`).join('、'); }catch(_){} }
    return `${l.reps??'-'} 次${l.sets?(' × '+l.sets+' 組'):''}`;
  };
  const fmt=b.format?b.format.toUpperCase():'';
  const isFriendly=window._tlIsFriendly;
  let typeM={'私人教練':'私人教練課','自主訓練':'自主訓練','體驗':'體驗課','小班肌力':'團體課'}[b.category]||'課程';
  if(isFriendly && b.category==='私人教練') typeM='友善教練課';
  const memColorCls = isFriendly?'tlh-member-friendly':'tlh-member-'+typeOfCat(b.category);

  // 第一區：會員資訊
  const sec1=`<div class="tlh-member ${memColorCls}">
    <div class="tlh-mem-name">${window._tlMemName}${fmt?`<span class="tlh-fmt">${fmt}</span>`:''}</div>
    <div class="tlh-mem-sub">${typeM}${window._tlTkText?`　·　剩餘 ${window._tlTkText}`:''}</div>
  </div>`;

  // 第二區：今日訓練紀錄
  const sec2 = logs.length===0
    ? '<div class="tl-empty">尚無訓練紀錄<br><span style="font-size:11.5px;color:var(--t3);">點下方「新增動作」開始記錄</span></div>'
    : `<div class="tlh-logs">${logs.map(l=>`<div class="tlh-log">
        <div class="tlh-log-main"><span class="tlh-ex">${l.exercise_name}</span><span class="tlh-sets">${setLine(l)}</span></div>
        <div class="tlh-log-sub">${[l.posture,l.tool].filter(Boolean).join(' / ')}${l.note?'　·　'+l.note.replace(/\[[^\]]*\]/g,'').trim():''}</div>
        <button class="tl-del" onclick="delTrainingLog('${l.id}')">✕</button>
      </div>`).join('')}</div>`;

  // ── P1-1 會員訓練總覽（跨課程統計）──
  const memAllLogs=allLogs.filter(l=>l.member_id===b.member_id);
  const memBkSet=new Set(memAllLogs.map(l=>l.booking_id));
  const sessionCount=memBkSet.size;                       // 有訓練紀錄的課堂數
  const lastTrainDate=memAllLogs.length
    ? memAllLogs.map(l=>(l.created_at||'').slice(0,10)).sort().slice(-1)[0].replace(/-/g,'/')
    : '—';
  // 最常練動作 Top3
  const exCount={};
  memAllLogs.forEach(l=>{ if(l.exercise_name) exCount[l.exercise_name]=(exCount[l.exercise_name]||0)+1; });
  const topEx=Object.entries(exCount).sort((a,b)=>b[1]-a[1]).slice(0,3).map(e=>e[0]);
  // 各部位分布
  const partCount={};
  memAllLogs.forEach(l=>{ if(l.body_part) partCount[l.body_part]=(partCount[l.body_part]||0)+1; });
  const partLine=TL_BODY_PARTS.map(p=>partCount[p]?`${p} ${partCount[p]}`:null).filter(Boolean).join('　');
  const overview=`<div class="tlh-ov">
      <div class="tlh-ov-row">
        <div class="tlh-ov-cell"><div class="tlh-ov-n">${sessionCount}</div><div class="tlh-ov-l">訓練堂數</div></div>
        <div class="tlh-ov-cell"><div class="tlh-ov-n" style="font-size:15px;">${lastTrainDate}</div><div class="tlh-ov-l">最近訓練</div></div>
      </div>
      ${topEx.length?`<div class="tlh-ov-sub"><span class="tlh-ov-k">常練</span>${topEx.join('、')}</div>`:''}
      ${partLine?`<div class="tlh-ov-sub"><span class="tlh-ov-k">部位</span>${partLine}</div>`:''}
    </div>`;

  // ── P1-2 歷史課表（最近三次，可一鍵套用）──
  const memLogs=allLogs.filter(l=>l.member_id===b.member_id && l.booking_id!==b.id);
  const byBk={};
  memLogs.forEach(l=>{ (byBk[l.booking_id]=byBk[l.booking_id]||[]).push(l); });
  let hist=Object.entries(byBk).map(([bid,ls])=>({bid,ls,t:ls[0].created_at||''}))
    .sort((a,b)=>b.t.localeCompare(a.t)).slice(0,3);
  window._tlHistCache=Object.fromEntries(hist.map(h=>[h.bid,h.ls])); // 供套用取用
  const sec4 = hist.length===0
    ? '<div style="font-size:12px;color:var(--t3);padding:10px 0;">尚無歷史課表</div>'
    : hist.map(h=>{
        const dt=(h.t||'').slice(0,10).replace(/-/g,'/');
        const exs=[...new Set(h.ls.map(l=>l.exercise_name))].join('、');
        return `<div class="tlh-hist">
          <div class="tlh-hist-l"><div class="tlh-hist-d">${dt||'—'}</div><div class="tlh-hist-x">${exs}</div></div>
          <button class="tlh-apply" onclick="tlApplyHist('${h.bid}')">套用</button>
        </div>`;
      }).join('');

  host.innerHTML=`<div class="ms-backdrop" onclick="closeTrainingLog()"></div>
    <div class="ms-panel tl-panel">
      <div class="ms-head">
        <div><div class="ms-title">訓練課表</div>
          <div style="font-size:11.5px;color:var(--t3);margin-top:2px;">${b.date.replace(/-/g,'/')} ${b.start_time}</div></div>
        <button class="ms-close" onclick="closeTrainingLog()">✕</button>
      </div>
      <div class="tl-scroll">
        ${sec1}
        ${overview}
        <div class="tlh-label">今日訓練紀錄</div>
        ${sec2}
        <button class="btn btn-green" style="width:100%;margin-top:10px;" onclick="tlStartAddExercise()">＋ 新增動作</button>
        <div class="tlh-label" style="margin-top:18px;display:flex;align-items:center;justify-content:space-between;">
          <span>歷史課表（最近三次）</span>
          <button class="tlh-hq-btn" onclick="tlOpenExerciseHistory()">動作查詢 ›</button>
        </div>
        ${sec4}
      </div>
    </div>`;
}
// ── P1-2 一鍵套用歷史課表：把某次的所有動作複製成今日紀錄（重量保留供微調）──
async function tlApplyHist(srcBid){
  const srcLogs=(window._tlHistCache||{})[srcBid];
  if(!srcLogs||!srcLogs.length){ showToast('找不到該次課表'); return; }
  const b=window._tlBooking;
  const dt=(srcLogs[0].created_at||'').slice(0,10).replace(/-/g,'/');
  const exNames=[...new Set(srcLogs.map(l=>l.exercise_name))].join('、');
  showModal(`<div class="modal-title">套用歷史課表</div>
    <div style="font-size:13px;color:var(--text);padding:4px 0 2px;">將 <b>${dt}</b> 的 ${srcLogs.length} 個動作複製到本堂課：</div>
    <div style="font-size:12.5px;color:var(--t2);margin:6px 0 14px;line-height:1.7;">${exNames}</div>
    <div style="font-size:11.5px;color:var(--t3);margin-bottom:14px;">複製後可逐項調整重量／次數。已存在的今日紀錄不會被覆蓋。</div>
    <div class="modal-foot"><button class="btn btn-ghost" onclick="closeModal()">取消</button><button class="btn btn-green" onclick="tlDoApplyHist('${srcBid}')">確認套用</button></div>`);
}
async function tlDoApplyHist(srcBid){
  const srcLogs=(window._tlHistCache||{})[srcBid];
  if(!srcLogs||!srcLogs.length){ closeModal(); return; }
  const b=window._tlBooking;
  let n=0;
  try{
    for(const s of srcLogs){
      const log={
        id:uid('TLOG'), booking_id:b.id, member_id:b.member_id, coach_id:SESSION.id,
        exercise_name:s.exercise_name, body_part:s.body_part, posture:s.posture, tool:s.tool,
        reps:s.reps, sets:s.sets, sets_detail:s.sets_detail,
        note:(s.note||'').replace(/\s*\(套用.*?\)\s*/g,'')+' (套用 '+((s.created_at||'').slice(0,10).replace(/-/g,'/'))+')',
        created_at:new Date().toISOString()
      };
      await dbPut('training_logs',log);
      window._tlogBids&&window._tlogBids.add(log.booking_id);
      n++;
    }
    closeModal();
    showToast(`已套用 ${n} 個動作`);
    renderTrainingLogSheet();
  }catch(e){ closeModal(); showToast('套用失敗：'+(e&&e.message?e.message:e)); }
}
// ── P1-3 動作歷史紀錄查詢：選一個動作 → 看該會員歷來重量/次數變化 ──
async function tlOpenExerciseHistory(){
  const b=window._tlBooking;
  let allLogs=[];
  try{ allLogs=await dbGetAll('training_logs'); }catch(_){}
  const memLogs=allLogs.filter(l=>l.member_id===b.member_id);
  // 該會員練過的所有動作（去重，依最近練過排序）
  const exMap={};
  memLogs.forEach(l=>{ if(!l.exercise_name)return; const t=l.created_at||''; if(!exMap[l.exercise_name]||t>exMap[l.exercise_name]) exMap[l.exercise_name]=t; });
  const exList=Object.entries(exMap).sort((a,b)=>b[1].localeCompare(a[1])).map(e=>e[0]);
  window._tlExHistLogs=memLogs;
  let host=document.getElementById('tl-exhist'); if(host)host.remove();
  host=document.createElement('div'); host.id='tl-exhist'; document.body.appendChild(host);
  const chips=exList.length
    ? exList.map(n=>`<button class="tleh-chip" onclick="tlExHistShow('${n.replace(/'/g,"\\'")}')">${n}</button>`).join('')
    : '<div class="ae-hint">這位會員尚無動作紀錄</div>';
  host.innerHTML=`<div class="ms-backdrop" onclick="document.getElementById('tl-exhist').remove()"></div>
    <div class="ms-panel">
      <div class="ms-head"><div><div class="ms-title">動作歷史查詢</div>
        <div style="font-size:11.5px;color:var(--t3);margin-top:2px;">${window._tlMemName}</div></div>
        <button class="ms-close" onclick="document.getElementById('tl-exhist').remove()">✕</button></div>
      <div class="ms-list" style="max-height:62vh;">
        <div class="ae-label" style="margin:8px 0;">選擇動作</div>
        <div class="tleh-chips">${chips}</div>
        <div id="tleh-detail"></div>
      </div>
    </div>`;
}
function tlExHistShow(name){
  const logs=(window._tlExHistLogs||[]).filter(l=>l.exercise_name===name)
    .sort((a,b)=>(b.created_at||'').localeCompare(a.created_at||''));
  const box=document.getElementById('tleh-detail'); if(!box)return;
  // 標記選中 chip
  document.querySelectorAll('#tl-exhist .tleh-chip').forEach(c=>c.classList.toggle('active',c.textContent===name));
  if(!logs.length){ box.innerHTML='<div class="ae-hint">無紀錄</div>'; return; }
  // 計算每次最大重量，標出進步
  const rows=logs.map(l=>{
    const dt=(l.created_at||'').slice(0,10).replace(/-/g,'/');
    let detail='', maxW=0;
    if(l.sets_detail){ try{ const arr=JSON.parse(l.sets_detail);
      detail=arr.map(s=>`${s.reps||'-'}×${s.weight||'-'}`).join('　');
      arr.forEach(s=>{ const w=parseFloat(s.weight)||0; if(w>maxW)maxW=w; });
    }catch(_){} }
    if(!detail) detail=`${l.reps||'-'} 次${l.sets?(' ×'+l.sets+'組'):''}`;
    return {dt,detail,maxW,tool:l.tool,posture:l.posture};
  });
  const peak=Math.max(...rows.map(r=>r.maxW));
  box.innerHTML=`<div class="ae-label" style="margin:16px 0 8px;">${name} · 歷來紀錄（共 ${rows.length} 次）</div>
    <div class="tleh-rows">${rows.map(r=>`<div class="tleh-row">
      <div class="tleh-row-d">${r.dt}</div>
      <div class="tleh-row-x"><div class="tleh-row-sets">${r.detail}</div>
        <div class="tleh-row-meta">${[r.tool,r.posture].filter(Boolean).join(' / ')}</div></div>
      ${r.maxW>0?`<div class="tleh-row-w ${r.maxW>=peak?'peak':''}">${r.maxW}<span>kg</span></div>`:''}
    </div>`).join('')}</div>
    <div style="font-size:11px;color:var(--t3);margin-top:10px;text-align:center;">標金色＝歷來最大重量</div>`;
}
async function delTrainingLog(id){
  if(!confirm('確定刪除這筆動作紀錄？'))return;
  try{ await dbDel('training_logs',id); }catch(_){}
  renderTrainingLogSheet();
}

//   第一頁：訓練部位＋動作選擇／使用工具＋使用姿勢

function tlStartAddExercise(){
  window._tlState={page:1, _dir:null, body_part:null, exercise_name:null, posture:null, tool:null, _tpOpen:false, _exq:'',
    sets:[{reps:'',weight:''}]};
  renderAddExerciseSheet();
}
function closeAddExercise(){ const s=document.getElementById('tl-add-sheet'); if(s)s.remove(); }

async function renderAddExerciseSheet(){
  const st=window._tlState;
  let host=document.getElementById('tl-add-sheet');
  if(!host){ host=document.createElement('div'); host.id='tl-add-sheet'; document.body.appendChild(host); }

  if(st.page===1){
    let allEx=[];
    try{ allEx=(await dbGetAll('exercises')).filter(e=>e.active!==false); }catch(_){}

    { const seen=new Set(); allEx=allEx.filter(e=>{ if(seen.has(e.name))return false; seen.add(e.name); return true; }); }

      <div class="ae-chosen-l"><span class="ae-chosen-ex">${st.exercise_name}</span>
        <span class="ae-chosen-meta">工具：${st.tool||'—'}　·　姿勢：${st.posture||'—'}　<button class="ae-chosen-edit" onclick="tlToggleTP()">${st._tpOpen?'收合':'修改'}</button></span></div>
      </div>
      ${st._tpOpen?`<div class="ae-tp">
        <div class="ae-label">使用工具</div><div class="ae-grid ae-grid-3">${TL_TOOLS.map(t=>`<button class="ae-opt ${st.tool===t?'active':''}" onclick="tlPickTool('${t}')">${t}</button>`).join('')}</div>
        <div class="ae-label">使用姿勢</div><div class="ae-grid ae-grid-2">${TL_POSTURES.map(p=>`<button class="ae-opt ${st.posture===p?'active':''}" onclick="tlPickPosture('${p}')">${p}</button>`).join('')}</div>
      </div>`:''}` : '';
    const ready = st.exercise_name && st.tool && st.posture;
    const foot = `<div class="ae-foot"><button class="btn ${ready?'btn-green':'btn-ghost'}" style="width:100%;" ${ready?'':'disabled'} onclick="tlGoPage2()">開始記錄 →</button></div>`;

    if(!st._dir){
      // 步驟1：選訓練方向（七大按鈕）
      const dirBtns=TL_DIRECTIONS.map(d=>`<button class="ae-dir" onclick="tlPickDir('${d.key}')">${d.key}</button>`).join('');
      host.innerHTML=`<div class="ms-backdrop" onclick="closeAddExercise()"></div>
        <div class="ms-panel ae-panel">
          <div class="ms-head"><div class="ms-title">選擇訓練方向</div><button class="ms-close" onclick="closeAddExercise()">✕</button></div>
          <div class="ae-body"><div class="ae-dir-grid">${dirBtns}</div></div>
        </div>`;
      return;
    }

    // 步驟2：方向已選 → 上次紀錄 + 快速套用 + 新增動作
    const dir=TL_DIRECTIONS.find(d=>d.key===st._dir)||TL_DIRECTIONS[0];
    const part=dir.part;
    // 該會員最近一次此方向(part)的紀錄
    let lastBlock='<div class="ae-hint">這個會員還沒有這個方向的紀錄</div>';
    try{
      const b=window._tlBooking;
      const logs=(await dbGetAll('training_logs')).filter(l=>l.member_id===b.member_id && l.body_part===part && l.booking_id!==b.id)
        .sort((a,b)=>(b.created_at||'').localeCompare(a.created_at||''));
      if(logs.length){
        // 取最近那一堂課(同 booking_id)的紀錄
        const lastBid=logs[0].booking_id;
        const lastLogs=logs.filter(l=>l.booking_id===lastBid);
        const dt=(logs[0].created_at||'').slice(0,10).replace(/-/g,'/');
        lastBlock=`<div class="ae-last-date">${dt}</div>`+lastLogs.map(l=>{
          let sets='';
          if(l.sets_detail){ try{ const arr=JSON.parse(l.sets_detail); sets=arr.map(s=>`${s.reps||'-'}×${s.weight||'-'}`).join('　'); }catch(_){} }
          if(!sets) sets=`${l.reps||'-'} 次${l.sets?(' ×'+l.sets+'組'):''}`;
          return `<div class="ae-last-row"><span class="ae-last-ex">${l.exercise_name}</span><span class="ae-last-sets">${sets}</span></div>`;
        }).join('');
      }
    }catch(_){}

    // 快速套用：此方向(part)的動作
    const dirExs=allEx.filter(e=>e.body_part===part);
    const quickBlock=`<div class="ae-grid ae-grid-2">${dirExs.map(e=>mkBtn(e.name)).join('')||'<div class="ae-hint">尚無動作</div>'}</div>`;

    host.innerHTML=`<div class="ms-backdrop" onclick="closeAddExercise()"></div>
      <div class="ms-panel ae-panel">
        <div class="ms-head">
          <button class="ae-back" onclick="tlBackToDir()">‹</button>
          <div class="ms-title">${st._dir}</div>
          <button class="ms-close" onclick="closeAddExercise()">✕</button>
        </div>
        <div class="ae-body">
          <div class="ae-label">最近訓練</div>
          <div class="ae-last">${lastBlock}</div>
          <div class="ae-label">快速套用</div>
          ${quickBlock}
          <div class="ae-grid ae-grid-2" style="margin-top:10px;"><button class="ae-opt ae-add" onclick="tlAddCustomExercise()">＋ 新增動作</button></div>
        </div>
        ${chosen}
        ${foot}
      </div>`;
  }else{
    // 第二頁：已完成的組顯示為摘要，最後一組為輸入；按「＋新增一組」定下當前組再開新組
    const done = st.sets.slice(0, st.sets.length-1); // 已定下的組
    const cur = st.sets[st.sets.length-1];           // 當前輸入組
    const doneHtml=done.map((s,i)=>`<div class="ae-set-done">
      <div class="ae-set-no done">${i+1}</div>
      <div class="ae-set-val">${s.reps||'-'} 次　×　${s.weight||'-'} kg</div>
      <button class="ae-set-del" onclick="tlDelSet(${i})">✕</button>
    </div>`).join('');
    const curNo=done.length+1;
    const curHtml=`<div class="ae-set-cur">
      <div class="ae-set-no">${curNo}</div>
      <div class="ae-cur-fields">
        <div class="ae-set-field"><input type="number" inputmode="numeric" id="ae-cur-reps" class="ae-set-in" placeholder="次數" value="${cur.reps}"><span>次</span></div>
        <div class="ae-set-field"><input type="number" inputmode="decimal" id="ae-cur-weight" class="ae-set-in" placeholder="重量" value="${cur.weight}"><span>kg</span></div>
      </div>
    </div>`;
    const noteBlock = st._noteOpen
      ? `<textarea id="ae-note" class="ae-note" placeholder="輸入備註…">${st.note||''}</textarea>`
      : `<button class="ae-add-note" onclick="tlOpenNote()">＋ 新增備註</button>`;
    // 工具/姿勢：預設已從動作資料庫帶入，顯示於動作名下方；點「修改」才展開編輯
    const tpBlock = st._tpOpen
      ? `<div class="ae-tp" style="margin-top:8px;">
          <div class="ae-label">使用工具</div><div class="ae-grid ae-grid-3">${TL_TOOLS.map(t=>`<button class="ae-opt ${st.tool===t?'active':''}" onclick="tlPickTool('${t}')">${t}</button>`).join('')}</div>
          <div class="ae-label">使用姿勢</div><div class="ae-grid ae-grid-2">${TL_POSTURES.map(p=>`<button class="ae-opt ${st.posture===p?'active':''}" onclick="tlPickPosture('${p}')">${p}</button>`).join('')}</div>
        </div>`
      : '';
    host.innerHTML=`<div class="ms-backdrop" onclick="closeAddExercise()"></div>
      <div class="ms-panel ae-panel">
        <div class="ms-head">
          <button class="ae-back" onclick="tlBackPage1()">‹</button>
          <div class="ms-title">記錄訓練</div>
          <button class="ms-close" onclick="closeAddExercise()">✕</button>
        </div>
        <div class="ae-chosen">
          <div class="ae-chosen-ex">${st.exercise_name}</div>
          <div class="ae-chosen-sub">${[st.posture,st.tool].filter(Boolean).join('　·　')||'未設定工具姿勢'}　<button class="ae-chosen-edit" onclick="tlToggleTP()">${st._tpOpen?'收合':'修改'}</button></div>
          ${tpBlock}
        </div>
        <div class="ae-body">
          <div class="ae-sets-head"><span>組</span><span>次數 RM</span><span>重量 kg</span></div>
          ${doneHtml}
          ${curHtml}
          <button class="ae-add-set" onclick="tlAddSet()">＋ 新增一組</button>
          <div style="margin-top:14px;">${noteBlock}</div>
        </div>
        <div class="ae-foot"><button class="btn btn-green" style="width:100%;" onclick="tlSaveExercise()">儲存（共 ${curNo} 組）</button></div>
      </div>`;
    setTimeout(()=>{const r=document.getElementById('ae-cur-reps');if(r&&!cur.reps)r.focus();},60);
  }
}
function tlPickBody(p){ window._tlState.body_part=p; window._tlState.exercise_name=null; window._tlState._exq=''; renderAddExerciseSheet(); }
function tlExSearch(v){ window._tlState._exq=v; renderAddExerciseSheet(); setTimeout(()=>{const s=document.getElementById('ae-ex-search');if(s){s.focus();s.setSelectionRange(s.value.length,s.value.length);}},20); }
function tlPickEx(n){
  window._tlState.exercise_name=n;
  // 自動帶入該動作的預設工具／姿勢（若有）
  (async()=>{
    try{
      const ex=(await dbGetAll('exercises')).find(e=>e.name===n && e.body_part===window._tlState.body_part);
      if(ex){ if(ex.default_tool && !window._tlState.tool) window._tlState.tool=ex.default_tool;
              if(ex.default_posture && !window._tlState.posture) window._tlState.posture=ex.default_posture; }
    }catch(_){}
    renderAddExerciseSheet();
  })();
}
// 選動作 → 自動帶入部位＋預設工具/姿勢，直接進入記錄頁（紙本邏輯：先記重量次數）
async function tlPickExAuto(n){
  const st=window._tlState;
  st.exercise_name=n; st._tpOpen=false;
  try{
    const ex=(await dbGetAll('exercises')).find(e=>e.name===n && e.active!==false);
    if(ex){
      st.body_part=ex.body_part||st.body_part;
      st.tool = ex.default_tool || st.tool || '徒手';
      st.posture = ex.default_posture || st.posture || '站姿';
    }else{ st.tool=st.tool||'徒手'; st.posture=st.posture||'站姿'; }
  }catch(_){ st.tool=st.tool||'徒手'; st.posture=st.posture||'站姿'; }
  st.page=2; // 直接進記錄頁，不需再按「開始記錄」
  renderAddExerciseSheet();
}
function tlToggleTP(){ if(window._tlState.page===2)tlReadCur(); window._tlState._tpOpen=!window._tlState._tpOpen; renderAddExerciseSheet(); }
// 選訓練方向 → 帶入對應 body_part
function tlPickDir(key){
  const d=TL_DIRECTIONS.find(x=>x.key===key);
  window._tlState._dir=key;
  window._tlState.body_part=d?d.part:null;
  window._tlState.exercise_name=null; window._tlState.tool=null; window._tlState.posture=null; window._tlState._tpOpen=false;
  renderAddExerciseSheet();
}
function tlBackToDir(){
  window._tlState._dir=null; window._tlState.exercise_name=null; window._tlState.tool=null; window._tlState.posture=null;
  renderAddExerciseSheet();
}
function tlPickPosture(p){ if(window._tlState.page===2)tlReadCur(); window._tlState.posture=p; renderAddExerciseSheet(); }
function tlPickTool(t){ if(window._tlState.page===2)tlReadCur(); window._tlState.tool=t; renderAddExerciseSheet(); }
function tlBackPage1(){ tlReadCur(); window._tlState.page=1; renderAddExerciseSheet(); }
function tlGoPage2(){
  const st=window._tlState;
  if(!(st.body_part&&st.exercise_name&&st.posture&&st.tool)){ showToast('請完成上方四項選擇'); return; }
  st.page=2; renderAddExerciseSheet();
}
// 讀取當前輸入組的值回 state
function tlReadCur(){
  const st=window._tlState; const cur=st.sets[st.sets.length-1];
  const r=document.getElementById('ae-cur-reps'), w=document.getElementById('ae-cur-weight');
  if(r)cur.reps=r.value; if(w)cur.weight=w.value;
  const n=document.getElementById('ae-note'); if(n)st.note=n.value;
}
function tlAddSet(){
  tlReadCur();
  const st=window._tlState; const cur=st.sets[st.sets.length-1];
  if(cur.reps===''&&cur.weight===''){ showToast('請先填這一組的次數或重量'); return; }
  // 新一組預設沿用上一組的次數/重量（常見情境：同重量多組）
  st.sets.push({reps:cur.reps,weight:cur.weight});
  renderAddExerciseSheet();
}
function tlDelSet(i){ tlReadCur(); window._tlState.sets.splice(i,1); if(window._tlState.sets.length===0)window._tlState.sets.push({reps:'',weight:''}); renderAddExerciseSheet(); }
function tlOpenNote(){ tlReadCur(); window._tlState._noteOpen=true; renderAddExerciseSheet(); }

function tlAddCustomExercise(){
  const st=window._tlState;
  const toolOpts=TL_TOOLS.map(t=>`<option value="${t}">${t}</option>`).join('');
  const postOpts=TL_POSTURES.map(p=>`<option value="${p}">${p}</option>`).join('');
  const partOpts=TL_BODY_PARTS.map(p=>`<option value="${p}" ${st.body_part===p?'selected':''}>${p}</option>`).join('');
  showModal(`<div class="modal-title">新增自訂動作</div>
    <div class="form-row"><label>動作名稱</label><input id="cx-name" placeholder="例如：保加利亞分腿蹲"></div>
    <div class="form-row"><label>訓練部位</label><select id="cx-part">${partOpts}</select></div>
    <div class="form-2col">
      <div class="form-row"><label>預設工具</label><select id="cx-tool">${toolOpts}</select></div>
      <div class="form-row"><label>預設姿勢</label><select id="cx-post">${postOpts}</select></div>
    </div>
    <div style="font-size:11px;color:var(--t3);margin-bottom:6px;">建立後會直接出現在動作選擇裡，並自動帶入預設工具／姿勢。</div>
    <div class="modal-foot"><button class="btn btn-ghost" onclick="closeModal();renderAddExerciseSheet()">取消</button><button class="btn btn-green" onclick="saveCustomExercise()">建立並選用</button></div>`);
}
async function saveCustomExercise(){
  const name=(document.getElementById('cx-name').value||'').trim();
  if(!name){showToast('請輸入動作名稱');return;}
  const part=document.getElementById('cx-part').value;
  const tool=document.getElementById('cx-tool').value;
  const post=document.getElementById('cx-post').value;
  const ex={id:uid('EX'),name,body_part:part,default_tool:tool,default_posture:post,is_custom:true,created_by:SESSION.id,active:true,created_at:new Date().toISOString()};
  try{
    await dbPut('exercises',ex);
    const st=window._tlState;
    st.body_part=part; st.exercise_name=name;
    if(!st.tool)st.tool=tool; if(!st.posture)st.posture=post;
    closeModal();
    renderAddExerciseSheet();
  }catch(e){ showToast('建立失敗：'+(e&&e.message?e.message:e)); }
}
async function tlSaveExercise(){
  tlReadCur();
  const st=window._tlState, b=window._tlBooking;
  // 整理有效組（至少填了次數或重量的組）
  const valid=st.sets.filter(s=>s.reps!==''||s.weight!=='');
  if(valid.length===0){ showToast('請至少記錄一組的次數或重量'); return; }
  const setsText=valid.map(s=>`${s.reps||'-'}次${s.weight?'×'+s.weight+'kg':''}`).join('、');
  const repsFirst=valid[0].reps!==''?parseInt(valid[0].reps,10):null;
  const log={
    id:uid('TLOG'), booking_id:b.id, member_id:b.member_id, coach_id:SESSION.id,
    exercise_name:st.exercise_name, body_part:st.body_part, posture:st.posture, tool:st.tool,
    reps:repsFirst, sets:valid.length,
    sets_detail:JSON.stringify(valid),    // 多組明細（次數+重量）
    note:(st.note||'') + (setsText?(st.note?'　':'')+'['+setsText+']':''),
    created_at:new Date().toISOString()
  };
  try{
    await dbPut('training_logs',log);
    window._tlogBids&&window._tlogBids.add(log.booking_id); // 即時更新課卡狀態
    closeAddExercise();
    showToast('已加入紀錄');
    renderTrainingLogSheet();
  }catch(e){ showToast('儲存失敗：'+(e&&e.message?e.message:e)); }
}

window._exdbFilter={part:'',q:'',showInactive:false};
PAGES.exercise_db=async function(){
  const isAdmin=SESSION.role==='admin';
  C.innerHTML=head('EXERCISE','動作資料庫','統一動作庫 · 教練可新增自訂動作')
    +`<div class="card">
        <div style="display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap;">
          <input id="exdb-search" placeholder="搜尋動作名稱…例如「划」" value="${window._exdbFilter.q}"

          <button class="btn btn-green btn-sm" onclick="openExEdit()">＋ 新增動作</button>
        </div>

async function renderExdbParts(){
  const box=document.getElementById('exdb-parts'); if(!box)return;
  const parts=['',...TL_BODY_PARTS];
  box.innerHTML=parts.map(p=>`<button class="exdb-part ${window._exdbFilter.part===p?'active':''}" onclick="window._exdbFilter.part='${p}';renderExdbParts();renderExdbList()">${p||'全部'}</button>`).join('')
    + (SESSION.role==='admin'?`<label class="exdb-inactive"><input type="checkbox" ${window._exdbFilter.showInactive?'checked':''} onchange="window._exdbFilter.showInactive=this.checked;renderExdbList()"> 顯示已停用</label>`:'');
}
async function renderExdbList(){
  const box=document.getElementById('exdb-body'); if(!box)return;
  const isAdmin=SESSION.role==='admin';
  let exs=[],coaches=[];
  try{ [exs,coaches]=await Promise.all([dbGetAll('exercises'),dbGetAll('coaches')]); }catch(e){ box.innerHTML='<div class="empty"><div class="em-t">載入失敗，請先在 Supabase 建立 exercises 表</div></div>'; return; }
  const coachMap=Object.fromEntries(coaches.map(c=>[c.id,c.name]));
  const f=window._exdbFilter;
  let list=exs.filter(e=>{
    if(f.part && e.body_part!==f.part) return false;
    if(f.q && (e.name||'').indexOf(f.q)<0) return false;
    if(!f.showInactive && e.active===false) return false;
    return true;
  });
  // 預設動作在前、自訂在後，依部位與名稱
  list.sort((a,b)=>{
    if(!!a.is_custom!==!!b.is_custom) return a.is_custom?1:-1;
    return (a.body_part||'').localeCompare(b.body_part||'')||(a.name||'').localeCompare(b.name||'');
  });
  if(list.length===0){ box.innerHTML='<div class="empty" style="padding:24px;"><div class="em-t">沒有符合的動作</div></div>'; return; }
  box.innerHTML=`<table class="rwd-card"><thead><tr><th>動作名稱</th><th>部位</th><th>工具</th><th>姿勢</th><th>建立者</th><th>狀態</th><th></th></tr></thead><tbody>
    ${list.map(e=>{
      const creator = e.is_custom ? (coachMap[e.created_by]||'教練') : '系統預設';
      const canEdit = isAdmin || (e.is_custom && e.created_by===SESSION.id);
      const stat = e.active===false?'<span class="tag tag-danger">已停用</span>':'<span class="tag tag-ok">啟用中</span>';
      return `<tr${e.active===false?' style="opacity:.55;"':''}>
        <td data-label="動作名稱"><b>${e.name}</b>${e.is_custom?'<span style="font-size:10px;color:var(--gold);margin-left:4px;">自訂</span>':''}</td>
        <td data-label="部位">${e.body_part||'—'}</td>
        <td data-label="工具">${e.default_tool||'—'}</td>
        <td data-label="姿勢">${e.default_posture||'—'}</td>
        <td data-label="建立者">${creator}</td>
        <td data-label="狀態">${stat}</td>
        <td class="rwd-actions" data-label="" style="white-space:nowrap;">
          ${canEdit?`<button class="btn btn-ghost btn-sm" onclick="openExEdit('${e.id}')">編輯</button>
            <button class="btn btn-ghost btn-sm" onclick="toggleExActive('${e.id}')">${e.active===false?'啟用':'停用'}</button>
            ${isAdmin?`<button class="btn btn-ghost btn-sm" style="color:var(--danger);" onclick="delExercise('${e.id}')">刪除</button>`:''}`
            :'<span style="font-size:11px;color:var(--t3);">—</span>'}
        </td></tr>`;
    }).join('')}
    </tbody></table>`;
}
async function openExEdit(id){

  let e={id:null,name:'',body_part:TL_BODY_PARTS[0],default_tool:'',default_posture:'',is_custom:true};
  if(id){ try{ e=await dbGet('exercises',id); }catch(_){} if(!e){showToast('找不到動作');return;} }

  if(id && !(isAdmin || (e.is_custom && e.created_by===SESSION.id))){ showToast('只能編輯自己建立的動作'); return; }
  const partOpts=TL_BODY_PARTS.map(p=>`<option value="${p}" ${e.body_part===p?'selected':''}>${p}</option>`).join('');
  const toolOpts=['<option value="">（不指定）</option>',...TL_TOOLS.map(t=>`<option value="${t}" ${e.default_tool===t?'selected':''}>${t}</option>`)].join('');
  const postOpts=['<option value="">（不指定）</option>',...TL_POSTURES.map(p=>`<option value="${p}" ${e.default_posture===p?'selected':''}>${p}</option>`)].join('');
  showModal(`<div class="modal-title">${id?'編輯動作':'新增動作'}</div>

    <div class="form-row"><label>訓練部位 *</label><select id="ex-part">${partOpts}</select></div>
    <div class="form-2col">
      <div class="form-row"><label>預設工具</label><select id="ex-tool">${toolOpts}</select></div>
      <div class="form-row"><label>預設姿勢</label><select id="ex-post">${postOpts}</select></div>
    </div>
    <div class="modal-foot"><button class="btn btn-ghost" onclick="closeModal()">取消</button><button class="btn btn-green" onclick="saveExercise('${id||''}')">儲存</button></div>`);
}
async function saveExercise(id){
  const name=(document.getElementById('ex-name').value||'').trim();
  if(!name){showToast('請輸入動作名稱');return;}
  const part=document.getElementById('ex-part').value;
  const tool=document.getElementById('ex-tool').value;
  const post=document.getElementById('ex-post').value;
  try{
    if(id){
      const e=await dbGet('exercises',id);
      e.name=name; e.body_part=part; e.default_tool=tool||null; e.default_posture=post||null;
      await dbPut('exercises',e);
    }else{
      await dbPut('exercises',{id:uid('EX'),name,body_part:part,default_tool:tool||null,default_posture:post||null,
        is_custom:true,created_by:SESSION.id,active:true,created_at:new Date().toISOString()});
    }
    closeModal(); showToast('已儲存'); renderExdbList();
  }catch(e){ showToast('儲存失敗：'+(e&&e.message?e.message:e)); }
}
async function toggleExActive(id){
  try{
    const e=await dbGet('exercises',id);
    if(!(SESSION.role==='admin'||(e.is_custom&&e.created_by===SESSION.id))){showToast('無權限');return;}
    e.active = e.active===false; // 反轉
    await dbPut('exercises',e);
    showToast(e.active?'已啟用':'已停用'); renderExdbList();
  }catch(e){ showToast('操作失敗：'+(e&&e.message?e.message:e)); }
}
async function delExercise(id){
  if(SESSION.role!=='admin'){showToast('僅管理員可刪除');return;}

// 勾選同意 → 開啟簽名區並初始化簽名板
function toggleSigArea(){
  const on=document.getElementById('ap-agree').checked;
  const area=document.getElementById('ap-sig-area');
  if(!area)return;
  area.style.display=on?'block':'none';
  if(on) setTimeout(initSigPad,50);
}
function initSigPad(){
  const canvas=document.getElementById('ap-sig'); if(!canvas)return;
  const rect=canvas.getBoundingClientRect();
  canvas.width=rect.width*2; canvas.height=rect.height*2;
  const ctx=canvas.getContext('2d'); ctx.scale(2,2); ctx.lineWidth=2; ctx.lineCap='round'; ctx.strokeStyle='#003d32';
  let drawing=false, has=false;
  const pos=e=>{const r=canvas.getBoundingClientRect();const t=e.touches?e.touches[0]:e;return{x:t.clientX-r.left,y:t.clientY-r.top};};
  const start=e=>{drawing=true;has=true;const p=pos(e);ctx.beginPath();ctx.moveTo(p.x,p.y);e.preventDefault();};
  const move=e=>{if(!drawing)return;const p=pos(e);ctx.lineTo(p.x,p.y);ctx.stroke();e.preventDefault();};
  const end=()=>{drawing=false;};
  canvas.addEventListener('pointerdown',start); canvas.addEventListener('pointermove',move);
  canvas.addEventListener('pointerup',end); canvas.addEventListener('pointerleave',end);
  _sigPad={canvas,ctx,hasInk:()=>has,clear:()=>{ctx.clearRect(0,0,canvas.width,canvas.height);has=false;}};
}
function clearSig(){ if(_sigPad)_sigPad.clear(); }
async function submitApply(){
  if(!document.getElementById('ap-agree').checked){showToast('請先閱讀並勾選同意合約內容');return;}
  if(!document.getElementById('ap-health').checked){showToast('請勾選健康聲明確認');return;}
  const g=x=>(document.getElementById(x).value||'').trim();
  const name=g('ap-name'), birth=g('ap-birth'), phone=g('ap-phone'), email=g('ap-email'), ec=g('ap-ec'), ecphone=g('ap-ecphone');
  if(!name||!birth||!phone||!ec||!ecphone){ showToast('請完整填寫會員基本資料（Email 選填）'); return; }
  if(!_sigPad||!_sigPad.hasInk()){showToast('請完成電子簽名');return;}
  const p=await dbGet('course_plans',_applyPlanId);
  const ty=await dbGet('ticket_types',p.ticket_type_id);
  const tot=p.sessions_base+p.sessions_bonus;
  const price=(p.unit_price||0)*p.sessions_base;
  const sig=_sigPad.canvas.toDataURL('image/png');
  let ip=null;
  try{ const r=await fetch('https://api.ipify.org?format=json'); const j=await r.json(); ip=j.ip||null; }catch(_){}
  const signedAt=new Date().toISOString();
  // 回寫會員基本資料（簽約時填的視為最新）
  try{
    const me=await dbGet('members',SESSION.id);
    if(me){ me.name=name; me.birth_date=birth; me.email=email||me.email; me.emergency_name=ec; me.emergency_phone=ecphone; await dbPut('members',me); }
  }catch(_){}
  // 合約快照（存當下購買內容與會員資料，供後台永久查閱、第二批產 PDF）
  const snapshot={
    member:{name,birth_date:birth,phone,email,emergency_name:ec,emergency_phone:ecphone},
    purchase:{plan_name:p.name,course_type:(ty?ty.name:'')+(p.format?'・'+p.format.toUpperCase():''),
      purchase_date:ymd(TODAY),sessions_total:tot,sessions_bonus:p.sessions_bonus||0,
      amount:price,installment:!!p.installment,valid_days:p.valid_days,
      expire_date:ymd(addDays(TODAY,p.valid_days))},
    contract_version:CONTRACT_VERSION, signed_at:signedAt, ip
  };
  const app={id:uid('PA'),member_id:SESSION.id,plan_id:_applyPlanId,plan_name:p.name,
    list_price:price,signature:sig,contract_version:CONTRACT_VERSION,agreed_health:true,ip,
    signed_at:signedAt, contract_snapshot:JSON.stringify(snapshot),
    status:'pending',created_at:new Date().toISOString()};
  try{ await dbPut('purchase_applications',app); }
  catch(e){ showToast('送出失敗：'+(e.message||e)); return; }
  closeModal();showToast('合約已簽署，申請已送出待審核');navTo('mem_tickets');
}

/* ════════ 後台:購買申請審核（發票分流） ════════
   狀態流轉：
   pending（待審核）
     ├─免發票  → completed（已完成）          ＋ 立即發票券（invoice_status=none）
     ├─雲端發票→ invoicing（待開立發票）      → 填發票號 → completed ＋發票券
     ├─紙本發票→ invoicing（待開立發票）      → 填發票號 → completed ＋發票券
     └─取消    → cancelled（已取消）          不發票券
   發放核心統一走 _issueTicketsFromApp()，沿用既有「發票券／算到期日／購買紀錄／異動紀錄／升級會員／通知」邏輯。 */
const APP_INVOICE_LABEL={none:'免發票',cloud:'雲端發票',paper:'紙本發票'};
PAGES.purchase_review=async function(){
  const[apps,members,plans,types]=await Promise.all([dbGetAll('purchase_applications'),dbGetAll('members'),dbGetAll('course_plans'),dbGetAll('ticket_types')]);
  const memMap=Object.fromEntries(members.map(m=>[m.id,m]));
  const planMap=Object.fromEntries(plans.map(p=>[p.id,p]));
  const pending=apps.filter(a=>a.status==='pending').sort((a,b)=>(a.created_at||'').localeCompare(b.created_at||''));
  const invoicing=apps.filter(a=>a.status==='invoicing').sort((a,b)=>(a.reviewed_at||a.created_at||'').localeCompare(b.reviewed_at||b.created_at||''));
  const done=apps.filter(a=>a.status==='completed'||a.status==='cancelled').sort((a,b)=>(b.reviewed_at||b.created_at||'').localeCompare(a.reviewed_at||a.created_at||'')).slice(0,30);
  const APPST={completed:['已完成','tag-ok'],cancelled:['已取消','tag-danger'],invoicing:['待開立發票','tag-warn'],
    approved:['已通過','tag-ok'],rejected:['已拒絕','tag-danger']}; // 後兩者相容舊資料
  const payMethodLabel=m=>({cash:'現金',transfer:'匯款'}[m]||m||'—');
  const metaLine=a=>{
    const bits=[];
    bits.push(`申請 ${(a.created_at||'').replace('T',' ').slice(0,16)}`);
    if(a.payment_method) bits.push('付款：'+payMethodLabel(a.payment_method));
    if(a.installment_count>1) bits.push(`分期 ${a.installment_count} 期`);
    if(a.transfer_last5) bits.push('匯款後五碼 '+a.transfer_last5);
    if(a.invoice_type) bits.push('發票：'+(APP_INVOICE_LABEL[a.invoice_type]||a.invoice_type));
    if(a.invoice_number) bits.push('發票號 '+a.invoice_number);
    if(a.ip) bits.push('IP '+a.ip);

/* ── 發放核心（共用）：建票券→算到期日→購買紀錄→異動紀錄→升級會員→通知 ──
   invoiceStatus：'none' | 'issued'（已開立）；invoiceNumber：發票號（可空）
   回傳建立的 ticket，失敗丟例外。 */
async function _issueTicketsFromApp(a, invoiceStatus, invoiceNumber){
  const plan=await dbGet('course_plans',a.plan_id);
  if(!plan) throw new Error('找不到對應方案，無法發放');
  const total=plan.sessions_base+plan.sessions_bonus;
  const unitPrice=plan.unit_price||0;
  const dealAmount=a.list_price||(unitPrice*plan.sessions_base);
  const t={id:uid('TK'),member_id:a.member_id,ticket_type_id:plan.ticket_type_id,source_plan_id:plan.id,plan_name:plan.name,format:plan.format||null,source:'purchase',
    unit_price:unitPrice,amount_paid:dealAmount,
    purchase_date:ymd(TODAY),start_date:ymd(TODAY),expire_date:ymd(addDays(TODAY,plan.valid_days)),
    sessions_total:total,sessions_remaining:total,status:'usable',
    payment_status:'paid',invoice_status:invoiceStatus||'none',invoice_number:invoiceNumber||null,
    created_at:new Date().toISOString()};
  await dbPut('member_tickets',t);
  await logTicket(t.id,'grant',total,null,SESSION.id,'購買申請通過發放（'+plan.name+'）');
  // 購買紀錄
  try{ await dbPut('purchases',{id:uid('PUR'),member_id:a.member_id,plan_id:plan.id,ticket_id:t.id,plan_name:plan.name,
    list_price:unitPrice*plan.sessions_base,deal_amount:dealAmount,
    payment_method:a.payment_method||null,installment_count:a.installment_count||1,
    invoice_type:a.invoice_type||null,invoice_number:invoiceNumber||null,
    note:'購買申請',operator:SESSION.id,source:'purchase_application',created_at:new Date().toISOString()}); }catch(_){}
  // 新朋友購私教 → 升級會員
  try{ const ty=await dbGet('ticket_types',plan.ticket_type_id);
    if(ty&&ty.category==='私人教練'){const mem=await dbGet('members',a.member_id);if(mem&&(mem.tier==='newbie'||!mem.tier)){mem.tier='regular';await dbPut('members',mem);}} }catch(_){}
  // 通知會員
  try{ await pushNotification(a.member_id,'payment','票券已啟用','您的票券已完成購買並啟用。'); }catch(_){}
  return t;
}

// 免發票 → 直接發券、申請完成；雲端/紙本 → 進入待開立發票
async function appInvoice(id, invoiceType){
  const a=await dbGet('purchase_applications',id);
  if(!a||a.status!=='pending'){showToast('此申請已處理');return;}
  if(invoiceType==='none'){
    try{ await _issueTicketsFromApp(a,'none',null); }
    catch(e){ showToast('發放失敗：'+(e.message||e)); return; }
    a.status='completed'; a.invoice_type='none'; a.invoice_status='none';
    a.reviewed_by=SESSION.id; a.reviewed_at=new Date().toISOString();
    await dbPut('purchase_applications',a);
    showToast('已完成並發放票券（免發票）'); setTkTab('purchase_review');
  }else{
    // 雲端 / 紙本：先進待開立，不發券
    a.status='invoicing'; a.invoice_type=invoiceType;
    a.invoice_status=invoiceType==='cloud'?'cloud_pending':'paper_pending';
    a.reviewed_by=SESSION.id; a.reviewed_at=new Date().toISOString();
    await dbPut('purchase_applications',a);
    showToast(invoiceType==='cloud'?'已轉雲端發票待開立':'已轉紙本發票待開立'); setTkTab('purchase_review');
  }
}
// 完成開立發票 → 填發票號（雲端未來可由 API 自動帶入）→ 發券、申請完成
function appCompleteInvoice(id){
  const a=window._appCache?window._appCache[id]:null;
  const isCloud=a&&a.invoice_type==='cloud';
  showModal(`<div class="modal-title">完成開立發票</div>
    <div style="font-size:12px;color:var(--t2);margin-bottom:12px;">${isCloud?'雲端發票（未來可串接電子發票 API 自動回填號碼）':'紙本發票'}。填入發票號碼後將正式發放票券。</div>
    <div class="form-row"><label>發票號碼（可留空）</label><input id="iv-no" placeholder="例：AB-12345678"></div>
    <div class="modal-foot"><button class="btn btn-ghost" onclick="closeModal()">取消</button><button class="btn btn-green" onclick="confirmCompleteInvoice('${id}')">完成並發券</button></div>`);
}
async function confirmCompleteInvoice(id){
  const a=await dbGet('purchase_applications',id);
  if(!a||a.status!=='invoicing'){showToast('此申請狀態已變更');return;}
  const no=(document.getElementById('iv-no').value||'').trim()||null;
  try{ await _issueTicketsFromApp(a,'issued',no); }
  catch(e){ showToast('發放失敗：'+(e.message||e)); return; }
  a.status='completed'; a.invoice_status='issued'; a.invoice_number=no;
  a.reviewed_at=new Date().toISOString();
  await dbPut('purchase_applications',a);
  showToast('發票已開立，票券已發放'); setTkTab('purchase_review');
}
// 取消申請（pending 或 invoicing 皆可）→ 不發券
function appCancel(id){
  showModal(`<div class="modal-title">取消購買申請</div>
    <div style="font-size:13.5px;padding:6px 0 4px;">確定取消這筆購買申請嗎？</div>
    <div style="font-size:12px;color:var(--t2);margin-top:6px;">取消後狀態改為「已取消」，不會發放票券。</div>
    <div class="form-row" style="margin-top:10px;"><label>取消原因（選填，會顯示給會員）</label><input id="ac-reason" placeholder="選填"></div>
    <div class="modal-foot"><button class="btn btn-ghost" onclick="closeModal()">返回</button><button class="btn btn-danger" onclick="confirmAppCancel('${id}')">確定取消</button></div>`);
}
async function confirmAppCancel(id){
  const a=await dbGet('purchase_applications',id);
  if(!a||(a.status!=='pending'&&a.status!=='invoicing')){showToast('此申請已處理');return;}
  const reason=(document.getElementById('ac-reason').value||'').trim()||null;
  a.status='cancelled'; a.reject_reason=reason; a.reviewed_by=SESSION.id; a.reviewed_at=new Date().toISOString();
  await dbPut('purchase_applications',a);
  try{ if(reason) await pushNotification(a.member_id,'payment','購買申請已取消','您的購買申請已取消。原因：'+reason); }catch(_){}
  showToast('已取消申請'); setTkTab('purchase_review');
}

async function submitInvite(token){
  const v=id=>document.getElementById(id).value.trim();
  const err=document.getElementById('inv-err');
  const req={name:'姓名',nick:'教練名',phone:'手機',email:'Email',pw:'密碼'};
  for(const k in req){if(!v('inv-'+k)){err.textContent=`請填寫${req[k]}`;err.style.display='block';return;}}
  const invBday=readBirthday('inv');
  if(!invBday){err.textContent='請選擇完整生日（年/月/日）';err.style.display='block';return;}
  if(v('inv-pw').length<6){err.textContent='密碼至少需要 6 個字元';err.style.display='block';return;}
  const phone=v('inv-phone');
  // 用 token 直接查那一筆 pending 邀請（配合 token RLS policy，不需撈全表）
  const inv=await dbGetByToken(token);
  if(!inv || inv.invite_status!=='pending'){err.textContent='邀請連結無效或已使用';err.style.display='block';return;}
  const profile={
    name:v('inv-name'),nickname:v('inv-nick'),name_en:v('inv-nick'),phone,email:v('inv-email'),birthday:invBday,
    address:v('inv-addr'),emergency_name:v('inv-econtact'),emergency_phone:v('inv-ephone'),
    id_number:v('inv-idno'),bank_account:v('inv-bank'),
    invite_status:'completed', // 已填寫
    status:'inactive'          // 待管理員啟用
  };
  // 改用前端 signUp 建帳號（與會員相同）：建完會帶 authenticated session，寫入 employees 才能通過 RLS
  const r=await cloudCreateAuth('staff',phone,v('inv-pw'));
  if(r.error){
    const dup=/already|exists|registered/i.test(r.error);
    if(dup){
      // 此手機在 Auth 已存在（多半是先前在 LINE 內建瀏覽器申辦留下的半殘帳號）
      // → 用這次輸入的密碼嘗試登入修復
      const email=toEmail('staff',phone);
      const{data:loginData,error:loginErr}=await sb.auth.signInWithPassword({email,password:v('inv-pw')});
      if(loginErr){
        err.textContent='此手機先前已申辦過。請用「當時設定的密碼」重試一次；若忘記密碼請聯繫管理員協助。';
        err.style.display='block';return;
      }
      const uid=loginData.user.id;
      // 檢查 employees 是否已有完整資料
      const existing=(await sb.from('employees').select('*').eq('auth_id',uid).maybeSingle()).data;
      if(existing){
        try{await sb.auth.signOut();}catch(_){}
        err.textContent='此帳號已申辦完成，請直接以手機與密碼登入。';
        err.style.display='block';return;
      }
      // 半殘帳號（有 Auth、無 employees 資料）→ 用這次填的資料補寫、綁定原帳號
      profile.auth_id=uid;
      Object.assign(inv,profile);
      try{ await dbPut('coaches',inv); }
      catch(e){ err.textContent='員工資料寫入失敗：'+(e.message||e);err.style.display='block';
        try{await sb.auth.signOut();}catch(_){ } return; }
      try{await sb.auth.signOut();}catch(_){}
      // 往下顯示成功畫面
      const host0=document.getElementById('invite-screen');
      host0.innerHTML=`<div class="login-card"><div class="login-logo"><div class="mark">YUGYM</div></div>
        <div style="text-align:center;padding:24px 0;">
          <div style="font-size:40px;margin-bottom:12px;">✓</div>
          <div style="font-size:15px;font-weight:500;margin-bottom:8px;">資料已送出</div>
          <div style="font-size:13px;color:var(--t2);line-height:1.7;">先前未完成的申辦已為您接續完成。<br>待管理員啟用後即可登入。</div>
        </div></div>`;
      return;
    }
    err.textContent='建立帳號失敗：'+r.error;
    err.style.display='block';return;
  }
  profile.auth_id=r.uid;
  Object.assign(inv,profile);
  try{
    await dbPut('coaches',inv);
  }catch(e){
    err.textContent='員工資料寫入失敗：'+(e.message||e);err.style.display='block';
    try{await sb.auth.signOut();}catch(_){ } return;
  }
  // 前端 signUp 建帳號會帶登入 session，寫入後登出，避免申辦者停在登入狀態
  try{await sb.auth.signOut();}catch(_){}
  const host=document.getElementById('invite-screen');
  host.innerHTML=`<div class="login-card"><div class="login-logo"><div class="mark">YUGYM</div></div>
    <div style="text-align:center;padding:24px 0;">
      <div style="font-size:40px;margin-bottom:12px;">✓</div>
      <div style="font-size:15px;font-weight:500;margin-bottom:8px;">資料已送出</div>
      <div style="font-size:12.5px;color:var(--t2);line-height:1.8;">您的帳號已建立。<br>待管理員啟用後，即可用手機號碼登入。</div>
    </div></div>`;
}
/* 櫃台設備帳號：只建帳號+密碼，不存個人資料 */
async function submitDeskInvite(token){
  const v=id=>document.getElementById(id).value.trim();
  const err=document.getElementById('inv-err');
  const name=v('fd-name'), acct=v('fd-phone'), pw=document.getElementById('fd-pw').value;
  if(!name||!acct||!pw){err.textContent='請填寫帳號名稱、登入帳號與密碼';err.style.display='block';return;}
  if(pw.length<6){err.textContent='密碼至少需要 6 個字元';err.style.display='block';return;}
  // 用 token 查那一筆 pending 邀請
  const inv=await dbGetByToken(token);
  if(!inv || inv.invite_status!=='pending'){err.textContent='邀請連結無效或已使用';err.style.display='block';return;}
  const r=await cloudCreateAuth('staff',acct,pw,true); // Edge Function 建帳號，不切換登入身分
  if(r.error){
    const dup=/already|exists|registered/i.test(r.error);
    err.textContent=dup?'此登入帳號已被使用，請改用其他代號':('建立帳號失敗：'+r.error);
    err.style.display='block';return;
  }
  // 設備帳號：只記必要欄位，個人資料留空
  Object.assign(inv,{name,phone:acct,auth_id:r.uid,invite_status:'completed',status:'inactive'});
  try{
    await dbPut('coaches',inv);
  }catch(e){
    err.textContent='櫃台帳號寫入失敗：'+(e.message||e);err.style.display='block';return;
  }
  // Edge Function 建帳號不會切換登入身分，故不需登出
  const host=document.getElementById('invite-screen');
  host.innerHTML=`<div class="login-card"><div class="login-logo"><div class="mark">YUGYM</div></div>
    <div style="text-align:center;padding:24px 0;">
      <div style="font-size:40px;margin-bottom:12px;">✓</div>
      <div style="font-size:15px;font-weight:500;margin-bottom:8px;">櫃台帳號已建立</div>
      <div style="font-size:12.5px;color:var(--t2);line-height:1.8;">待管理員啟用後，即可在店內電腦以帳號 <b>${acct}</b> 登入。</div>
    </div></div>`;
}

/* ── Modal helpers ── */
function showModal(html){
  document.querySelectorAll('.modal-bg').forEach(el=>el.remove()); // 單一彈窗
  const bg=document.createElement('div');bg.className='modal-bg';bg.id='modal-bg';
  bg.innerHTML=`<div class="modal">${html}</div>`;
  let downOnBg=false;
  bg.addEventListener('mousedown',e=>{downOnBg=(e.target===bg);});
  bg.addEventListener('mouseup',e=>{if(downOnBg&&e.target===bg)closeModal();downOnBg=false;});
  document.body.appendChild(bg);
  if(!window._escBound){
    window._escBound=true;
    document.addEventListener('keydown',e=>{ if(e.key==='Escape'&&document.getElementById('modal-bg'))closeModal(); });
  }
}
function closeModal(){const m=document.getElementById('modal-bg');if(m)m.remove();}
// 註冊 PWA service worker（讓網站可加入主畫面、離線可開）
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{ navigator.serviceWorker.register('sw.js').catch(()=>{}); });
}
