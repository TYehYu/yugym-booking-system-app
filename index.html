// 產生分段問候：lead（早安/節日）+ name（名字主體）+ msg（提醒）
function greetingMsg(role, name){
  const now=new Date();
  const hh=now.getHours();
  const mmdd=`${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
  const ymdStr=ymd(now);
  const nm=name||'';
  const isMember=role==='member';

  // 1) 生日
  try{
    const me = isMember ? (window._meMember||null) : (window._meStaff||null);
    const bday = me&&me.birthday ? String(me.birthday).slice(5) : null;
    if(bday && bday===mmdd) return {lead:'🎂 生日快樂', name:nm, msg:'今天是屬於你的日子，YUGYM 陪你一起慶祝。'};
  }catch(_){}

  // 2) 節日
  const fest = FESTIVALS_LUNAR[ymdStr] || FESTIVALS_SOLAR[mmdd];
  if(fest){ return {lead:'🎊 今日', name:nm, msg:fest}; }

  // 時段問候詞
  const timeWord = hh<5?'夜深了':hh<11?'早安':hh<14?'午安':hh<18?'午後好':hh<22?'晚安':'夜深了';

  // 3) 天氣（當作 msg，lead 用時段）
  const w=window._weatherNow;
  let weatherMsg=null;
  if(w){
    const c=w.code, t=w.temp;
    if([61,63,65,80,81,82,51,53,55].includes(c)) weatherMsg=`${w.icon} 今天有雨，記得帶把傘，路上小心。`;
    else if([95,96,99].includes(c)) weatherMsg=`${w.icon} 外面在打雷下雨，注意安全。`;
    else if(t>=32) weatherMsg=`${w.icon} 今天好熱（${t}°C），記得多補水。`;
    else if(t<=14) weatherMsg=`🧥 今天有點冷（${t}°C），多加件外套。`;
  }
  if(weatherMsg) return {lead:timeWord, name:nm, msg:weatherMsg};

  // 4) 時段語氣（依角色）
  let msg;
  if(isMember){
    msg = hh<11?'新的一天，讓身體慢慢醒過來。' : hh<18?'今天有空來練一下嗎？' : '今天也辛苦了，記得好好休息。';
  }else{
    msg = hh<11?'今天也請多多指教。' : hh<18?'陪會員一起加油，記得喝水。' : hh<22?'今天辛苦了，謝謝你的付出。' : '早點休息，明天見。';
  }
  return {lead:timeWord, name:nm, msg};
}

// 取得一張票券所屬的「課程類別」(category)：優先查 ticket_types，再用名稱/字串相容
function ticketCategoryOf(t){
  if(!t) return null;
  const tt=(window._ttCache||[]).find(x=>x.id===t.ticket_type_id);
  if(tt && tt.category) return tt.category;
  // 字串相容（舊資料 ticket_type_id 直接是語意字串）
  const id=t.ticket_type_id||'';
  if(id==='pt'||id==='pt_friendly') return '私人教練';
  if(id==='group') return '小班肌力';
  if(id==='self_training'||id==='self_friendly') return '自主訓練';
  if(id==='trial') return '體驗';
  // 用方案名相容
  const nm=(t.plan_name||'')+(tt?tt.name:'');
  if(nm.indexOf('團體')>=0||nm.indexOf('小班')>=0) return '小班肌力';
  if(nm.indexOf('自主')>=0) return '自主訓練';
  if(nm.indexOf('體驗')>=0) return '體驗';
  if(nm.indexOf('教練')>=0) return '私人教練';
  return null;
}
// 判斷一張票券是否可用於某「課程類別」（同類別即可，不死綁 ticket_type_id）
function ticketMatchesCategory(t, category){
  if(!t||!category) return false;
  const cat=ticketCategoryOf(t);
  if(cat===category) return true;
  // 教練課與體驗在票券上常通用？預設不通用，嚴格比對類別
  return false;
}
// 把一個 ticket_type_id 解析成它代表的課程類別（給呼叫端用 id 時轉換）
function categoryOfTypeId(type_id){
  const tt=(window._ttCache||[]).find(x=>x.id===type_id);
  if(tt && tt.category) return tt.category;
  if(type_id==='pt'||type_id==='pt_friendly') return '私人教練';
  if(type_id==='group') return '小班肌力';
  if(type_id==='self_training'||type_id==='self_friendly') return '自主訓練';
  if(type_id==='trial') return '體驗';
  return null;
}
// 找會員某類型最早到期的可用票券
// 列出會員在某類型、某預約日仍有效（未過期、有剩餘堂數）的所有票券
async function listUsableTickets(member_id,type_id,bookDate){
  const all=await dbGetAll('member_tickets');
  if(!window._ttCache){ try{ window._ttCache=await dbGetAll('ticket_types'); }catch(_){ window._ttCache=[]; } }
  const wantCat=categoryOfTypeId(type_id); // 目標課程類別
  const groupMode = wantCat==='小班肌力';   // 團課：不同方案票券互通（同為團課即可用）
  return all.filter(t=>{
      if(t.member_id!==member_id) return false;
      if(t.status!=='usable' || !(t.sessions_remaining>0)) return false;
      if(bookDate && t.expire_date && t.expire_date<bookDate) return false; // 已過期
      if(groupMode) return ticketCategoryOf(t)==='小班肌力'; // 團課：同類別即可（不分方案）
      return t.ticket_type_id===type_id;                     // 其他類別：維持原本嚴格比對（保留友善/方案區分）
    })
    .sort((a,b)=>(a.expire_date||'').localeCompare(b.expire_date||''));
}
async function findUsableTicket(member_id,type_id,bookDate){
  const cand=await listUsableTickets(member_id,type_id,bookDate);
  return cand[0]||null;
}

// 計算各票券「已使用（已簽到/已完成）」堂數 → { ticket_id: count }
//  用途：會員詳細／會員端票券顯示「未使用堂數 = 總堂數 − 已使用」，
//  讓「已預約但尚未上課」仍計為未使用，避免會員誤以為堂數已用完。
function usedSessionsMap(bookings){
  const map={};
  (bookings||[]).forEach(b=>{
    if(!b||!b.ticket_id) return;
    if(b.status==='checked_in'||b.status==='completed'){
      map[b.ticket_id]=(map[b.ticket_id]||0)+1;
    }
  });
  return map;
}
// 單張票券未使用堂數 = 總堂數 − 已簽到/完成；下限 0
//  防呆：以「真實剩餘(sessions_remaining) + 已預約未上」為上限，
//  避免預約資料缺漏（如預約被刪、只剩扣課紀錄）時，未使用堂數被高估。
//  bookedCount：該票券「已預約但尚未上課」的堂數（可選；未傳則不套用上限）。
function ticketUnused(t,usedMap,bookedCount){
  const used=(usedMap&&usedMap[t.id])||0;
  let unused=Math.max(0,(t.sessions_total||0)-used);
  if(bookedCount!=null){
    const cap=Math.max(0,(t.sessions_remaining||0))+Math.max(0,bookedCount);
    unused=Math.min(unused, cap);
  }
  return unused;
}
// 扣一堂
async function deductTicket(ticket,booking_id,operator){
  ticket.sessions_remaining-=1;
  if(ticket.sessions_remaining<=0) ticket.status='used_up';
  await dbPut('member_tickets',ticket);
  await logTicket(ticket.id,'deduct',-1,booking_id,operator,'預約扣課');
}
// 退一堂
async function refundTicket(ticket_id,booking_id,operator){
  const t=await dbGet('member_tickets',ticket_id);
  if(!t)return;
  t.sessions_remaining+=1;
  if(t.status==='used_up'&&t.sessions_remaining>0) t.status='usable';
  await dbPut('member_tickets',t);
  await logTicket(ticket_id,'refund',1,booking_id,operator,'取消退課');
}
// 一鍵補發補課券：綁原課同類型，1 堂，效期 14 天，source='makeup'
async function grantMakeupTicket(booking){
  if(!booking||!booking.member_id){ showToast('此預約無綁定會員，無法補發'); return; }
  // 找原課同類型的票券種類 id（優先用原 booking 的 ticket_type_id，否則依 category 找）
  let type_id=booking.ticket_type_id||null, planName='補課券';
  try{
    if(!window._ttCache) window._ttCache=await dbGetAll('ticket_types');
    if(type_id){
      const tt=window._ttCache.find(t=>t.id===type_id);
      if(tt) planName=`${tt.name}・補課券`;
    }else{
      const tt=window._ttCache.find(t=>t.category===booking.category);
      if(tt){ type_id=tt.id; planName=`${tt.name}・補課券`; }
    }
  }catch(_){}
  const today=ymd(TODAY);
  // 自主訓練類補課券效期 7 天，其他 14 天
  const catName=booking.category||'';
  const isSelf=catName.includes('自主')||(planName&&planName.includes('自主'));
  const makeupDays=isSelf?7:14;
  const expire=ymd(addDays(TODAY,makeupDays));
  const tk={ id:uid('TK'), member_id:booking.member_id, ticket_type_id:type_id,
    source_plan_id:null, plan_name:planName, format:booking.format||null,
    source:'makeup', purchase_date:today, start_date:today, expire_date:expire,
    sessions_total:1, sessions_remaining:1, status:'usable',
    payment_status:'paid', invoice_status:'none',
    makeup_for_booking:booking.id||null, created_at:new Date().toISOString() };
  await dbPut('member_tickets',tk);
  await logTicket(tk.id,'grant',1,booking.id||null,SESSION.id,'補發補課券');
  if(booking.id){ try{ const b=await dbGet('bookings',booking.id); if(b){ b.makeup_granted=true; await dbPut('bookings',b); } }catch(_){} }
  return tk;
}

  };
  const sumCard=(iconKey,label,value,sub,gkey)=>`
    <div class="dash-sum-card"${gkey?` onclick="selectGroup('${gkey}')" style="cursor:pointer;"`:''}>
      <div class="dsc-ic">${ICONS[iconKey]||''}</div>
      <div class="dsc-body">

  const summary=`<div class="dash-summary">
    ${sumCard('cal','今日課堂',classCount+' 堂','','g_booking')}
    ${sumCard('people','今日會員',memberCount+' 人','','g_member')}
    ${sumCard('coin','今日營收','$'+dayRevenue.toLocaleString(),'','g_finance')}
    ${sumCard('check','今日完成率',doneCount+' / '+classCount,rate+'%','g_booking')}
  </div>`;

  // ── 第二區：今日教練任務（時間軸甘特圖）──
  const memMap=Object.fromEntries(members.map(m=>[m.id,m]));
  const typeMap=Object.fromEntries((types||[]).map(t=>[t.id,t]));
  const coachable=coaches.filter(c=>(c.role==='coach'||c.role==='admin') && c.status!=='inactive' && c.status!=='resigned');
  const dayShifts=(shifts||[]).filter(s=>s.date===date);
  // 時間軸：08:00–22:00
  const AXIS_START=8*60, AXIS_END=22*60, AXIS_SPAN=AXIS_END-AXIS_START;
  const pctOf=min=>Math.max(0,Math.min(100,(min-AXIS_START)/AXIS_SPAN*100));
  const hours=[]; for(let h=8;h<=22;h++) hours.push(h);
  const nowPct = (nowMin>=AXIS_START&&nowMin<=AXIS_END)? pctOf(nowMin) : null;
  const ORDER={live:1, resting:2, waiting:3, done:4, duty:5, waitduty:6, off:7, leave:8};
  const catName={'ev-pt':'教練課','ev-friendly':'友善課','ev-group':'團體課','ev-trial':'體驗課','ev-self':'自主訓練'};
  const catColor={'ev-pt':'#1f6f54','ev-friendly':'#23508a','ev-group':'#9a5a1e','ev-trial':'#6e3a86','ev-self':'#6a655c'};

  const rows=coachable.map(c=>{
    const myBk=dayBkAll.filter(b=>b.coach_id===c.id).sort((a,b)=>(a.start_time||'').localeCompare(b.start_time||''));
    const myShift=dayShifts.find(s=>s.emp_id===c.id);

    const hasDuty=myShift&&!onLeave&&myShift.start_time&&myShift.end_time;
    const activeBk=myBk.filter(b=>!isCancelled(b));
    // 只顯示「今天有課 或 有值班（含請假）」的教練
    if(!activeBk.length && !myShift) return null;

    const total=activeBk.length, done=activeBk.filter(isDone).length;
    const pct=total?Math.round(done/total*100):0;
    const nextBk=activeBk.find(b=>timeToMin(b.start_time||'0:0')>nowMin && !isDone(b));
    const inClass=activeBk.find(b=>{const s=timeToMin(b.start_time||'0:0');return nowMin>=s && nowMin<s+60 && !isDone(b);});
    const onDuty = hasDuty && nowMin>=timeToMin(myShift.start_time) && nowMin<timeToMin(myShift.end_time);
    // 狀態
    let stKey,stIcon,stText;
    if(onLeave){ stKey='leave'; stIcon='📅'; stText='請假中'; }
    else if(total===0){
      // 無課：依真實時間判斷值班狀態
      if(hasDuty && onDuty){ stKey='duty'; stIcon='🟠'; stText='值班中'; }

    }
    else if(done===total){ stKey='done'; stIcon='✅'; stText='已完成'; }
    else if(inClass){ stKey='live'; stIcon='🟢'; stText='授課中'; }
    else if(nextBk){ stKey= done>0?'resting':'waiting'; stIcon= done>0?'🟡':'⏳'; stText= done>0?'休息中':'待開始'; }
    else { stKey='done'; stIcon='✅'; stText='已完成'; }
    // 下一堂
    const nextTime = nextBk ? nextBk.start_time : '—';
    const nextMem = nextBk ? (nextBk.member_id?(memMap[nextBk.member_id]?memMap[nextBk.member_id].name:'')

    // 值班色條（代表整個值班時段；時間看軸即可，標籤不重複顯示時間）
    const dutyBar = hasDuty
      ? `<div class="tl-duty${onDuty?' now':''}" style="left:${pctOf(timeToMin(myShift.start_time))}%;width:${pctOf(timeToMin(myShift.end_time))-pctOf(timeToMin(myShift.start_time))}%;" title="值班 ${myShift.start_time}–${myShift.end_time}">
           <span class="tl-duty-lbl">🗓 值班</span></div>`
      : '';
    // 請假整條
    const leaveBar = onLeave
      ? `<div class="tl-leave">請假（全天）</div>` : '';
    // 課程圓點
    const dots = drawBk.map(b=>{
      const cc=evColorClass(b,typeMap); const col=catColor[cc]||'#1f6f54';
      const smin=timeToMin(b.start_time||'0:0');
      const nm = b.member_id?(memMap[b.member_id]?memMap[b.member_id].name:'—')
               : (Array.isArray(b.member_ids)&&b.member_ids.length?`團課 ${b.member_ids.length} 人`:'—');
      let dotStyle,cls='';
      if(isCancelled(b)){ dotStyle=`background:#c0392b;`; cls='td-cancel'; }
      else if(isDone(b)){ dotStyle=`background:${col};`; }        // 已完成：實心
      else if(inClass && b===inClass){ dotStyle=`background:#fff;border:3px solid ${col};`; cls='td-live'; } // 進行中：空心色環
      else { dotStyle=`background:#fff;border:2px solid #c9c2b4;`; }  // 待開始：空心灰
      return `<div class="tl-dot-wrap" style="left:${pctOf(smin)}%;">
        <div class="tl-dot-time">${b.start_time||''}</div>
        <div class="tl-dot" style="${dotStyle}" title="${b.start_time} ${catName[cc]||''}｜${nm}${isCancelled(b)?'（已取消）':''}"></div>
        <div class="tl-dot-mem">${nm}</div>
      </div>`;
    }).join('');
    const emptyLbl = (!drawBk.length && !hasDuty && !onLeave)
      ? `<div class="tl-empty">🌙 今日無課</div>` : '';
    return { order:ORDER[stKey], isSelf:(c.id===SESSION.id), html:
      `<div class="tl-row">
        <div class="tl-coach">
          <span class="tl-ava">${coachAva(c)}</span>
          <span class="tl-cname">${coachDisp(c)}${c.id===SESSION.id?'<span class="tl-me">我</span>':''}</span>
        </div>

        <div class="tl-prog"><div class="tl-count">${done} / ${total}</div><div class="tl-bar"><div class="tl-bar-fill${(stKey==='leave')?' muted':''}" style="width:${pct}%;"></div></div></div>
        <div class="tl-status"><span class="cpl-st ${stKey}">${stIcon} ${stText}</span></div>
        <div class="tl-next">${nextTime!=='—'?`<b>${nextTime}</b>${nextMem?`<span class="tl-next-mem">${nextMem}</span>`:''}`:'—'}</div>
      </div>`
    };
  }).filter(Boolean);
  rows.sort((a,b)=> (b.isSelf-a.isSelf) || (a.order-b.order));

  const legend=`<div class="tl-legend">
    <span class="tl-lg"><i class="tl-lg-dot" style="background:#1f6f54;"></i>教練課</span>

  const nowLine = nowPct!=null

  const coachSection = rows.length
    ? `<div class="tl-panel">
        <div class="tl-panel-top"><div class="tl-title">👨‍🏫 今日教練任務</div>${legend}</div>

        <div class="tl-body">${rows.map(r=>r.html).join('')}</div>
      </div>`
    : `<div class="empty" style="padding:40px;text-align:center;color:var(--t3);">今日沒有課程或值班安排</div>`;

  C.innerHTML=`
    <div class="page-head"><div class="ph-ey">DASHBOARD</div><h1>儀表板</h1><div class="ph-sub">${date.slice(5).replace('-','/')}（${WD[TODAY.getDay()]}）　·　今日營運指揮中心</div></div>
    <div class="dash-sec-label">今日概況</div>
    ${summary}
    <div style="margin-top:28px;"></div>
    ${coachSection}
  `;
};

// 營運中心分頁切換：點同一個收合，點不同切換；一次只顯示一個
function opsTab(tab){
  const panel=document.getElementById('ops-tab-panel'); if(!panel)return;
  const bodies=document.querySelectorAll('.ops-tab-body');
  const tabs=document.querySelectorAll('.ops-tab');
  const target=document.getElementById('ops-tab-'+tab);
  const curTab=document.querySelector(`.ops-tab[data-tab="${tab}"]`);
  const isOpen = panel.style.display!=='none' && target && target.style.display!=='none';
  if(isOpen){ // 再點同一個 → 收合
    panel.style.display='none';
    bodies.forEach(b=>b.style.display='none');
    tabs.forEach(t=>t.classList.remove('ops-tab-active'));
    return;
  }
  panel.style.display='block';
  bodies.forEach(b=>b.style.display='none');
  if(target) target.style.display='block';
  tabs.forEach(t=>t.classList.remove('ops-tab-active'));
  if(curTab) curTab.classList.add('ops-tab-active');
}

/* ════════ 管理員:營運分析（統計報表） ════════ */
let _dashRange='month'; // 'month' | 'today'
PAGES.dashboard=async function(){
  const[members,coaches,tickets,bookings,plans,types]=await Promise.all([
    dbGetAll('members'),dbGetAll('coaches'),dbGetAll('member_tickets'),dbGetAll('bookings'),dbGetAll('course_plans'),dbGetAll('ticket_types')]);
  const coachMap=Object.fromEntries(coaches.map(c=>[c.id,coachDisp(c)]));
  const memMap=Object.fromEntries(members.map(m=>[m.id,m.name]));
  const planMap=Object.fromEntries(plans.map(p=>[p.id,p]));
  const typeMap=Object.fromEntries(types.map(t=>[t.id,t]));

  // 區間判斷
  const today=ymd(TODAY);
  const ym=today.slice(0,7); // YYYY-MM
  const inRange=(dateStr)=> _dashRange==='today' ? dateStr===today : (dateStr||'').slice(0,7)===ym;
  const rangeLabel=_dashRange==='today'?`今日（${today}）`:`本月（${ym}）`;

  // ── 營收：發票券金額（purchase_date 在區間內）──
  const revTickets=tickets.filter(t=>t.source==='purchase'&&inRange(t.purchase_date));
  const revenue=revTickets.reduce((s,t)=>s+(t.amount_paid||0),0);

  // ── 已使用課堂費用：本期銷課（已完成/已簽到的預約）× 該票券單堂價 ──
  const usedBk=bookings.filter(b=>inRange(b.date)&&(b.status==='completed'||b.status==='checked_in'));
  let usedFee=0;
  for(const b of usedBk){
    const tk=tickets.find(t=>t.id===b.ticket_id);
    usedFee+=(tk&&tk.unit_price)?tk.unit_price:0;
  }

  // ── 課堂數 ──
  const rangeBk=bookings.filter(b=>inRange(b.date)&&b.status!=='cancelled');
  const classCount=rangeBk.length;
  const doneCount=rangeBk.filter(b=>b.status==='completed'||b.status==='checked_in').length;

  // ── 各教練課堂數 ──
  const byCoach={};
  rangeBk.forEach(b=>{const k=b.substitute_coach_id||b.coach_id||'_none';byCoach[k]=(byCoach[k]||0)+1;}); // 有代課算代課教練
  const coachRows=Object.entries(byCoach).sort((a,b)=>b[1]-a[1])
    .map(([cid,n])=>({name:cid==='_none'?'（無教練）':(coachMap[cid]||'—'),n}));

  // ── 課程營收：本期銷課（已完成/簽到的課）依方案分組，算銷課堂數與銷課金額 ──
  const byPlan={};
  usedBk.forEach(b=>{
    const tk=tickets.find(t=>t.id===b.ticket_id);
    const name=(tk&&tk.plan_name)||b.category||'—';
    const fee=(tk&&tk.unit_price)?tk.unit_price:0;
    byPlan[name]=byPlan[name]||{amount:0,used:0};
    byPlan[name].used+=1;          // 銷課堂數
    byPlan[name].amount+=fee;      // 銷課金額（單堂價加總）
  });
  const planRows=Object.entries(byPlan)
    .map(([name,d])=>({name,...d}))
    .sort((a,b)=>b.amount-a.amount||b.used-a.used); // 依銷課金額由高到低

  const fmtNT=(n)=>'$'+(n||0).toLocaleString();

  // ── 員工表現（手機版營運速覽）──
  // 載入本月出勤工時
  let attAll=[];
  try{ attAll=await dbGetAll('attendance'); }catch(_){}
  const perfRows=coaches.filter(c=>c.role!=='front_desk'&&isCoachable(c)).map(c=>{
    const myBk=rangeBk.filter(b=>(b.substitute_coach_id||b.coach_id)===c.id);
    const ptCount=myBk.filter(b=>b.category==='私人教練'||b.category==='體驗').length;
    const groupCount=myBk.filter(b=>b.category==='小班肌力').length;
    // 業績營收：該教練負責、已銷課的單堂金額加總
    let rev=0;
    myBk.filter(b=>b.status==='completed'||b.status==='checked_in').forEach(b=>{
      const tk=tickets.find(t=>t.id===b.ticket_id);
      rev+=(tk&&tk.unit_price)?tk.unit_price:0;
    });
    // 上班時數（依上方「今日／本月」範圍；需打卡者才有出勤紀錄）
    const hours=attAll.filter(a=>a.emp_id===c.id&&inRange(a.date))
      .reduce((s,r)=>s+(calcWorkHours(r)||0),0);
    return {name:coachDisp(c),rev,ptCount,groupCount,hours,need_punch:!!c.need_punch};
  }).filter(r=>r.rev>0||r.ptCount>0||r.groupCount>0||r.hours>0)
    .sort((a,b)=>b.ptCount-a.ptCount||b.rev-a.rev); // 預設依教練課堂數由高到低

  C.innerHTML=head('ANALYTICS','營運分析','統計報表 · 營收 / 教練 / 團課 / KPI')+
  `<div class="filter-row" style="margin-bottom:18px;">
    <div class="seg">
      <button class="seg-btn ${_dashRange==='month'?'active':''}" onclick="_dashRange='month';navTo('dashboard')">本月</button>
      <button class="seg-btn ${_dashRange==='today'?'active':''}" onclick="_dashRange='today';navTo('dashboard')">今日</button>
    </div>
    <span style="font-size:12.5px;color:var(--t2);">${rangeLabel}</span>
  </div>

  <!-- ═══ 手機版：營運速覽 ═══ -->
  <div class="mobile-only">
    <div class="card" style="padding:4px 14px;">
      <div style="font-size:11.5px;color:var(--t3);letter-spacing:0.08em;padding:12px 0 4px;font-weight:600;">本月總覽</div>
      <div class="ov-row"><span class="ov-label">本月營收</span><span class="ov-val">${fmtNT(revenue)}</span></div>
      <div class="ov-row"><span class="ov-label">本月課堂數</span><span class="ov-val">${classCount} 堂</span></div>
      <div class="ov-row"><span class="ov-label">本月銷課金額</span><span class="ov-val" style="color:var(--gold-d);">${fmtNT(usedFee)}</span></div>
      <div class="ov-row"><span class="ov-label">本月銷課堂數</span><span class="ov-val">${doneCount} 堂</span></div>
    </div>
    <div class="card">
      <div class="card-title">員工表現</div>
      ${perfRows.length===0?'<div class="empty"><div class="em-t">本期無資料</div></div>':
      `<div class="perf-m">
        <div class="perf-m-head">
          <span>姓名</span><span>營收</span><span>教練課</span><span>團體課</span><span>工時</span>
        </div>
        ${perfRows.map(r=>`<div class="perf-m-row">
          <span class="perf-m-name">${r.name}</span>
          <span style="color:var(--green);font-weight:600;">${fmtNT(r.rev)}</span>
          <span>${r.ptCount}</span>
          <span>${r.groupCount}</span>
          <span>${r.need_punch?r.hours.toFixed(1):'—'}</span>
        </div>`).join('')}
      </div>`}
    </div>
  </div>

  <!-- ═══ 桌機版：分析報表 ═══ -->
  <div class="desktop-only">
  <div class="stat-grid dash-summary">
    <div class="stat-card"><div class="sc-label">營收</div><div><span class="sc-num" style="font-size:28px;">${fmtNT(revenue)}</span></div></div>
    <div class="stat-card"><div class="sc-label">銷課數</div><div><span class="sc-num">${doneCount}</span><span class="sc-unit">堂</span></div></div>
    <div class="stat-card"><div class="sc-label">銷課金額</div><div><span class="sc-num" style="font-size:28px;color:var(--gold-d);">${fmtNT(usedFee)}</span></div></div>
  </div>
  <div class="card"><div class="card-title">員工表現</div>
    ${perfRows.length===0?'<div class="empty"><div class="em-t">本期無資料</div></div>':
    `<table><thead><tr><th>姓名</th><th>營收</th><th>教練課</th><th>團體課</th><th>上班時數</th></tr></thead><tbody>
    ${perfRows.map(r=>`<tr><td style="font-weight:500;">${r.name}</td><td class="num" style="color:var(--green);font-weight:600;">${fmtNT(r.rev)}</td><td class="num">${r.ptCount} 堂</td><td class="num">${r.groupCount} 堂</td><td class="num">${r.need_punch?r.hours.toFixed(1)+' hr':'—'}</td></tr>`).join('')}
    </tbody></table>`}
  </div>
  <div class="dash-grid dash-2col">
    <div class="card"><div class="card-title">各教練課堂數</div>
      ${coachRows.length===0?'<div class="empty"><div class="em-t">本期無課堂</div></div>':
      coachRows.map(r=>{const pct=classCount?Math.round(r.n/classCount*100):0;return `<div style="padding:8px 0;border-bottom:1px solid var(--bd2);">
        <div style="display:flex;justify-content:space-between;align-items:baseline;gap:10px;"><span style="font-weight:500;">${r.name}</span><span style="font-size:13px;color:var(--t2);white-space:nowrap;">${r.n} 堂｜${pct}%</span></div>
        <div style="height:5px;background:var(--card2);border-radius:3px;overflow:hidden;margin-top:5px;"><div style="height:100%;width:${pct}%;background:var(--green);"></div></div>

    <div class="card"><div class="card-title">課程營收（當月最賺）</div>
      ${planRows.length===0?'<div class="empty"><div class="em-t">本期無銷課</div></div>':
      (()=>{const maxAmt=Math.max(...planRows.map(r=>r.amount),1);return planRows.map(r=>{const pct=Math.round(r.amount/maxAmt*100);return `<div style="padding:9px 0;border-bottom:1px solid var(--bd2);">
        <div style="display:flex;justify-content:space-between;align-items:baseline;gap:10px;margin-bottom:3px;"><span style="font-weight:500;">${r.name}</span><span style="font-size:13px;color:var(--green);font-weight:600;white-space:nowrap;">${fmtNT(r.amount)}</span></div>
        <div style="font-size:12px;color:var(--t3);margin-bottom:5px;">課堂 ${r.used}｜金額 ${fmtNT(r.amount)}</div>
        <div style="height:5px;background:var(--card2);border-radius:3px;overflow:hidden;"><div style="height:100%;width:${pct}%;background:var(--green);"></div></div>
      </div>`;}).join('');})()}
    </div>

};
function typeOfCat(cat){return {'私人教練':'pt','小班肌力':'group','自主訓練':'self_training','體驗':'trial'}[cat]||'pt';}
/* ── 行事曆隱私：教練身分看「別人的課」時，隱藏會員姓名（改顯示課程類型）、灰階呈現 ──
   只對 role==='coach' 生效；管理員 / 後台帳號正常看全部。
   「自己的課」＝ 授課教練（含代課）是登入者本人。 */
function bkIsMasked(b){
  if(!SESSION || SESSION.role!=='coach') return false; // 非教練不遮蔽
  if(b.category==='小班肌力') return false;             // 團體課本就不顯示會員名
  const acting = b.substitute_coach_id || b.coach_id;
  return acting !== SESSION.id;                          // 不是我帶的 → 遮蔽
}
// 取得行事曆上應顯示的名稱（遮蔽時回課程類型，如「教練課」「自主訓練」）
function bkDisplayName(b, realName){
  if(bkIsMasked(b)){
    return {'私人教練':'教練課','自主訓練':'自主訓練','體驗':'體驗','小班肌力':'團體課'}[b.category] || '課程';
  }
  return realName;
}

/* ════════ 共用:行事曆（30 分鐘格、可拖曳/拉伸/跨日） ════════ */
let calWeekStart=null;
let _calDays=null; // null=自動(依寬度) ; 7/3/1=手動覆蓋
function autoCalDays(){ const w=window.innerWidth; return w>=1100?7:(w>=680?3:1); }
function effCalDays(){ return _calDays||autoCalDays(); }
const CAL_START_H=8, CAL_END_H=22, SLOT_MIN=30, SLOT_PX=34; // 每 30 分 = 34px（容納三列卡片）
function initCalWeek(){const d=new Date(TODAY);const dow=d.getDay();calWeekStart=addDays(d,-((dow+6)%7));} // 週一起
function calToToday(){
  // 「回今天」：7 日檢視維持週一起；3/1 日檢視以今天當第一欄
  if(effCalDays()===7){ initCalWeek(); }
  else { const d=new Date(TODAY); calWeekStart=new Date(d.getFullYear(),d.getMonth(),d.getDate()); }
}
function timeToMin(t){const[h,m]=t.split(':').map(Number);return h*60+m;}
function minToTime(min){const h=Math.floor(min/60),m=min%60;return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0');}
function isMobileView(){return window.innerWidth<=820;}

let _calOpts=null;
async function renderCalendar(opts){
  // opts: {coachFilter(bool), onSlot(fnName), me(coach_id), editable(bool), _data(預先抓好的資料，避免重複) }
  _calOpts=opts;
  if(!calWeekStart)initCalWeek();
  // 若呼叫端已抓好資料（_data），直接沿用避免重複向雲端要同一批表；否則自行抓取
  let bookings,coaches,members,types,allTickets;
  if(opts&&opts._data){
    ({bookings,coaches,members,types,allTickets}=opts._data);
  }else{
    // 效能優化：coaches / members / ticket_types 很少變動 → 首次抓取後快取（60 秒內），切週時沿用，
    // 只有 bookings / member_tickets 每次重抓（會新增/異動）。大幅減少切週的等待時間。
    const cacheFresh = window._calStaticCache && (Date.now()-window._calStaticCache._t < 60000);
    const useCache = window._calStepping && cacheFresh;
    if(useCache){
      ({coaches,members,types}=window._calStaticCache);
      [bookings,allTickets]=await Promise.all([dbGetAll('bookings'),dbGetAll('member_tickets')]);
    }else{
      [bookings,coaches,members,types,allTickets]=await Promise.all([dbGetAll('bookings'),dbGetAll('coaches'),dbGetAll('members'),dbGetAll('ticket_types'),dbGetAll('member_tickets')]);
      window._calStaticCache={coaches,members,types,_t:Date.now()};
    }
  }
  const coachMap=Object.fromEntries(coaches.map(c=>[c.id,coachDisp(c)]));
  const memMap=Object.fromEntries(members.map(m=>[m.id,m.name]));
  const typeMap=Object.fromEntries(types.map(t=>[t.id,t]));

  // 同步全域快取，讓 bkCC / bookingTypeName 的舊資料友善回退（種類名稱、票券 plan_name）可靠
  window._ttCache=types;
  window._allTkCache=allTickets;
  const nDays=effCalDays();
  const days=[];for(let i=0;i<nDays;i++)days.push(addDays(calWeekStart,i));

    if(opts.me && !opts.allMode && !opts.maskOthers && (b.substitute_coach_id||b.coach_id)!==opts.me) return false;
    if(opts.coachFilter && filterCoach!=='all' && b.coach_id!==filterCoach) return false;

  });

  let filterHtml='';

  const totalSlots=(CAL_END_H-CAL_START_H)*2;

  // 每天一欄
  let daysHtml='';
  days.forEach((d,di)=>{
    const ds=ymd(d), isToday=ds===ymd(TODAY), isPast=ds<ymd(TODAY);
    // 半小時格(可點擊新增)

    for(let s=0;s<totalSlots;s++){

      const t=minToTime(min);
      const hourline=((min+SLOT_MIN)%60===0)?'hourline':'';
      const click=opts.onSlot?`onclick="${opts.onSlot}('${ds}','${t}')"`:'';
      halves+=`<div class="cal-half ${hourline}" ${click}></div>`;
    }
    // 該天事件,絕對定位
    const dayEvs=visible.filter(b=>b.date===ds);
    // 同一天同時段並排:簡單分欄
    const lanes=assignLanes(dayEvs);
    let evHtml='';
    dayEvs.forEach(b=>{
      const startMin=timeToMin(b.start_time)-CAL_START_H*60;
      const top=(startMin/SLOT_MIN)*SLOT_PX;
      const h=((b.duration||60)/SLOT_MIN)*SLOT_PX;
      const lane=lanes[b.id]||{idx:0,total:1};
      const wpct=100/lane.total;
      const editable=opts.editable && !opts.allMode && b.status!=='cancelled' && b.status!=='completed' && b.date>=ymd(TODAY) && (!opts.me || b.coach_id===opts.me);
      const cls=evColorClass(b,typeMap);
      const tk=b.ticket_id?ticketMap[b.ticket_id]:null;
      const remain = tk ? `${tk.sessions_remaining}/${tk.sessions_total}` : '';
      const coachName=b.coach_id?coachMap[b.coach_id]:'';
      const subCoachName=b.substitute_coach_id?coachMap[b.substitute_coach_id]:'';
      const typeName=bookingTypeName(b,typeMap);
      // 顯示名稱：團體課=多會員、體驗課=客戶名、一般=單一會員
      // 教練端（opts.me）：自己的課顯示會員名；別人的課顯示課程種類（隱私）
      let memName;
      const gIds=mids(b);
      const acting=b.substitute_coach_id||b.coach_id;
      const isMine = opts.me && acting===opts.me;
      // 教練端（含全部預約模式）：自己的課顯示會員名；別的教練的課隱藏會員名
      const hideMember = (opts.me && !isMine) || bkIsMasked(b);
      if(hideMember){
        // 別的教練的課：隱藏會員名，顯示課程類型（如「教練課」「自主訓練」）
        memName = {'私人教練':'教練課','自主訓練':'自主訓練','體驗':'體驗','小班肌力':'團體課'}[b.category] || typeName;
      }else if(b.category==='體驗'){
        memName=(b.trial_name?b.trial_name+'（體驗）':'體驗客戶');
      }else if(b.category==='小班肌力'){
        const names=gIds.map(id=>memMap[id]).filter(Boolean);

        memName=memMap[b.member_id]||'—';

      // 同時段 3 張以上 → 考慮改直式；但若每張卡夠寬（視窗大），仍維持橫式完整資訊
      const colW = (window.innerWidth - 80) / Math.max(nDays,1); // 每日欄約略寬度
      const cardW = colW / lane.total; // 同時段均分後每張卡寬度
      const mobile7 = window.innerWidth<=600 && nDays===7; // 手機七日 → 一律色塊（直書單名）
      const dense = mobile7 || (lane.total>=3 && cardW < 96); // 每張 < 96px 才縮成直式
      // 直式窄卡的精簡名稱：教練端非自己的課顯示種類；體驗=純客戶名、團課=第一人（人數）、一般=會員名
      let denseName;
      if(hideMember){
        const actingName = subCoachName || coachName;

      }else if(b.category==='體驗'){

        const gHeads=(Array.isArray(b.member_ids)&&b.member_ids.length)?b.member_ids.length:(b.member_id?1:0);
        const gCoach=subCoachName||coachName||'團課';
        denseName = gHeads>0 ? `${gCoach}<span class="dn-cnt">${gHeads}</span>` : gCoach;
      }else{
        denseName = memMap[b.member_id]||'—';
      }
      // hover 詳細資訊卡（滑過仍可看到完整狀態）
      const tip = hideMember ? `<div class="ev-tip">

      </div>` : `<div class="ev-tip">
        <div class="ev-tip-h"><b>${memName}</b><span>${b.start_time}–${minToTime(timeToMin(b.start_time)+(b.duration||60))}</span></div>
        <div class="ev-tip-r">${typeName}${b.format?' · '+b.format:''}</div>
        ${coachName?`<div class="ev-tip-r">教練：${coachName}${subCoachName?`　→ 代課：${subCoachName}`:''}</div>`:''}
        ${tk?`<div class="ev-tip-tk">${tk.plan_name||'票券'}　剩 ${remain}　<span style="opacity:.7;">效期至 ${tk.expire_date}</span></div>`:''}
        <div class="ev-tip-s">${statusLabel(b.status)}</div>
      </div>`;
      const tipUp = timeToMin(b.start_time) >= (CAL_END_H-3)*60; // 接近底部 → 提示往上展開避免被切
      evHtml+=`<div class="cal-ev ${cls} ${editable?'':'readonly'} ${dense?'ev-dense':''} ${tipUp?'tip-up':''} ${hideMember?'bk-masked':''}" data-bid="${b.id}" data-time="${b.start_time}"
        style="top:${top}px;height:${Math.max(h-2,64)}px;left:calc(${lane.idx*wpct}% + 3px);width:calc(${wpct}% - 6px);"
        ${editable?`onclick="onEvClick(event,'${b.id}')"`:(opts.allMode||bkIsMasked(b)?'':`onclick="openBookingDetail('${b.id}')"`)}>
        ${dense
          ? `<div class="ev-dense-name">${denseName}</div>`
          : ( b.category==='小班肌力'
              ? (()=>{ const gHeads=(Array.isArray(b.member_ids)&&b.member_ids.length)?b.member_ids.length:(b.member_id?1:0);
                       const gCoach=subCoachName?subCoachName+'（代）':(coachName||'團課');
                       return `<div class="ev-time">${b.start_time}</div><div class="ev-t">${gCoach}</div><div class="ev-m">${gHeads>0?gHeads+' 人':'團課'}</div>`; })()
              : `<div class="ev-time">${b.start_time}</div><div class="ev-t">${memName}</div><div class="ev-m">${hideMember?typeName:(subCoachName?subCoachName+'（代）':(coachName||typeName))}</div>` )}
        ${tip}
      </div>`;
    });
    daysHtml+=`<div class="cal-daycol ${isPast?'col-past':''}" data-date="${ds}">
      <div class="cal-daycol-head ${isToday?'today':''}">
        <div class="cd-wd">週${WD[d.getDay()]}</div>
        <div class="cd-date">${d.getMonth()+1}/${d.getDate()}</div>
        ${isToday?'<div class="cd-today">今天</div>':''}
      </div>
      <div class="cal-track" style="height:${trackH}px;" data-date="${ds}">${halves}${evHtml}${(()=>{
        if(!isToday)return '';
        const now=new Date();
        const nowMin=now.getHours()*60+now.getMinutes();
        if(nowMin<CAL_START_H*60||nowMin>CAL_END_H*60)return ''; // 超出顯示範圍不畫

  const title=(nDays===1)
    ? `${calWeekStart.getFullYear()} 年 ${calWeekStart.getMonth()+1} 月 ${calWeekStart.getDate()} 日`
    : `${calWeekStart.getFullYear()} 年 ${calWeekStart.getMonth()+1} 月 ${calWeekStart.getDate()} 日 起`;
  return filterHtml+`<div class="cal-wrap">
    <div class="cal-head">
      <div class="cal-nav">
        <div class="cal-arrow" onclick="calStep(-${nDays})">‹</div>
        <div class="cal-title" onclick="openCalJump()" style="cursor:pointer;" title="點擊選擇日期">${title} ▾</div>

        </div>

      </div>
    </div>
    <div class="cal-body${nDays===7?' cal-7d':''}">${timecol}${daysHtml}</div>
  </div>
  ${hint}
  ${legendHtml()}`;
}

// 同天事件並排分欄(避免重疊):依時間排序貪婪分配
function assignLanes(evs){
  const sorted=[...evs].sort((a,b)=>timeToMin(a.start_time)-timeToMin(b.start_time));
  const lanesEnd=[]; const res={};
  // 找重疊群組
  const groups=[]; let cur=[];
  let curEnd=-1;
  sorted.forEach(b=>{
    const s=timeToMin(b.start_time),e=s+(b.duration||60);
    if(cur.length&&s>=curEnd){groups.push(cur);cur=[];curEnd=-1;}
    cur.push(b);curEnd=Math.max(curEnd,e);
  });
  if(cur.length)groups.push(cur);
  groups.forEach(g=>{
    const ends=[];
    g.forEach(b=>{
      const s=timeToMin(b.start_time),e=s+(b.duration||60);
      let idx=ends.findIndex(end=>end<=s);
      if(idx===-1){idx=ends.length;ends.push(e);}else{ends[idx]=e;}
      res[b.id]={idx,total:0};
    });
    g.forEach(b=>res[b.id].total=ends.length);
  });
  return res;
}

/* ── 拖曳 / 拉伸互動（電腦，支援跨日跟隨） ── */
function initCalDrag(){
  if(window.innerWidth<=600)return; // 真手機（窄螢幕）改點選；平板/iPad/桌機可拖曳
  const wrap=document.querySelector('.cal-body');
  if(!wrap)return;
  // Tooltip 邊界自適應：滑入卡片時，依空間決定 tooltip 往左/置中/往右展開，避免超出畫面
  wrap.addEventListener('mouseenter',(e)=>{
    const ev=e.target.closest&&e.target.closest('.cal-ev'); if(!ev)return;
    const tip=ev.querySelector('.ev-tip'); if(!tip)return;
    // 先重置
    tip.style.left='50%'; tip.style.right='auto'; tip.style.transform='translateX(-50%)';
    requestAnimationFrame(()=>{
      const r=tip.getBoundingClientRect();
      const vw=window.innerWidth, margin=8;
      if(r.left<margin){ // 超出左邊 → 靠卡片左緣往右展開
        tip.style.left='0'; tip.style.right='auto'; tip.style.transform='translateX(0)';
      }else if(r.right>vw-margin){ // 超出右邊 → 靠卡片右緣往左展開
        tip.style.left='auto'; tip.style.right='0'; tip.style.transform='translateX(0)';
      }
    });
  },true);
  let mode=null, bid=null, evEl=null, startY=0, startX=0, origH=0, origDur=60;
  let origDate=null, origTime=null, grabOffsetY=0, grabOffsetX=0;
  let preview=null, label=null;
  let dropDate=null, dropTime=null, dropDur=60;
  const cols=[...document.querySelectorAll('.cal-daycol')];

  function clearVis(){
    cols.forEach(c=>c.classList.remove('drop-target'));
    if(preview){preview.remove();preview=null;}
    if(label){label.remove();label=null;}
  }
  // 由滑鼠座標找落點欄位與對齊到 30 分的時間
  function locate(clientX,clientY){
    let col=null;
    for(const c of cols){
      const r=c.getBoundingClientRect();
      if(clientX>=r.left&&clientX<r.right){col=c;break;}
    }
    if(!col)return null;
    const track=col.querySelector('.cal-track');
    const tr=track.getBoundingClientRect();
    // 以抓取點在卡片內的偏移，換算卡片頂端應對齊的格
    let topPx=clientY - tr.top - grabOffsetY;
    let slot=Math.round(topPx/SLOT_PX);
    const maxSlot=(CAL_END_H-CAL_START_H)*2 - Math.round(origDur/SLOT_MIN);
    slot=Math.max(0,Math.min(slot,maxSlot));
    const min=CAL_START_H*60+slot*SLOT_MIN;
    return {col, track, date:col.dataset.date, time:minToTime(min), topPx:slot*SLOT_PX};
  }

  wrap.addEventListener('pointerdown',e=>{
    const ev=e.target.closest('.cal-ev');
    if(!ev||ev.classList.contains('readonly'))return;
    bid=ev.dataset.bid; evEl=ev;
    const rect=ev.getBoundingClientRect();
    origH=rect.height; origDur=Math.round(parseFloat(ev.style.height)/SLOT_PX)*SLOT_MIN||60;
    origDate=ev.closest('.cal-track').dataset.date;
    origTime=ev.dataset.time;
    grabOffsetY=e.clientY-rect.top;
    grabOffsetX=e.clientX-rect.left;
    startY=e.clientY; startX=e.clientX;
    mode='move';
    window._dragStarted=false; // 尚未真正開始拖曳（避免純點擊就移動卡片）
    try{ wrap.setPointerCapture(e.pointerId); }catch(_){}
    e.preventDefault();
  });

  window.addEventListener('pointermove',e=>{
    if(!mode)return;
    e.preventDefault(); // 觸控時避免頁面跟著捲動
    // move：首次移動超過 5px 才真正開始拖曳（純點擊不會移動卡片）
    if(!window._dragStarted){
      if(Math.abs(e.clientX-startX)<=5 && Math.abs(e.clientY-startY)<=5) return;
      window._dragStarted=true;
      const rect=evEl.getBoundingClientRect();
      evEl.classList.add('dragging');
      evEl.style.position='fixed';
      evEl.style.width=rect.width+'px';
      evEl.style.left=rect.left+'px';
      evEl.style.top=rect.top+'px';
      evEl.style.right='auto';
    }
    // 卡片左上角跟隨滑鼠（扣除抓取點偏移）
    evEl.style.left=(e.clientX-grabOffsetX)+'px';
    evEl.style.top=(e.clientY-grabOffsetY)+'px';

    clearVis();
    const loc=locate(e.clientX,e.clientY);
    if(loc){
      loc.col.classList.add('drop-target');
      dropDate=loc.date; dropTime=loc.time;
      // 預覽框
      preview=document.createElement('div');
      preview.className='cal-drop-preview';
      preview.style.top=loc.topPx+'px';
      preview.style.height=((origDur/SLOT_MIN)*SLOT_PX-2)+'px';
      loc.track.appendChild(preview);
      // 浮動標籤
      label=document.createElement('div');
      label.className='cal-drop-label';
      const d=parseYmd(loc.date);
      const endMin=timeToMin(loc.time)+origDur;
      label.textContent=`${d.getMonth()+1}/${d.getDate()}（${WD[d.getDay()]}）${loc.time}–${minToTime(endMin)}`;
      label.style.left=(e.clientX+14)+'px';
      label.style.top=(e.clientY+14)+'px';
      document.body.appendChild(label);
    }else{dropDate=null;dropTime=null;}
  });

  window.addEventListener('pointerup',async e=>{
    if(!mode)return;
    const m=mode; mode=null;
    const ev=evEl; evEl=null;
    const _bid=bid;
    // 判斷是否真的進入過拖曳（_dragStarted 在 mousemove 超過閾值時才設）
    const moved = window._dragStarted===true;
    window._dragStarted=false;
    clearVis();
    try{ wrap.releasePointerCapture(e.pointerId); }catch(_){}
    if(!moved){
      // 沒有拖動 → 視為點擊。因 pointer capture 會吞掉瀏覽器 click，這裡手動開明細。
      window._justDragged=false;
      window._justTapped=true; setTimeout(()=>{window._justTapped=false;},400);
      if(_bid) openBookingDetail(_bid);
      return;
    }
    // 確實拖曳過 → 立即重繪行事曆，讓卡片回到正確位置（避免清空 inline 定位後掉到容器底部）
    window._justDragged=true; setTimeout(()=>{window._justDragged=false;},300);
    // 只吞掉瀏覽器在 pointerup 後「補發在課卡上」的 click（避免拖完又誤開明細）。
    //  ⚠ 不可無差別吞整個視窗的下一次 click：否則拖完接著點明細裡的「取消預約」等按鈕會被吃掉（P0-1 bug）。
    //  判斷：click 目標若落在 .cal-ev / 行事曆容器內 → 攔截；落在 modal 或其他 UI → 放行。
    const swallow=(ev)=>{
      const t=ev.target;
      const onCalCard = t && t.closest && (t.closest('.cal-ev') || (t.closest('.cal-body') && !t.closest('.modal')));
      if(onCalCard){ ev.stopPropagation(); ev.preventDefault(); }
    };
    window.addEventListener('click',swallow,{capture:true,once:true});
    setTimeout(()=>window.removeEventListener('click',swallow,{capture:true}),350);
    window._calStepping=true; // 拖曳更新後保留當前檢視週，不要跳回本週
    const b=await dbGet('bookings',_bid);
    if(!b){navTo(CUR_PAGE);return;}
    if(b.date<ymd(TODAY)){ showToast('已過期的預約無法移動'); navTo(CUR_PAGE); return; } // 原課已過期 → 不可拖動

    const nd=dropDate||origDate, ntime=dropTime||origTime;
    if(nd!==b.date||ntime!==b.start_time){
      const verr=await validateBooking(b,nd,ntime,b.duration);
      if(verr){ showToast(verr); navTo(CUR_PAGE); return; } // 有錯誤 → 提示並復原
      b.date=nd; b.start_time=ntime; await dbPut('bookings',b);
      showToast('已更新預約'); navTo(CUR_PAGE);
    }else navTo(CUR_PAGE);
  });

}
function initCalSwipe(wrap){
  if(!wrap) return;
  let sx=0, sy=0, st=0, tracking=false, onCard=false;
  wrap.addEventListener('touchstart',(e)=>{
    if(e.touches.length!==1){ tracking=false; return; }
    const t=e.touches[0];
    sx=t.clientX; sy=t.clientY; st=Date.now();
    onCard = !!(e.target.closest && e.target.closest('.cal-ev')); // 起點在課卡 → 交給拖曳邏輯，不換頁
    tracking=true;
  },{passive:true});
  wrap.addEventListener('touchend',(e)=>{
    if(!tracking||onCard){ tracking=false; return; }
    tracking=false;
    if(window._dragStarted){ return; } // 正在拖卡，忽略
    const t=e.changedTouches[0];
    const dx=t.clientX-sx, dy=t.clientY-sy, dt=Date.now()-st;
    const TH=60; // 觸發門檻（px）
    // 必須是「夠長的橫向滑動」且「橫向明顯大於縱向」且「不是太慢的拖移」
    if(Math.abs(dx)<TH) return;
    if(Math.abs(dx)<Math.abs(dy)*1.5) return;
    if(dt>600) return;
    const step=_calDays||(window.innerWidth<=600?1:(window.innerWidth<=1024?3:7));
    if(dx<0) calStep(step);   // 左滑 → 下一段（往未來）
    else calStep(-step);      // 右滑 → 上一段（往過去）
  },{passive:true});
}
/* ════════ 驗證層（Validation Layer） ════════
   規則：
   - 時間重疊：new_start < existing_end && new_end > existing_start
   - 教練衝堂：同教練、重疊時段，只能一堂
   - 場地容量：私人教練/體驗/自主訓練 同時段最多 3 組（小班肌力不計入）
   - 團課教室：小班肌力 同時段只能一堂
   - 會員重複：同會員、重疊時段，只能一筆
   booking 參數需含：id(可空,新增時)、coach_id、member_id、category、date、start_time、duration
   回傳：錯誤訊息字串（不可建立）或 null（通過）。
*/
const CAP_CATS=['私人教練','自主訓練','體驗']; // 沿用：哪些類別需要場地
// ── 場地設定（可在系統設定調整數量）──
// 每個場地有 N 個單位（multi=3、treadmill=2、group=1）。
window.VENUES = window.VENUES || [
  { id:'multi',     name:'多功能訓練區', capacity:3, active:true },
  { id:'treadmill', name:'跑步機',       capacity:2, active:true },
  { id:'group',     name:'團課教室',     capacity:1, active:true },
];
function getVenues(){ return (window.VENUES||[]).filter(v=>v.active!==false); }
function venueCap(id){ const v=getVenues().find(x=>x.id===id); return v?(v.capacity||0):0; }

// 課程類型 → 可使用場地的「優先序」（先排滿前面的，剩餘溢出到後面）
//   教練課/友善教練課：多功能 → 團課教室
//   體驗課：同教練課
//   團體課：只能團課教室
//   自主訓練/友善自主訓練：多功能 → 跑步機 → 團課教室
function venuePriorityFor(category){
  if(category==='小班肌力') return ['group'];
  if(category==='自主訓練') return ['multi','treadmill','group'];
  // 私人教練（含友善）、體驗
  return ['multi','group'];
}
// 產生所有場地單位 id：multi_1..3 / treadmill_1..2 / group_1
function venueUnits(){
  const units=[];
  getVenues().forEach(v=>{ for(let i=1;i<=(v.capacity||0);i++) units.push(`${v.id}_${i}`); });
  return units;
}
// venue_unit（如 multi_1 / group_1 / treadmill_2）→ 場地名稱
function venueName(unit){
  if(!unit) return '';
  const vid=String(unit).split('_')[0];
  const v=(window.VENUES||[]).find(x=>x.id===vid);
  return v?v.name:vid;
}
// 是否為「非預設場地」（值得特別提示）：
//   教練課/體驗 預設在多功能訓練區 → 排到團課教室要提示
//   自主訓練 預設多功能 → 排到跑步機/團課教室要提示
//   團體課 本來就在團課教室 → 不提示
function venueIsNotable(category, unit){
  if(!unit) return false;
  const vid=String(unit).split('_')[0];
  if(category==='小班肌力') return false;            // 團課在團課教室是常態
  if(category==='自主訓練') return vid!=='multi';     // 自主訓練排到跑步機/團課教室才提示
  return vid!=='multi';                               // 教練課/體驗排到團課教室才提示
}
// 計算某時段「已被佔用」的場地單位集合
function occupiedUnits(sameDay, ns, ne){
  const occ=new Set();
  sameDay.forEach(x=>{
    if(!overlaps(ns,ne, timeToMin(x.start_time), timeToMin(x.start_time)+(x.duration||60))) return;
    if(x.venue_unit){ occ.add(x.venue_unit); }
  });
  return occ;
}
// 為一筆預約分配場地單位：依課程類型優先序，找第一個該時段未被佔的單位。
//   回傳 { unit } 或 { error }
function allocateVenue(category, sameDay, ns, ne, selfId){
  // 排除自己（改期時）
  const others=sameDay.filter(x=> x.id!==selfId);
  const occ=occupiedUnits(others, ns, ne);
  // 還要相容「舊資料沒有 venue_unit」：用數量回推佔用——把沒標單位的同類場地預約，依場地池順序填佔
  //   （保險：避免舊資料未分配單位導致超賣）
  const legacy=others.filter(x=> overlaps(ns,ne, timeToMin(x.start_time), timeToMin(x.start_time)+(x.duration||60)) && !x.venue_unit);
  // 依課程類型把 legacy 也納入對應場地池佔用估算
  const fillLegacy=(poolPrefix, count)=>{
    for(let i=1;i<=venueCap(poolPrefix) && count>0;i++){
      const u=`${poolPrefix}_${i}`; if(!occ.has(u)){ occ.add(u); count--; }
    }
    return count;
  };
  if(legacy.length){
    // 粗略：團課佔 group，教練/體驗佔 multi 優先、自主佔 multi/treadmill
    let g=legacy.filter(x=>x.category==='小班肌力').length;
    let m=legacy.filter(x=>x.category==='私人教練'||x.category==='體驗').length;
    let s=legacy.filter(x=>x.category==='自主訓練').length;
    g=fillLegacy('group',g);
    m=fillLegacy('multi',m); if(m>0) fillLegacy('group',m);
    s=fillLegacy('multi',s); s=(s>0?fillLegacy('treadmill',s):0); if(s>0) fillLegacy('group',s);
  }
  const pri=venuePriorityFor(category);
  for(const vid of pri){
    for(let i=1;i<=venueCap(vid);i++){
      const u=`${vid}_${i}`;
      if(!occ.has(u)) return { unit:u };
    }
  }
  return { error:'該時段沒有可用場地（已額滿）' };
}
function overlaps(s1,e1,s2,e2){ return s1<e2 && e1>s2; }
async function validateBooking(bk,date,time,duration){
  const dur=duration||bk.duration||60;
  const ns=timeToMin(time), ne=ns+dur;

  // 0a) 不得排到「過去的日期」（以日期為界，不看時分）
  //     今天即使某時段已過仍可操作（教練忙碌時常來不及即時更新今天的課）
  if(date < ymd(TODAY)) return '不可預約已過去的日期';

  // 0b) 限時段檢查：該票券種類 time_restricted=true → 僅平日 18:00 前
  if(bk.ticket_type_id){
    const tt=await dbGet('ticket_types',bk.ticket_type_id);
    if(tt && tt.time_restricted){
      const dow=parseYmd(date).getDay(); // 0=日,6=六
      const isWeekday = dow>=1 && dow<=5;
      const before18 = ns < 1080; // 開始時間早於 18:00（不限下限，不受場館營業時間影響）
      if(!isWeekday || !before18) return '此票券僅限平日 18:00 前使用';
    }
  }

  const all=await dbGetAll('bookings');
  // 同一天、未取消、排除自己
  const sameDay=all.filter(x=> x.id!==bk.id && x.status!=='cancelled' && x.date===date );

  // 1) 教練衝堂：以「實際授課教練」（有代課算代課教練）判斷
  //    例：A 把課交給 B 代課 → 該時段是 B 在忙，A 反而可再排課
  const actingCoach = bk.substitute_coach_id || bk.coach_id;
  if(actingCoach){
    const clash=sameDay.find(x=>{
      const xActing = x.substitute_coach_id || x.coach_id;
      return xActing===actingCoach &&
        overlaps(ns,ne, timeToMin(x.start_time), timeToMin(x.start_time)+(x.duration||60));
    });
    if(clash) return '此教練於該時段已有課程，無法重複預約';
  }

  // 2) 會員重複預約（同會員、時間重疊）
  if(bk.member_id){
    const dup=sameDay.find(x=> x.member_id===bk.member_id &&
      overlaps(ns,ne, timeToMin(x.start_time), timeToMin(x.start_time)+(x.duration||60)) );
    if(dup) return '會員於該時段已有預約';
  }

  // 3) 場地分配（依課程類型可用場地優先序，找該時段未被佔的單位）
  //    團課→團課教室；教練/體驗→多功能→團課教室；自主→多功能→跑步機→團課教室
  const alloc = allocateVenue(bk.category, sameDay, ns, ne, bk.id);
  if(alloc.error) return alloc.error;
  bk.venue_unit = alloc.unit; // 寫回，呼叫端存 booking 時帶上

  return null; // 通過
}

    slots+=`<div class="dtl-slot" style="top:${dtlYOf(mm)}px;height:${DTL_ROWH}px;" data-min="${mm}" onclick="dtlSlotClick(${mm})"></div>`;
  }
  // 課程卡：依開始時間絕對定位，並排處理重疊（同時段多堂 → 分欄）
  // 先計算每堂的欄位（簡單重疊分欄）
  const evs=dayBk.map(b=>{
    const s=timeToMin(b.start_time); const dur=b.duration||60; const e=s+dur;
    return {b,s,e};
  });
  // 分欄：與已放置的事件重疊則右移一欄
  evs.forEach(ev=>{
    let col=0;
    while(evs.some(o=>o!==ev && o.col===col && o.s<ev.e && o.e>ev.s)) col++;
    ev.col=col;
  });
  const maxCol=Math.max(1,...evs.map(e=>e.col+1));
  let cards='';
  evs.forEach(ev=>{
    const {b,s,e,col}=ev;
    const top=dtlYOf(s); const height=Math.max((e-s)/DTL_SLOT*DTL_ROWH-3, 22);
    const cc=bkCC(b);
    const done=(b.status==='completed'||b.status==='checked_in');
    const mname=b.member_id?(memMap[b.member_id]||'—'):(b.category==='自主訓練'?'自主':'—');
    const catLabel={'私人教練':'教練課','小班肌力':'團體課','自主訓練':'自主訓練','體驗':'體驗'}[b.category]||b.category;
    const wPct=100/maxCol; const leftPct=col*wPct;
    cards+=`<div class="dtl-card dtl-${cc}${done?' dtl-done':''}" style="top:${top}px;height:${height}px;left:calc(${leftPct}% + 4px);width:calc(${wPct}% - 8px);" onclick="event.stopPropagation();openCourseCard('${b.id}')">
      <div class="dtl-c-time">${b.start_time}</div>
      <div class="dtl-c-name">${mname}</div>
      ${height>=58?`<div class="dtl-c-meta">${catLabel}${b.coach_id&&role==='admin'?' · '+(coachMap[b.coach_id]||''):''}</div>`:''}
      ${done?'<div class="dtl-c-done">✓</div>':''}
    </div>`;
  });
  const axisH=(DTL_END-DTL_START)/DTL_SLOT*DTL_ROWH;
  host.innerHTML=`
    <div class="dtl-head">
      <button class="dtl-nav" onclick="dtlStepDay(-1)">‹</button>
      <div class="dtl-head-mid">
        <div class="dtl-head-date">${dateLabel}${isToday?' <span class="dtl-today-tag">今天</span>':''}</div>
        <div class="dtl-head-sub">今日共 ${dayBk.length} 堂課</div>
      </div>
      <button class="dtl-nav" onclick="dtlStepDay(1)">›</button>
    </div>
    <div class="dtl-body" id="dtl-body">
      <div class="dtl-scroll">
        <div class="dtl-axis-col">${axis}</div>
        <div class="dtl-grid" style="height:${axisH}px;">
          ${slots}
          ${cards}
        </div>
      </div>
    </div>
    <div class="dtl-foot">
      <button class="btn btn-ghost" onclick="closeDayTimeline()">返回</button>
      <button class="btn btn-green" onclick="dtlAddAt(window._dtlDate)">＋ 新增預約</button>
    </div>`;
  // 左右滑動換日
  initDtlSwipe();
  // 捲到 08:00 上方一點（或捲到第一堂課）
  const body=document.getElementById('dtl-body');
  if(body){
    if(dayBk.length){ const firstMin=timeToMin(dayBk[0].start_time); body.scrollTop=Math.max(dtlYOf(firstMin)-40,0); }
  }
}

function initDtlSwipe(){
  const body=document.getElementById('dtl-body'); if(!body) return;
  let x0=null,y0=null,moved=false;
  body.ontouchstart=(e)=>{ const t=e.touches[0]; x0=t.clientX; y0=t.clientY; moved=false; };
  body.ontouchmove=(e)=>{ if(x0==null) return; const t=e.touches[0]; if(Math.abs(t.clientX-x0)>Math.abs(t.clientY-y0)&&Math.abs(t.clientX-x0)>40) moved=true; };
  body.ontouchend=(e)=>{
    if(x0==null) return; const t=e.changedTouches[0]; const dx=t.clientX-x0; const dy=t.clientY-y0;
    if(Math.abs(dx)>60 && Math.abs(dx)>Math.abs(dy)*1.5){ dtlStepDay(dx<0?1:-1); }
    x0=null;y0=null;
  };

/* ══════ 滿版週曆（7 欄一屏 · Google Calendar 風格）· 預約頁手機版主畫面 ══════ */
function mondayOf(d){ const x=new Date(d); const dow=(x.getDay()+6)%7; x.setDate(x.getDate()-dow); x.setHours(0,0,0,0); return x; }
// 週曆時間軸參數（比單日更密，讓 7 欄一屏塞下）
const WTL_START=8*60, WTL_END=22*60, WTL_SLOT=30, WTL_ROWH=22; // 08:00–22:00，每30分一格高22px
function wtlYOf(min){ return (min-WTL_START)/WTL_SLOT*WTL_ROWH; }
// 現在時刻的當日分鐘數（用於過期變暗與紅線）
function nowMinOfDay(){ const n=new Date(); return n.getHours()*60+n.getMinutes(); }
function wtlStepWeek(delta){
  const m=parseYmd(window._wtlMonday); m.setDate(m.getDate()+delta*7);
  window._wtlMonday=ymd(m);
  window._wtlAnim = delta>0 ? 'in-from-right' : 'in-from-left';
  renderWeekTimeline();
}
function wtlToday(){ window._wtlMonday=ymd(mondayOf(TODAY)); renderWeekTimeline(); }

function wtlOpenDay(ds){ openDayTimeline(ds); }

  // 先檢查該時段場地是否已額滿（以最常見的私人教練 60 分鐘為準）
  try{

  dtlAddAt(ds, minToTime(mm));

// 長按課卡 → 跟手拖曳
let _wtlPressTimer=null;
function initWtlCardPress(){
  const host=document.getElementById('wtl-page')||document;
  host.querySelectorAll('.wtl-card[data-bid]').forEach(card=>{
    const bid=card.getAttribute('data-bid');
    let pressTimer=null, dragging=false, ghost=null, startX=0, startY=0, hlSlot=null, lastMin=null, offX=0, offY=0, timeTag=null;
    const clearHL=()=>{ if(hlSlot){ hlSlot.classList.remove('wtl-drag-over'); hlSlot=null; } };
    const slotAt=(x,y)=>{
      const prev=ghost?ghost.style.display:''; if(ghost) ghost.style.display='none';
      const el=document.elementFromPoint(x,y);
      if(ghost) ghost.style.display=prev;
      return el&&el.closest?el.closest('.wtl-slot'):null;
    };
    const positionGhost=(x,y)=>{ if(ghost){ ghost.style.left=(x-offX)+'px'; ghost.style.top=(y-offY)+'px'; } };
    const beginDrag=(x,y)=>{
      dragging=true; lastMin=null;
      hapticFeedback(20);
      card.classList.add('wtl-card-dragging');
      const r=card.getBoundingClientRect();
      // 以卡片左上角為基準，落在手指斜上方（不被手指遮住）：左上角在手指左上方約 14px
      offX=14; offY=14;
      ghost=card.cloneNode(true);
      ghost.classList.add('wtl-card-ghost');
      ghost.classList.remove('wtl-card-dragging');
      ghost.style.cssText='position:fixed!important;margin:0!important;z-index:99999;pointer-events:none;'
        +`width:${r.width}px;height:${r.height}px;left:${r.left}px;top:${r.top}px;`
        +'box-shadow:0 14px 34px rgba(0,0,0,0.34);opacity:.96;border-radius:6px;transition:none;';
      document.body.appendChild(ghost);
      timeTag=document.createElement('div');
      timeTag.className='wtl-ghost-time';
      timeTag.style.display='none';
      document.body.appendChild(timeTag);
      document.body.classList.add('wtl-dragging-active');
      // 綁 document 級監聽，確保手指移出卡片也追得到
      document.addEventListener('touchmove',docTouchMove,{passive:false});
      document.addEventListener('touchend',docTouchEnd);
      document.addEventListener('touchcancel',docTouchEnd);
      document.addEventListener('mousemove',docMouseMove);
      document.addEventListener('mouseup',docMouseUp);
    };
    const moveDrag=(x,y)=>{
      if(!ghost) return;
      positionGhost(x,y);
      const slot=slotAt(x,y);
      if(slot!==hlSlot){ clearHL(); if(slot){ slot.classList.add('wtl-drag-over'); hlSlot=slot; } }
      // 跟手時間標籤：顯示將移動到的日期時間
      if(timeTag){
        if(slot){
          const mm=parseInt(slot.getAttribute('data-min'),10);
          const ds=slot.getAttribute('data-date')||'';
          const dObj=ds?parseYmd(ds):null;
          const dLabel=dObj?`${dObj.getMonth()+1}/${dObj.getDate()} `:'';
          timeTag.textContent=`${dLabel}${minToTime(mm)}`;
          timeTag.style.display='block';
          timeTag.style.left=x+'px';
          timeTag.style.top=(y-46)+'px';
        }else{
          timeTag.style.display='none';
        }
      }
      // 跨越 30 分鐘時段 → 視覺脈衝回饋（iOS 無法可靠震動，改用視覺）＋ Android 震動
      if(slot){
        const mm=parseInt(slot.getAttribute('data-min'),10);
        if(!isNaN(mm) && mm!==lastMin){
          lastMin=mm;
          hapticFeedback(8);
          if(ghost){
            ghost.classList.remove('wtl-ghost-pulse');
            void ghost.offsetWidth; // 強制 reflow 讓動畫可重播
            ghost.classList.add('wtl-ghost-pulse');
          }
        }
      }
    };
    const finishDrag=(x,y)=>{
      let slot=null;
      if(ghost){ slot=slotAt(x,y); ghost.remove(); ghost=null; }
      if(timeTag){ timeTag.remove(); timeTag=null; }
      document.body.classList.remove('wtl-dragging-active');
      card.classList.remove('wtl-card-dragging');
      clearHL();
      const wasDragging=dragging; dragging=false;
      document.removeEventListener('touchmove',docTouchMove,{passive:false});
      document.removeEventListener('touchend',docTouchEnd);
      document.removeEventListener('touchcancel',docTouchEnd);
      document.removeEventListener('mousemove',docMouseMove);
      document.removeEventListener('mouseup',docMouseUp);
      if(wasDragging && slot){
        const ds=slot.getAttribute('data-date'); const mm=parseInt(slot.getAttribute('data-min'),10);
        if(ds!=null && !isNaN(mm)) wtlDropAt(bid, ds, mm);
      }
    };
    // document 級處理器
    const docTouchMove=(e)=>{ if(!dragging)return; e.preventDefault(); const t=e.touches[0]; if(t) moveDrag(t.clientX,t.clientY); };
    const docTouchEnd=(e)=>{ const t=(e.changedTouches&&e.changedTouches[0]); if(dragging&&t) finishDrag(t.clientX,t.clientY); };
    const docMouseMove=(e)=>{ if(dragging){ e.preventDefault(); moveDrag(e.clientX,e.clientY); } };
    const docMouseUp=(e)=>{ if(dragging) finishDrag(e.clientX,e.clientY); };
    // 卡片上的觸發
    const tStart=(e)=>{ const t=e.touches[0]; if(!t)return; startX=t.clientX; startY=t.clientY;
      pressTimer=setTimeout(()=>{ beginDrag(startX,startY); }, 240); };
    const tMoveEarly=(e)=>{ if(dragging)return; const t=e.touches[0]; if(!t)return;
      if(Math.abs(t.clientX-startX)>10||Math.abs(t.clientY-startY)>10){ if(pressTimer){clearTimeout(pressTimer);pressTimer=null;} } };
    const tEndEarly=()=>{ if(pressTimer){ clearTimeout(pressTimer); pressTimer=null; } };
    card.addEventListener('touchstart',tStart,{passive:true});
    card.addEventListener('touchmove',tMoveEarly,{passive:true});
    card.addEventListener('touchend',tEndEarly);
    card.addEventListener('mousedown',(e)=>{ startX=e.clientX; startY=e.clientY;
      pressTimer=setTimeout(()=>{ beginDrag(e.clientX,e.clientY); }, 240);
      const up=()=>{ if(pressTimer){clearTimeout(pressTimer);pressTimer=null;} card.removeEventListener('mouseup',up); };
      card.addEventListener('mouseup',up);
    });
  });
}
// 點選/滑動時高亮手指下方的時段格（背景提示選到哪格）
function initWtlSlotHighlight(){
  const body=document.getElementById('wtl-body'); if(!body) return;
  let cur=null;
  const clear=()=>{ if(cur){ cur.classList.remove('wtl-slot-hl'); cur=null; } };
  const hlAt=(x,y)=>{
    if(document.body.classList.contains('wtl-dragging-active')){ clear(); return; } // 拖曳中不干擾
    const el=document.elementFromPoint(x,y);
    const slot=el&&el.closest&&el.closest('.wtl-slot');
    if(slot!==cur){ clear(); if(slot){ slot.classList.add('wtl-slot-hl'); cur=slot; } }
  };
  body.addEventListener('touchstart',(e)=>{ const t=e.touches[0]; if(t) hlAt(t.clientX,t.clientY); },{passive:true});
  body.addEventListener('touchmove',(e)=>{ const t=e.touches[0]; if(t) hlAt(t.clientX,t.clientY); },{passive:true});
  body.addEventListener('touchend',()=>{ setTimeout(clear,180); });
  body.addEventListener('touchcancel',clear);
  // 桌機滑鼠

}

async function wtlDropAt(bid, ds, mm){

    if(ds<ymd(TODAY)){ showToast('不可移動到已過期的日期'); return; }
    if(ds===b.date && ntime===b.start_time){ return; } // 沒移動

async function wtlDropMove(ds, mm){

      return `<div class="wtl-c-time">${b.start_time}</div><div class="wtl-c-name">${coach}</div><div class="wtl-c-sub">${headStr}</div>`;
    }else if(height>=30){
      // 中卡：教練 · N人
      return `<div class="wtl-c-name">${coach}</div><div class="wtl-c-sub">${headStr}</div>`;
    }
    // 矮卡：團N
    return `<div class="wtl-c-name">${heads>0?`團${heads}`:'團課'}</div>`;
  };
  // 分欄佈局：每張卡的寬度依「自己所在的重疊簇」決定（非全天最大），避免單獨的課被壓窄
  const wtlLayout=(list)=>{
    const evs=list.map(b=>{ const s=timeToMin(b.start_time); return {b,s,e:s+(b.duration||60),col:0}; })
      .sort((a,b)=>a.s-b.s);
    evs.forEach(ev=>{ let col=0; while(evs.some(o=>o!==ev && o.col===col && o.s<ev.e && o.e>ev.s)) col++; ev.col=col; });
    // 對每張卡，找與它時間相連的重疊簇，取簇內最大欄數
    evs.forEach(ev=>{
      const cluster=evs.filter(o=>o.s<ev.e && o.e>ev.s); // 與 ev 直接重疊者
      // 擴展簇：傳遞重疊（A-B 重疊、B-C 重疊也算同簇）
      let changed=true; const set=new Set(cluster);
      while(changed){ changed=false; evs.forEach(o=>{ if(set.has(o))return; for(const x of set){ if(o.s<x.e&&o.e>x.s){ set.add(o); changed=true; break; } } }); }
      ev.cols=Math.max(...[...set].map(x=>x.col))+1;
    });
    return evs;
  };

  const monday=parseYmd(window._wtlMonday);
  const days=[]; for(let i=0;i<7;i++){ const d=addDays(monday,i); days.push(ymd(d)); }
  const sunday=addDays(monday,6);
  const todayStr=ymd(TODAY);
  // 週標題：6/29 – 7/5
  const rangeLabel=`${monday.getMonth()+1}/${monday.getDate()} – ${sunday.getMonth()+1}/${sunday.getDate()}`;

  // 時間軸（左側刻度）
  let axis='';
  for(let mm=WTL_START; mm<=WTL_END; mm+=WTL_SLOT){
    if(mm%60!==0) continue;
    axis+=`<div class="wtl-time" style="top:${wtlYOf(mm)}px;">${String(Math.floor(mm/60)).padStart(2,'0')}</div>`;
  }
  const gridH=(WTL_END-WTL_START)/WTL_SLOT*WTL_ROWH;
  // 水平格線 + 整點交替底色（8點米、9點白、10點米…斑馬交錯，讓每小時清楚分開）
  let hlines='';
  for(let mm=WTL_START; mm<WTL_END; mm+=60){
    const hh=Math.floor(mm/60);
    const band = hh%2===0 ? 'wtl-band-beige' : 'wtl-band-white'; // 偶數整點米色、奇數整點白色
    hlines+=`<div class="wtl-hourband ${band}" style="top:${wtlYOf(mm)}px;height:${60/WTL_SLOT*WTL_ROWH}px;"></div>`;
  }
  for(let mm=WTL_START; mm<=WTL_END; mm+=WTL_SLOT){
    const isHour=mm%60===0;
    hlines+=`<div class="wtl-hline${isHour?' wtl-hline-h':''}" style="top:${wtlYOf(mm)}px;"></div>`;
  }

  // 各天欄位
  let cols='';
  let totalWeek=0;
  days.forEach((ds)=>{
    const allDay=bookings.filter(b=>b.date===ds&&b.status!=='cancelled');
    // 分三組
    const myBk = allDay.filter(isMineBk).sort((a,b)=>(a.start_time||'').localeCompare(b.start_time||''));
    const otherBk = allDay.filter(b=>!isMineBk(b)&&!isGroupBk(b)).sort((a,b)=>(a.start_time||'').localeCompare(b.start_time||''));
    const groupOtherBk = allDay.filter(b=>!isMineBk(b)&&isGroupBk(b));
    totalWeek += (showMine?myBk.length:0);

    // 我的時段區間（用於遮蓋下層）
    const myRanges = myBk.map(b=>{ const s=timeToMin(b.start_time); return [s, s+(b.duration||60)]; });
    const overlapMine=(s,e)=> myRanges.some(([ms,me])=> s<me && e>ms);

    const nowMin = nowMinOfDay();
    const dayIsPast = ds < todayStr;
    const dayIsToday = ds === todayStr;
    let slots='';
    for(let mm=WTL_START; mm<WTL_END; mm+=WTL_SLOT){
      const slotPast = dayIsPast || (dayIsToday && mm < nowMin);
      slots+=`<div class="wtl-slot${slotPast?' wtl-slot-past':''}" data-date="${ds}" data-min="${mm}" style="top:${wtlYOf(mm)}px;height:${WTL_ROWH}px;" onclick="wtlSlotClick('${ds}',${mm})"></div>`;
    }

    // 第三層：非我的團課（獨立「團課」開關控制；被我的遮蓋處不畫）
    let layerGroup='';
    if(showGroup){
      const vis=groupOtherBk.filter(b=>{ const s=timeToMin(b.start_time), e=s+(b.duration||60); return !(showMine && overlapMine(s,e)); });
      wtlLayout(vis).forEach(ev=>{
        const {b,s,e,col,cols}=ev;
        const top=wtlYOf(s); const height=Math.max((e-s)/WTL_SLOT*WTL_ROWH-1, 14);
        const wPct=100/cols; const leftPct=col*wPct;
        layerGroup+=`<div class="wtl-card wtl-group wtl-group2 wtl-noclick${groupDim?' wtl-group-dim':''}" style="top:${top}px;height:${height}px;left:calc(${leftPct}% + 1px);width:calc(${wPct}% - 2px);">
          ${wtlGroupInner(b,height)}
        </div>`;
      });
    }
    // 第二層：其他教練課 + 自主訓練（併排、正確寬度；被我的遮蓋處不畫）
    let layerOther='';
    if(showOthers){
      const vis=otherBk.filter(b=>{ const s=timeToMin(b.start_time), e=s+(b.duration||60); return !(showMine && overlapMine(s,e)); });
      wtlLayout(vis).forEach(ev=>{
        const {b,s,e,col,cols}=ev;
        const top=wtlYOf(s); const height=Math.max((e-s)/WTL_SLOT*WTL_ROWH-1, 14);
        const cc=bkCC(b);
        const wPct=100/cols; const leftPct=col*wPct;
        layerOther+=`<div class="wtl-card wtl-other${otherDim?' wtl-other-dim':''}${canClickOthers?'':' wtl-noclick'} wtl-${cc}" style="top:${top}px;height:${height}px;left:calc(${leftPct}% + 1px);width:calc(${wPct}% - 2px);"${canClickOthers?` onclick="event.stopPropagation();wtlCardClick('${b.id}')"`:''}>
          ${isGroupBk(b)?wtlGroupInner(b,height):`${height>=44?`<div class="wtl-c-time">${b.start_time}</div>`:''}<div class="wtl-c-name">${cardLabel(b)}</div>`}
        </div>`;
      });
    }
    // 第一層：我的預約（完整卡，蓋住下層，顏色加強）
    let layerMine='';
    if(showMine){
      wtlLayout(myBk).forEach(ev=>{
        const {b,s,e,col,cols}=ev;
        const top=wtlYOf(s); const height=Math.max((e-s)/WTL_SLOT*WTL_ROWH-1, 14);
        const cc=bkCC(b);
        const done=(b.status==='completed'||b.status==='checked_in');
        const wPct=100/cols; const leftPct=col*wPct;
        layerMine+=`<div class="wtl-card wtl-mine wtl-${cc}${done?' wtl-done':''}" data-bid="${b.id}" style="top:${top}px;height:${height}px;left:calc(${leftPct}% + 1px);width:calc(${wPct}% - 2px);" onclick="event.stopPropagation();wtlCardClick('${b.id}')">
          ${isGroupBk(b)?wtlGroupInner(b,height):`${height>=44?`<div class="wtl-c-time">${b.start_time}</div>`:''}<div class="wtl-c-name">${myCardLabel(b)}</div>${(height>=58 && b.coach_id)?`<div class="wtl-c-sub">${coachAbbr(coachObj[b.coach_id])}</div>`:''}`}
        </div>`;
      });
    }

    // 今天欄位：現在時間紅線
    let nowLine='';
    if(dayIsToday && nowMin>=WTL_START && nowMin<=WTL_END){
      nowLine=`<div class="wtl-nowline" style="top:${wtlYOf(nowMin)}px;"><span class="wtl-nowdot"></span></div>`;
    }
    cols+=`<div class="wtl-col">
      <div class="wtl-grid" style="height:${gridH}px;">${slots}${layerGroup}${layerOther}${layerMine}${nowLine}</div>
    </div>`;
  });

  // 欄位標題列（可點 → 開單日）
  let heads='';
  days.forEach((ds)=>{
    const d=parseYmd(ds);
    const isToday=ds===todayStr;
    heads+=`<button class="wtl-dhead${isToday?' wtl-dhead-today':''}" onclick="wtlOpenDay('${ds}')">
      <span class="wtl-dw">${WD[d.getDay()]}</span>
      <span class="wtl-dn">${d.getDate()}</span>
    </button>`;
  });

  const scopeBar = `<div class="wtl-scope">
      <button class="wtl-sc ${showMine?'active':''}" onclick="wtlToggleLayer('mine')">我的</button>
      <button class="wtl-sc ${showOthers?'active':''}" onclick="wtlToggleLayer('others')">其他</button>
      <button class="wtl-sc ${showGroup?'active':''}" onclick="wtlToggleLayer('group')">團課</button>
    </div>`;

  host.innerHTML=`
    <div class="wtl-wrap">
      <div class="wtl-head">
        <button class="wtl-nav" onclick="wtlStepWeek(-1)">‹</button>
        <div class="wtl-head-mid">
          <div class="wtl-range">${rangeLabel}</div>
          <button class="wtl-today-btn" onclick="wtlToday()">今天</button>
        </div>
        <button class="wtl-nav" onclick="wtlStepWeek(1)">›</button>
      </div>
      ${scopeBar}
      <div class="wtl-headrow">
        <div class="wtl-axis-head"></div>
        <div class="wtl-dheads">${heads}</div>
      </div>
      <div class="wtl-body" id="wtl-body">
        <div class="wtl-scroll">
          <div class="wtl-axis-col" style="height:${gridH}px;">${axis}</div>
          <div class="wtl-cols"><div class="wtl-hlines" style="height:${gridH}px;">${hlines}</div>${cols}</div>
        </div>
      </div>
      <div class="wtl-foot">
        <button class="btn btn-green" style="width:100%;" onclick="dtlAddAt('${todayStr}')">＋ 新增預約</button>
      </div>
    </div>`;

  // 左右滑換週
  initWtlSwipe();
  // 課卡長按 → 移動模式
  initWtlCardPress();
  initWtlSlotHighlight();
  // 捲到 09:00 附近（多數課從早上開始）
  const body=document.getElementById('wtl-body');
  if(body){ body.scrollTop=Math.max(wtlYOf(9*60)-10,0); }
  // 翻頁動畫：對欄位區套用滑入
  if(window._wtlAnim){
    const cols=host.querySelector('.wtl-cols'); const heads=host.querySelector('.wtl-dheads');
    const cls=window._wtlAnim; window._wtlAnim=null;
    [cols,heads].forEach(el=>{ if(!el)return; el.classList.add('wtl-anim',cls);
      el.addEventListener('animationend',()=>el.classList.remove('wtl-anim',cls),{once:true}); });
  }
}
function wtlSetScope(s){ window._coachScope=s; renderWeekTimeline(); }
function wtlToggleLayer(which){
  if(which==='mine') window._wtlLayerMine=!window._wtlLayerMine;
  else if(which==='others') window._wtlLayerOthers=!window._wtlLayerOthers;
  else if(which==='group') window._wtlLayerGroup=!window._wtlLayerGroup;
  renderWeekTimeline();
}
function initWtlSwipe(){
  const body=document.getElementById('wtl-body'); if(!body) return;
  let x0=null,y0=null;
  body.ontouchstart=(e)=>{ const t=e.touches[0]; x0=t.clientX; y0=t.clientY; };
  body.ontouchend=(e)=>{
    if(x0==null) return; const t=e.changedTouches[0]; const dx=t.clientX-x0; const dy=t.clientY-y0;
    if(Math.abs(dx)>60 && Math.abs(dx)>Math.abs(dy)*1.5){ wtlStepWeek(dx<0?1:-1); }
    x0=null;y0=null;
  };
}
let _prefill=null;
function quickBookAt(date,time){
  // 防誤觸：剛拖曳放開 / 剛點過課卡（pointer capture 後補發的 click）不應觸發「新增預約」
  if(window._justDragged){window._justDragged=false;return;}
  if(window._justTapped){return;}
  _prefill={date,time};openBookingModal();
}

/* ══════ 預約精靈（兩頁式） ══════
   第1頁：課程類型 / 教練 / 日期 / 時間（從行事曆點選會自動帶入日期時間）
   第2頁：會員 / 票券 / 連續預約
   全部不預設值；連續預約預設「否」。 */
let _bkMembers=[];
let _bkWizard={};   // 暫存第1頁選擇
async function openBookingModal(){
  const[coaches,types]=await Promise.all([dbGetAll('coaches'),dbGetAll('ticket_types')]);
  const isCoach=SESSION.role==='coach';
  const isMobileBk=window.innerWidth<=600;
  // 課程類型過濾：
  //  - 教練端：只能建「私人教練」「體驗」類（教練課/友善教練課/體驗課）；不可建自主訓練、團體課
  //  - 手機版（含管理員教練視角）：不可建團體課（團體課僅後台桌機建立）
  const coachAllowed=['私人教練','體驗'];
  const activeTypes=types.filter(t=>{
    if(t.active===false) return false;
    if(isCoach && !coachAllowed.includes(t.category)) return false; // 教練：只留教練課/體驗
    if(isMobileBk && t.category==='小班肌力') return false;          // 手機：不建團體課
    if(isMobileBk && t.category==='自主訓練') return false;          // 手機：自主訓練由會員自約
    return true;
  });
  const typeOpts=activeTypes.map(t=>`<option value="${t.id}">${t.name}（${t.category}）</option>`).join('');
  const pf=_prefill||{};   // 只有從行事曆點選才有 date/time
  _bkWizard={fromSlot:!!_prefill};
  _prefill=null;
  // 教練端：授課教練固定為自己（隱藏選擇）；管理員/櫃台才顯示教練下拉
  window._bkSelfCoach = isCoach ? SESSION.id : null;
  // 管理員/櫃台從「某教練視角」建立預約時的預設教練（可修改）：
  //  - 手機版行事曆只看自己 → 預設自己
  //  - 桌機「只看我的課」模式 → 預設自己
  //  - 全店模式 → 不預設
  let prefillCoach = window._bkPrefillCoach || null;
  if(!isCoach && !prefillCoach){
    const isMobile=window.innerWidth<=600;
    if(isMobile) prefillCoach = SESSION.id;              // 手機行事曆=只看自己
    else if(window._calMineOnly) prefillCoach = SESSION.id; // 桌機只看我的課
  }
  window._bkPrefillCoach=null; // 用完即清
  const coachOpts=coaches.filter(isCoachable).map(c=>{
    const sel = (isCoach&&c.id===SESSION.id) || (prefillCoach&&c.id===prefillCoach);
    return `<option value="${c.id}" ${sel?'selected':''}>${coachDisp(c)}</option>`;
  }).join('');
  // 30 分鐘時段選項（08:00～22:00）
  const timeOpts=bkTimeOptions(pf.time);
  showModal(`<div class="modal-title">新增預約 · 步驟 1 / 2</div>
    <div style="font-size:12px;color:var(--t2);margin-bottom:14px;">選擇課程類型${isCoach?'與時段':'、教練與時段'}。</div>
    <div class="form-row"><label>課程類型</label>
      <div id="bk-type-cards" class="bk-cards"></div>
      <input type="hidden" id="bk-type" value="" onchange="onBkTypeChange()"></div>
    ${isCoach
      ? `<input type="hidden" id="bk-coach" value="${SESSION.id}">`
      : `<div class="form-row" id="bk-coach-row" style="display:none;"><label>授課教練</label>
          <div id="bk-coach-cards" class="bk-cards"></div>
          <input type="hidden" id="bk-coach" value=""></div>`}
    <div class="form-row"><label>日期</label><input type="date" id="bk-date" value="${pf.date||''}"></div>
    <div class="form-row"><label>時間</label><select id="bk-time">${timeOpts}</select></div>
    <div class="modal-foot"><button class="btn btn-ghost" onclick="cancelBookingModal()">取消</button><button class="btn btn-green" onclick="bkStep2()">下一步 →</button></div>`);
  // 渲染卡片
  window._bkTypes=activeTypes;
  window._bkCoaches=coaches.filter(isCoachable);
  window._bkPrefillCoachId=prefillCoach||null;
  renderBkTypeCards();
}
// 課程類型卡片
function renderBkTypeCards(){
  const box=document.getElementById('bk-type-cards'); if(!box)return;
  const types=window._bkTypes||[];
  const cur=document.getElementById('bk-type').value;
  box.innerHTML=types.map(t=>`<button type="button" class="bk-card${cur===t.id?' on':''}" onclick="pickBkType('${t.id}')">
    <span class="bk-card-name">${t.name}</span><span class="bk-card-sub">${t.category}</span>
  </button>`).join('');
}
function pickBkType(tid){
  document.getElementById('bk-type').value=tid;
  renderBkTypeCards();
  onBkTypeChange();
  renderBkCoachCards();
}
// 教練卡片（依課程類型是否需要教練顯示）
function renderBkCoachCards(){
  const box=document.getElementById('bk-coach-cards'); if(!box)return;
  const coaches=window._bkCoaches||[];
  const cur=document.getElementById('bk-coach').value || window._bkPrefillCoachId || '';
  if(cur && !document.getElementById('bk-coach').value){ document.getElementById('bk-coach').value=cur; }
  box.innerHTML=coaches.map(c=>`<button type="button" class="bk-card${cur===c.id?' on':''}" onclick="pickBkCoach('${c.id}')">
    <span class="bk-card-name">${coachDisp(c)}</span>
  </button>`).join('');
}
function pickBkCoach(cid){
  document.getElementById('bk-coach').value=cid;
  renderBkCoachCards();
}
// 產生 30 分鐘間隔時段選項（08:00～22:00）
function bkTimeOptions(selected){
  let html='<option value="">請選擇時間…</option>';
  for(let h=8;h<=22;h++){
    for(let mm of ['00','30']){
      if(h===22&&mm==='30')break;
      const t=String(h).padStart(2,'0')+':'+mm;
      html+=`<option value="${t}" ${selected===t?'selected':''}>${t}</option>`;
    }
  }
  return html;
}
async function onBkTypeChange(){
  const types=await dbGetAll('ticket_types');
  const tid=document.getElementById('bk-type').value;
  const t=types.find(x=>x.id===tid);
  const needCoach = t && (t.requires_coach || t.category==='體驗' || t.category==='小班肌力');
  const row=document.getElementById('bk-coach-row');
  if(row){ row.style.display=needCoach?'block':'none'; if(needCoach) renderBkCoachCards(); } // 教練端無此 row（已固定自己）
}
// 第1頁 → 第2頁
async function bkStep2(){
  const type_id=document.getElementById('bk-type').value;
  if(!type_id){showToast('請選擇課程類型');return;}
  const types=await dbGetAll('ticket_types');
  window._ttCache=types;
  const t=types.find(x=>x.id===type_id);
  const needCoach = t.requires_coach || t.category==='體驗' || t.category==='小班肌力'; // 體驗/團體課強制要教練
  const coachEl=document.getElementById('bk-coach');
  // 教練端：永遠用自己；管理員/櫃台：需要教練的類型才取下拉值
  const coach_id = window._bkSelfCoach ? window._bkSelfCoach : (needCoach ? (coachEl?coachEl.value:'') : null);
  if(needCoach && !coach_id){showToast(t.category==='體驗'?'體驗課請指定接洽教練':t.category==='小班肌力'?'團體課請指定授課教練':'請選擇授課教練');return;}
  const date=document.getElementById('bk-date').value;
  const time=document.getElementById('bk-time').value.slice(0,5);
  if(!date||!time){showToast('請選擇日期與時間');return;}
  Object.assign(_bkWizard,{type_id,t,coach_id,date,time});
  // 載入會員清單；若步驟一有選教練，該教練的會員排前面
  const members=await dbGetAll('members');
  let actives=members.filter(m=>m.status==='active');
  if(coach_id){
    actives.sort((a,b)=>{
      const am=a.default_coach_id===coach_id?0:1;
      const bm=b.default_coach_id===coach_id?0:1;
      if(am!==bm)return am-bm;                 // 該教練的會員排前
      return (a.name||'').localeCompare(b.name||'');
    });
  }
  _bkMembers=actives;
  window._bkCoachId=coach_id||null; // 供 bkMemberOpts 標色
  const wd=['一','二','三','四','五','六','日'];
  const isGroup = t.category==='小班肌力';
  const isTrial = t.category==='體驗';

  // ── 體驗課：填臨時客戶姓名+電話（不綁會員、不扣票）──
  if(isTrial){
    showModal(`<div class="modal-title">新增體驗課 · 步驟 2 / 2</div>
      <div style="font-size:12px;color:var(--t2);margin-bottom:12px;">${t.name}　${date} ${time}${coach_id?'　·　'+(await coachName(coach_id)):''}</div>
      <div style="font-size:11.5px;color:var(--t2);margin-bottom:12px;background:var(--card2);padding:10px 12px;border-radius:9px;">體驗課由教練接洽安排，客戶可尚未註冊；不扣會員票券。</div>

    return;

  // ── 一般課程（私教/友善/自主）：單選會員 + 票券 + 連續預約 ──
  // 只顯示有可用票券的會員，標籤改為票券張數

        <span id="bk-mem-pick-label" style="color:var(--t3);">${withTicket.length?'點此選擇會員…':'目前沒有持此類票券的會員'}</span>
        <span style="color:var(--t3);">▾</span>
      </button>
      ${coach_id?'<div style="font-size:11px;color:#1f6f3f;margin-top:5px;">★ 標示為該教練的指定會員</div>':''}</div>
    <div class="form-row" style="margin-bottom:10px;"><div id="bk-ticket-info" style="font-size:12px;color:var(--t2);padding:10px 12px;background:var(--card2);border-radius:9px;">選擇會員後，將自動帶入可用票券。</div></div>

function closeMemberSheet(){ const s=document.getElementById('bk-mem-sheet'); if(s)s.remove(); }
function renderMemberSheet(){
  const box=document.getElementById('ms-list'); if(!box)return;
  const q=(document.getElementById('ms-search').value||'').trim().toLowerCase();
  const cid=window._bkCoachId, sums=window._bkTicketSum||{};
  let list=(window._bkMembers||[]).filter(m=>{
    if(!q)return true;
    return (m.name||'').toLowerCase().includes(q)||(m.phone||'').includes(q);
  });
  // 指定會員排前面
  list=list.slice().sort((a,b)=>{
    const am=cid&&a.default_coach_id===cid?0:1, bm=cid&&b.default_coach_id===cid?0:1;
    if(am!==bm)return am-bm; return (a.name||'').localeCompare(b.name||'');
  });
  if(list.length===0){ box.innerHTML='<div class="ms-empty">找不到符合的會員</div>'; return; }
  box.innerHTML=list.map(m=>{
    const mine=cid&&m.default_coach_id===cid;
    const sum=sums[m.id];
    return `<button class="ms-item" onclick="pickMember('${m.id}')">
      <div class="ms-name">${mine?'<span class="ms-star">★</span> ':''}${m.name||'—'}</div>
      <div class="ms-rem">剩餘 ${sum!=null?sum:0} 堂</div>
    </button>`;
  }).join('');
}
function pickMember(mid){
  const m=(window._bkMembers||[]).find(x=>x.id===mid);
  document.getElementById('bk-member').value=mid;
  const label=document.getElementById('bk-mem-pick-label');
  if(label&&m){ const sum=(window._bkTicketSum||{})[mid]; label.innerHTML=`${m.name} · 剩 ${sum!=null?sum:0} 堂`; label.style.color='var(--text)'; }

  refreshBkTicket();

// 團體課選會員：搜尋 + 點選即複選（不需按 Ctrl/⌘，不顯示電話）
function renderGrpPick(){
  const box=document.getElementById('grp-list'); if(!box)return;

      <div style="display:flex;align-items:center;gap:8px;">
