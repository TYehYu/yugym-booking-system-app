async function refreshBkTicket(){
  const mid=document.getElementById('bk-member').value;
  const tid=_bkWizard.type_id;
  const bookDate=_bkWizard.date;
  const info=document.getElementById('bk-ticket-info');
  if(!info)return;
  if(!mid){info.innerHTML='選擇會員後，將自動帶入可用票券。';return;}
  const list=await listUsableTickets(mid,tid,bookDate);
  if(list.length===0){
    info.innerHTML='<span style="color:var(--danger);">⚠ 此會員沒有可用的該類票券（或票券已過期），無法預約。</span>';
    return;
  }
  const fmtLabel=(tk)=> tk.format?`　<b style="color:var(--gold);">${tk.format.toUpperCase()}</b>`:'';
  if(list.length===1){
    const tk=list[0];
    info.innerHTML=`將扣抵票券　${tk.plan_name||''}${fmtLabel(tk)}　剩餘 <b>${tk.sessions_remaining}</b> 堂　效期至 ${tk.expire_date}
      <input type="hidden" id="bk-ticket-sel" value="${tk.id}">`;
  }else{
    // 多張可用票券 → 卡片式選擇（清楚區分 1V1／1V2、剩餘堂數、效期）
    if(!window._bkTkSel || !list.some(x=>x.id===window._bkTkSel)) window._bkTkSel=list[0].id;
    const cards=list.map(tk=>`<button type="button" class="bk-tk-card${window._bkTkSel===tk.id?' on':''}" onclick="pickBkTicket('${tk.id}')">
        <div class="bk-tk-top"><span class="bk-tk-name">${tk.plan_name||'票券'}</span>${tk.format?`<span class="bk-tk-fmt">${tk.format.toUpperCase()}</span>`:''}</div>
        <div class="bk-tk-meta">剩 <b>${tk.sessions_remaining}</b> 堂　·　效期至 ${tk.expire_date}</div>
      </button>`).join('');
    info.innerHTML=`<div style="margin-bottom:8px;color:var(--text);">此會員有多張可用票券，請選擇要扣抵：</div>
      <div class="bk-tk-cards">${cards}</div>
      <input type="hidden" id="bk-ticket-sel" value="${window._bkTkSel}">`;
  }
  // 連續預約「最多建立次數」預設帶入該會員剩餘總堂數（使用者未手動改過才覆蓋）
  const recMax=document.getElementById('rec-max');
  if(recMax && mid){
    const remain=(window._bkTicketSum||{})[mid];
    if(remain>0 && !recMax.dataset.touched){
      recMax.value=Math.min(remain,52);
    }
  }
}
async function submitBooking(){
 try{
  const{type_id,t,coach_id,date,time}=_bkWizard;
  const isGroup = t.category==='小班肌力';
  const isTrial = t.category==='體驗';

  // ── 體驗課：建立一張綁臨時客戶的預約（不扣票）──
  if(isTrial){
    const tname=(document.getElementById('bk-trial-name').value||'').trim();
    const tphone=(document.getElementById('bk-trial-phone').value||'').trim();
    if(!tname){showToast('請填寫客戶姓名');return;}
    const vbk={id:null,coach_id,category:t.category,ticket_type_id:type_id};
    const verr=await validateBooking(vbk,date,time,60);
    if(verr){showToast(verr);return;}
    const bk={id:uid('BK'),member_id:null,member_ids:[],trial_name:tname,trial_phone:tphone||null,
      coach_id,ticket_id:null,ticket_type_id:type_id,category:t.category,format:t.format||null,
      date,start_time:time,duration:60,status:'booked',recurring:false,venue_unit:vbk.venue_unit||null,
      created_by:SESSION.id,created_at:new Date().toISOString()};
    await dbPut('bookings',bk);
    closeModal();showToast('體驗課已建立');bkAfterSubmit();
    return;
  }

  // ── 團體課：建立一張多會員預約（上限 5；有票者扣票，無票由教練負責）──
  if(isGroup){
    const ids=(window._grpSel||[]).filter(Boolean);
    if(ids.length>5){showToast('團體課最多 5 人');return;}
    const vbk={id:null,coach_id,category:t.category,ticket_type_id:type_id};
    const verr=await validateBooking(vbk,date,time,60);
    if(verr){showToast(verr);return;}
    const bk={id:uid('BK'),member_id:null,member_ids:ids,trial_name:null,trial_phone:null,
      coach_id,ticket_id:null,ticket_type_id:type_id,category:t.category,format:t.format||null,
      date,start_time:time,duration:60,status:'booked',recurring:false,venue_unit:vbk.venue_unit||null,
      created_by:SESSION.id,created_at:new Date().toISOString()};
    await dbPut('bookings',bk);
    // 為有團體課票的會員各扣 1 堂（沒票的略過，由教練負責）
    let charged=0,skipped=0;
    for(const mid of ids){
      const tk=await findUsableTicket(mid,type_id,date);
      if(tk){ await deductTicket(tk,bk.id,SESSION.id); charged++; }
      else skipped++;
    }
    closeModal();
    showToast(`團體課已建立（${ids.length} 人，扣票 ${charged} 人${skipped?`，${skipped} 人無票由教練負責`:''}）`);
    bkAfterSubmit();
    return;
  }

  // ── 一般課程（私教/友善/自主）──
  const member_id=document.getElementById('bk-member').value;
  if(!member_id){showToast('請選擇會員');return;}
  const recurring=document.getElementById('bk-recurring')?.checked;
  // 使用者選定的票券（多張時的下拉，或單張的 hidden）
  const selTicketId=document.getElementById('bk-ticket-sel')?.value||null;
  // 確認有可用票券（用起始日過濾過期）
  const firstTk=selTicketId?await dbGet('member_tickets',selTicketId):await findUsableTicket(member_id,type_id,date);
  if(!firstTk){showToast('此會員沒有可用票券（或已過期），無法預約');return;}
  let fmt=firstTk.format||null;
  if(!fmt&&firstTk.source_plan_id){const pl=await dbGet('course_plans',firstTk.source_plan_id);fmt=pl?pl.format:null;}

  // 連續預約星期檢查（次數與日期由 runRecurringBooking 處理）
  const recurring2=recurring;
  if(recurring2){
    const dowsChk=[...document.querySelectorAll('.rec-dow:checked')].map(c=>Number(c.value));
    if(dowsChk.length===0){showToast('請勾選至少一個星期');return;}
  }

  // 找票券：優先用選定票券（若仍可用且該日未過期），否則找同類別可用票
  const bkFindTk=async(mid,d)=>{
    if(selTicketId){
      const sel=await dbGet('member_tickets',selTicketId);
      if(sel && sel.member_id===mid && sel.status==='usable' && sel.sessions_remaining>0 && (!sel.expire_date||sel.expire_date>=d)) return sel;
    }
    return await findUsableTicket(mid,type_id,d);
  };
  const r=await runRecurringBooking({
    member_id, coach_id, substitute_coach_id:null,
    category:t.category, type_id, format:fmt,
    startDate:date, time, duration:60,
    dows: recurring ? [...document.querySelectorAll('.rec-dow:checked')].map(c=>Number(c.value)) : [],
    count: recurring ? (Number(document.getElementById('rec-max').value)||8) : 1,
    findTicketFn: bkFindTk,
  });
  const created=r.ok, skipped=r.skipped, noTicket=r.noTicket, results=r.results;
  if(created>0) await pushNotification(member_id,'booking','預約成立',`已為您建立 ${created} 筆${t.category}預約。`);

  // 單筆預約：直接吐司；連續預約或有跳過：跳結果摘要視窗
  if(!recurring && results.length===1){
    closeModal();
    if(results[0].ok){ showToast('預約成功，已扣抵 1 堂票券'); }
    else { showToast(results[0].reason); }
    bkAfterSubmit();
    return;
  }
  // 結果摘要視窗
  const wd=['日','一','二','三','四','五','六'];
  const rows=results.map(rr=>{
    const dt=parseYmd(rr.date);
    const label=`${dt.getMonth()+1}/${dt.getDate()}（${wd[dt.getDay()]}）${time}`;
    return rr.ok
      ? `<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--bd);"><span>${label}</span><span style="color:var(--ok);font-weight:500;">✓ 已建立</span></div>`

  }).join('');
  const summary=`成功 ${created} 筆${skipped?`，跳過 ${skipped} 筆衝突/已滿`:''}${noTicket?`，${noTicket} 筆票券不足`:''}${r.capped?`（次數受票券剩餘 ${r.remainTotal} 堂限制）`:''}`;
  showModal(`<div class="modal-title">連續預約結果</div>
    <div style="font-size:13px;color:var(--text);margin-bottom:12px;font-weight:500;">${summary}</div>
    <div style="max-height:300px;overflow-y:auto;font-size:13px;">${rows}</div>
    <div class="modal-foot"><button class="btn btn-green" onclick="closeModal();bkAfterSubmit()">完成</button></div>`);
 }catch(e){
   console.error('submitBooking 錯誤:',e);
   showToast('預約失敗：'+(e&&e.message?e.message:e));
 }
}
// 依起始日、星期清單、次數上限、結束日，產生日期陣列
function buildRecurringDates(startDate,dows,maxN,until){
  const out=[];
  const start=parseYmd(startDate);
  const untilD=until?parseYmd(until):null;
  let cur=new Date(start);
  let guard=0;
  while(out.length<maxN && guard<400){
    guard++;
    if(untilD && cur>untilD) break;
    if(dows.includes(cur.getDay())){
      out.push(ymd(cur));
    }
    cur.setDate(cur.getDate()+1);
  }
  return out;
}

/* ════════════════════════════════════════════════════════
   共用連續預約引擎（後台與教練端共用，規則一致）
   opts = {
     member_id, coach_id, substitute_coach_id,
     category, type_id, format,
     startDate, time, duration=60,
     dows:[],            // 重複星期（0=日..6=六）；空陣列＝單筆（只建 startDate）
     count,              // 要求建立次數（會被票券剩餘上限夾住）
     horizonDays=370,    // 往後最多展開幾天
     onProgress(cur,total)  // 進度回呼（可選）
   }
   回傳 { ok, skipped, noTicket, total, results:[{date, ok, reason}], capped }
   規則：
     1. 次數上限 = min(要求次數, 票券剩餘堂數)
     2. 逐筆即時找該會員可用票券（連續扣，逐次重算剩餘）
     3. 衝堂/場地滿 → 該筆跳過並記原因
     4. 票券不足 → 該筆記「票券不足」
   ════════════════════════════════════════════════════════ */
async function runRecurringBooking(opts){
  const o=opts||{};
  const dur=o.duration||60;
  const operator=(window.SESSION&&SESSION.id)||o.coach_id||null;
  // 找票券函式：預設用 listUsableTickets(依類別)；呼叫端可傳 findTicketFn(memberId, dateStr) 覆寫
  const findTk = o.findTicketFn || (async(mid,ds)=>{ const c=await listUsableTickets(mid,o.type_id,ds); return c[0]||null; });
  const countRemain = o.countRemainFn || (async(mid)=>{ const c=await listUsableTickets(mid,o.type_id,o.startDate); return c.reduce((s,t)=>s+(t.sessions_remaining||0),0); });
  // 1) 票券剩餘上限
  let remainTotal=0;
  try{ remainTotal=await countRemain(o.member_id); }catch(_){}
  const noDeduct = (o.category==='體驗');
  // 2) 產生日期清單
  let dates;
  if(o.dows && o.dows.length){
    const reqCount=Math.max(1, o.count||1);
    const cap = noDeduct ? reqCount : Math.min(reqCount, remainTotal||0);
    const far=ymd(addDays(parseYmd(o.startDate), o.horizonDays||370));
    dates=buildRecurringDates(o.startDate, o.dows, cap, far);
  }else{
    dates=[o.startDate];
  }
  const total=dates.length;
  const capped = (o.dows&&o.dows.length) ? (!noDeduct && (o.count||1) > (remainTotal||0)) : false;

  let ok=0, skipped=0, noTicket=0;
  const results=[];
  let done=0;
  for(const ds of dates){
    done++;
    if(typeof o.onProgress==='function'){ try{ o.onProgress(done,total); }catch(_){} await new Promise(r=>setTimeout(r,0)); }
    let tk=null;
    if(!noDeduct){
      try{ tk=await findTk(o.member_id, ds); }catch(_){}
      if(!tk){ noTicket++; results.push({date:ds,ok:false,reason:'票券不足或已過期'}); continue; }
    }
    const bk={id:uid('BK'), member_id:o.member_id||null, coach_id:o.coach_id||null,
      substitute_coach_id:o.substitute_coach_id||null,
      ticket_id:tk?tk.id:null, ticket_type_id:(tk&&tk.ticket_type_id)||o.type_id||null,
      category:o.category, format:o.format||null,
      date:ds, start_time:o.time, duration:dur, status:'booked',
      recurring:(o.dows&&o.dows.length>0)||false, created_by:operator, created_at:new Date().toISOString()};
    const verr=await validateBooking(bk, ds, o.time, dur);
    if(verr){ skipped++; results.push({date:ds,ok:false,reason:verr}); continue; }
    try{
      await dbPut('bookings', bk);
      if(tk) await deductTicket(tk, bk.id, operator);
      ok++; results.push({date:ds,ok:true});
    }catch(e){ skipped++; results.push({date:ds,ok:false,reason:'寫入失敗'}); }
  }
  return { ok, skipped, noTicket, total, results, capped, remainTotal };
}
// 把連續預約結果組成回報訊息
function recurringResultMsg(r){
  let msg=`已建立 ${r.ok} 筆`;
  const fails=r.skipped+r.noTicket;
  if(fails>0){
    msg+=`，${fails} 筆未建立`;
    const reasons={};
    r.results.filter(x=>!x.ok).forEach(x=>{ reasons[x.reason]=(reasons[x.reason]||0)+1; });
    const detail=Object.entries(reasons).map(([k,v])=>`${k}×${v}`).join('、');
    if(detail) msg+=`（${detail}）`;
  }
  if(r.capped) msg+=`；次數已受票券剩餘 ${r.remainTotal} 堂限制`;
  return msg;
}

async function checkInBooking(id, opts){
  opts=opts||{};
  const b=await dbGet('bookings',id);
  if(!b){showToast('找不到預約');return false;}
  if(b.status==='checked_in'){showToast('此預約已簽到');return false;}
  // 簽到開放時間：課程開始前 30 分鐘起。太早不可簽（維持時段公平、避免提前領點數）
  const slotDt=new Date(b.date+'T'+b.start_time+':00');
  const openDt=new Date(slotDt.getTime()-30*60000);
  if(new Date()<openDt){
    showToast('尚未開放簽到（課程開始前 30 分鐘起）');

  b.checked_in_at=new Date().toISOString();

  if(opts.silent) return true;                   // 掃碼簽到：畫面由呼叫端自行處理

  showToast('已簽到'+(granted?'，已發放自主訓練點數 2 點':''));
  navTo(CUR_PAGE);
  return true;
}

// 掃到正確會員碼後：找出可簽到的課並處理
async function doMemberScanCheckin(){
  const today=ymd(TODAY);
  const now=new Date();
  let bookings=[];
  try{ bookings=await dbGetAll('bookings'); }catch(_){}
  // 本人、今日、狀態可簽（booked/scheduled）、已到 30 分鐘窗的課
  const candidates=(bookings||[]).filter(b=>{
    if(b.member_id!==SESSION.id) return false;
    if(b.date!==today) return false;
    if(b.status!=='booked'&&b.status!=='scheduled') return false;
    const slotDt=new Date(b.date+'T'+b.start_time+':00');
    const openDt=new Date(slotDt.getTime()-30*60000);
    return now>=openDt;
  }).sort((a,b)=>a.start_time.localeCompare(b.start_time));

  if(!candidates.length){
    // 進一步分辨原因：今天有課但還沒到簽到時間 vs 完全沒課
    const todayMine=(bookings||[]).filter(b=>b.member_id===SESSION.id&&b.date===today&&(b.status==='booked'||b.status==='scheduled'));
    const msg = todayMine.length
      ? '尚未開放簽到（課程開始前 30 分鐘起）'
      : '目前沒有可簽到的課程';
    showMemberScanResult(false,msg);
    return;
  }
  if(candidates.length===1){
    const ok=await checkInBooking(candidates[0].id,{silent:true});  // 內含時間檢查、發點
    showMemberScanResult(!!ok, ok?'簽到成功':'簽到失敗，請稍後再試', ok?candidates[0]:null);
    return;
  }
  // 多堂 → 列出讓會員選
  showMemberPickClass(candidates);
}

/* ── 簽到自動發點數 ──
   教練課/體驗課 → 自主訓練點數 +2；友善教練課 → 友善自主訓練點數 +2
   點數以 member_tickets 儲存（ticket_type_id: self_training / self_friendly, source: checkin_grant）
   有效期 7 天。防呆：booking.reward_issued 為 true 則不再發。 */
async function grantCheckinReward(b){
  if(b.reward_issued) return true;             // 已發過視為已發
  // 補簽限制：僅「課程當天」補簽可發點；隔天以後補登不發（維持時段公平）
  // 用正規化日期字串比較，避免補零差異造成誤判
  const norm=s=>{const d=parseYmd(s);return d?ymd(d):s;};
  if(b.makeup && norm(b.date) !== ymd(TODAY)) return false;
  // 判斷發哪種點數
  //  以 category 為主要依據（穩定值），ticket_type_id 為輔（相容舊寫死值）。
  let isFriendly=false, doGrant=false;
  const cat=b.category||'';
  // 反查該預約的票券種類（友善方案 category 可能仍是「私人教練」，需靠種類 color/名稱或扣抵票券名稱判斷友善）
  let ttName='', ttColor='';
  try{
    if(b.ticket_type_id){
      if(!window._ttCache) window._ttCache=await dbGetAll('ticket_types');
      const tt=(window._ttCache||[]).find(t=>t.id===b.ticket_type_id);
      if(tt){ ttName=tt.name||''; ttColor=tt.color||''; }
    }
  }catch(_){}
  // 扣抵的會員票券名稱（最準：友善方案票券 plan_name 含「友善」）
  let tkPlanName='';
  try{
    if(b.ticket_id){ const mt=await dbGet('member_tickets',b.ticket_id); if(mt) tkPlanName=mt.plan_name||''; }
  }catch(_){}
  const friendly = b.ticket_type_id==='pt_friendly' || ttColor==='friendly'
    || cat.indexOf('友善')>=0 || ttName.indexOf('友善')>=0 || tkPlanName.indexOf('友善')>=0;
  const coachClass = cat==='私人教練' || cat==='體驗' || b.ticket_type_id==='pt' || b.ticket_type_id==='trial' || b.ticket_type_id==='pt_friendly' || ttName.indexOf('教練課')>=0 || ttName.indexOf('體驗')>=0 || tkPlanName.indexOf('教練課')>=0 || ttColor==='friendly' || ttColor==='pt';
  if(coachClass){ doGrant=true; isFriendly=friendly; }
  if(!doGrant) return false;                 // 團課/自主訓練本身不發點

  // 動態查「自主訓練」票券種類的實際 ID（與會員預約自主訓練時用的同一個種類，避免 ID 對不上）
  //  規則：category==='自主訓練'；友善 → name 含「友善」；一般 → name 不含「友善」。
  let rewardTypeId=null;
  try{
    const allTypes=await dbGetAll('ticket_types');
    const selfTypes=allTypes.filter(t=>t.category==='自主訓練');
    const friendlyType=selfTypes.find(t=>(t.name||'').indexOf('友善')>=0);
    const normalType=selfTypes.find(t=>(t.name||'').indexOf('友善')<0);
    rewardTypeId = isFriendly ? (friendlyType&&friendlyType.id) : (normalType&&normalType.id);
    // 後備：若找不到對應種類，退回舊的固定 ID（self_friendly / self_training）
    if(!rewardTypeId) rewardTypeId = isFriendly ? 'self_friendly' : 'self_training';
  }catch(_){ rewardTypeId = isFriendly ? 'self_friendly' : 'self_training'; }

  const POINTS=2, VALID_DAYS=7;
  const today=ymd(TODAY);
  const expire=ymd(addDays(TODAY,VALID_DAYS)); // 發放日 +7
  const tk={
    id:uid('TK'),
    member_id:b.member_id,
    ticket_type_id:rewardTypeId,
    source_plan_id:null,
    plan_name: isFriendly?'友善自主訓練點數':'自主訓練點數',
    format:null,
    source:'checkin_grant',
    purchase_date:today, start_date:today, expire_date:expire,
    sessions_total:POINTS, sessions_remaining:POINTS,
    status:'usable', payment_status:'paid', invoice_status:'none',
    created_at:new Date().toISOString()
  };
  try{
    await dbPut('member_tickets',tk);
    await logTicket(tk.id,'grant',POINTS,b.id,SESSION.id,'簽到發放（'+tk.plan_name+'）');
    // 在 booking 上標記，避免重複發
    b.reward_issued=true; b.reward_issued_at=new Date().toISOString(); b.reward_type=rewardTypeId;
    await dbPut('bookings',b);
    return true;
  }catch(e){
    // 發放失敗：完整記錄錯誤並以明顯方式提示（不阻斷簽到本身）
    const msg=(e&&e.message)?e.message:String(e);
    console.error('自主訓練點數發放失敗:',e,'tk=',tk);
    window._lastRewardError=msg;
    // 用 alert 確保不被其他 toast 蓋掉，讓使用者看得到原因
    setTimeout(()=>{ try{ alert('自主訓練點數發放失敗：\n'+msg+'\n\n（簽到已完成，但點數沒發出去。請把這段訊息回報給開發者。）'); }catch(_){} },300);
    return false;
  }
}

async function confirmCancelBooking(id){
  const b=await dbGet('bookings',id);
  if(!b){showToast('找不到預約');return;}
  const hrs=hoursUntilStart(b);
  const within24 = hrs < 24;
  const isAdmin = SESSION.role==='admin' || SESSION.role==='front_desk';
  const isTrial = b.category==='體驗';

  if(isAdmin && !isTrial){
    // 管理員：可選擇是否退回票券
    const note = within24
      ? '此預約在開課 24 小時內。一般會員自行取消不退票，管理員可決定是否退回。'
      : '此預約在開課 24 小時前，預設退回票券。';
    showModal(`<div class="modal-title">取消預約</div>
      <div style="font-size:13px;color:var(--text);padding:4px 0;">${b.date} ${b.start_time}　${b.category}</div>
      <div style="font-size:12px;color:var(--t2);margin:8px 0 14px;line-height:1.6;">${note}</div>
      <div class="modal-foot" style="flex-wrap:wrap;gap:8px;">
        <button class="btn btn-ghost" onclick="closeModal()">返回</button>
        <button class="btn btn-ghost" onclick="cancelBooking('${id}','none')">取消・不退票</button>
        <button class="btn btn-danger" onclick="cancelBooking('${id}','force')">取消・退回票券</button>
      </div>`);
    return;
  }
  // 教練 / 會員：依 24h 自動判斷
  const refundText = isTrial ? '體驗課不涉及票券。'
    : (within24 ? '因開課 24 小時內取消，<b>本次扣課不退票</b>。' : '開課 24 小時前取消，票券將退回。');
  showModal(`<div class="modal-title">取消預約</div>
    <div style="font-size:13.5px;color:var(--text);padding:6px 0 4px;">確定要取消 ${b.date} ${b.start_time} 的${b.category}嗎？</div>
    <div style="font-size:12px;color:var(--t2);margin-top:6px;line-height:1.6;">${refundText}</div>
    <div class="modal-foot"><button class="btn btn-ghost" onclick="closeModal()">返回</button><button class="btn btn-danger" onclick="cancelBooking('${id}','auto')">確定取消</button></div>`);
}
async function saveBookingTime(id){
  const b=await dbGet('bookings',id);
  if(b.date<ymd(TODAY)){showToast('已過期的預約無法修改');return;} // 原課已過期 → 不可改動
  const nd=document.getElementById('ed-date').value;
  const nt=document.getElementById('ed-time').value.slice(0,5);
  const ndur=Number(document.getElementById('ed-dur').value);
  const nsub=document.getElementById('ed-subcoach')?document.getElementById('ed-subcoach').value||null:b.substitute_coach_id||null;
  const noChange = nd===b.date&&nt===b.start_time&&ndur===b.duration&&nsub===(b.substitute_coach_id||null);
  if(noChange){closeModal();return;}
  // 用更新後的內容（含代課教練）驗證：時間衝突、代課教練該時段衝堂、過去時間等
  const vbk={...b, substitute_coach_id:nsub};
  const verr=await validateBooking(vbk,nd,nt,ndur);
  if(verr){showToast(verr);return;}
  b.date=nd;b.start_time=nt;b.duration=ndur;b.substitute_coach_id=nsub;
  if(vbk.venue_unit) b.venue_unit=vbk.venue_unit; // 重新分配的場地單位
  await dbPut('bookings',b);
  closeModal();showToast('已更新預約');navTo(CUR_PAGE);
}

async function saveGroupMembers(id){
  const b=await dbGet('bookings',id);
  const next=(window._grpSel||[]).slice();
  if(next.length>5){showToast('團體課最多 5 人');return;}
  const prev=mids(b);
  const added=next.filter(x=>!prev.includes(x));
  const removed=prev.filter(x=>!next.includes(x));
  // 新加入的有票就扣、移除的退回（依該 booking 的票券類型）
  for(const mid of added){
    const tk=await findUsableTicket(mid,b.ticket_type_id,b.date);
    if(tk) await deductTicket(tk,b.id,SESSION.id);
  }
  for(const mid of removed){
    // 找該會員因這堂課扣的票退回（用 ticket_logs 對應）；簡化：找該會員同類型最近一筆可退
    const logs=(await dbGetAll('ticket_logs')).filter(l=>l.booking_id===b.id && l.action==='deduct');
    const tickets=await dbGetAll('member_tickets');
    const log=logs.find(l=>{const t=tickets.find(t=>t.id===l.ticket_id);return t&&t.member_id===mid;});
    if(log) await refundTicket(log.ticket_id,b.id,SESSION.id);
  }
  b.member_ids=next;
  await dbPut('bookings',b);
  showToast('名單已更新');
  openBookingDetail(id);
}
function statusLabel(s){return {scheduled:'已預約',booked:'已預約',checked_in:'已簽到',completed:'已完成',cancelled:'已取消',no_show:'未到'}[s]||s;}
// 安全取得團體課會員 id 陣列（相容資料庫回傳陣列或 JSON 字串）
function mids(b){
  const v=b&&b.member_ids;
  if(Array.isArray(v))return v;
  if(typeof v==='string'&&v.trim()){try{const p=JSON.parse(v);return Array.isArray(p)?p:[];}catch(e){return [];}}
  return [];
}
// 安全取得團課每人簽到狀態物件 {memberId: 'checked_in'|'booked'}
function attObj(b){
  const v=b&&b.attendance;
  if(v&&typeof v==='object'&&!Array.isArray(v))return v;
  if(typeof v==='string'&&v.trim()){try{const p=JSON.parse(v);return (p&&typeof p==='object')?p:{};}catch(e){return {};}}
  return {};
}
// 團課：切換某會員的簽到狀態
async function toggleGroupAttend(bid,mid){
  const b=await dbGet('bookings',bid);
  const att=attObj(b);
  att[mid] = att[mid]==='checked_in' ? 'booked' : 'checked_in';
  b.attendance=att;
  // 整體狀態：有任一人簽到就算 checked_in，否則 booked（保留原本整體狀態邏輯供今日事項統計）
  const anyIn=Object.values(att).some(s=>s==='checked_in');
  if(b.status!=='completed'&&b.status!=='cancelled') b.status = anyIn?'checked_in':'booked';
  await dbPut('bookings',b);
  openBookingDetail(bid);
}
// 距開課剩餘小時數（<0 表示已過開課時間）
function hoursUntilStart(b){
  try{ const dt=new Date(b.date+'T'+(b.start_time||'00:00')+':00'); return (dt.getTime()-Date.now())/3600000; }
  catch(_){ return 999; }
}
// refundMode：'auto'(依24h自動)、'force'(強制退)、'none'(強制不退)
async function cancelBooking(id, refundMode){
  const b=await dbGet('bookings',id);
  if(!b)return;
  b.status='cancelled';
  b.cancelled_at=new Date().toISOString();
  await dbPut('bookings',b);

  // 決定是否退票
  const hrs=hoursUntilStart(b);
  const within24 = hrs < 24;        // 24 小時內取消
  let doRefund;
  if(refundMode==='force') doRefund=true;
  else if(refundMode==='none') doRefund=false;
  else doRefund = !within24;        // auto：24 小時前才退
  b.refund_waived = !doRefund;      // 記錄是否扣課不退（供補課券判斷）
  await dbPut('bookings',b);

  let refundedCount=0;
  if(doRefund){
    if(b.category==='小班肌力'){
      const logs=(await dbGetAll('ticket_logs')).filter(l=>l.booking_id===b.id && l.action==='deduct');
      const refunded=(await dbGetAll('ticket_logs')).filter(l=>l.booking_id===b.id && l.action==='refund');
      const refundCntByTk={};
      refunded.forEach(l=>{refundCntByTk[l.ticket_id]=(refundCntByTk[l.ticket_id]||0)+1;});
      for(const log of logs){
        if((refundCntByTk[log.ticket_id]||0)>0){ refundCntByTk[log.ticket_id]--; continue; }
        await refundTicket(log.ticket_id,b.id,SESSION.id);
        refundedCount++;
      }
    }else if(b.ticket_id){
      await refundTicket(b.ticket_id,b.id,SESSION.id);
      refundedCount=1;
    }
  }
  // 體驗課（ticket_id 為 null）：本就不退

  // 通知文案
  let body;
  const when=`（${b.date} ${b.start_time}）`;
  if(b.category==='體驗'){
    body=`您的體驗課${when}已取消。`;
  }else if(!doRefund && within24){
    body=`您的${b.category}${when}已取消。因開課 24 小時內取消，本次恕不退回票券。`;
  }else if(b.category==='小班肌力'){
    body=`您的小班肌力課${when}已取消${refundedCount>0?`，已退回 ${refundedCount} 堂團體課票券`:''}。`;
  }else{
    body=`您的${b.category}${when}已取消${refundedCount>0?'，票券已退回 1 堂':'，本次未退回票券'}。`;
  }
  if(b.member_id) await pushNotification(b.member_id,'cancel','預約已取消',body);

  closeModal();
  if(refundedCount>0) showToast(`已取消預約，退回 ${refundedCount} 堂票券`);
  else if(within24 && refundMode!=='none' && refundMode!=='force') showToast('已取消預約（24 小時內，扣課不退）');
  else showToast('已取消預約');
  navTo(CUR_PAGE);
}

// 產生頁碼按鈕（頁數多時以省略號精簡，永遠顯示首尾與當前頁附近）
function memPageNumbers(cur,total){
  const pages=[];
  const add=p=>pages.push(p);
  if(total<=7){ for(let i=1;i<=total;i++)add(i); }
  else{
    add(1);
    if(cur>3) pages.push('...');
    for(let i=Math.max(2,cur-1);i<=Math.min(total-1,cur+1);i++)add(i);
    if(cur<total-2) pages.push('...');
    add(total);
  }
  return pages.map(p=>p==='...'
    ? `<span style="padding:0 4px;color:var(--t3);">…</span>`
    : `<button class="btn btn-sm ${p===cur?'btn-green':'btn-ghost'}" onclick="memGoPage(${p})" style="min-width:34px;">${p}</button>`
  ).join('');
}

async function renderMemQuickResult(){
  const box=document.getElementById('mq-result'); if(!box) return;

  const[members,allTk,types]=await Promise.all([dbGetAll('members'),dbGetAll('member_tickets').catch(()=>[]),dbGetAll('ticket_types').catch(()=>[])]);
  const matched=members.filter(m=>(m.name||'').toLowerCase().includes(q)||(m.phone||'').includes(q));
  if(!matched.length){ box.innerHTML=`<div class="card" style="padding:30px 20px;text-align:center;color:var(--t2);">查無符合的會員</div>`; return; }
  const allBk=await dbGetAll('bookings').catch(()=>[]);
  // 票券彙整（只看可用）
  const today=ymd(TODAY);
  const typeCatMap=Object.fromEntries(types.map(t=>[t.id,t.category]));
  const sumOf=mid=>{
    const s={pt:0,group:0,makeup:0,any:false};
    allTk.forEach(t=>{
      if(t.member_id!==mid) return;
      const usable=t.status==='usable'&&t.sessions_remaining>0&&(!t.expire_date||t.expire_date>=today);
      if(!usable) return; s.any=true;
      if(t.source==='makeup'){ s.makeup+=t.sessions_remaining; return; }
      const cat=typeCatMap[t.ticket_type_id]||'';
      if(cat==='小班肌力') s.group+=t.sessions_remaining; else s.pt+=t.sessions_remaining;
    });
    return s;
  };
  // 最近上課日：已發生（含今天）、未取消的最新一筆
  const lastClassOf=mid=>{
    let last='';
    allBk.forEach(b=>{
      if(b.status==='cancelled')return;
      if(!b.date||b.date>today)return;
      const ids=[]; if(b.member_id)ids.push(b.member_id); if(Array.isArray(b.member_ids))b.member_ids.forEach(x=>ids.push(x));
      if(ids.includes(mid)&&b.date>last) last=b.date;
    });
    return last;
  };
  // 精準命中（姓名或電話完全相同）優先；通常查詢就是要找那一位
  const exact=matched.filter(m=>(m.name||'').toLowerCase()===q||(m.phone||'')===_memQuickQuery.trim());
  const show=(exact.length?exact:matched).slice(0,8);
  const card=m=>{
    const s=sumOf(m.id);

      ? `<span style="color:var(--green);font-weight:600;">教練課 ${s.pt}</span> · 團課 ${s.group} · 補課 ${s.makeup}`
      : `<span style="color:#c0392b;">無有效票券</span>`;
    const last=lastClassOf(m.id);
    return `<div class="card" style="margin-bottom:10px;padding:16px 18px;">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">
        <div style="font-size:18px;font-weight:700;color:var(--text);">${m.name||'—'}</div>
        <span style="font-size:11px;padding:2px 9px;border-radius:20px;background:${d.bg};color:${d.color};font-weight:600;">${d.label}</span>
      </div>
      <div style="font-size:13.5px;color:var(--t2);line-height:2;">
        <div>電話　${m.phone||'—'}</div>
        ${m.email?`<div>Email　${m.email}</div>`:''}
        <div>剩餘票券　${tk}</div>
        <div>最近上課　${last?last:'<span style="color:var(--t3);">尚無紀錄</span>'}</div>
      </div>
    </div>`;
  };
  const more=(!exact.length&&matched.length>show.length)?`<div style="font-size:12px;color:var(--t3);text-align:center;padding:4px 0 8px;">共 ${matched.length} 筆，顯示前 ${show.length} 筆，請輸入更精確的關鍵字</div>`:'';
  box.innerHTML=show.map(card).join('')+more;
}

// 手機版卡片列表：滑動時讓畫面中央的卡片浮起高亮
function initFeedFocus(){
  if(window.innerWidth>600) return;
  const update=()=>{
    const cards=document.querySelectorAll('.mem-feed .mem-line');
    if(!cards.length) return;
    const midY=window.innerHeight*0.42; // 視窗中央偏上一點當聚焦線
    let best=null, bestDist=Infinity;
    cards.forEach(c=>{
      const r=c.getBoundingClientRect();
      const cy=r.top+r.height/2;
      const d=Math.abs(cy-midY);
      if(d<bestDist){ bestDist=d; best=c; }
    });
    cards.forEach(c=>c.classList.toggle('mem-fc-focus', c===best));
  };
  if(window._feedFocusHandler) window.removeEventListener('scroll',window._feedFocusHandler);
  let ticking=false;
  window._feedFocusHandler=()=>{ if(ticking)return; ticking=true; requestAnimationFrame(()=>{ update(); ticking=false; }); };
  window.addEventListener('scroll',window._feedFocusHandler,{passive:true});
  update();
}

// 會員預約紀錄：月曆呈現（整月格子，每格放預約小卡，可翻月）
function memWeekStep(n){
  let {y,m}=window._memMonth; m+=n;
  if(m<0){m=11;y--;} if(m>11){m=0;y++;}
  window._memMonth={y,m}; renderMemberWeek();
}
function memWeekToday(){ const td=new Date(TODAY); window._memMonth={y:td.getFullYear(),m:td.getMonth()}; renderMemberWeek(); }
function renderMemberWeek(){
  const box=document.getElementById('mem-week-cal'); if(!box||!window._memWeekData)return;
  const {bookings,coachMap}=window._memWeekData;
  const {y,m}=window._memMonth;
  const todayStr=ymd(TODAY);
  const wlabel=['一','二','三','四','五','六','日'];
  const first=new Date(y,m,1);
  const startOffset=(first.getDay()+6)%7;            // 週一為第一欄
  const daysInMonth=new Date(y,m+1,0).getDate();
  const totalCells=Math.ceil((startOffset+daysInMonth)/7)*7;
  const heads=wlabel.map(w=>`<div class="mm-wh">週${w}</div>`).join('');
  let cells='';
  for(let i=0;i<totalCells;i++){
    const dayNum=i-startOffset+1;
    if(dayNum<1||dayNum>daysInMonth){ cells+=`<div class="mm-cell mm-empty"></div>`; continue; }
    const d=new Date(y,m,dayNum); const ds=ymd(d);
    const isToday=ds===todayStr;
    const list=bookings.filter(b=>b.date===ds).sort((a,b)=>a.start_time.localeCompare(b.start_time));
    const cards=list.map(b=>{
      const cn=b.coach_id?(coachMap[b.coach_id]||''):'';
      const cc=bkCC(b);
      return `<div class="mm-card ev-${cc}"><span class="mm-t">${b.start_time}</span>${cn?` <span class="mm-c">${cn}</span>`:''}</div>`;
    }).join('');
    cells+=`<div class="mm-cell${isToday?' mm-today':''}">
      <div class="mm-d">${dayNum}</div>${cards}
    </div>`;
  }
  box.innerHTML=`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
      <button class="btn btn-ghost btn-sm" onclick="memWeekStep(-1)">‹ 上月</button>
      <div style="display:flex;align-items:center;gap:10px;"><span style="font-size:14px;font-weight:600;">${y} 年 ${m+1} 月</span><button class="btn btn-ghost btn-sm" onclick="memWeekToday()">本月</button></div>
      <button class="btn btn-ghost btn-sm" onclick="memWeekStep(1)">下月 ›</button>
    </div>
    <div class="mm-grid">${heads}${cells}</div>`;
}

function birthdaySelects(prefix){
  const thisYear=new Date().getFullYear();
  let years='<option value="">年</option>';
  for(let y=thisYear;y>=1940;y--) years+=`<option value="${y}">${y}</option>`;
  let months='<option value="">月</option>';
  for(let m=1;m<=12;m++) months+=`<option value="${m}">${m}</option>`;
  let days='<option value="">日</option>';
  for(let d=1;d<=31;d++) days+=`<option value="${d}">${d}</option>`;
  return `<div style="display:flex;gap:8px;">
    <select id="${prefix}-by" style="flex:1.3;">${years}</select>
    <select id="${prefix}-bm" style="flex:1;">${months}</select>
    <select id="${prefix}-bd" style="flex:1;">${days}</select>
  </div>`;
}

function togglePw(inputId, btn){

// 即時驗證手機格式（台灣手機：09 開頭、10 碼數字），並只允許輸入數字
function checkPhone(){
  const el=document.getElementById('reg-phone'); const box=document.getElementById('phone-hint');
  if(!el)return;
  // 過濾非數字
  const cleaned=el.value.replace(/\D/g,'').slice(0,10);
  if(cleaned!==el.value) el.value=cleaned;
  if(!box)return;
  const p=el.value;
  if(!p){ box.textContent=''; return; }
  if(/^09\d{8}$/.test(p)){ box.textContent='✓ 手機格式正確'; box.style.color='var(--ok)'; }
  else if(p.length<10){ box.textContent=`還差 ${10-p.length} 碼（需 09 開頭共 10 碼）`; box.style.color='var(--t3)'; }
  else { box.textContent='✕ 請輸入 09 開頭的台灣手機號碼'; box.style.color='var(--danger)'; }
}
// 即時驗證兩次密碼是否一致
function checkPwMatch(){
  const p1=document.getElementById('reg-pw'), p2=document.getElementById('reg-pw2');
  const box=document.getElementById('pw-match'); if(!box||!p1||!p2)return;
  if(!p2.value){ box.textContent=''; return; }
  if(p1.value===p2.value){ box.textContent='✓ 密碼一致'; box.style.color='var(--ok)'; }
  else { box.textContent='✕ 兩次輸入的密碼不一致'; box.style.color='var(--danger)'; }
}

async function submitRegister(){
  const v=id=>document.getElementById(id).value.trim();
  const err=document.getElementById('reg-err');
  const btn=document.getElementById('reg-submit');
  const showErr=(msg)=>{err.textContent=msg;err.style.display='block';err.scrollIntoView({block:'center'});if(btn){btn.disabled=false;btn.textContent='完成註冊';}};
  const name=v('reg-name'), phone=v('reg-phone'), pw=document.getElementById('reg-pw').value;
  const pw2=document.getElementById('reg-pw2')?document.getElementById('reg-pw2').value:'';
  if(!name||!phone||!pw){showErr('請填寫姓名、手機與密碼');return;}
  if(!/^09\d{8}$/.test(phone)){showErr('手機號碼格式不正確，請輸入 09 開頭的 10 位數字（例：0912345678）');return;}
  if(pw.length<8){showErr('密碼至少需要 8 個字元');return;}
  if(pw!==pw2){showErr('兩次輸入的密碼不一致');return;}
  // 鎖定按鈕，給使用者「處理中」回饋（避免在 LINE 等內建瀏覽器看似沒反應而重複點）
  if(btn){btn.disabled=true;btn.textContent='處理中…請稍候';}
  err.style.display='none';
  const showLoginHint=(msg)=>{
    err.innerHTML=msg+' <button class="btn btn-green btn-sm" style="margin-left:8px;" onclick="backToLogin&&backToLogin()">前往登入</button>';
    err.style.display='block';err.scrollIntoView({block:'center'});
    if(btn){btn.disabled=false;btn.textContent='完成註冊';}
  };
  try{
    // 防呆：此手機是否已是會員（含尚未建 Auth 帳號的匯入舊會員）→ 引導改用登入
    const existMem=(await sb.from('members').select('id,name,must_setup,auth_id').eq('phone',phone).maybeSingle()).data;
    if(existMem){
      if(existMem.must_setup && !existMem.auth_id){
        showLoginHint('此手機已是本館會員，無需重新申辦。請改用「登入」，預設密碼 88888888，首次登入後設定新密碼。');
      }else{
        showLoginHint('此手機已是會員，請直接登入。');
      }
      return;
    }
    const m={id:uid('m'),name,phone,email:v('reg-email')||null,birthday:readBirthday('reg'),status:'active',tier:'newbie',created_at:new Date().toISOString()};
    const r=await cloudCreateAuth('member',phone,pw);
    if(r.error){
      const dup=/already|exists|registered/i.test(r.error);
      if(dup){
        // 此手機在 Auth 已存在 → 嘗試用這次輸入的密碼登入，修復可能的「半殘帳號」
        const email=toEmail('member',phone);
        const{data:loginData,error:loginErr}=await sb.auth.signInWithPassword({email,password:pw});
        if(loginErr){
          // 密碼不符 → 友善提示，引導登入
          showLoginHint('此手機已註冊過，請用原本的密碼登入；若忘記密碼請聯繫櫃台協助。');
          return;
        }
        // 登入成功 → 檢查 members 是否已有資料
        const existing=(await sb.from('members').select('*').eq('auth_id',loginData.user.id).maybeSingle()).data;
        if(existing){
          // 已是完整會員
          try{await sb.auth.signOut();}catch(_){}
          showLoginHint('此手機已是會員，請直接登入。');
          return;
        }
        // 半殘帳號（有 Auth 無資料）→ 優先綁定後台已建同手機會員，否則補寫新資料
        const pre2=(await sb.from('members').select('*').eq('phone',phone).is('auth_id',null).maybeSingle()).data;
        if(pre2){
          pre2.auth_id=loginData.user.id;
          if(!pre2.name && name) pre2.name=name;
          await dbPut('members',pre2);
        }else{
          m.auth_id=loginData.user.id;
          await dbPut('members',m);
        }
        try{await sb.auth.signOut();}catch(_){}
        // 繼續往下顯示成功畫面
      }else{
        showErr('註冊失敗：'+r.error);return;
      }
    }else{
      // 若後台已先建立同手機的會員資料（無 auth_id），綁定到既有那筆，保留其票券/預約紀錄
      const pre=(await sb.from('members').select('*').eq('phone',phone).is('auth_id',null).maybeSingle()).data;
      if(pre){
        pre.auth_id=r.uid;
        if(!pre.name && name) pre.name=name;
        if(!pre.email && m.email) pre.email=m.email;
        await dbPut('members',pre);
      }else{
        m.auth_id=r.uid;
        await dbPut('members',m);
      }
      try{await sb.auth.signOut();}catch(_){}
    }
  }catch(e){
    showErr('註冊失敗：'+(e.message||e));return;
  }
  const host=document.getElementById('invite-screen');
  host.innerHTML=`<div class="login-card"><div class="login-logo"><div class="mark">YUGYM</div></div>
    <div style="text-align:center;padding:24px 0;">
      <div style="font-size:40px;margin-bottom:12px;">✓</div>
      <div style="font-size:15px;font-weight:500;margin-bottom:8px;">會員帳號已建立</div>
      <div style="font-size:12.5px;color:var(--t2);line-height:1.8;">請返回登入頁，用手機號碼 ${phone} 登入。</div>
      <button class="btn-primary" style="margin-top:18px;" onclick="location.hash='';location.reload();">返回登入頁</button>
    </div></div>`;
}

async function loadSalaryTemplates(){
  try{

      rows.forEach(r=>{

          const lv=window.SALARY_GLOBAL&&window.SALARY_GLOBAL.insurance_levels;
          const allZero = !lv || !lv.length || lv.every(x=>!(Number(x.labor_emp)||Number(x.health_emp)));
          const noCoTotal = lv && lv.length && lv.every(x=>!(Number(x.co_total)>0));
          if(allZero || noCoTotal) window.SALARY_GLOBAL.insurance_levels = JSON.parse(JSON.stringify(SALARY_GLOBAL_DEFAULT.insurance_levels));
          return;
        }
        let cfg=r.config;
        if(typeof cfg==='string'){ try{ cfg=JSON.parse(cfg); }catch(_){ cfg=null; } }
        const base=SALARY_TPL_DEFAULT[r.id]?JSON.parse(JSON.stringify(SALARY_TPL_DEFAULT[r.id])):{};
        window.SALARY_TPL[r.id]= cfg ? Object.assign(base,cfg)
          : Object.assign(base,{pt_rate:r.pt_rate,group_per_head:r.group_rate,duty_hourly:r.duty_hourly});
      });
    }
  }catch(_){}
}
// 取得某員工適用費率（階段一：仍回傳簡易三費率供現有薪資頁過渡；階段二改複雜計算）
function effRates(emp){
  if(emp && emp.custom_salary){
    return { pt_rate:emp.pt_rate||0, group_rate:emp.group_rate||0, duty_hourly:emp.duty_hourly||0, source:'自訂' };
  }
  const et=normEmp(emp&&(emp.employment_type||emp.pay_type));
  const tpl=(window.SALARY_TPL||{})[et]||{};
  let pt=tpl.pt_rate||0;
  if(tpl.pt_mode==='tier' && Array.isArray(tpl.pt_tiers) && tpl.pt_tiers[0]) pt=tpl.pt_tiers[0].rate||0; // 暫以第一階代表
  return { pt_rate:pt, group_rate:tpl.group_per_head||0, duty_hourly:tpl.duty_hourly||0, source:(PAY_LABEL[et]||'')+'模板' };
}
// ════════ 完整薪資計算（依模板：底薪＋教練課階梯／固定＋達標獎金＋團課人頭＋值班費）════════
// 參數：emp 員工、ptDone 教練課完成堂數、groupHeads 團課總人頭、dutyHours 值班工時
// 回傳各項金額與合計，供薪資頁顯示
// ── 請假彙總：算某員工某月各假別時數 ──
function leaveSummary(shifts, empId, month){
  const list=(shifts||[]).filter(s=>s.emp_id===empId&&(s.date||'').slice(0,7)===month);
  let 特休=0, 病假=0, 事假=0, scheduled=0;
  list.forEach(s=>{
    scheduled+=(Number(s.hours)||0);
    const lh=Number(s.leave_hours)||0;
    if(s.leave_type==='特休') 特休+=lh;
    else if(s.leave_type==='病假') 病假+=lh;
    else if(s.leave_type==='事假') 事假+=lh;
  });
  const leaveTotal=特休+病假+事假;
  return { scheduled, 特休, 病假, 事假, leaveTotal, actual:Math.max(scheduled-leaveTotal,0) };
}
// ── 年度特休帳（設計A）──
// 基數存員工欄位：al_carry_hours(去年結轉)、al_earned_hours(本年度新增)
// 已使用＝該年度排班表「特休」時數加總；依 FIFO 先扣去年結轉、再扣本年度新增（即時推算，不另存）
// year：西元年數字或字串（曆年制 1/1~12/31）
function annualLeaveAccount(emp, shifts, year){
  const y=String(year);
  const carry =Number(emp&&emp.al_carry_hours)||0;   // 去年結轉
  const earned=Number(emp&&emp.al_earned_hours)||0;  // 本年度新增
  // 當年度已使用特休（從排班表，曆年制）
  let used=0;
  (shifts||[]).forEach(s=>{
    if(s.emp_id===emp.id && (s.date||'').slice(0,4)===y && s.leave_type==='特休'){
      used+=Number(s.leave_hours)||0;
    }
  });
  // FIFO：先扣去年結轉，溢出才扣本年度新增
  const usedFromCarry  = Math.min(used, carry);
  const usedFromEarned = Math.max(used - carry, 0);
  const carryRemain  = Math.max(carry  - usedFromCarry , 0); // 去年結轉剩餘
  const earnedRemain = Math.max(earned - usedFromEarned, 0); // 本年度新增剩餘
  const grant  = carry + earned;          // 應給（可用合計）
  const remain = Math.max(grant - used,0); // 剩餘
  return { year:y, carry, earned, used, usedFromCarry, usedFromEarned,
           carryRemain, earnedRemain, grant, remain };
}
// ── 值班時段內上課重疊時數：每天分別算該員工教練課與排班的重疊，加總（小時）──
// 規則：兼職/工讀/合作教練在值班時段內上教練課，該重疊時段以課程抽成為主，不重複計值班費
function dutyClassOverlapHours(shifts, bookings, empId, month){
  const myShifts=(shifts||[]).filter(s=>s.emp_id===empId&&(s.date||'').slice(0,7)===month);
  if(!myShifts.length) return 0;
  // 該員工當月已上課（已完成或已簽到）、且有授課時段的課（私人教練/體驗/小班肌力團課）
  const myClasses=(bookings||[]).filter(b=>b.coach_id===empId && (b.status==='completed'||b.status==='checked_in')
    && (b.category==='私人教練'||b.category==='體驗'||b.category==='小班肌力') && (b.date||'').slice(0,7)===month);
  if(!myClasses.length) return 0;
  let overlapMin=0;
  // 依日期分組比對
  const shiftsByDate={}; myShifts.forEach(s=>{ (shiftsByDate[s.date]=shiftsByDate[s.date]||[]).push(s); });
  myClasses.forEach(b=>{
    const daySh=shiftsByDate[b.date]; if(!daySh) return;
    const cs=timeToMin(b.start_time), ce=cs+(Number(b.duration)||60);
    daySh.forEach(s=>{
      const ss=timeToMin(s.start_time), se=timeToMin(s.end_time);
      const ov=Math.min(ce,se)-Math.max(cs,ss); // 重疊分鐘
      if(ov>0) overlapMin+=ov;
    });
  });
  return overlapMin/60;
}
// ── 值班時數：以打卡時數計，但被排班時數封頂（每天取 min(打卡, 排班) 加總）──
// 規則：照實際打卡算，但不超過排班；避免早到晚走多計。某天沒打卡則該天 0（視同未上班，不計值班費）。
function dutyHoursCapped(attendance, shifts, empId, month){
  const myShifts=(shifts||[]).filter(s=>s.emp_id===empId&&(s.date||'').slice(0,7)===month);
  if(!myShifts.length) return 0;
  // 每天排班時數（可能多筆，加總）
  const schedByDate={};
  myShifts.forEach(s=>{ schedByDate[s.date]=(schedByDate[s.date]||0)+(Number(s.hours)||0); });
  // 每天打卡時數
  const attByDate={};
  (attendance||[]).filter(a=>a.emp_id===empId&&(a.date||'').slice(0,7)===month).forEach(a=>{
    const h=calcWorkHours(a); if(h!=null) attByDate[a.date]=(attByDate[a.date]||0)+h;
  });
  let total=0;
  Object.keys(schedByDate).forEach(d=>{
    const sched=schedByDate[d];
    const punched=attByDate[d];
    // 有打卡→取 min(打卡,排班)；沒打卡→該天 0（視同未上班，不計值班費）
    total += (punched!=null) ? Math.min(punched, sched) : 0;
  });
  return total;
}
function calcSalary(emp, ptDone, groupHeads, dutyHours, leave, classOverlap, extras){
  extras=extras||{};
  // 自訂薪資：用個人費率（簡化：固定費率）
  if(emp && emp.custom_salary){
    const ptPay=ptDone*(emp.pt_rate||0);
    const groupPay=groupHeads*(emp.group_rate||0);
    const etC=normEmp(emp&&(emp.employment_type||emp.pay_type));
    let dhrC=Number(emp.duty_hourly)||0;
    if(etC==='contractor' && dutyHours>0 && dhrC<200) dhrC=200; // 合作教練值班保底 200
    const dutyGross=Math.round(dutyHours*dhrC);
    const Lc=leave||{特休:0,病假:0,事假:0};
    const dutyLeaveDeduct=Math.round((Lc.事假||0)*dhrC + (Lc.病假||0)*dhrC*0.5);
    const coC=Number(classOverlap)||0;
    const dutyClassDeduct=Math.round(coC*dhrC);
    const dutyPay=Math.max(dutyGross-dutyLeaveDeduct-dutyClassDeduct,0);
    const Gc=window.SALARY_GLOBAL||{};
    const renewCountC=Number(extras.renewCount)||0, renewEachC=Number(Gc.renew_bonus)||0, renewPayC=renewCountC*renewEachC;
    const supC=emp.is_supervisor?(Number(Gc.supervisor_bonus)||0):0;
    let leaderPayC=0; const leaderPartsC=[];
    if(emp.is_manager && Array.isArray(extras.leaderHeads)){
      const tiersC=(Gc.leader_tiers||[]).slice().sort((a,b)=>(a.min||0)-(b.min||0));
      extras.leaderHeads.forEach(h=>{const hh=Number(h)||0;for(const t of tiersC){const lo=t.min||0,hi=(t.max==null?Infinity:t.max);if(hh>=lo&&hh<=hi){leaderPayC+=Number(t.amount)||0;leaderPartsC.push(`${hh}堂+$${t.amount}`);break;}}});
    }
    const mgmtPayC=supC+leaderPayC;
    const gradeC=emp.insured_grade||emp.insurance_grade||emp.labor_insurance_level||emp.health_insurance_level;
    const lvlC=(Gc.insurance_levels||[]).find(x=>String(x.grade)===String(gradeC));
    const laborOnC = emp.labor_insurance_status!=null&&emp.labor_insurance_status!=='' ? emp.labor_insurance_status==='enrolled' : emp.is_labor_insurance===true;
    const healthOnC= emp.health_insurance_status!=null&&emp.health_insurance_status!=='' ? emp.health_insurance_status==='enrolled' : emp.is_health_insurance===true;
    const insIdentityC=(emp&&emp.insurance_identity)||'employee';
    const insHealthEmpC = (healthOnC && insIdentityC==='owner')
      ? Math.round((Number(gradeC)||0)*NHI_RATE_OWNER)
      : (lvlC?(healthOnC?Number(lvlC.health_emp)||0:0):0);
    const insLaborEmpC = lvlC?(laborOnC?Number(lvlC.labor_emp)||0:0):0;
    const insEmpC=insLaborEmpC+insHealthEmpC;
    const insCoC=(lvlC?(Number(lvlC.co_total)>0?Number(lvlC.co_total):((Number(lvlC.labor_co)||0)+(Number(lvlC.health_co)||0))):0);
    const grossC=ptPay+groupPay+dutyPay+renewPayC+mgmtPayC;
    return { base:0, adjBase:0, baseLeaveDeduct:0, ptPay, ptDetail:`${ptDone} 堂 × $${emp.pt_rate||0}`, ptIncome:ptPay, ptIsFloor:false, ptIncomeDetail:`${ptDone} 堂 × $${emp.pt_rate||0}`,
      bonus:0, bonusDetail:'—', groupPay, groupDetail:`${groupHeads} 人 × $${emp.group_rate||0}`,
      dutyGross, dutyLeaveDeduct, dutyClassDeduct, classOverlap:coC, dutyPay, dutyDetail:`${dutyHours.toFixed(1)} hr × $${dhrC}`,
      renewCount:renewCountC, renewPay:renewPayC, renewDetail:renewCountC>0?`${renewCountC} 張 × $${renewEachC}`:'—',
      isSupervisor:!!emp.is_supervisor, supPay:supC, isLeader:!!emp.is_manager, leaderPay:leaderPayC, leaderDetail:leaderPayC>0?leaderPartsC.join('、'):'—', mgmtPay:mgmtPayC,
      insGrade:gradeC||null, insLaborEmp:0, insHealthEmp:0, insEmpDeduct:insEmpC, insLaborCo:0, insHealthCo:0, insCoCost:insCoC,
      leave:Lc,
      grossPay:grossC, netPay:Math.max(grossC-insEmpC,0),
      total: grossC };
  }
  const et=normEmp(emp&&(emp.employment_type||emp.pay_type));
  const tpl=(window.SALARY_TPL||{})[et]||{};
  const base=tpl.base_salary||0;

  // ① 教練課費（固定 or 階梯）
  let ptPay=0, ptDetail='';
  if(tpl.pt_mode==='tier' && Array.isArray(tpl.pt_tiers) && tpl.pt_tiers.length){
    // 累進：級距 {min,max} 代表「第 min..max 堂」（含兩端，1-based）。
    //  例 {0,59}=第1~59堂、{60,79}=第60~79堂…。逐階取該區間落在已完成堂數內的堂數。
    const tiers=tpl.pt_tiers.slice().sort((a,b)=>(a.min||0)-(b.min||0));
    const parts=[];
    tiers.forEach((t,i)=>{
      // 區間下界：第一階從第 1 堂起；其餘從 min 堂起（min 視為該階第一堂）
      const lo=(i===0)?1:(t.min||0);
      const hi=(t.max==null?Infinity:t.max);
      const cntInTier=Math.max(0, Math.min(ptDone, hi) - lo + 1);
      if(cntInTier>0){ ptPay+=cntInTier*(t.rate||0); parts.push(`${cntInTier}堂×$${t.rate||0}`); }
    });
    ptDetail = ptDone>0 ? parts.join(' + ') : '0 堂';
  }else{
    const rate=tpl.pt_rate||0;
    ptPay=ptDone*rate; ptDetail=`${ptDone} 堂 × $${rate}`;
  }

  // ② 達標獎金（疊加：每個達到門檻的都給）
  let bonus=0; const bonusParts=[];
  (tpl.pt_bonus||[]).forEach(b=>{
    if(b.amount>0 && ptDone>=(b.threshold||0)){ bonus+=b.amount; bonusParts.push(`滿${b.threshold}堂+$${b.amount}`); }
  });
  const bonusDetail = bonus>0 ? bonusParts.join('、') : '—';

  // ③ 團課費（人頭制）
  const ghead=tpl.group_per_head||0;
  const groupPay=groupHeads*ghead;
  const groupDetail=`${groupHeads} 人次 × $${ghead}`;

  // ④ 值班費（工時 × 時薪）：員工個人值班時薪優先，否則用類型模板
  let dhr=(emp&&Number(emp.duty_hourly)>0)?Number(emp.duty_hourly):(tpl.duty_hourly||0);
  // 合作教練若有排班值班，時薪至少 200（保底，不受雲端模板殘留 0 影響）
  if(et==='contractor' && dutyHours>0 && dhr<200) dhr=200;
  const dutyGross=Math.round(dutyHours*dhr); // 原應值班費（依排班時數）
  const L=leave||{特休:0,病假:0,事假:0};
  // 值班費請假扣除：事假全扣、病假半扣、特休不扣（皆 × 時薪）
  const dutyLeaveDeduct=Math.round((L.事假||0)*dhr + (L.病假||0)*dhr*0.5);
  // 值班時段內上課：重疊時數以課程抽成為主，不重複計值班費 → 扣除
  const co=Number(classOverlap)||0;
  const dutyClassDeduct=Math.round(co*dhr);
  const dutyPay=Math.max(dutyGross-dutyLeaveDeduct-dutyClassDeduct,0);
  const dutyDetail=`${dutyHours.toFixed(1)} hr × $${dhr}`;

  // 正職保障底薪的請假扣除（固定排班制，非傳統 8h 月薪）：
  //  時薪 = 當月保障底薪 ÷ 當月應排班時數（由班表自動換算，不寫死時薪/工時）
  //  事假全扣、病假折半(50%)、特休/公假不扣
  const schedHours = (leave && Number(leave.scheduled)>0) ? Number(leave.scheduled) : 0;
  const baseHourly = (base>0 && schedHours>0) ? base/schedHours : 0;
  const leavePersonal = (L.事假||0); // 事假時數
  const leaveSick = (L.病假||0);     // 病假時數
  const baseLeavePersonalDed = Math.round(leavePersonal*baseHourly);       // 事假：全扣
  const baseLeaveSickDed = Math.round(leaveSick*baseHourly*0.5);           // 病假：折半
  const baseLeaveDeduct = baseLeavePersonalDed + baseLeaveSickDed;
  const adjBase = Math.max(base-baseLeaveDeduct,0); // 調整後保障薪資
  // 請假扣款計算說明（供薪資明細顯示）
  const leaveDeductDetail = (baseLeaveDeduct>0 && baseHourly>0)
    ? `時薪 $${Math.round(baseHourly).toLocaleString()}（底薪 $${base.toLocaleString()} ÷ 當月排班 ${schedHours.toFixed(1)}h）`
      + (leavePersonal>0?`　事假 ${leavePersonal}h × 時薪 = −$${baseLeavePersonalDed.toLocaleString()}`:'')
      + (leaveSick>0?`　病假 ${leaveSick}h × 時薪 × 50% = −$${baseLeaveSickDed.toLocaleString()}`:'')
    : '';

  // 保障底薪：教練課費與「調整後底薪」取高者（其餘項目另外加）
  const ptIncome = Math.max(ptPay, adjBase);
  const ptIsFloor = adjBase>0 && adjBase>ptPay; // 是否觸發保障底薪
  const ptIncomeDetail = base>0
    ? (ptIsFloor ? `保障底薪 $${adjBase.toLocaleString()}${baseLeaveDeduct>0?`（底薪 $${base.toLocaleString()} − 請假 $${baseLeaveDeduct.toLocaleString()}）`:''}（課費 $${ptPay.toLocaleString()} 未達底薪）`
                 : `教練課費 $${ptPay.toLocaleString()}（高於調整後底薪 $${adjBase.toLocaleString()}）`)
    : ptDetail;
  // ── v2.0 加項（全部讀全域設定，不寫死）──
  const G=window.SALARY_GLOBAL||{};
  // ⑤ 續約獎金：每張固定金額 × 當月續約張數
  const renewCount=Number(extras.renewCount)||0;
  const renewEach=Number(G.renew_bonus)||0;
  const renewPay=renewCount*renewEach;
  const renewDetail=renewCount>0?`${renewCount} 張 × $${renewEach}`:'—';
  // ⑥ 主管津貼：固定（is_supervisor）
  const isSup=!!(emp&&emp.is_supervisor);
  const supPay=isSup?(Number(G.supervisor_bonus)||0):0;
  // ⑦ 店長階梯津貼：傳入所管理教練的堂數陣列 extras.leaderHeads=[105,85,102...]
  //    每位教練的堂數落在哪一階就加該階金額，可累加（名單已排除老闆與店長本人，由呼叫端負責）
  const isLeader=!!(emp&&emp.is_manager);
  let leaderPay=0; const leaderParts=[];
  if(isLeader && Array.isArray(extras.leaderHeads)){
    const tiers=(G.leader_tiers||[]).slice().sort((a,b)=>(a.min||0)-(b.min||0));
    extras.leaderHeads.forEach(h=>{
      const hh=Number(h)||0;
      for(const t of tiers){
        const lo=t.min||0, hi=(t.max==null?Infinity:t.max);
        if(hh>=lo && hh<=hi){ leaderPay+=Number(t.amount)||0; leaderParts.push(`${hh}堂+$${t.amount}`); break; }
      }
    });
  }
  const leaderDetail=leaderPay>0?leaderParts.join('、'):'—';
  const mgmtPay=supPay+leaderPay; // 管理職津貼合計
  // ⑧ 勞健保員工負擔：依員工投保級距查級距表（insured_grade 為勞健保管理填的欄位）
  const grade=emp&&(emp.insured_grade||emp.insurance_grade||emp.labor_insurance_level||emp.health_insurance_level);
  const lvl=(G.insurance_levels||[]).find(x=>String(x.grade)===String(grade));
  // 只在投保狀態明確為「投保中(enrolled)」時才扣；未設定/未投保/已退保皆不扣（含舊布林相容）
  const laborOn = emp ? (emp.labor_insurance_status!=null&&emp.labor_insurance_status!=='' ? emp.labor_insurance_status==='enrolled' : emp.is_labor_insurance===true) : false;
  const healthOn= emp ? (emp.health_insurance_status!=null&&emp.health_insurance_status!=='' ? emp.health_insurance_status==='enrolled' : emp.is_health_insurance===true) : false;
  const insLaborEmp = (laborOn && lvl)?(Number(lvl.labor_emp)||0):0;
  // 健保員工負擔：負責人(owner)＝投保金額×費率全額自付；一般受僱者＝查級距表 health_emp
  const insIdentity = (emp&&emp.insurance_identity)||'employee';
  let insHealthEmp;
  if(healthOn && insIdentity==='owner'){
    const insAmt = Number(grade)||0; // 負責人投保金額
    insHealthEmp = Math.round(insAmt * NHI_RATE_OWNER);
  } else {
    insHealthEmp = (healthOn && lvl)?(Number(lvl.health_emp)||0):0;
  }
  const insEmpDeduct=insLaborEmp+insHealthEmp; // 員工負擔合計（從應發扣除）
  const insLaborCo  = lvl?(Number(lvl.labor_co)||0):0;
  const insHealthCo = lvl?(Number(lvl.health_co)||0):0;
  // 公司三合一負擔：優先用 co_total（勞保雇主總額+健保雇主+勞退）；無則退回舊欄位加總
  const insCoCost   = lvl ? (Number(lvl.co_total)>0 ? Number(lvl.co_total) : (insLaborCo+insHealthCo)) : 0;

  const grossPay = ptIncome + bonus + groupPay + dutyPay + renewPay + mgmtPay; // 應發
  const netPay   = Math.max(grossPay - insEmpDeduct, 0);                       // 實發

  return { base, adjBase, baseLeaveDeduct, baseHourly, schedHours, baseLeavePersonalDed, baseLeaveSickDed, leaveDeductDetail,
    ptPay, ptDetail, ptIncome, ptIsFloor, ptIncomeDetail,
    bonus, bonusDetail, groupPay, groupDetail,
    dutyGross, dutyLeaveDeduct, dutyClassDeduct, classOverlap:co, dutyPay, dutyDetail,
    renewCount, renewPay, renewDetail,
    isSupervisor:isSup, supPay, isLeader, leaderPay, leaderDetail, mgmtPay,
    insGrade:grade||null, insLaborEmp, insHealthEmp, insEmpDeduct, insLaborCo, insHealthCo, insCoCost,
    leave:L,
    grossPay, netPay,
    total: grossPay }; // total 維持＝應發，相容既有顯示
}
const STAFF_STATUS_TAG={active:'tag-ok',unpaid_leave:'tag-warn',inactive:'tag-danger',resigned:'tag-danger'};
// 可編輯排班：管理員、店長(is_manager)、主管(is_supervisor)

// 計薪規則：只有兼職 part_time / 工讀 intern 列入排班計時（值班費＝排班總時數×duty_hourly）
const SHIFT_DUTY_TYPES=['part_time','intern'];
function isDutyType(emp){ return SHIFT_DUTY_TYPES.includes(normEmp(emp&&(emp.employment_type||emp.pay_type))); }
// 計算起迄時數（HH:MM），以 0.5 小時為單位；支援跨午夜
function shiftHours(start,end){
  if(!start||!end) return 0;
  const[sh,sm]=start.split(':').map(Number),[eh,em]=end.split(':').map(Number);
  let mins=(eh*60+em)-(sh*60+sm);
  if(mins<0) mins+=24*60;            // 跨午夜
  return Math.round(mins/30)/2;      // 0.5 小時為單位
}

// 依起迄時間反推班別代號（給舊資料或手動輸入用）
function shiftCode(start,end){
  const m=SHIFT_QUICK.find(([c,s,e])=>s===start&&e===end);
  return m?m[0]:'';
}
// 營業時間（依星期；0=日）：週一~五 10-22、週六 9-21、週日 9-15
const BUSINESS_HOURS={ 0:['09:00','15:00'], 1:['10:00','22:00'], 2:['10:00','22:00'], 3:['10:00','22:00'], 4:['10:00','22:00'], 5:['10:00','22:00'], 6:['09:00','21:00'] };
// 檢查某天排班是否覆蓋全營業時段，回傳沒人的時段陣列 [[startMin,endMin],...]
// 註：有登記請假(leave_type)的班次，整段視為「沒人」（與出勤月曆判定一致）
function findShiftGaps(dayShifts, dow){
  const bh=BUSINESS_HOURS[dow]; if(!bh) return [];
  const open=timeToMin(bh[0]), close=timeToMin(bh[1]);
  const covered=dayShifts.filter(s=>s.start_time&&s.end_time&&!s.leave_type)
    .map(s=>[timeToMin(s.start_time),timeToMin(s.end_time)])
    .sort((a,b)=>a[0]-b[0]);
  const gaps=[]; let cursor=open;
  for(const[cs,ce] of covered){
    if(ce<=open||cs>=close) continue; // 完全在營業時間外
    const s=Math.max(cs,open), e=Math.min(ce,close);
    if(s>cursor) gaps.push([cursor,s]); // cursor 到本段開始之間沒人
    cursor=Math.max(cursor,e);
  }
  if(cursor<close) gaps.push([cursor,close]); // 最後到打烊沒人
  return gaps;
}
// 掃描整月，回傳有空班的日子 [{date, dow, gaps:[[s,e]...]}]
function monthShiftGaps(shifts, month){
  const[my,mm]=month.split('-').map(Number);
  const daysInMonth=new Date(my,mm,0).getDate();
  const result=[];
  for(let d=1;d<=daysInMonth;d++){
    const ds=`${my}-${String(mm).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dow=new Date(my,mm-1,d).getDay();
    const dayShifts=(shifts||[]).filter(s=>s.date===ds);
    const gaps=findShiftGaps(dayShifts, dow);
    if(gaps.length) result.push({date:ds, day:d, dow, gaps});
  }
  return result;
}
let _shiftMonth=null;
// 某班次是否「已開始」（用來判斷未打卡是否算異常）：
//   過去日期 → 一定已開始；今天 → 需 start_time 已過現在時刻；未來 → 尚未開始
function shiftStarted(ds, startTime, today){
  if(ds<today) return true;
  if(ds>today) return false;
  if(!startTime) return true; // 今天但沒起始時間，保守視為已開始
  const _n=new Date(); const nowMin=_n.getHours()*60+_n.getMinutes();
  return timeToMin(startTime)<=nowMin;
}

function readWeeklyPattern(){
  const arr=[];
  for(let i=0;i<7;i++){ const el=document.getElementById('wk-'+i); arr.push(el?el.value:'off'); }
  return arr;
}
async function saveWeeklyPattern(){
  const empId=document.getElementById('wk-empid').value;
  const pattern=readWeeklyPattern().join(',');
  try{
    const c=await dbGet('coaches',empId);
    c.weekly_shift=pattern;
    await dbPut('coaches',c);
    showToast('已儲存週期模式');
    return true;
  }catch(e){
    showToast('模式儲存失敗（可能是 coaches 表尚未加 weekly_shift 欄位）');
    return false;
  }
}
async function applyWeeklyToMonth(){
  const empId=document.getElementById('wk-empid').value;
  const pattern=readWeeklyPattern();
  // 先嘗試記住模式（失敗不影響套用）
  try{ const c=await dbGet('coaches',empId); c.weekly_shift=pattern.join(','); await dbPut('coaches',c); }catch(_){}
  const month=_shiftMonth||ymd(TODAY).slice(0,7);
  const[my,mm]=month.split('-').map(Number);
  const daysInMonth=new Date(my,mm,0).getDate();
  const existing=(window._shiftsCache||[]).filter(s=>s.emp_id===empId&&(s.date||'').slice(0,7)===month);
  const hasDay=new Set(existing.map(s=>s.date));
  let added=0, skipped=0;
  for(let d=1;d<=daysInMonth;d++){
    const dateObj=new Date(my,mm-1,d);
    const dow=dateObj.getDay(); // 0=日
    const code=pattern[dow];
    if(!code||code==='off') continue;
    const dateStr=`${my}-${String(mm).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    if(hasDay.has(dateStr)){ skipped++; continue; } // 已有排班→跳過
    const t=codeToTime(code); if(!t) continue;
    const hours=shiftHours(t[0],t[1]);
    const obj={ id:uid('shift'), emp_id:empId, date:dateStr, start_time:t[0], end_time:t[1], hours,
      note:'', created_by:(SESSION&&SESSION.id)||'', created_at:new Date().toISOString() };
    try{ await dbPut('shifts',obj); added++; }catch(_){}
  }
  showToast(`已套用：新增 ${added} 天${skipped?`，跳過 ${skipped} 天（已有排班）`:''}`);
  closeModal();
  navTo('attendance');
}

// 把 modal 當前填的時段，套用到本月所有「同星期」的日子，並記入週期模式
// 一併把當天這格存成新時段；同星期已有排班的日子，依 overwrite 決定覆蓋或跳過
async function applyThisToWeekly(empId, dateStr){
  const start=document.getElementById('sh-start').value;
  const end=document.getElementById('sh-end').value;
  if(!start||!end){ showToast('請先選好起迄時間'); return; }
  const hours=shiftHours(start,end);
  if(hours<=0){ showToast('時數需大於 0'); return; }
  const note=(document.getElementById('sh-note')||{}).value||'';
  const curId=(document.getElementById('sh-id')||{}).value||'';
  const targetDow=parseYmd(dateStr).getDay();
  const month=(_shiftMonth||ymd(TODAY).slice(0,7));
  const[my,mm]=month.split('-').map(Number);
  const daysInMonth=new Date(my,mm,0).getDate();
  // 先存當天這格（有 id 更新、無 id 新建）
  const todayObj={ id:curId||uid('shift'), emp_id:empId, date:dateStr, start_time:start, end_time:end, hours, note:note.trim(),
    leave_type:null, leave_hours:0, created_by:(SESSION&&SESSION.id)||'', created_at:new Date().toISOString() };
  try{ await dbPut('shifts',todayObj); }catch(_){}
  // 抓最新排班，找出同星期「其他日子」的衝突（已有班）
  let allShifts=[]; try{ allShifts=await dbGetAll('shifts'); }catch(_){ allShifts=window._shiftsCache||[]; }
  const monthEmp=allShifts.filter(s=>s.emp_id===empId&&(s.date||'').slice(0,7)===month);
  const byDate={}; monthEmp.forEach(s=>{ (byDate[s.date]=byDate[s.date]||[]).push(s); });
  const targetDates=[];
  for(let d=1;d<=daysInMonth;d++){
    const ds=`${my}-${String(mm).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    if(new Date(my,mm-1,d).getDay()!==targetDow) continue;
    if(ds===dateStr) continue; // 當天已存
    targetDates.push(ds);
  }
  const conflicts=targetDates.filter(ds=>(byDate[ds]||[]).length>0);
  window._applyWeeklyCtx={ empId, dateStr, start, end, hours, note, targetDow, month, byDate, targetDates, conflicts };
  if(conflicts.length===0){
    await _doApplyWeekly(false); // 全空白，直接套
  }else{
    // 有衝突 → 問使用者
    const wdName='日一二三四五六'[targetDow];
    showModal(`<div class="modal-title">設為每週${wdName}固定</div>
      <div style="font-size:13px;color:var(--t2);line-height:1.8;margin-bottom:14px;">
        本月共有 <b>${targetDates.length}</b> 個週${wdName}，其中 <b style="color:#c0392b;">${conflicts.length} 天已有排班</b>。<br>
        已排班的日子要怎麼處理？
      </div>
      <div class="modal-foot" style="flex-direction:column;gap:8px;">
        <button class="btn btn-green" style="width:100%;" onclick="_doApplyWeekly(true)">全部覆蓋成 ${start}–${end}</button>
        <button class="btn btn-ghost" style="width:100%;" onclick="_doApplyWeekly(false)">只補空白日（保留現有班）</button>
        <button class="btn btn-ghost" style="width:100%;color:var(--t3);" onclick="closeModal();navTo('attendance');">取消</button>
      </div>`);
  }
}
async function _doApplyWeekly(overwrite){
  const ctx=window._applyWeeklyCtx; if(!ctx){ closeModal(); return; }
  const{ empId, dateStr, start, end, hours, note, targetDow, byDate, targetDates }=ctx;
  const code=shiftCode(start,end);
  let added=0, updated=0, skipped=0;
  for(const ds of targetDates){
    const dayList=byDate[ds]||[];
    if(dayList.length){
      if(!overwrite){ skipped++; continue; }
      // 覆蓋：更新該日第一筆（沿用 id），其餘同日多筆刪除
      const first=dayList[0];
      const obj={ ...first, emp_id:empId, date:ds, start_time:start, end_time:end, hours, note:note.trim(), leave_type:null, leave_hours:0 };
      try{ await dbPut('shifts',obj); updated++; }catch(_){}
      for(let i=1;i<dayList.length;i++){ try{ await dbDel('shifts',dayList[i].id); }catch(_){} }
    }else{
      const obj={ id:uid('shift'), emp_id:empId, date:ds, start_time:start, end_time:end, hours, note:note.trim(),
        leave_type:null, leave_hours:0, created_by:(SESSION&&SESSION.id)||'', created_at:new Date().toISOString() };
      try{ await dbPut('shifts',obj); added++; }catch(_){}
    }
  }
  // 記入週期模式（下個月也能用）
  try{
    const c=await dbGet('coaches',empId);
    let pat=(c.weekly_shift?String(c.weekly_shift).split(','):['off','off','off','off','off','off','off']);
    while(pat.length<7) pat.push('off');
    pat[targetDow]= code || 'off';
    c.weekly_shift=pat.join(',');
    await dbPut('coaches',c);
  }catch(_){}
  const wdName='日一二三四五六'[targetDow];
  const parts=[]; if(added)parts.push(`新增 ${added} 天`); if(updated)parts.push(`覆蓋 ${updated} 天`); if(skipped)parts.push(`跳過 ${skipped} 天`);
  showToast(`已設為每週${wdName}：當天已存${parts.length?'，'+parts.join('、'):''}`);
  window._applyWeeklyCtx=null;
  closeModal();
  navTo('attendance');
}

  const staff=coaches.filter(c=>c.role!=='front_desk' && c.status!=='inactive' && c.invite_status!=='pending');

  // 先算每位教練當月教練課堂數（店長津貼需要全體名單堂數）
  const ptDoneById={};
  staff.forEach(emp=>{
    ptDoneById[emp.id]=bookings.filter(b=>b.coach_id===emp.id&&(b.status==='completed'||b.status==='checked_in')&&(b.date||'').slice(0,7)===month&&(b.category==='私人教練'||b.category==='體驗')).length;

  const renewById={};
  staff.forEach(emp=>{ renewById[emp.id]=0; });

      const who=t.renewed_by||t.sold_by||t.coach_id;

    // 店長津貼名單：所有教練（排除老闆 role==='admin' 與店長本人）的當月堂數
    const leaderHeads = emp.is_manager

    const extras={ renewCount:renewById[emp.id]||0, leaderHeads };

    return {emp,countSalary,ptDone,groupHeads,dutyHours,leave,sal,total};
  });
  const grandTotal=rows.reduce((s,r)=>s+(r.countSalary?r.sal.grossPay:0),0);

// 共用：人事員工清單（排除設備帳號與待填寫），依類型排序
async function _hrStaffList(){
  const order={full_time:0,part_time:1,intern:2,contractor:3};
  return (await dbGetAll('coaches'))
    .filter(c=>c.role!=='front_desk' && c.invite_status!=='pending')
    .sort((a,b)=>(order[normEmp(a.employment_type||a.pay_type)]??9)-(order[normEmp(b.employment_type||b.pay_type)]??9)
      ||(a.name||'').localeCompare(b.name||'','zh-Hant'));
}
const INS_STATUS_OPTS=[['','—'],['enrolled','投保中'],['not_enrolled','未投保'],['withdrawn','已退保']];
function insStatusLabel(v){ return (INS_STATUS_OPTS.find(o=>o[0]===v)||['','—'])[1]; }

async function saveInsurance(id){
 try{
  const c=await dbGet('coaches',id); const g=x=>document.getElementById(x).value;
  c.insurance_identity=g('ins-identity')||'employee';
  c.labor_insurance_status=g('ins-labor')||null;
  c.health_insurance_status=g('ins-health')||null;
  c.pension_status=g('ins-pension')||null;
  c.insured_grade=g('ins-grade')?Number(g('ins-grade')):null;
  c.insured_unit=g('ins-unit')||null;
  c.insured_enroll_date=g('ins-enroll')||null;
  c.insured_withdraw_date=g('ins-withdraw')||null;
  await dbPut('coaches',c); closeModal(); showToast('勞健保資料已儲存'); navTo('staff');
 }catch(e){ console.error('saveInsurance 失敗:',e); showToast('儲存失敗：'+(e&&e.message?e.message:e)); }
}

/* ── 特休管理（以「小時」為單位）── */
// 公司正職為部分工時，1 天特休＝ 6 小時（換算基準；應給時數仍可手動覆寫）
const LEAVE_HOURS_PER_DAY=6;
// 依勞基法計算「應給特休天數」(以年資對應)；未滿半年 0
function statutoryAnnualLeave(hireDate){
  const sen=calcSeniority(hireDate); if(!sen) return null;
  const days=sen.days;
  if(days<182) return 0;            // 未滿 6 個月
  if(days<365) return 3;            // 滿 6 個月～未滿 1 年
  const y=sen.years;
  if(y<2) return 7;                 // 滿 1 年
  if(y<3) return 10;                // 滿 2 年
  if(y<5) return 14;                // 滿 3～5 年
  if(y<10) return 15;              // 滿 5～10 年
  return Math.min(30, 15+(y-9));   // 滿 10 年起每年+1，上限 30
}
// 判斷員工在某結算年度是否「該年度離職」（有離職日且落在該年）
function resignedInYear(emp, year){
  const rd=emp&&emp.resign_date; if(!rd) return null;
  const y=String(rd).slice(0,4);
  if(String(y)!==String(year)) return null;
  return rd; // 回傳離職日字串
}
// 結算用「本年新增特休」：一般取員工帳戶的 al_earned_hours；
// 若該年度離職，改用「全年應給 × 當年在職比例」折算（在職起點 max(1/1,到職日)、終點 min(12/31,離職日)）
function earnedLeaveForYear(emp, year){
  const stored=Number(emp&&emp.al_earned_hours)||0;
  const rd=resignedInYear(emp, year);
  if(!rd) return { hours: stored, prorated:false };
  // 全年應給（小時）：依到職日對應年資的法定天數
  const statDays=statutoryAnnualLeave(emp.hire_date);
  const fullHours=(statDays!=null)?statDays*LEAVE_HOURS_PER_DAY:stored;
  // 當年在職區間
  const yStart=new Date(year,0,1), yEnd=new Date(year,11,31);
  const hire=emp.hire_date?parseYmd(emp.hire_date):yStart;
  const resign=parseYmd(rd);
  const s=(hire>yStart)?hire:yStart;
  const e=(resign<yEnd)?resign:yEnd;
  const inService=Math.max(0, Math.round((e-s)/86400000)+1); // 含頭尾
  const daysInYear=Math.round((yEnd-yStart)/86400000)+1;      // 365 或 366
  const ratio=Math.min(1, inService/daysInYear);
  const prorated=Math.round(fullHours*ratio*2)/2; // 取到 0.5 小時
  return { hours: prorated, prorated:true, ratio, inService, daysInYear, fullHours, resignDate:rd };
}

// ── 正職工時基準（我們自訂：一週 5 天、每天 6 小時；改這兩個常數即可）──
const FT_HOURS_PER_DAY=6;
const FT_DAYS_PER_WEEK=5;
// 月工時 = 每週時數 × (52 週 ÷ 12 個月) ≈ 130 小時（週30h → 130h）
const FT_MONTHLY_HOURS=Math.round(FT_HOURS_PER_DAY*FT_DAYS_PER_WEEK*52/12);
// ── 折薪估算時薪：正職用 底薪÷月工時（與給假的全年值班時數基準一致），其餘用 duty_hourly（值班時薪）──
function leaveCashoutHourly(emp){
  const et=normEmp(emp&&(emp.employment_type||emp.pay_type));
  if(et==='full_time'){
    const tpl=(window.SALARY_TPL||{})[et]||{};
    const base=(emp&&Number(emp.base_salary)>0)?Number(emp.base_salary):(Number(tpl.base_salary)||0);
    return base>0 ? Math.round(base/FT_MONTHLY_HOURS) : 0; // 底薪 ÷ 月工時(≈130)
  }
  const r=effRates(emp);
  let h=Number(r.duty_hourly)||0;
  if(et==='contractor' && h<200) h=200;
  return h;
}

      <div style="border-top:1px dashed var(--bd);margin:6px 0;"></div>

// 依到職日計算年資（年）
function calcSeniority(hireDate){
  if(!hireDate) return null;
  const h=parseYmd(hireDate); if(!h||isNaN(h)) return null;
  const now=new Date(TODAY);
  let years=now.getFullYear()-h.getFullYear();
  const m=now.getMonth()-h.getMonth();
  if(m<0||(m===0&&now.getDate()<h.getDate())) years--;
  const days=Math.floor((now-h)/86400000);
  return {years:Math.max(0,years), days:Math.max(0,days)};
}

// 產生某員工類型的薪資制度摘要 HTML（員工詳細資料、唯讀，統一五區塊）
function salaryTplSummaryHtml(et){
  const t=(window.SALARY_TPL||{})[et]||{};
  const money=n=>'$'+Number(n||0).toLocaleString();
  let ptLine;
  if(t.pt_mode==='tier'){
    const tiers=(t.pt_tiers||[]).map(x=>`${x.min}~${x.max==null?'∞':x.max}堂 ${money(x.rate)}`).join('　');
    ptLine=tiers?`階梯　${tiers}`:'不適用';
  }else{ ptLine=(t.pt_rate>0)?`固定每堂 ${money(t.pt_rate)}`:'不適用 / 0'; }
  const bonus=(t.pt_bonus||[]).filter(x=>x.amount>0).map(x=>`滿${x.threshold}堂+${money(x.amount)}`).join('、')||'不適用 / 0';
  const grp=(t.group_per_head>0)?`人頭制 每人 ${money(t.group_per_head)}`:'不適用 / 0';
  const duty=(t.duty_hourly>0)?`${money(t.duty_hourly)} / 小時`:'依設定 / 0';
  const row=(lb,val)=>`<div style="display:flex;gap:8px;"><span style="min-width:64px;color:var(--t3);">${lb}</span><span>${val}</span></div>`;
  return `${row('底薪',(t.base_salary>0)?money(t.base_salary):'不適用 / 0')}${row('教練課費',ptLine)}${row('達標獎金',bonus)}${row('團課費',grp)}${row('值班時薪',duty)}`;
}
// 切換自訂薪資：開＝顯示費率框可編輯；關＝顯示該類型模板摘要（唯讀）
function hrToggleCustom(init, cArg){
  const custom=document.getElementById('hr-custom').checked;
  const et=normEmp(document.getElementById('hr-emptype').value);
  const tpl=(window.SALARY_TPL||{})[et]||{};
  const c=cArg||{};
  const wrap=document.getElementById('hr-rate-wrap');
  const summary=document.getElementById('hr-tpl-summary');
  const pt=document.getElementById('hr-ptrate'), gp=document.getElementById('hr-grouprate'), dy=document.getElementById('hr-dutyrate');
  const hint=document.getElementById('hr-rate-hint');
  if(custom){
    wrap.style.display='block'; summary.style.display='none';
    if(init){ pt.value=c.pt_rate??0; gp.value=c.group_rate??0; dy.value=c.duty_hourly??0; }
    [pt,gp,dy].forEach(el=>{el.readOnly=false; el.style.background='#fff'; el.style.color='';});
    hint.innerHTML='此員工使用<b>自訂費率</b>（簡易三費率），會覆蓋類型模板。';
  }else{
    wrap.style.display='none'; summary.style.display='block';
    summary.innerHTML=`<div style="font-size:11.5px;color:var(--t3);margin-bottom:6px;">依「${PAY_LABEL[et]||''}」薪資制度模板（修改請至 員工管理 → 薪資制度）</div>${salaryTplSummaryHtml(et)}`;
  }
}

function toggleMgr(prefix){
  const ft=normEmp(document.getElementById(prefix+'-pay').value)==='full_time';
  document.getElementById(prefix+'-mgr-wrap').style.display=ft?'block':'none';
}
function readPayRoleFields(prefix){
  const empType=normEmp(document.getElementById(prefix+'-pay').value);
  const ft=empType==='full_time';
  const isMgr=ft&&document.getElementById(prefix+'-ismgr').checked;
  const isSup=ft&&document.getElementById(prefix+'-issup').checked;
  const customEl=document.getElementById(prefix+'-custom'); // 自訂薪資開關（邀請階段無）
  const out={
    employment_type:empType,
    hire_date:document.getElementById(prefix+'-hire').value||null,
    is_manager:isMgr, is_supervisor:isSup,
    manager_bonus:isMgr?Number(document.getElementById(prefix+'-mgrbonus').value)||0:0,
    supervisor_bonus:isSup?Number(document.getElementById(prefix+'-supbonus').value)||0:0,
  };
  const promoteEl=document.getElementById(prefix+'-promote');
  if(promoteEl) out.promote_date=promoteEl.value||null;
  if(customEl){
    const custom=customEl.checked;
    out.custom_salary=custom;
    out.count_salary=document.getElementById(prefix+'-countsalary').checked;
    if(custom){
      out.pt_rate=Number(document.getElementById(prefix+'-ptrate').value)||0;
      out.group_rate=Number(document.getElementById(prefix+'-grouprate').value)||0;
      out.duty_hourly=Number(document.getElementById(prefix+'-dutyrate').value)||0;
      out.pay_rate=out.pt_rate;
    }
    // 不開自訂時不寫費率欄位，沿用模板（不覆蓋既有值）
  }
  return out;
}

const STAFF_DEFAULT_PW='88888888';
async function submitStaffInvite(){
  const preName=(document.getElementById('st-name').value||'').trim();
  const prePhone=(document.getElementById('st-phone').value||'').trim();
  if(!preName){showToast('請填寫姓名');return;}
  if(!prePhone){showToast('請填寫電話');return;}
  // 防重複：同電話是否已存在員工
  const exist=(await dbGetAll('coaches')).find(c=>c.phone===prePhone);
  if(exist){showToast('此電話已存在員工資料');return;}
  const pay=readPayRoleFields('st');
  if(pay.pay_rate===undefined) pay.pay_rate=null;
  // 透過 Edge Function 以預設密碼建立 Auth 帳號（伺服器端，不影響目前管理員登入）
  const r=await cloudCreateAuth('staff',prePhone,STAFF_DEFAULT_PW,true);
  if(r.error){
    const dup=/already|exists|registered/i.test(r.error);
    showToast(dup?'此電話已被使用（Auth 已存在）':('建立帳號失敗：'+r.error));
    return;
  }
  const chosenRole=document.getElementById('st-role').value;
  // 若新員工設為管理員：先把既有 admin 降為一般員工（系統僅一位管理員）
  if(chosenRole==='admin'){
    const others=(await dbGetAll('coaches')).filter(x=>x.role==='admin');
    for(const o of others){ o.role='coach'; try{ await dbPut('coaches',o); }catch(_){} }
  }
  const c=Object.assign({
    id:uid('c'),
    name:preName, phone:prePhone,
    role:chosenRole,
    auth_id:r.uid,
    status:'active',          // 可登入
    must_setup:true,          // 首次登入須改密碼+完善資料
    invite_status:'completed',
    need_duty:true,           // 預設：需值班（多數員工符合，特殊人員再個別關閉）
    can_substitute:true,      // 預設：可代課
    need_punch:true,          // 預設：需打卡
    created_at:new Date().toISOString()
  },pay);
  try{
    await dbPut('coaches',c);   // coaches 映射到 employees 表
  }catch(e){
    showToast('建立員工失敗：'+(e.message||e));
    return;
  }
  closeModal();
  navTo('staff');
  showModal(`<div class="modal-title">員工帳號已建立</div>
    <div style="font-size:13px;color:var(--t2);line-height:1.9;">請把以下登入資訊交給員工：</div>
    <div style="background:var(--card2);border:1px solid var(--bd);border-radius:9px;padding:14px;margin:12px 0;font-size:14px;line-height:2;">
      帳號（電話）：<b>${prePhone}</b><br>
      預設密碼：<b>${STAFF_DEFAULT_PW}</b>
    </div>
    <div style="font-size:12px;color:var(--t3);line-height:1.7;">員工首次登入後，系統會要求修改密碼並完善資料。</div>
    <div class="modal-foot"><button class="btn btn-green" onclick="closeModal()">完成</button></div>`);
}

function copyText(txt){
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(()=>showToast('已複製連結')).catch(()=>fallbackCopy(txt));
  }else fallbackCopy(txt);
}
function fallbackCopy(txt){
  const ta=document.createElement('textarea');ta.value=txt;document.body.appendChild(ta);ta.select();
  try{document.execCommand('copy');showToast('已複製連結');}catch(e){showToast('請手動複製');}
  ta.remove();
}

// 行事曆：唯讀全店月曆，點日期看當天課（不可新增/排課）
let _fdCalMonth=null, _fdCalSel=null;
PAGES.fd_calendar=async function(){
  const[bookings,members,coaches]=await Promise.all([dbGetAll('bookings'),dbGetAll('members'),dbGetAll('coaches')]);
  const memMap=Object.fromEntries(members.map(m=>[m.id,m.name]));
  const coachMap=Object.fromEntries(coaches.map(c=>[c.id,coachDisp(c)]));
  const all=bookings.filter(b=>b.status!=='cancelled');
  window._fdCalData={all,memMap,coachMap};
  _fdCalMonth=null; _fdCalSel=null;
  C.innerHTML=head('SCHEDULE','行事曆','點日期看當天預約（唯讀）')+`<div class="card"><div id="fd-cal"></div></div>`;
  renderFdMonthView();
};
function renderFdMonthView(){
  const box=document.getElementById('fd-cal'); if(!box||!window._fdCalData)return;
  const {all,memMap,coachMap}=window._fdCalData;
  const today=new Date(TODAY);
  if(!_fdCalMonth) _fdCalMonth={y:today.getFullYear(),m:today.getMonth()};
  if(!_fdCalSel) _fdCalSel=ymd(today);
  const {y,m}=_fdCalMonth;
  const startDow=new Date(y,m,1).getDay();
  const daysInMonth=new Date(y,m+1,0).getDate();
  const todayStr=ymd(today);
  const WDH=['日','一','二','三','四','五','六'];
  const cntByDate={};
  all.forEach(b=>{ if(!b.date)return; cntByDate[b.date]=(cntByDate[b.date]||0)+1; });
  let cells='';
  for(let i=0;i<startDow;i++) cells+=`<div class="mc-cell mc-empty"></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const cnt=cntByDate[ds]||0;
    const isToday=ds===todayStr, isSel=ds===_fdCalSel;
    cells+=`<div class="mc-cell${isToday?' mc-today':(isSel?' mc-sel':'')}" onclick="fdCalPick('${ds}')">
      <span class="mc-d">${d}</span>${cnt>0?`<span class="mc-dot">${cnt}</span>`:''}</div>`;
  }
  const sel=parseYmd(_fdCalSel);
  const selBk=all.filter(b=>b.date===_fdCalSel).sort((a,b)=>(a.start_time||'').localeCompare(b.start_time||''));
  const selLabel=`${_fdCalSel.slice(5).replace('-','/')}（${WDH[sel.getDay()]}）`;
  let listHtml;
  if(selBk.length===0){
    listHtml=`<div style="text-align:center;color:var(--t3);font-size:13px;padding:24px 0;">這天沒有預約</div>`;
  }else{
    listHtml=selBk.map(b=>{
      const isSelf=b.category==='自主訓練';
      const dur=b.duration||60;
      const end=minToTime(timeToMin(b.start_time)+dur);
      const who=b.category==='小班肌力'?'團體課':(b.category==='體驗'?(b.trial_name||'體驗'):(memMap[b.member_id]||'—'));
      const coachNm=b.coach_id?(coachMap[b.coach_id]||'教練'):'—';
      const barCls=isSelf?'mc-bar-self':(b.category==='小班肌力'?'mc-bar-group':(b.category==='體驗'?'mc-bar-trial':'mc-bar-pt'));
      return `<div class="mc-ev">
        <div class="mc-ev-time"><span class="mc-ev-t1">${b.start_time}</span><span class="mc-ev-t2">${end}</span></div>
        <div class="mc-ev-bar ${barCls}"></div>
        <div class="mc-ev-body"><div class="mc-ev-name">${who}</div>
          <div class="mc-ev-cat">${b.category} · ${coachNm} · ${statusLabel(b.status)}</div></div>
      </div>`;
    }).join('');
  }
  box.innerHTML=`
    <div class="mc-head">
      <button class="btn btn-ghost btn-sm" onclick="fdCalShiftMonth(-1)">‹</button>
      <div style="font-weight:600;color:var(--green);">${y} 年 ${m+1} 月</div>
      <button class="btn btn-ghost btn-sm" onclick="fdCalShiftMonth(1)">›</button>
    </div>
    <div class="mc-wd mc-grid">${WDH.map((w,i)=>`<div class="mc-wdh${i===0||i===6?' mc-wk':''}">${w}</div>`).join('')}</div>
    <div class="mc-grid">${cells}</div>
    <div style="margin-top:16px;padding-top:14px;border-top:1px solid var(--bd);">
      <div style="font-size:13px;font-weight:600;color:var(--text);margin-bottom:6px;">${selLabel}</div>
      ${listHtml}
    </div>`;
}
function fdCalPick(ds){ _fdCalSel=ds; renderFdMonthView(); }
function fdCalShiftMonth(delta){ let {y,m}=_fdCalMonth; m+=delta; if(m<0){m=11;y--;} if(m>11){m=0;y++;} _fdCalMonth={y,m}; renderFdMonthView(); }

// 會員是否可使用主顧客方案：主顧客(loyal)或 VIP 才可
function memberCanUseLoyal(m){
  const tier=m&&m.tier; return tier==='loyal'||tier==='vip';
}
// 依目前選到的會員，刷新可選方案（主顧客方案僅主顧客/VIP 可見）→ 渲染禮包卡片牆
function refreshGrantPlans(){
  const members=window._grantMembers||[]; const plans=window._grantPlans||[];
  const mid=document.getElementById('gt-member').value;
  const m=members.find(x=>x.id===mid);
  const allowLoyal=memberCanUseLoyal(m);
  const usable=plans.filter(p=>p.active && (p.plan_type!=='loyal' || allowLoyal));
  window._grantUsable=usable;
  window._grantSel={planId:undefined};
  renderGrantPicker();
}
// 禮包卡片牆：依「授課類型」分組（1V1 / 1V2 / 團課），每組底下排方案卡（名稱＋堂數＋價格）
function renderGrantPicker(){
  const box=document.getElementById('gt-picker'); if(!box)return;
  const usable=window._grantUsable||[];
  const types=window._grantTypes||[];
  const catMap=Object.fromEntries(types.map(t=>[t.id,t.category]));
  const sel=window._grantSel||{};
  if(!usable.length){ box.innerHTML='<div style="color:var(--t3);font-size:13px;padding:8px 0;">此會員目前沒有可發放的方案。</div>'; setGrantPlan(''); return; }
  const PT={general:'一般',promo:'優惠',friendly:'友善',friendly_promo:'友善優惠',loyal:'主顧客'};
  // 分組鍵：團課（category=小班肌力）→ 'group'；否則依 format（1v1/1v2/其他）
  const groupOf=(p)=> (catMap[p.ticket_type_id]==='小班肌力') ? 'group' : (p.format||'other');
  const GROUP_LABEL={'1v1':'1V1 個人教練課','1v2':'1V2 雙人教練課','group':'團課','other':'其他方案'};
  const GROUP_ORDER=['1v1','1v2','group','other'];
  const groups={};
  usable.forEach(p=>{ const g=groupOf(p); (groups[g]=groups[g]||[]).push(p); });
  let html='';
  GROUP_ORDER.filter(g=>groups[g]).forEach(g=>{
    html+=`<div class="gt-group"><div class="gt-group-lbl">${GROUP_LABEL[g]||g}</div><div class="gt-cards">`;
    html+=groups[g].map(p=>{
      const total=(p.sessions_base||0)+(p.sessions_bonus||0);
      const price=(p.unit_price||0)*(p.sessions_base||0);
      const isPromo=(p.plan_type==='promo'||p.plan_type==='friendly_promo');
      const typeTag=isPromo?`<span class="gt-card-tag">優惠</span>`:'';
      return `<button type="button" class="gt-card${sel.planId===p.id?' on':''}" onclick="grantPickPlan('${p.id}')">
        <div class="gt-card-name">${p.name}${typeTag}</div>
        <div class="gt-card-meta"><span class="gt-card-sess">${total} 堂</span><span class="gt-card-price">$${price.toLocaleString()}</span></div>
      </button>`;
    }).join('');
    html+=`</div></div>`;
  });
  box.innerHTML=html;
}
