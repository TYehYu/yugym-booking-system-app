PAGES.coach_salary=async function(){
  const[bookings,coaches,members]=await Promise.all([dbGetAll('bookings'),dbGetAll('coaches'),dbGetAll('members')]);
  const me=coaches.find(c=>c.id===SESSION.id);
  const memMap=Object.fromEntries(members.map(m=>[m.id,m.name]));
  const month=ymd(TODAY).slice(0,7); // 2026-06
  // 本月已完成課堂
  const myDone=bookings.filter(b=>b.coach_id===SESSION.id&&b.status==='completed'&&b.date.slice(0,7)===month);
  const myAll=bookings.filter(b=>b.coach_id===SESSION.id&&b.status!=='cancelled'&&b.date.slice(0,7)===month);
  const ptDone=myDone.filter(b=>b.category==='私人教練'||b.category==='體驗').length;
  const groupDone=myDone.filter(b=>b.category==='小班肌力').length;
  const rate=me.pay_rate||0;
  const payTypeLabel=PAY_LABEL[me.employment_type||me.pay_type]||'—';
  const sessionPay=myDone.length*rate; // 課堂費(依完成堂數)
  const bonus=(me.is_manager?(me.manager_bonus||0):0)+(me.is_supervisor?(me.supervisor_bonus||0):0);
  const estimate=sessionPay+bonus;
  const mgrLine=[me.is_manager?`店長獎金 $${(me.manager_bonus||0).toLocaleString()}`:'',me.is_supervisor?`主管獎金 $${(me.supervisor_bonus||0).toLocaleString()}`:''].filter(Boolean).join('　·　');
  C.innerHTML=head('SALARY','薪資查詢',`${month.replace('-',' 年 ')} 月 · 薪資制度：${payTypeLabel}${mgrLine?'　·　'+mgrLine:''}`)+
  `<div class="stat-grid">
    <div class="stat-card"><div class="sc-label">本月完成課堂</div><div><span class="sc-num">${myDone.length}</span><span class="sc-unit">堂</span></div></div>
    <div class="stat-card"><div class="sc-label">課堂費（完成×費率）</div><div><span class="sc-num">${sessionPay.toLocaleString()}</span><span class="sc-unit">元</span></div></div>
    ${bonus?`<div class="stat-card"><div class="sc-label">管理獎金</div><div><span class="sc-num">${bonus.toLocaleString()}</span><span class="sc-unit">元</span></div></div>`:''}
    <div class="stat-card"><div class="sc-label">預估合計</div><div><span class="sc-num" style="color:var(--gold-d)">${estimate.toLocaleString()}</span><span class="sc-unit">元</span></div></div>
  </div>
  <div class="card"><div class="card-title">本月課堂明細</div>
    <div style="display:flex;gap:14px;margin-bottom:14px;">
      <div style="flex:1;background:var(--card2);border-radius:10px;padding:14px;text-align:center;"><div class="num" style="font-size:26px;color:var(--blue);">${ptDone}</div><div style="font-size:11px;color:var(--t2);margin-top:4px;">私教/體驗完成</div></div>
      <div style="flex:1;background:var(--card2);border-radius:10px;padding:14px;text-align:center;"><div class="num" style="font-size:26px;color:var(--brown);">${groupDone}</div><div style="font-size:11px;color:var(--t2);margin-top:4px;">小班完成</div></div>
    </div>
    ${myAll.length===0?'<div class="empty"><div class="em-t">本月尚無排課</div></div>':
    `<table><thead><tr><th>日期</th><th>時間</th><th>會員</th><th>類型</th><th>狀態</th><th>計薪</th></tr></thead><tbody>
    ${myAll.sort((a,b)=>(a.date+a.start_time).localeCompare(b.date+b.start_time)).map(b=>{
      const counted=b.status==='completed';
      return `<tr><td>${b.date.slice(5)}</td><td>${b.start_time}</td><td>${memMap[b.member_id]||'—'}</td>
      <td><span class="tag tag-${colorClass(typeOfCat(b.category))}">${b.category}</span></td>
      <td><span class="tag ${counted?'tag-ok':'tag-warn'}">${statusLabel(b.status)}</span></td>
      <td class="num">${counted?'$'+rate:'—'}</td></tr>`;}).join('')}
    </tbody></table>`}
  </div>
  <div style="font-size:11.5px;color:var(--t3);padding:0 4px;line-height:1.7;">＊ 預估 = 完成課堂 × 費率 ＋ 管理獎金。正式版將依薪資制度（正職／兼職／合作／工讀）套用不同計算規則與月結，資料表已預留對應欄位。</div>`;
};

async function markRead(id){const n=await dbGet('notifications',id);n.read=true;await dbPut('notifications',n);navTo('mem_notifications');}

      <div class="form-row"><label>設定密碼 *（至少 6 個字元）</label><input type="password" id="inv-pw" placeholder="至少 6 個字元"></div>
    </div>
    <div class="form-row"><label>地址（選填）</label><input id="inv-addr"></div>
    <div class="form-2col">
      <div class="form-row"><label>緊急聯絡人 *</label><input id="inv-econtact"></div>
      <div class="form-row"><label>緊急聯絡電話 *</label><input id="inv-ephone"></div>
    </div>
    <div class="form-2col">
      <div class="form-row"><label>身分證字號（選填）</label><input id="inv-idno"></div>
      <div class="form-row"><label>銀行帳號（選填）</label><input id="inv-bank"></div>
    </div>
    <button class="btn-primary" onclick="submitInvite('${token}')">建立帳號</button>
    <div class="login-hint">送出後帳號即建立，待管理員啟用後即可登入。</div>
  </div>`;
}
async function submitInvite(token){
  const v=id=>document.getElementById(id).value.trim();
  const err=document.getElementById('inv-err');
  const req={name:'姓名',nick:'暱稱',phone:'手機',email:'Email',pw:'密碼',econtact:'緊急聯絡人',ephone:'緊急聯絡電話'};
  for(const k in req){if(!v('inv-'+k)){err.textContent=`請填寫${req[k]}`;err.style.display='block';return;}}
  const invBday=readBirthday('inv');
  if(!invBday){err.textContent='請選擇完整生日（年/月/日）';err.style.display='block';return;}
  if(v('inv-pw').length<6){err.textContent='密碼至少需要 6 個字元';err.style.display='block';return;}
  const phone=v('inv-phone');
  // 用 token 直接查那一筆 pending 邀請（配合 token RLS policy，不需撈全表）
  const inv=await dbGetByToken(token);
  if(!inv || inv.invite_status!=='pending'){err.textContent='邀請連結無效或已使用';err.style.display='block';return;}
  const profile={
    name:v('inv-name'),nickname:v('inv-nick'),phone,email:v('inv-email'),birthday:invBday,
    address:v('inv-addr'),emergency_name:v('inv-econtact'),emergency_phone:v('inv-ephone'),
    id_number:v('inv-idno'),bank_account:v('inv-bank'),
    invite_status:'completed', // 已填寫
    status:'inactive'          // 待管理員啟用
  };
  // 透過 Edge Function 建帳號（伺服器端，不切換目前登入身分）
  const r=await cloudCreateAuth('staff',phone,v('inv-pw'),true);
  if(r.error){
    const dup=/already|exists|registered/i.test(r.error);
    err.textContent=dup?'此手機已被使用，請改用其他號碼或聯繫管理員':('建立帳號失敗：'+r.error);
    err.style.display='block';return;
  }
  profile.auth_id=r.uid;
  Object.assign(inv,profile);
  try{
    await dbPut('coaches',inv);
  }catch(e){
    err.textContent='員工資料寫入失敗：'+(e.message||e);err.style.display='block';return;
  }
  // Edge Function 建帳號不會切換登入身分，故不需登出
  const host=document.getElementById('invite-screen');
  host.innerHTML=`<div class="login-card"><div class="login-logo"><div class="mark">YUGYM</div></div>
    <div style="text-align:center;padding:24px 0;">
      <div style="font-size:40px;margin-bottom:12px;">✓</div>
      <div style="font-size:15px;font-weight:500;margin-bottom:8px;">資料已送出</div>
      <div style="font-size:12.5px;color:var(--t2);line-height:1.8;">您的帳號已建立。<br>待管理員啟用後，即可用手機號碼登入。</div>
    </div></div>`;
}
/* 櫃台設備帳號：只建帳號+密碼，不存個人資料 */
async function submitDeskInvite(token){
  const v=id=>document.getElementById(id).value.trim();
  const err=document.getElementById('inv-err');
  const name=v('fd-name'), acct=v('fd-phone'), pw=document.getElementById('fd-pw').value;
  if(!name||!acct||!pw){err.textContent='請填寫帳號名稱、登入帳號與密碼';err.style.display='block';return;}
  if(pw.length<6){err.textContent='密碼至少需要 6 個字元';err.style.display='block';return;}
  // 用 token 查那一筆 pending 邀請
  const inv=await dbGetByToken(token);
  if(!inv || inv.invite_status!=='pending'){err.textContent='邀請連結無效或已使用';err.style.display='block';return;}
  const r=await cloudCreateAuth('staff',acct,pw,true); // Edge Function 建帳號，不切換登入身分
  if(r.error){
    const dup=/already|exists|registered/i.test(r.error);
    err.textContent=dup?'此登入帳號已被使用，請改用其他代號':('建立帳號失敗：'+r.error);
    err.style.display='block';return;
  }
  // 設備帳號：只記必要欄位，個人資料留空
  Object.assign(inv,{name,phone:acct,auth_id:r.uid,invite_status:'completed',status:'inactive'});
  try{
    await dbPut('coaches',inv);
  }catch(e){
    err.textContent='櫃台帳號寫入失敗：'+(e.message||e);err.style.display='block';return;
  }
  // Edge Function 建帳號不會切換登入身分，故不需登出
  const host=document.getElementById('invite-screen');
  host.innerHTML=`<div class="login-card"><div class="login-logo"><div class="mark">YUGYM</div></div>
    <div style="text-align:center;padding:24px 0;">
      <div style="font-size:40px;margin-bottom:12px;">✓</div>
      <div style="font-size:15px;font-weight:500;margin-bottom:8px;">櫃台帳號已建立</div>
      <div style="font-size:12.5px;color:var(--t2);line-height:1.8;">待管理員啟用後，即可在店內電腦以帳號 <b>${acct}</b> 登入。</div>
    </div></div>`;
}

/* ── Modal helpers ── */
function showModal(html){
  document.querySelectorAll('.modal-bg').forEach(el=>el.remove()); // 單一彈窗
  const bg=document.createElement('div');bg.className='modal-bg';bg.id='modal-bg';
  bg.innerHTML=`<div class="modal">${html}</div>`;
  let downOnBg=false;
  bg.addEventListener('mousedown',e=>{downOnBg=(e.target===bg);});
  bg.addEventListener('mouseup',e=>{if(downOnBg&&e.target===bg)closeModal();downOnBg=false;});
  document.body.appendChild(bg);
}
function closeModal(){const m=document.getElementById('modal-bg');if(m)m.remove();}
</script>
