/* ── 發放核心（共用）：建票券→算到期日→購買紀錄→異動紀錄→升級會員→通知 ──
   invoiceStatus：'none' | 'issued'（已開立）；invoiceNumber：發票號（可空）
   回傳建立的 ticket，失敗丟例外。 */
async function _issueTicketsFromApp(a, invoiceStatus, invoiceNumber){
  const plan=await dbGet('course_plans',a.plan_id);
  if(!plan) throw new Error('找不到對應方案，無法發放');
  const total=plan.sessions_base+plan.sessions_bonus;
  const unitPrice=plan.unit_price||0;
  const dealAmount=a.list_price||(unitPrice*plan.sessions_base);
  const t={id:uid('TK'),member_id:a.member_id,ticket_type_id:plan.ticket_type_id,source_plan_id:plan.id,plan_name:plan.name,format:plan.format||null,source:'purchase',
    unit_price:unitPrice,amount_paid:dealAmount,
    purchase_date:ymd(TODAY),start_date:ymd(TODAY),expire_date:ymd(addDays(TODAY,plan.valid_days)),
    sessions_total:total,sessions_remaining:total,status:'usable',
    payment_status:'paid',invoice_status:invoiceStatus||'none',invoice_number:invoiceNumber||null,
    created_at:new Date().toISOString()};
  await dbPut('member_tickets',t);
  await logTicket(t.id,'grant',total,null,SESSION.id,'購買申請通過發放（'+plan.name+'）');
  // 購買紀錄
  try{ await dbPut('purchases',{id:uid('PUR'),member_id:a.member_id,plan_id:plan.id,ticket_id:t.id,plan_name:plan.name,
    list_price:unitPrice*plan.sessions_base,deal_amount:dealAmount,
    payment_method:a.payment_method||null,installment_count:a.installment_count||1,
    invoice_type:a.invoice_type||null,invoice_number:invoiceNumber||null,
    note:'購買申請',operator:SESSION.id,source:'purchase_application',created_at:new Date().toISOString()}); }catch(_){}
  // 新朋友購私教 → 升級會員
  try{ const ty=await dbGet('ticket_types',plan.ticket_type_id);
    if(ty&&ty.category==='私人教練'){const mem=await dbGet('members',a.member_id);if(mem&&(mem.tier==='newbie'||!mem.tier)){mem.tier='regular';await dbPut('members',mem);}} }catch(_){}
  // 通知會員
  try{ await pushNotification(a.member_id,'payment','票券已啟用','您的票券已完成購買並啟用。'); }catch(_){}
  return t;
}

// 免發票 → 直接發券、申請完成；雲端/紙本 → 進入待開立發票
async function appInvoice(id, invoiceType){
  const a=await dbGet('purchase_applications',id);
  if(!a||a.status!=='pending'){showToast('此申請已處理');return;}
  if(invoiceType==='none'){
    try{ await _issueTicketsFromApp(a,'none',null); }
    catch(e){ showToast('發放失敗：'+(e.message||e)); return; }
    a.status='completed'; a.invoice_type='none'; a.invoice_status='none';
    a.reviewed_by=SESSION.id; a.reviewed_at=new Date().toISOString();
    await dbPut('purchase_applications',a);
    showToast('已完成並發放票券（免發票）'); setTkTab('purchase_review');
  }else{
    // 雲端 / 紙本：先進待開立，不發券
    a.status='invoicing'; a.invoice_type=invoiceType;
    a.invoice_status=invoiceType==='cloud'?'cloud_pending':'paper_pending';
    a.reviewed_by=SESSION.id; a.reviewed_at=new Date().toISOString();
    await dbPut('purchase_applications',a);
    showToast(invoiceType==='cloud'?'已轉雲端發票待開立':'已轉紙本發票待開立'); setTkTab('purchase_review');
  }
}
// 完成開立發票 → 填發票號（雲端未來可由 API 自動帶入）→ 發券、申請完成
function appCompleteInvoice(id){
  const a=window._appCache?window._appCache[id]:null;
  const isCloud=a&&a.invoice_type==='cloud';
  showModal(`<div class="modal-title">完成開立發票</div>
    <div style="font-size:12px;color:var(--t2);margin-bottom:12px;">${isCloud?'雲端發票（未來可串接電子發票 API 自動回填號碼）':'紙本發票'}。填入發票號碼後將正式發放票券。</div>
    <div class="form-row"><label>發票號碼（可留空）</label><input id="iv-no" placeholder="例：AB-12345678"></div>
    <div class="modal-foot"><button class="btn btn-ghost" onclick="closeModal()">取消</button><button class="btn btn-green" onclick="confirmCompleteInvoice('${id}')">完成並發券</button></div>`);
}
async function confirmCompleteInvoice(id){
  const a=await dbGet('purchase_applications',id);
  if(!a||a.status!=='invoicing'){showToast('此申請狀態已變更');return;}
  const no=(document.getElementById('iv-no').value||'').trim()||null;
  try{ await _issueTicketsFromApp(a,'issued',no); }
  catch(e){ showToast('發放失敗：'+(e.message||e)); return; }
  a.status='completed'; a.invoice_status='issued'; a.invoice_number=no;
  a.reviewed_at=new Date().toISOString();
  await dbPut('purchase_applications',a);
  showToast('發票已開立，票券已發放'); setTkTab('purchase_review');
}
// 取消申請（pending 或 invoicing 皆可）→ 不發券
function appCancel(id){
  showModal(`<div class="modal-title">取消購買申請</div>
    <div style="font-size:13.5px;padding:6px 0 4px;">確定取消這筆購買申請嗎？</div>
    <div style="font-size:12px;color:var(--t2);margin-top:6px;">取消後狀態改為「已取消」，不會發放票券。</div>
    <div class="form-row" style="margin-top:10px;"><label>取消原因（選填，會顯示給會員）</label><input id="ac-reason" placeholder="選填"></div>
    <div class="modal-foot"><button class="btn btn-ghost" onclick="closeModal()">返回</button><button class="btn btn-danger" onclick="confirmAppCancel('${id}')">確定取消</button></div>`);
}
async function confirmAppCancel(id){
  const a=await dbGet('purchase_applications',id);
  if(!a||(a.status!=='pending'&&a.status!=='invoicing')){showToast('此申請已處理');return;}
  const reason=(document.getElementById('ac-reason').value||'').trim()||null;
  a.status='cancelled'; a.reject_reason=reason; a.reviewed_by=SESSION.id; a.reviewed_at=new Date().toISOString();
  await dbPut('purchase_applications',a);
  try{ if(reason) await pushNotification(a.member_id,'payment','購買申請已取消','您的購買申請已取消。原因：'+reason); }catch(_){}
  showToast('已取消申請'); setTkTab('purchase_review');
}

// 薪資月曆：每日顯示課程數＋值班時數，點日期展開當日明細
function salaryCalendar(month, bookings, shifts, dayResult){
  const [my,mm]=month.split('-');
  const daysInMonth=new Date(Number(my),Number(mm),0).getDate();
  const firstDow=new Date(Number(my),Number(mm)-1,1).getDay();
  const today=ymd(TODAY);
  const WDh=['日','一','二','三','四','五','六'];
  let cells='';
  for(let i=0;i<firstDow;i++) cells+='<div class="cdash-cell cdash-empty"></div>';
  for(let d=1;d<=daysInMonth;d++){
    const ds=`${my}-${mm}-${String(d).padStart(2,'0')}`;
    const dow=new Date(Number(my),Number(mm)-1,d).getDay();
    const isWk=dow===0||dow===6;
    const r=dayResult(ds);
    const isToday=ds===today;
    cells+=`<div class="cdash-cell${isWk?' cdash-wk':''}${isToday?' cdash-today':''}" onclick="salaryClickDay('${ds}')" data-sd="${ds}">
      <div class="cdash-num">${d}</div>
      ${r.clsCnt>0?`<div class="cdash-cls">🟢${r.clsCnt}</div>`:''}
      ${r.duty>0?`<div class="cdash-duty">🕒${r.duty%1===0?r.duty:r.duty.toFixed(1)}h</div>`:''}
    </div>`;
  }
  return `<div class="cdash-head">${WDh.map((w,i)=>`<div class="cdash-wd${(i===0||i===6)?' cdash-wd-wk':''}">${w}</div>`).join('')}</div>
    <div class="cdash-grid">${cells}</div>`;
}
async function salaryClickDay(ds){
  document.querySelectorAll('.cdash-cell').forEach(c=>c.classList.remove('cdash-sel'));
  const cell=document.querySelector(`.cdash-cell[data-sd="${ds}"]`); if(cell)cell.classList.add('cdash-sel');
  const[bookings,members,shifts,coaches]=await Promise.all([dbGetAll('bookings'),dbGetAll('members'),dbGetAll('shifts').catch(()=>[]),dbGetAll('coaches')]);
  await loadSalaryTemplates();
  const me=coaches.find(c=>c.id===SESSION.id)||{};
  const memMap=Object.fromEntries(members.map(m=>[m.id,m.name]));
  const er=effRates(me); const dutyRate=(me.custom_salary?(me.duty_hourly||0):(er.duty_hourly||0)); const countSalary=me.count_salary!==false;
  const dayResult=(d)=>{
    const dayBk=bookings.filter(b=>b.coach_id===SESSION.id&&b.date===d&&(b.status==='completed'||b.status==='checked_in'));
    const dPt=dayBk.filter(b=>b.category==='私人教練'||b.category==='體驗').length;
    const dGH=dayBk.filter(b=>b.category==='小班肌力').reduce((s,b)=>s+(Array.isArray(b.member_ids)&&b.member_ids.length?b.member_ids.length:1),0);
    const dCls=bookings.filter(b=>b.coach_id===SESSION.id&&b.date===d&&b.status!=='cancelled').length;
    const dDuty=(shifts||[]).filter(s=>s.emp_id===SESSION.id&&s.date===d).reduce((a,s)=>a+(Number(s.hours)||0),0);
    const dPay=countSalary?(dPt*(er.pt_rate||0)+dGH*(er.group_rate||0)+dDuty*dutyRate):0;
    return {clsCnt:dCls, duty:dDuty, pay:Math.round(dPay)};
  };
  salaryShowDay(ds, bookings, shifts, memMap, dayResult);
}
function salaryShowDay(ds, bookings, shifts, memMap, dayResult){
  const box=document.getElementById('salary-cal-day'); if(!box)return;
  const list=bookings.filter(b=>b.coach_id===SESSION.id&&b.date===ds&&b.status!=='cancelled').sort((a,b)=>a.start_time.localeCompare(b.start_time));
  const duty=(shifts||[]).filter(s=>s.emp_id===SESSION.id&&s.date===ds).reduce((a,s)=>a+(Number(s.hours)||0),0);
  const r=dayResult(ds);
  const [y,m,d]=ds.split('-');
  box.innerHTML=`<div class="cdash-daybox">
    <div class="cdash-daytitle">${Number(m)}/${Number(d)}（週${WD[new Date(Number(y),Number(m)-1,Number(d)).getDay()]}）</div>
    ${list.length===0&&duty===0?'<div style="font-size:12.5px;color:var(--t3);padding:8px 0;">這天沒有課程或值班</div>':''}
    ${list.map(b=>`<div class="cdash-dayitem">
        <span class="cdash-dt">${b.start_time}</span>
        <span class="cdash-dn">${memMap[b.member_id]||'—'}</span>
        <span class="tag tag-${colorClass(typeOfCat(b.category))}" style="font-size:10px;">${b.category}</span>
        <span class="tag ${(b.status==='completed'||b.status==='checked_in')?'tag-ok':'tag-warn'}" style="font-size:10px;">${statusLabel(b.status)}</span>
      </div>`).join('')}
    ${duty>0?`<div class="cdash-dayitem"><span class="cdash-dt">值班</span><span class="cdash-dn">${duty%1===0?duty:duty.toFixed(1)} 小時</span></div>`:''}
  </div>`;
}

async function submitInvite(token){

  const invBday=readBirthday('inv');
  if(!invBday){err.textContent='請選擇完整生日（年/月/日）';err.style.display='block';return;}
  if(v('inv-pw').length<6){err.textContent='密碼至少需要 6 個字元';err.style.display='block';return;}
  const phone=v('inv-phone');
  // 用 token 直接查那一筆 pending 邀請（配合 token RLS policy，不需撈全表）
  const inv=await dbGetByToken(token);
  if(!inv || inv.invite_status!=='pending'){err.textContent='邀請連結無效或已使用';err.style.display='block';return;}
  const profile={
    name:v('inv-name'),nickname:v('inv-nick'),name_en:v('inv-nick'),phone,email:v('inv-email'),birthday:invBday,
    address:v('inv-addr'),emergency_name:v('inv-econtact'),emergency_phone:v('inv-ephone'),
    id_number:v('inv-idno'),bank_account:v('inv-bank'),
    invite_status:'completed', // 已填寫
    status:'inactive'          // 待管理員啟用
  };
  // 改用前端 signUp 建帳號（與會員相同）：建完會帶 authenticated session，寫入 employees 才能通過 RLS
  const r=await cloudCreateAuth('staff',phone,v('inv-pw'));
  if(r.error){
    const dup=/already|exists|registered/i.test(r.error);
    if(dup){
      // 此手機在 Auth 已存在（多半是先前在 LINE 內建瀏覽器申辦留下的半殘帳號）
      // → 用這次輸入的密碼嘗試登入修復
      const email=toEmail('staff',phone);
      const{data:loginData,error:loginErr}=await sb.auth.signInWithPassword({email,password:v('inv-pw')});
      if(loginErr){
        err.textContent='此手機先前已申辦過。請用「當時設定的密碼」重試一次；若忘記密碼請聯繫管理員協助。';
        err.style.display='block';return;
      }
      const uid=loginData.user.id;
      // 檢查 employees 是否已有完整資料
      const existing=(await sb.from('employees').select('*').eq('auth_id',uid).maybeSingle()).data;
      if(existing){
        try{await sb.auth.signOut();}catch(_){}
        err.textContent='此帳號已申辦完成，請直接以手機與密碼登入。';
        err.style.display='block';return;
      }
      // 半殘帳號（有 Auth、無 employees 資料）→ 用這次填的資料補寫、綁定原帳號
      profile.auth_id=uid;
      Object.assign(inv,profile);
      try{ await dbPut('coaches',inv); }
      catch(e){ err.textContent='員工資料寫入失敗：'+(e.message||e);err.style.display='block';
        try{await sb.auth.signOut();}catch(_){ } return; }
      try{await sb.auth.signOut();}catch(_){}
      // 往下顯示成功畫面
      const host0=document.getElementById('invite-screen');
      host0.innerHTML=`<div class="login-card"><div class="login-logo"><div class="mark">YUGYM</div></div>
        <div style="text-align:center;padding:24px 0;">
          <div style="font-size:40px;margin-bottom:12px;">✓</div>
          <div style="font-size:15px;font-weight:500;margin-bottom:8px;">資料已送出</div>
          <div style="font-size:13px;color:var(--t2);line-height:1.7;">先前未完成的申辦已為您接續完成。<br>待管理員啟用後即可登入。</div>
        </div></div>`;
      return;
    }
    err.textContent='建立帳號失敗：'+r.error;
    err.style.display='block';return;
  }
  profile.auth_id=r.uid;
  Object.assign(inv,profile);
  try{
    await dbPut('coaches',inv);
  }catch(e){
    err.textContent='員工資料寫入失敗：'+(e.message||e);err.style.display='block';
    try{await sb.auth.signOut();}catch(_){ } return;
  }
  // 前端 signUp 建帳號會帶登入 session，寫入後登出，避免申辦者停在登入狀態
  try{await sb.auth.signOut();}catch(_){}
  const host=document.getElementById('invite-screen');
  host.innerHTML=`<div class="login-card"><div class="login-logo"><div class="mark">YUGYM</div></div>
    <div style="text-align:center;padding:24px 0;">
      <div style="font-size:40px;margin-bottom:12px;">✓</div>
      <div style="font-size:15px;font-weight:500;margin-bottom:8px;">資料已送出</div>
      <div style="font-size:12.5px;color:var(--t2);line-height:1.8;">您的帳號已建立。<br>待管理員啟用後，即可用手機號碼登入。</div>
    </div></div>`;
}
/* 櫃台設備帳號：只建帳號+密碼，不存個人資料 */
async function submitDeskInvite(token){
  const v=id=>document.getElementById(id).value.trim();
  const err=document.getElementById('inv-err');
  const name=v('fd-name'), acct=v('fd-phone'), pw=document.getElementById('fd-pw').value;
  if(!name||!acct||!pw){err.textContent='請填寫帳號名稱、登入帳號與密碼';err.style.display='block';return;}
  if(pw.length<6){err.textContent='密碼至少需要 6 個字元';err.style.display='block';return;}
  // 用 token 查那一筆 pending 邀請
  const inv=await dbGetByToken(token);
  if(!inv || inv.invite_status!=='pending'){err.textContent='邀請連結無效或已使用';err.style.display='block';return;}
  const r=await cloudCreateAuth('staff',acct,pw,true); // Edge Function 建帳號，不切換登入身分
  if(r.error){
    const dup=/already|exists|registered/i.test(r.error);
    err.textContent=dup?'此登入帳號已被使用，請改用其他代號':('建立帳號失敗：'+r.error);
    err.style.display='block';return;
  }
  // 設備帳號：只記必要欄位，個人資料留空
  Object.assign(inv,{name,phone:acct,auth_id:r.uid,invite_status:'completed',status:'inactive'});
  try{
    await dbPut('coaches',inv);
  }catch(e){
    err.textContent='櫃台帳號寫入失敗：'+(e.message||e);err.style.display='block';return;
  }
  // Edge Function 建帳號不會切換登入身分，故不需登出
  const host=document.getElementById('invite-screen');
  host.innerHTML=`<div class="login-card"><div class="login-logo"><div class="mark">YUGYM</div></div>
    <div style="text-align:center;padding:24px 0;">
      <div style="font-size:40px;margin-bottom:12px;">✓</div>
      <div style="font-size:15px;font-weight:500;margin-bottom:8px;">櫃台帳號已建立</div>
      <div style="font-size:12.5px;color:var(--t2);line-height:1.8;">待管理員啟用後，即可在店內電腦以帳號 <b>${acct}</b> 登入。</div>
    </div></div>`;
}

/* ── Modal helpers ── */
function showModal(html){
  document.querySelectorAll('.modal-bg').forEach(el=>el.remove()); // 單一彈窗
  const bg=document.createElement('div');bg.className='modal-bg';bg.id='modal-bg';
  bg.innerHTML=`<div class="modal">${html}</div>`;
  let downOnBg=false;
  bg.addEventListener('mousedown',e=>{downOnBg=(e.target===bg);});
  bg.addEventListener('mouseup',e=>{if(downOnBg&&e.target===bg)closeModal();downOnBg=false;});
  document.body.appendChild(bg);
  if(!window._escBound){
    window._escBound=true;
    document.addEventListener('keydown',e=>{ if(e.key==='Escape'&&document.getElementById('modal-bg'))closeModal(); });
  }
}
function closeModal(){const m=document.getElementById('modal-bg');if(m)m.remove(); if(window._scanInModal){ if(typeof stopScan==='function')stopScan(); window._scanInModal=false; }}
// 註冊 PWA service worker（讓網站可加入主畫面、離線可開）
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{ navigator.serviceWorker.register('sw.js').catch(()=>{}); });
}
